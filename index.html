function renderTicTacToeBlitz() {
  const state = APP.room.activityState || {};
  const isHost = APP.room.host === APP.player.name;
  const safeRoomCode = escapeHtml(APP.roomCode);
  const round = Number(state.round) || 1;
  const roundClosed = Boolean(state.roundClosed);
  const remainingMs = roundClosed ? 0 : ((Number(state.roundEndsAt) || 0) - Date.now());
  const timerLabel = formatClockFromMs(remainingMs);
  const standings = state.standings && typeof state.standings === 'object' ? state.standings : {};
  const standingsRows = Object.entries(standings)
    .sort((a, b) => {
      const aStats = a[1] || {};
      const bStats = b[1] || {};
      if ((bStats.points || 0) !== (aStats.points || 0)) return (bStats.points || 0) - (aStats.points || 0);
      if ((bStats.wins || 0) !== (aStats.wins || 0)) return (bStats.wins || 0) - (aStats.wins || 0);
      return a[0].localeCompare(b[0]);
    });
  const topScore = standingsRows.length ? (standingsRows[0][1]?.points || 0) : 0;
  const topPlayers = standingsRows
    .filter(([, stats]) => (stats?.points || 0) === topScore)
    .map(([name]) => name);
  const isTieForFirst = roundClosed && topPlayers.length > 1;
  const winnerName = roundClosed && topPlayers.length === 1 ? topPlayers[0] : '';
  const confettiPieces = roundClosed && topPlayers.length ? buildCelebrationConfettiPieces(28) : '';
  const avatarByName = Object.fromEntries((APP.room.participants || []).map(player => [player.name, player.avatar || '👤']));
  const playerMatchId = state.matchByPlayer?.[APP.player.name] || '';
  const playerMatch = state.matches?.[playerMatchId] || null;
  const byePlayers = Array.isArray(state.byePlayers) ? state.byePlayers : [];
  const currentPlayerIsBye = byePlayers.includes(APP.player.name);
  const roundMatchCount = Object.keys(state.matches || {}).length;
  const completedCount = Object.values(state.matches || {}).filter(match => Boolean(match?.complete)).length;

  let boardHtml = `
    <div style="background:linear-gradient(180deg,rgba(18,11,62,0.96),rgba(8,8,28,0.98));border:1px solid rgba(161,113,255,0.34);box-shadow:0 18px 42px rgba(6,6,26,0.42),inset 0 0 0 1px rgba(255,255,255,0.04);border-radius:28px;padding:20px;">
      <div style="color:var(--text-dim);">You are waiting for a matchup in this round.</div>
    </div>
  `;

  if (currentPlayerIsBye) {
    boardHtml = `
      <div style="background:linear-gradient(180deg,rgba(18,11,62,0.96),rgba(8,8,28,0.98));border:1px solid rgba(92,255,210,0.3);box-shadow:0 18px 42px rgba(6,6,26,0.42),0 0 26px rgba(0,210,211,0.12);border-radius:28px;padding:20px;">
        <div style="font-weight:800;margin-bottom:6px;color:#86fff0;letter-spacing:0.08em;text-transform:uppercase;">Bye Round</div>
        <div style="color:rgba(236,233,225,0.82);">No opponent this round. You received +1 point.</div>
      </div>
    `;
  } else if (playerMatch) {
    const symbols = playerMatch.symbols || {};
    const playerSymbol = symbols[APP.player.name] || '';
    const opponentName = (playerMatch.players || []).find(name => name !== APP.player.name) || 'Opponent';
    const opponentSymbol = symbols[opponentName] || '';
    const board = Array.isArray(playerMatch.board) ? playerMatch.board : Array(9).fill('');
    const canPlay = !roundClosed && !playerMatch.complete && playerMatch.turn === playerSymbol;
    const winner = playerMatch.winner || null;
    const statusText = playerMatch.complete
      ? (winner ? `${escapeHtml(winner)} won this match.` : 'Match ended in a draw.')
      : (canPlay ? 'Your turn.' : `${escapeHtml(opponentName)} is up.`);

    boardHtml = `
      <div style="position:relative;overflow:hidden;background:
        radial-gradient(circle at 50% 72%, rgba(255,72,108,0.24), transparent 24%),
        linear-gradient(180deg, rgba(23,10,74,0.98) 0%, rgba(13,9,45,0.98) 52%, rgba(8,7,26,0.99) 100%);
        border:1px solid rgba(174,118,255,0.42);
        box-shadow:0 24px 56px rgba(6,6,26,0.52), inset 0 0 0 1px rgba(255,255,255,0.05), 0 0 28px rgba(114,80,255,0.14);
        border-radius:30px;padding:20px;">
        <div style="position:absolute;inset:0;pointer-events:none;opacity:0.42;background:
          linear-gradient(to right, transparent 0%, transparent 14.8%, rgba(255,79,189,0.34) 15%, transparent 15.2%, transparent 49.8%, rgba(255,79,189,0.34) 50%, transparent 50.2%, transparent 84.8%, rgba(255,79,189,0.34) 85%, transparent 85.2%),
          linear-gradient(to bottom, transparent 0%, transparent 14.8%, rgba(255,79,189,0.34) 15%, transparent 15.2%, transparent 49.8%, rgba(255,79,189,0.34) 50%, transparent 50.2%, transparent 84.8%, rgba(255,79,189,0.34) 85%, transparent 85.2%);"></div>
        <div style="position:absolute;left:-6%;right:-6%;bottom:9%;height:38%;pointer-events:none;opacity:0.34;background:
          repeating-linear-gradient(to right, rgba(255,75,190,0.36) 0 2px, transparent 2px 12.5%),
          repeating-linear-gradient(to top, rgba(255,75,190,0.28) 0 2px, transparent 2px 16%);
          transform:perspective(420px) rotateX(76deg);transform-origin:bottom center;"></div>
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px;position:relative;z-index:1;">
          <div>
            <div style="font-weight:800;font-size:1.04rem;letter-spacing:0.05em;text-transform:uppercase;">Match vs ${escapeHtml(opponentName)}</div>
            <div style="color:rgba(236,233,225,0.72);font-size:0.9rem;">You: ${escapeHtml(playerSymbol)} • Opponent: ${escapeHtml(opponentSymbol)}</div>
          </div>
          <div style="font-size:0.82rem;color:${canPlay ? '#8bffe8' : 'rgba(236,233,225,0.64)'};font-weight:700;letter-spacing:0.04em;text-transform:uppercase;">${statusText}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;max-width:420px;position:relative;z-index:1;">
          ${board.map((cell, idx) => {
            const disabled = Boolean(cell) || !canPlay;
            const label = cell || '';
            const attrs = disabled ? '' : `data-action="submit-ttt-move" data-index="${idx}"`;
            const isX = cell === 'X';
            const isO = cell === 'O';
            const symbolColor = isX ? '#91c4ff' : isO ? '#ff8ca0' : 'rgba(255,255,255,0.24)';
            const symbolGlow = isX
              ? '0 0 10px rgba(145,196,255,0.95), 0 0 24px rgba(77,152,255,0.9), 0 0 42px rgba(77,152,255,0.45)'
              : isO
                ? '0 0 10px rgba(255,140,160,0.95), 0 0 24px rgba(255,86,126,0.9), 0 0 42px rgba(255,86,126,0.45)'
                : 'none';
            return `
              <button type="button" ${attrs} ${disabled ? 'disabled' : ''} style="
                aspect-ratio:1/1;
                border-radius:18px;
                border:2px solid ${cell ? 'rgba(221,181,255,0.46)' : 'rgba(255,112,219,0.28)'};
                background:${cell ? 'linear-gradient(180deg, rgba(33,15,92,0.9), rgba(14,8,43,0.94))' : 'linear-gradient(180deg, rgba(33,15,92,0.62), rgba(14,8,43,0.74))'};
                box-shadow:${cell
                  ? 'inset 0 0 0 1px rgba(255,255,255,0.06), 0 0 18px rgba(162,111,255,0.18)'
                  : disabled
                    ? 'inset 0 0 0 1px rgba(255,255,255,0.04)'
                    : 'inset 0 0 0 1px rgba(255,255,255,0.06), 0 0 18px rgba(255,79,189,0.12)'};
                color:${symbolColor};
                font-size:4.2rem;
                font-weight:900;
                letter-spacing:-0.08em;
                text-shadow:${symbolGlow};
                cursor:${disabled ? 'default' : 'pointer'};
                transition:transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
                position:relative;
              " onmouseover="if(!this.disabled){this.style.transform='translateY(-2px) scale(1.02)';this.style.boxShadow='inset 0 0 0 1px rgba(255,255,255,0.08), 0 0 24px rgba(255,79,189,0.2)';this.style.borderColor='rgba(255,153,229,0.58)';}" onmouseout="if(!this.disabled){this.style.transform='';this.style.boxShadow='inset 0 0 0 1px rgba(255,255,255,0.06), 0 0 18px rgba(255,79,189,0.12)';this.style.borderColor='rgba(255,112,219,0.28)';}">
                <span style="position:relative;z-index:1;">${escapeHtml(label)}</span>
              </button>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  return `
    ${roundClosed && topPlayers.length ? `<div class="trivia-confetti" aria-hidden="true">${confettiPieces}</div>` : ''}
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;">❌ Tic-Tac-Toe Blitz Arena</h1>
      <p class="tagline">Round ${round} • Room: ${safeRoomCode}</p>
    </div>

    ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}

    ${roundClosed && topPlayers.length ? `
      <div style="background:linear-gradient(135deg, rgba(44,18,112,0.86), rgba(140,33,91,0.74));border:2px solid rgba(152,229,255,0.68);box-shadow:0 0 28px rgba(112,209,255,0.16);border-radius:28px;padding:18px;margin:16px 0;text-align:center;">
        ${isTieForFirst ? `
          <div style="font-size:1.4rem;font-weight:700;margin-bottom:6px;">🤝 Tie for First Place!</div>
          <div style="color:var(--text-mid);font-size:1.02rem;">
            ${topPlayers.map(name => `${escapeHtml(avatarByName[name] || '👤')} ${escapeHtml(name)}`).join(' • ')}
          </div>
          <div style="margin-top:8px;color:var(--accent);font-weight:700;">${topScore} points each</div>
        ` : `
          <div style="font-size:1.4rem;font-weight:700;margin-bottom:6px;">🏆 Blitz Leader: ${escapeHtml(winnerName)}</div>
          <div style="font-size:2rem;line-height:1;">${escapeHtml(avatarByName[winnerName] || '👤')}</div>
          <div style="margin-top:8px;color:var(--accent);font-weight:700;">${topScore} points</div>
          <div style="margin-top:4px;color:var(--text-mid);">Round ${round} complete. Celebrate the win!</div>
        `}
      </div>
    ` : ''}

    <div style="background:linear-gradient(135deg, rgba(22,13,72,0.94), rgba(11,11,33,0.96));border:2px solid rgba(111,224,255,0.54);box-shadow:0 0 26px rgba(111,224,255,0.12);border-radius:28px;padding:18px;margin:16px 0;">
      <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;">
        <div style="font-weight:800;letter-spacing:0.05em;text-transform:uppercase;">Round Timer: <span style="color:${roundClosed ? 'rgba(236,233,225,0.56)' : '#8af1ff'};text-shadow:${roundClosed ? 'none' : '0 0 18px rgba(98,235,255,0.55)'};">${timerLabel}</span></div>
        <div style="color:rgba(236,233,225,0.74);font-size:0.92rem;">Matches complete: ${completedCount}/${roundMatchCount}</div>
      </div>
      ${roundClosed ? '<div style="margin-top:8px;color:var(--success);font-size:0.9rem;">Round closed. Start the next round when ready.</div>' : ''}
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;align-items:start;">
      ${boardHtml}
      <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);box-shadow:0 18px 42px rgba(6,6,26,0.42);border-radius:28px;padding:18px;">
        <h3 style="font-family:'Fraunces',serif;font-size:1.1rem;margin-bottom:10px;">Standings</h3>
        ${standingsRows.length ? `
          <div style="display:grid;gap:8px;">
            ${standingsRows.map(([name, stats], idx) => `
              <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.06);padding:10px;border-radius:14px;">
                <div style="min-width:0;">
                  <div style="font-weight:700;">#${idx + 1} ${escapeHtml(name)}</div>
                  <div style="font-size:0.82rem;color:var(--text-dim);">W ${stats.wins || 0} • D ${stats.draws || 0} • L ${stats.losses || 0} • Bye ${stats.byes || 0}</div>
                </div>
                <div style="font-weight:800;color:#8af1ff;text-shadow:0 0 14px rgba(98,235,255,0.4);">${stats.points || 0} pts</div>
              </div>
            `).join('')}
          </div>
        ` : '<div style="color:var(--text-dim);">No standings yet.</div>'}
      </div>
    </div>

    ${isHost ? `
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;">
        ${!roundClosed ? '<button class="btn-secondary" data-action="ttt-close-round">Close Round Now</button>' : ''}
        ${roundClosed ? '<button class="btn-primary" data-action="ttt-next-round">Start Next 2-Min Round</button>' : ''}
        <button class="btn-secondary" data-action="ttt-restart-blitz">Restart Blitz</button>
      </div>
    ` : ''}
  `;
}

function renderLightningTrivia() {
  const state = APP.room.activityState || {};
  const currentQ = state.currentQ || 0;
  const questionIndex = state.questionOrder?.[currentQ] ?? currentQ;
  const question = TRIVIA_BANK[questionIndex];
  const revealed = state.revealed || false;
  const answers = state.answers || {};
  const reactions = (state.reactions || []).filter(r => Date.now() - (r.ts || 0) < 3000);
  const userAnswer = answers[APP.player.name];
  const isHost = APP.room.host === APP.player.name;
  const hostSettings = getRoomHostSettings(APP.room);
  const safeRoomCode = escapeHtml(APP.roomCode);
  
  if (!question) {
    return renderTriviaResults();
  }
  
  const startTime = state.startTime || Date.now();
  const timeLimit = 20;
  const timeElapsed = (Date.now() - startTime) / 1000;
  const timeRemaining = Math.max(0, timeLimit - timeElapsed);
  const progress = (timeRemaining / timeLimit) * 100;
  const circumference = 2 * Math.PI * 50;
  const strokeDashoffset = circumference - (progress / 100) * circumference;
  
  const colors = ['kahoot-red', 'kahoot-blue', 'kahoot-yellow', 'kahoot-green'];
  
  let answerButtons = '';
  question.opts.forEach((opt, i) => {
    const colorClass = colors[i];
    let buttonClass = 'kahoot-answer ' + colorClass;
    const isCorrect = revealed && i === question.ans;
    const isUserAnswer = userAnswer === i;
    const isWrongUserAnswer = revealed && isUserAnswer && !isCorrect;
    const canClick = !revealed && (hostSettings.allowAnswerChanges || userAnswer === undefined || userAnswer === null);
    
    if (revealed) {
      buttonClass += ' disabled';
      if (isCorrect) buttonClass += ' correct';
      else if (!isCorrect) buttonClass += ' wrong';
    } else if (isUserAnswer) {
      buttonClass += ' selected';
    }
    
    const actionAttrs = canClick ? `data-action="submit-answer" data-index="${i}"` : '';
    const disabledAttr = canClick ? '' : 'disabled';
    
    const badge = !revealed
      ? (isUserAnswer ? '<span class="kahoot-selected-badge" aria-hidden="true">✓</span>' : '')
      : (isCorrect
        ? '<span class="kahoot-selected-badge" aria-hidden="true" style="background:var(--success);">✓</span>'
        : (isWrongUserAnswer
          ? '<span class="kahoot-selected-badge" aria-hidden="true" style="background:var(--danger);">✕</span>'
          : ''));

    const revealStyle = revealed
      ? (isCorrect
        ? 'box-shadow:0 0 0 4px rgba(255,255,255,0.22),0 0 0 9px rgba(0,210,106,0.4),0 0 42px rgba(0,210,106,0.45);transform:scale(1.06);filter:brightness(1.08) saturate(1.18);z-index:2;'
        : (isWrongUserAnswer
          ? 'box-shadow:0 0 0 3px rgba(255,64,96,0.45),0 0 18px rgba(255,64,96,0.22);'
          : 'box-shadow:inset 0 0 0 1px rgba(255,255,255,0.16);filter:brightness(0.98);'))
      : '';

    answerButtons += `
      <button type="button" class="${buttonClass}" ${actionAttrs} ${disabledAttr} aria-pressed="${isUserAnswer ? 'true' : 'false'}" style="${revealStyle}">
        ${badge}
        ${String.fromCharCode(65 + i)}. ${opt}
      </button>
    `;
  });
  
  let leaderboardHtml = '';
  if (revealed) {
    const participants = APP.room.participants.map(p => ({
      ...p,
      score: state.scores?.[p.name] || 0,
      lastPoints: state.lastPoints?.[p.name] || 0
    })).sort((a, b) => b.score - a.score);
    
    participants.forEach((p, i) => {
      const lastPts = p.lastPoints > 0 ? `<span style="color:var(--success);font-size:0.85rem;margin-left:8px;">+${p.lastPoints}</span>` : '';
      leaderboardHtml += `
        <div style="display:flex;justify-content:space-between;align-items:center;
          background:var(--surface-2);border-radius:10px;padding:14px;margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:1.5rem;font-weight:700;width:40px;">#${i + 1}</span>
            <span style="font-size:1.2rem;">${escapeHtml(p.avatar)}</span>
            <span style="font-weight:600;">${escapeHtml(p.name)}</span>
            ${lastPts}
          </div>
          <span style="background:var(--accent);color:var(--bg);padding:6px 14px;border-radius:20px;font-weight:700;">
            ${p.score}
          </span>
        </div>
      `;
    });
  }

  const reactionButtons = LIGHTNING_REACTIONS.map(emoji => `
    <button type="button" class="reaction-btn" data-action="send-lightning-reaction" data-emoji="${emoji}" aria-label="Send reaction ${emoji}">
      ${emoji}
    </button>
  `).join('');

  const reactionStream = reactions.map(r => {
    const left = Math.max(10, Math.min(90, Number(r.left) || 50));
    const drift = Math.max(-24, Math.min(24, Number(r.drift) || 0));
    const ageMs = Math.max(0, Math.min(3000, Date.now() - (Number(r.ts) || 0)));
    return `<span class="reaction-pill" title="${escapeHtml(r.player)}" style="--reaction-left:${left}%;--reaction-drift:${drift}px;animation-delay:-${ageMs}ms;">
      <span class="reaction-pill-emoji">${escapeHtml(r.emoji)}</span>
      <span class="reaction-pill-name">${escapeHtml(r.player)}</span>
    </span>`;
  }).join('');
  
  return `
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;margin-bottom:5px;">⚡ Lightning Trivia</h1>
      <p class="tagline">Question ${currentQ + 1} of ${TRIVIA_BANK.length} • Room: ${safeRoomCode}</p>
    </div>
    
    ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}
    
    ${!revealed ? `
      <div class="kahoot-timer">
        <svg class="timer-circle" viewBox="0 0 120 120">
          <circle class="timer-bg" cx="60" cy="60" r="50"/>
          <circle class="timer-progress ${timeRemaining < 5 ? 'warning' : ''}" 
            cx="60" cy="60" r="50"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${strokeDashoffset}"/>
        </svg>
        <div class="timer-text" role="timer" aria-live="off" aria-label="${Math.ceil(timeRemaining)} seconds remaining" style="color:${timeRemaining < 5 ? 'var(--danger)' : 'var(--accent)'}">
          ${timeRemaining.toFixed(1)}
        </div>
      </div>
    ` : ''}

    <div class="reaction-stream" aria-live="polite">${reactionStream}</div>
    <div class="reaction-bar">${reactionButtons}</div>
    
    <div style="background:var(--surface-solid);border:2px solid var(--accent);
      border-radius:var(--radius);padding:40px 30px;margin-bottom:30px;text-align:center;">
      <div style="font-family:'Fraunces',serif;font-size:${APP.presentationMode ? '2.5rem' : '1.8rem'};
        font-weight:700;line-height:1.4;margin-bottom:30px;">
        ${question.q}
      </div>
      
      <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;max-width:800px;margin:0 auto;">
        ${answerButtons}
      </div>
    </div>
    
    ${!revealed ? `
      <div role="status" aria-live="polite" aria-atomic="true" style="text-align:center;color:var(--text-dim);margin-bottom:20px;">
        ${Object.keys(answers).length} of ${APP.room.participants.length} answered
      </div>
    ` : `
      <div style="background:var(--surface-solid);border:1px solid var(--border);
        border-radius:var(--radius);padding:24px;margin-bottom:20px;">
        <h3 aria-live="polite" aria-atomic="true" style="text-align:center;font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:20px;">
          🏆 Leaderboard
        </h3>
        ${leaderboardHtml}
      </div>
    `}
    
    ${isHost ? `
      <button class="btn-primary" data-action="${revealed ? 'next-question' : 'reveal-answer'}">
        ${revealed ? (currentQ < TRIVIA_BANK.length - 1 ? 'Next Question' : 'View Final Results') : 'Reveal Answer'}
      </button>
    ` : ''}
  `;
}

function renderTriviaResults() {
  const finishedActivity = APP.room.currentActivity;
  const isLightningResults = finishedActivity === 'lightning-trivia';
  const participants = APP.room.participants.map(p => ({
    ...p,
    score: APP.room.activityState.scores?.[p.name] || 0
  })).sort((a, b) => b.score - a.score);
  
  const top3 = participants.slice(0, 3);
  const isHost = APP.room.host === APP.player.name;
  const confettiPalette = ['#00d2d3', '#c56cf0', '#feca57', '#00d26a', '#ff4060', '#ffd700'];
  const confettiPieces = isLightningResults
    ? Array.from({ length: 42 }, (_, idx) => {
      const left = Math.floor(Math.random() * 100);
      const delay = (Math.random() * 2).toFixed(2);
      const duration = (7.2 + (Math.random() * 2.8)).toFixed(2);
      const drift = Math.floor((Math.random() * 160) - 80);
      const rotate = Math.floor(Math.random() * 70) - 35;
      const color = confettiPalette[idx % confettiPalette.length];
      return `<span class="trivia-confetti-piece" style="left:${left}%;background:${color};animation-delay:${delay}s;animation-duration:${duration}s;--confetti-drift:${drift}px;transform:rotate(${rotate}deg);"></span>`;
    }).join('')
    : '';
  
  return `
    ${isLightningResults ? `<div class="trivia-confetti" aria-hidden="true">${confettiPieces}</div>` : ''}
    <div class="header">
      <h1 style="font-size:2.5rem;font-weight:700;margin-bottom:10px;">🎉 Game Over!</h1>
      <p class="tagline">${finishedActivity === 'regular-trivia' ? 'Trivia Battle Results' : 'Lightning Trivia Results'}</p>
    </div>
    
    ${top3.length >= 3 ? `
      <div class="podium">
        <div class="podium-place second">
          <div class="podium-medal">🥈</div>
          <div style="font-size:1.5rem;margin-bottom:5px;">${escapeHtml(top3[1].avatar)}</div>
          <div style="font-weight:700;">${escapeHtml(top3[1].name)}</div>
          <div style="color:var(--accent);font-size:1.2rem;font-weight:700;margin-top:8px;">
            ${top3[1].score}
          </div>
        </div>
        
        <div class="podium-place first">
          <div class="podium-medal">🥇</div>
          <div style="font-size:2rem;margin-bottom:5px;">${escapeHtml(top3[0].avatar)}</div>
          <div style="font-weight:700;font-size:1.1rem;">${escapeHtml(top3[0].name)}</div>
          <div style="color:#ffd700;font-size:1.5rem;font-weight:700;margin-top:8px;">
            ${top3[0].score}
          </div>
        </div>
        
        <div class="podium-place third">
          <div class="podium-medal">🥉</div>
          <div style="font-size:1.5rem;margin-bottom:5px;">${escapeHtml(top3[2].avatar)}</div>
          <div style="font-weight:700;">${escapeHtml(top3[2].name)}</div>
          <div style="color:var(--warning);font-size:1.2rem;font-weight:700;margin-top:8px;">
            ${top3[2].score}
          </div>
        </div>
      </div>
    ` : ''}
    
    <div style="background:var(--surface-solid);border:1px solid var(--border);
      border-radius:var(--radius);padding:24px;margin:30px 0;">
      <h3 style="text-align:center;margin-bottom:20px;font-size:1.2rem;font-weight:700;">
        Final Standings
      </h3>
      ${participants.map((p, i) => `
        <div style="display:flex;justify-content:space-between;align-items:center;
          background:var(--surface-2);border-radius:10px;padding:14px;margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:1.3rem;font-weight:700;">#${i + 1}</span>
            <span style="font-size:1.2rem;">${escapeHtml(p.avatar)}</span>
            <span style="font-weight:600;">${escapeHtml(p.name)}</span>
          </div>
          <span style="font-size:1.2rem;font-weight:700;color:var(--accent);">${p.score}</span>
        </div>
      `).join('')}
    </div>
    
    ${isHost ? `
      <div style="display:flex;gap:10px;">
        <button class="btn-primary" data-action="play-again" style="flex:1;">Play Again</button>
        <button class="btn-secondary" data-action="end-activity" style="flex:1;">Back to Lobby</button>
      </div>
    ` : ''}
  `;
}

// Initialize
async function init() {
  APP.footerQuoteIndex = Math.floor(Math.random() * TEAM_BUILDING_QUOTES.length);
  APP.sessionManager.plans = loadSessionPlans();
  const params = new URLSearchParams(window.location.search);
  const deepJoinCode = normalizeRoomCode(params.get('join') || params.get('room') || params.get('code') || '');
  const deepJoinToken = normalizeRoomAccessToken(params.get('token') || params.get('roomToken') || '');
  const sharedSessionPlan = decodeSessionPlan(params.get('sessionPlan') || '');
  if (/^[A-Z0-9]{6}$/.test(deepJoinCode)) {
    APP.pendingJoinCode = deepJoinCode;
  }
  if (deepJoinToken) {
    APP.pendingJoinToken = deepJoinToken;
    if (deepJoinCode) {
      setStoredRoomAccessToken(deepJoinCode, deepJoinToken);
    }
  }
  if (sharedSessionPlan) {
    const normalizedPlan = normalizeSessionPlan(sharedSessionPlan, 0);
    if (normalizedPlan) {
      const plans = loadSessionPlans().filter(plan => plan.id !== normalizedPlan.id);
      plans.unshift(normalizedPlan);
      persistSessionPlans(plans);
      APP.sessionManager.editingPlanId = normalizedPlan.id;
      APP.sessionManager.importedPlanId = normalizedPlan.id;
      const cleanUrl = new URL(window.location.href);
      cleanUrl.searchParams.delete('sessionPlan');
      window.history.replaceState({}, document.title, cleanUrl.toString());
    }
  }
  getFeedbackUserToken();
  await loadPublicConfig();
  const profile = await PlayerManager.loadProfile();
  if (profile) {
    APP.player = profile;
    if (APP.pendingJoinCode) {
      APP.screen = 'join-room';
    } else if (APP.sessionManager.importedPlanId) {
      APP.screen = 'load-session';
    } else {
      const restored = await restoreActiveSession();
      APP.screen = restored ? 'lobby' : 'dashboard';
    }
  }
  syncFooterQuoteRotation();
  render();
}

window.addEventListener('beforeunload', () => {
  stopRoomSync();
});

init();

// --- MISSING RENDER SCREENS ---
function renderScheduleMeeting() {
  if (APP.preferences.enableScheduleMeeting === false) {
    return `
      <div class="header">
        <h1 class="logo">Schedule Team Meeting</h1>
        <p class="tagline">This feature is disabled by admin.</p>
      </div>
      <button class="btn-secondary" data-action="go-screen" data-screen="dashboard">← Back</button>
    `;
  }
  const editingPlan = getSessionPlanById(APP.sessionManager.editingPlanId) || null;
  const sessionPlans = APP.sessionManager.plans || [];
  const selectedQueue = new Set(Array.isArray(editingPlan?.activityQueue) ? editingPlan.activityQueue : []);
  return `
    <div class="header">
      <h1 class="logo">${editingPlan ? 'Edit Session Plan' : 'Plan Session'}</h1>
      <p class="tagline">Set up a reusable session plan ahead of time, then share it or launch it into a live room when you are ready.</p>
    </div>
    <div class="form-container">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;">
        <div style="color:var(--text-dim);font-size:0.92rem;">
          ${editingPlan ? `Editing: <strong>${escapeHtml(editingPlan.title)}</strong>` : `${sessionPlans.length} saved session plan${sessionPlans.length === 1 ? '' : 's'}`}
        </div>
        ${editingPlan ? '<button class="btn-secondary" data-action="clear-session-plan-editor" style="width:auto;padding:10px 14px;">New Plan</button>' : ''}
      </div>
      <div class="form-group">
        <label class="form-label" for="meetingTitle">Session Title</label>
        <input id="meetingTitle" class="form-input" maxlength="80" value="${escapeHtml(editingPlan?.title || '')}" placeholder="Quarterly kickoff">
      </div>
      <div class="form-group">
        <label class="form-label" for="meetingDate">Date</label>
        <input type="date" id="meetingDate" class="form-input" style="max-width:220px;" value="${escapeHtml(editingPlan?.date || '')}">
      </div>
      <div class="form-group">
        <label class="form-label" for="meetingTime">Time</label>
        <input type="time" id="meetingTime" class="form-input" style="max-width:220px;" value="${escapeHtml(editingPlan?.time || '')}">
      </div>
      <div class="form-group">
        <label class="form-label" for="zoomLink">Meeting or Session Link</label>
        <input type="url" id="zoomLink" class="form-input" value="${escapeHtml(editingPlan?.zoomLink || '')}" placeholder="https://zoom.us/...">
      </div>
      <div class="form-group">
        <label class="form-label" for="meetingDetails">Agenda / Details</label>
        <textarea id="meetingDetails" class="form-input" rows="5" placeholder="Agenda, goals, notes, facilitators, reminders...">${escapeHtml(editingPlan?.details || '')}</textarea>
      </div>
      ${APP.preferences.enableActivityQueue !== false ? `
        <div class="form-group">
          <label class="form-label">Activity Queue</label>
          <div id="activityQueueSelector" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;">
            ${getEnabledActivityItems().map(item => `
              <label style="display:flex;align-items:center;gap:8px;padding:6px 0;">
                <input type="checkbox" class="activity-queue-checkbox" value="${item.id}" ${selectedQueue.has(item.id) ? 'checked' : ''}>
                <span style="font-size:1.2rem;">${item.icon}</span>
                <span>${escapeHtml(item.label)}</span>
              </label>
            `).join('')}
          </div>
          <div style="font-size:0.9rem;color:var(--text-dim);margin-top:6px;">Pick the activities to preload for this session plan. They will be added to the room queue when you launch the plan.</div>
        </div>
      ` : ''}
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn-primary" data-action="save-meeting" style="width:auto;padding:12px 18px;">${editingPlan ? 'Update Session Plan' : 'Save Session Plan'}</button>
        ${editingPlan ? `<button class="btn-secondary" data-action="share-session-plan" data-plan-id="${escapeHtml(editingPlan.id)}" style="width:auto;padding:12px 18px;">Share Plan</button>` : ''}
        ${editingPlan ? `<button class="btn-secondary" data-action="export-session-plan-ics" data-plan-id="${escapeHtml(editingPlan.id)}" style="width:auto;padding:12px 18px;">Download Invite</button>` : ''}
      </div>
      <button class="btn-secondary" data-action="go-screen" data-screen="dashboard" style="margin-top:10px;">Cancel</button>
    </div>
  `;
}

function renderLoadSession() {
  if (APP.preferences.enableLoadSession === false) {
    return `
      <div class="header">
        <h1 class="logo">Load Saved Session</h1>
        <p class="tagline">This feature is disabled by admin.</p>
      </div>
      <button class="btn-secondary" data-action="go-screen" data-screen="dashboard">← Back</button>
    `;
  }
  const plans = APP.sessionManager.plans || [];
  const importedPlan = APP.sessionManager.importedPlanId ? getSessionPlanById(APP.sessionManager.importedPlanId) : null;
  return `
    <div class="header">
      <h1 class="logo">Manage Session Plans</h1>
      <p class="tagline">Load, edit, share, or launch a saved session plan into a new live room.</p>
    </div>
    <button class="btn-secondary" data-action="go-screen" data-screen="dashboard">← Back</button>
    ${importedPlan ? `
      <div style="margin-top:16px;background:rgba(0,210,211,0.08);border:1px solid rgba(0,210,211,0.18);border-radius:16px;padding:16px;">
        <div style="font-weight:800;margin-bottom:4px;">Imported shared session plan</div>
        <div style="color:var(--text-dim);font-size:0.9rem;">${escapeHtml(importedPlan.title)} is now available below and ready to edit, share, or launch.</div>
      </div>
    ` : ''}
    <div style="display:grid;gap:14px;margin-top:18px;">
      ${plans.length ? plans.map(plan => `
        <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:18px;padding:18px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
            <div style="min-width:0;">
              <div style="font-family:'Fraunces',serif;font-size:1.35rem;">${escapeHtml(plan.title)}</div>
              <div style="color:var(--text-dim);font-size:0.9rem;margin-top:4px;">
                ${escapeHtml([plan.date || '', plan.time || ''].filter(Boolean).join(' • ') || 'No date set')}
                ${plan.zoomLink ? ' • Link ready' : ''}
                ${plan.activityQueue.length ? ` • ${plan.activityQueue.length} queued activit${plan.activityQueue.length === 1 ? 'y' : 'ies'}` : ''}
              </div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn-primary" data-action="start-session-from-plan" data-plan-id="${escapeHtml(plan.id)}" style="width:auto;padding:10px 16px;">Launch Room</button>
              <button class="btn-secondary" data-action="share-session-plan" data-plan-id="${escapeHtml(plan.id)}" style="width:auto;padding:10px 16px;">Share</button>
              <button class="btn-secondary" data-action="edit-session-plan" data-plan-id="${escapeHtml(plan.id)}" style="width:auto;padding:10px 16px;">Edit</button>
              <button class="btn-secondary" data-action="export-session-plan-ics" data-plan-id="${escapeHtml(plan.id)}" style="width:auto;padding:10px 16px;">Invite</button>
              <button class="btn-secondary" data-action="delete-session-plan" data-plan-id="${escapeHtml(plan.id)}" style="width:auto;padding:10px 16px;">Delete</button>
            </div>
          </div>
          ${plan.details ? `<div style="margin-top:12px;color:var(--text-mid);line-height:1.55;white-space:pre-wrap;">${escapeHtml(plan.details)}</div>` : ''}
          ${plan.activityQueue.length ? `
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;">
              ${plan.activityQueue.map(activityId => {
                const item = ACTIVITY_QUEUE_ITEM_MAP[activityId];
                if (!item) return '';
                return `<span class="slides-studio-chip" style="font-size:0.78rem;">${item.icon} ${escapeHtml(item.label)}</span>`;
              }).join('')}
            </div>
          ` : ''}
        </div>
      `).join('') : `
        <div class="form-container">
          <div style="font-family:'Fraunces',serif;font-size:1.4rem;margin-bottom:8px;">No saved session plans yet.</div>
          <div style="color:var(--text-dim);margin-bottom:16px;">Create one in Plan Session, then come back here to share or launch it.</div>
          <button class="btn-primary" data-action="go-screen" data-screen="schedule-meeting">Create Session Plan</button>
        </div>
      `}
    </div>
  `;
}
</script>
