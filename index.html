        ` : '<p style="text-align:center;color:var(--text-dim);padding:8px;">Need at least one suggestion before voting.</p>'}
      </div>
      
      ${isHost && (Object.keys(answers).length > 0 || hostTypedWord.length === 5) ? `
        <button class="btn-primary" data-action="submit-wordle-guess" style="margin-top:20px;">
          ${hostTypedWord.length === 5 ? 'Submit Typed Word to Grid' : 'Submit Voted Word to Grid'}
        </button>
      ` : ''}
    ` : `
      ${isHost ? '<button class="btn-primary" data-action="new-wordle-round">New Round</button>' : ''}
    `}
  `;
}

async function submitWordChainGuess() {
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'word-chain') return;
  if (room.host !== APP.player?.name) {
    showError('Only host can submit the team row.');
    return;
  }

  const state = room.activityState || {};
  const puzzle = WORD_CHAIN_PUZZLES[state.puzzleIndex];
  if (!puzzle) return;

  if (!state.progressIndex) state.progressIndex = {};
  if (!state.revealedLetters) state.revealedLetters = {};
  if (!state.lastLetterGraceUsed) state.lastLetterGraceUsed = {};
  if (!state.solvedWords) state.solvedWords = {};
  if (!state.wordScores) state.wordScores = {};
  if (!state.wordAttempts) state.wordAttempts = {};
  if (!state.totalAttempts) state.totalAttempts = {};
  if (!state.completedAt) state.completedAt = {};
  if (!state.scores) state.scores = {};
  if (!state.feedback) state.feedback = {};
  if (!state.chainSuggestions) state.chainSuggestions = {};
  if (!state.chainVotes) state.chainVotes = {};

  const chain = (puzzle.words || []).slice(0, Math.min(8, state.wordCount || 8));
  if (chain.length < 3) return;

  const playerName = TEAM_CHAIN_KEY;
  const lastIndex = chain.length - 1;
  if (!state.progressIndex[playerName]) state.progressIndex[playerName] = 1;
  if (!state.revealedLetters[playerName]) state.revealedLetters[playerName] = { 1: 1 };
  if (!state.lastLetterGraceUsed[playerName]) state.lastLetterGraceUsed[playerName] = {};
  if (!state.solvedWords[playerName]) state.solvedWords[playerName] = {};
  if (!state.wordScores[playerName]) state.wordScores[playerName] = {};
  if (!state.wordAttempts[playerName]) state.wordAttempts[playerName] = {};

  const currentIndex = state.progressIndex[playerName];
  if (currentIndex >= lastIndex) return;

  const answer = normalizeChainWord(chain[currentIndex]);
  const revealCount = Math.max(1, Math.min(answer.length, state.revealedLetters[playerName]?.[currentIndex] || 1));
  const revealedPrefix = answer.slice(0, revealCount);
  captureWordChainRowDraft(currentIndex);
  const typedSuffix = normalizeChainWord(wordChainDraft[currentIndex] || '');
  const voteCounts = {};
  const validSuggestions = new Set(
    Object.values(state.chainSuggestions || {}).map(s => normalizeChainWord(s).slice(0, 9)).filter(Boolean)
  );
  Object.values(state.chainVotes || {}).forEach(v => {
    const val = normalizeChainWord(v).slice(0, 9);
    if (!validSuggestions.has(val)) return;
    voteCounts[val] = (voteCounts[val] || 0) + 1;
  });
  const votedWord = Object.entries(voteCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || '';
  let guess = '';
  if (typedSuffix) {
    guess = normalizeChainWord((revealedPrefix + typedSuffix).slice(0, answer.length));
  } else if (votedWord) {
    guess = normalizeChainWord(votedWord).slice(0, answer.length);
  }
  if (!guess) {
    showError('Need host typed input or at least one voted suggestion.');
    return;
  }

  state.totalAttempts[playerName] = (state.totalAttempts[playerName] || 0) + 1;
  const attemptForWord = (state.wordAttempts[playerName][currentIndex] || 0) + 1;
  state.wordAttempts[playerName][currentIndex] = attemptForWord;

  const solvedMap = state.solvedWords[playerName];
  const wordScoreMap = state.wordScores[playerName];
  const revealMap = state.revealedLetters[playerName];
  const graceMap = state.lastLetterGraceUsed[playerName];
  let newlySolved = false;
  let autoRevealedAdvance = false;
  let pointsEarned = 0;

  if (guess === answer) {
    solvedMap[currentIndex] = true;
    newlySolved = true;
    if (attemptForWord === 1) pointsEarned = 20;
    else if (attemptForWord === 2) pointsEarned = 15;
    else if (attemptForWord === 3) pointsEarned = 10;
    else pointsEarned = Math.max(0, 5 - (attemptForWord - 4)); // -1 for attempts after 4th
    state.scores[playerName] = (state.scores[playerName] || 0) + pointsEarned;
    wordScoreMap[currentIndex] = pointsEarned;

    state.progressIndex[playerName] = currentIndex + 1;
    delete graceMap[currentIndex];
    wordChainDraft[currentIndex] = '';
    const nextIndex = state.progressIndex[playerName];
    if (nextIndex < lastIndex) {
      revealMap[nextIndex] = Math.max(1, revealMap[nextIndex] || 1);
    } else {
      state.completedAt[playerName] = Date.now();
    }
  } else {
    const currentReveal = revealMap[currentIndex] || 1;
    const lastMissingLetter = currentReveal >= Math.max(1, answer.length - 1);
    if (lastMissingLetter && !graceMap[currentIndex]) {
      // Give one extra try when only one letter remains hidden.
      graceMap[currentIndex] = true;
    } else if (lastMissingLetter && graceMap[currentIndex]) {
      // Second miss on last-letter state: reveal it and advance.
      revealMap[currentIndex] = answer.length;
      solvedMap[currentIndex] = true;
      autoRevealedAdvance = true;
      pointsEarned = 0;
      wordScoreMap[currentIndex] = 0;
      delete graceMap[currentIndex];
      state.progressIndex[playerName] = currentIndex + 1;
      const nextIndex = state.progressIndex[playerName];
      if (nextIndex < lastIndex) {
        revealMap[nextIndex] = Math.max(1, revealMap[nextIndex] || 1);
      } else {
        state.completedAt[playerName] = Date.now();
      }
    } else {
      revealMap[currentIndex] = Math.min(answer.length, currentReveal + 1);
    }
    wordChainDraft[currentIndex] = '';
    const activeRowInputs = document.querySelectorAll(`.word-chain-letter-input[data-row="${currentIndex}"]`);
    activeRowInputs.forEach(input => {
      if (input instanceof HTMLInputElement) input.value = '';
    });
  }
  state.chainSuggestions = {};
  state.chainVotes = {};

  state.solvedWords[playerName] = solvedMap;
  state.wordScores[playerName] = wordScoreMap;
  state.revealedLetters[playerName] = revealMap;
  state.lastLetterGraceUsed[playerName] = graceMap;

  const solvedCount = Object.keys(solvedMap).length;
  const hiddenTotal = Math.max(0, lastIndex - 1);
  const remaining = Math.max(0, hiddenTotal - solvedCount);
  const now = Date.now();
  state.feedback[playerName] = {
    correctThisRound: newlySolved ? 1 : 0,
    remaining,
    attempts: state.totalAttempts[playerName] || 0,
    pointsEarned,
    autoRevealedAdvance,
    ts: now
  };

  // Force focus refresh after every submit (wrong: same row, correct: next row).
  resetWordChainFocusState();
  room.activityState = state;
  await RoomManager.updateRoom(APP.roomCode, room);
}

function renderWordChain() {
  const state = APP.room.activityState || {};
  const puzzle = WORD_CHAIN_PUZZLES[state.puzzleIndex];
  const isHost = APP.room.host === APP.player.name;
  const safeRoomCode = escapeHtml(APP.roomCode);

  if (!puzzle) {
    return `
      <div class="header">
        <h1 style="font-size:2rem;font-weight:700;">🔗 Word Chain</h1>
        <p class="tagline">Room: ${safeRoomCode}</p>
      </div>
      <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:12px;padding:20px;">
        Puzzle unavailable.
      </div>
    `;
  }

  const playerName = TEAM_CHAIN_KEY;
  const chain = (puzzle.words || []).slice(0, Math.min(8, state.wordCount || 8));
  const lastIndex = chain.length - 1;
  const playerProgress = state.progressIndex?.[playerName] || 1;
  const revealMap = state.revealedLetters?.[playerName] || { 1: 1 };
  const solvedMap = state.solvedWords?.[playerName] || {};
  const wordScoreMap = state.wordScores?.[playerName] || {};
  const wordAttempts = state.wordAttempts?.[playerName] || {};
  const totalAttempts = state.totalAttempts?.[playerName] || 0;
  const feedback = state.feedback?.[playerName];
  const solvedCount = Object.keys(solvedMap).length;
  const hiddenTotal = Math.max(0, lastIndex - 1);
  const completedAt = state.completedAt?.[playerName];
  const score = state.scores?.[playerName] || 0;
  const elapsedSec = Math.max(0, Math.floor((Date.now() - (state.startedAt || Date.now())) / 1000));
  const suggestions = state.chainSuggestions || {};
  const votes = state.chainVotes || {};
  const userSuggestion = suggestions[APP.player.name] || '';
  const userVote = votes[APP.player.name] || '';
  const suggestionWords = Array.from(new Set(Object.values(suggestions).map(word => normalizeChainWord(word).slice(0, 9)).filter(Boolean)));
  const voteCounts = {};
  Object.values(votes).forEach(word => {
    const normalized = normalizeChainWord(word).slice(0, 9);
    if (!suggestionWords.includes(normalized)) return;
    voteCounts[normalized] = (voteCounts[normalized] || 0) + 1;
  });
  const topVoteEntry = Object.entries(voteCounts).sort((a, b) => b[1] - a[1])[0] || null;
  const topVoteWord = topVoteEntry?.[0] || '';

  const participation = APP.room.participants.map(p => ({
    name: p.name,
    avatar: p.avatar,
    suggestion: suggestions[p.name] || '',
    vote: votes[p.name] || ''
  }));

  let gridHtml = '<div class="word-chain-board">';
  chain.forEach((word, idx) => {
    const normalized = normalizeChainWord(word).slice(0, 9);
    const isFirst = idx === 0;
    const isLast = idx === lastIndex;
    const isSolved = Boolean(solvedMap[idx]);
    const isActiveRow = idx === playerProgress && !isSolved && !isFirst && !isLast;
    const rowAttempts = wordAttempts[idx] || 0;
    const rowScore = Number(wordScoreMap[idx] ?? 0);
    const missHue = Math.max(0, 120 - (rowAttempts * 24)); // 120 (green) -> 0 (red)
    const missBorder = `hsl(${missHue} 72% 45%)`;
    const missBg = `hsla(${missHue}, 72%, 45%, 0.2)`;
    const finalHue = Math.max(0, Math.min(120, Math.round((rowScore / 20) * 120)));
    const finalBorder = `hsl(${finalHue} 72% 45%)`;
    const finalBg = `hsla(${finalHue}, 72%, 45%, 0.25)`;
    const baseReveal = revealMap[idx] ?? (idx === playerProgress ? 1 : 0);
    const revealedChars = isFirst || isLast || isSolved
      ? normalized.length
      : Math.max(0, Math.min(normalized.length, baseReveal));

    gridHtml += `
      <div class="word-chain-board-row">
        <div class="word-chain-row">
            ${Array.from({ length: 9 }, (_, pos) => {
              const showChar = pos < revealedChars && pos < normalized.length;
              const char = showChar ? normalized[pos] || '' : '';
              const isBlank = pos >= normalized.length;
              const draftChar = (wordChainDraft[idx] || '')[Math.max(0, pos - revealedChars)] || '';
              const isMiddleSolved = isSolved && !isFirst && !isLast;
              const cellClass = isFirst
                ? 'word-chain-cell top-anchor'
                : isLast
                  ? 'word-chain-cell bottom-anchor'
                  : 'word-chain-cell';
              if (isActiveRow && pos >= revealedChars && isHost) {
                const firstEditableAttr = pos === revealedChars ? 'data-first-editable="true"' : '';
                const missStyle = rowAttempts > 0 ? `style="border-color:${missBorder};background:${missBg};"` : '';
                return `<input class="word-chain-letter-input" data-row="${idx}" data-pos="${pos}" ${firstEditableAttr} ${missStyle} value="${escapeHtml(draftChar)}" maxlength="1" aria-label="Row ${idx + 1} letter ${pos + 1} of 9">`;
              }
              if (isBlank && !isFirst && !isLast && !isMiddleSolved) {
                const missStyle = rowAttempts > 0 ? `style="border-color:${missBorder};background:${missBg};"` : '';
                return `<div class="${cellClass}" ${missStyle}></div>`;
              }
              const solvedStyle = isMiddleSolved ? `style="border-color:${finalBorder};background:${finalBg};"` : '';
              const missStyle = (!isFirst && !isLast && !isSolved && rowAttempts > 0) ? `style="border-color:${missBorder};background:${missBg};"` : '';
              return `<div class="${cellClass}" ${solvedStyle || missStyle}>${escapeHtml(char)}</div>`;
            }).join('')}
        </div>
        ${idx > 0 && idx < lastIndex && Object.prototype.hasOwnProperty.call(wordScoreMap, idx)
          ? `<span class="word-chain-score-bubble">+${Number(wordScoreMap[idx]) || 0}</span>`
          : '<span></span>'}
      </div>
    `;
  });
  gridHtml += '</div>';

  const allDone = hiddenTotal > 0 && solvedCount >= hiddenTotal;
  const statusLine = allDone
    ? `Solved ${hiddenTotal} words in ${totalAttempts} ${totalAttempts === 1 ? 'attempt' : 'attempts'} • Score ${score}`
    : `${solvedCount}/${hiddenTotal} words solved • Total attempts: ${totalAttempts}`;

  return `
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;">🔗 Word Chain</h1>
      <p class="tagline">${escapeHtml(puzzle.title)} • Room: ${safeRoomCode}</p>
    </div>

    ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}

    <div class="word-chain-shell">
      <div class="word-chain-help">
        Team mode: first and last words are revealed. Solve middle words together (up to 8 total words).
      </div>
      <div class="word-chain-help">
        Submit by voted suggestion or host typed row. On wrong attempts, one more letter is revealed.
      </div>
      ${gridHtml}

      <div class="word-chain-status" role="status" aria-live="polite" aria-atomic="true">
        ${statusLine}
      </div>

      ${feedback && !allDone ? `
        <div style="margin-top:8px;color:var(--text-mid);font-size:0.9rem;">
          Last submit: ${
            feedback.correctThisRound
              ? `correct word solved (+${feedback.pointsEarned || 0})`
              : feedback.autoRevealedAdvance
                ? 'final letter revealed, advanced to next word'
                : 'not matched'
          } • ${feedback.remaining} remaining.
        </div>
      ` : ''}

      ${!allDone ? `
        <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px;">
          <div style="font-weight:700;margin-bottom:10px;">Team Suggestions & Voting</div>
          <div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px;">
            <input id="wordChainSuggestionInput" class="form-input" maxlength="9" value="${escapeHtml(userSuggestion)}" placeholder="Suggest word (up to 9 letters)">
            <button class="btn-secondary" data-action="submit-word-chain-suggestion" style="width:auto;padding:10px 14px;">${userSuggestion ? 'Update' : 'Suggest'}</button>
          </div>
          ${suggestionWords.length ? `
            <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;">
              ${suggestionWords.map(word => {
                const isSelected = userVote === word;
                const count = voteCounts[word] || 0;
                return `
                  <button type="button" class="tile-btn" data-action="submit-word-chain-vote" data-word="${word}" aria-pressed="${isSelected ? 'true' : 'false'}"
                    style="border:2px solid ${isSelected ? 'var(--accent)' : 'var(--border)'};background:${isSelected ? 'rgba(0,210,211,0.08)' : 'var(--surface-2)'};
                    border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
                    <span style="font-weight:700;letter-spacing:2px;">${escapeHtml(word)}</span>
                    <span style="font-size:0.82rem;color:var(--text-dim);">${count} vote${count === 1 ? '' : 's'}</span>
                  </button>
                `;
              }).join('')}
            </div>
          ` : '<div style="color:var(--text-dim);font-size:0.9rem;">No suggestions yet.</div>'}
          <div style="margin-top:8px;color:var(--text-dim);font-size:0.85rem;">
            ${Object.keys(votes).length} of ${APP.room.participants.length} voted
            ${topVoteWord ? ` • Leader: <strong style="color:var(--accent);letter-spacing:2px;">${escapeHtml(topVoteWord)}</strong>` : ''}
          </div>
        </div>
      ` : ''}

      ${!allDone ? `
        <div style="margin-top:12px;display:flex;justify-content:flex-end;">
          ${isHost ? `
            <button class="btn-primary" data-action="submit-word-chain-guess" style="width:auto;padding:12px 22px;">
              Submit Team Row
            </button>
          ` : '<div style="color:var(--text-dim);font-size:0.9rem;">Host submits the team row.</div>'}
        </div>
      ` : ''}

      ${completedAt ? `
        <div style="margin-top:10px;color:var(--success);font-weight:600;">
          Completed at ${new Date(completedAt).toLocaleTimeString()}.
        </div>
      ` : ''}
    </div>

    <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius);padding:20px;">
      <h3 style="font-family:'Fraunces',serif;font-size:1.2rem;margin-bottom:10px;">Team Progress</h3>
      <div style="color:var(--text-dim);font-size:0.9rem;margin-bottom:10px;">
        Elapsed: ${elapsedSec}s • Score: <strong style="color:var(--accent);">${score}</strong>
      </div>
      ${participation.map(p => `
        <div style="display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);
          border-radius:10px;padding:10px 12px;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span>${escapeHtml(p.avatar)}</span>
            <span>${escapeHtml(p.name)}</span>
          </div>
          <div style="font-size:0.85rem;color:var(--text-mid);text-align:right;">
            ${p.suggestion ? `suggested <strong>${escapeHtml(p.suggestion)}</strong>` : 'no suggestion'}
            ${p.vote ? ` • voted <strong>${escapeHtml(p.vote)}</strong>` : ''}
          </div>
        </div>
      `).join('')}
    </div>

    ${isHost ? `
      <button class="btn-primary" data-action="new-word-chain-puzzle" style="margin-top:16px;">
        New Word Chain Puzzle
      </button>
    ` : ''}
  `;
}

function generateBrainstormNoteId() {
  return `note_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
}

async function brainstormAddNote() {
  if (!APP.roomCode || APP.room?.currentActivity !== 'brainstorm-canvas') return;
  if (APP.brainstormAddingNote) return;
  const text = String(document.getElementById('brainNoteText')?.value || '').trim().slice(0, 200);
  const lane = String(document.getElementById('brainNoteLane')?.value || 'start');
  if (!text) {
    showError('Enter an idea before adding a note.');
    return;
  }
  if (!BRAINSTORM_LANE_INDEX.hasOwnProperty(lane)) {
    showError('Choose a valid lane.');
    return;
  }

  APP.brainstormAddingNote = true;
  render();

  try {
    const room = await RoomManager.loadRoom(APP.roomCode);
    if (!room || room.currentActivity !== 'brainstorm-canvas') return;
    const state = room.activityState || {};
    if (state.sessionStatus === 'locked') {
      showError('Canvas is locked by host.');
      return;
    }
    state.notes = Array.isArray(state.notes) ? state.notes : [];
    const noteId = generateBrainstormNoteId();
    state.notes.unshift({
      id: noteId,
      text,
      author: APP.player.name,
      lane,
      votes: 0,
      voters: [],
      color: BRAINSTORM_NOTE_COLORS[Math.floor(Math.random() * BRAINSTORM_NOTE_COLORS.length)],
      createdAt: Date.now(),
      updatedAt: Date.now()
    });
    await awardParticipationInput(room, `brainstorm_note:${noteId}:${APP.player.name}`, 5);
    room.activityState = state;
    room.brainstormData = safeParseJson(JSON.stringify(state)) || state;
    room.brainstormLastUpdatedAt = Date.now();
    await RoomManager.updateRoom(APP.roomCode, room);
    APP.room = room;
  } finally {
    APP.brainstormAddingNote = false;
    render();
  }
}

async function brainstormToggleVote(noteId) {
  if (!APP.roomCode || !noteId || APP.room?.currentActivity !== 'brainstorm-canvas') return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'brainstorm-canvas') return;
  const state = room.activityState || {};
  if (state.sessionStatus === 'locked') return;
  const notes = Array.isArray(state.notes) ? state.notes : [];
  const note = notes.find(item => item.id === noteId);
  if (!note) return;
  note.voters = Array.isArray(note.voters) ? note.voters : [];
  const idx = note.voters.indexOf(APP.player.name);
  if (idx >= 0) {
    note.voters.splice(idx, 1);
  } else {
    note.voters.push(APP.player.name);
    await awardParticipationInput(room, `brainstorm_vote:${noteId}:${APP.player.name}`, 1);
  }
  note.votes = note.voters.length;
  note.updatedAt = Date.now();
  state.notes = notes;
  room.activityState = state;
  room.brainstormData = safeParseJson(JSON.stringify(state)) || state;
  room.brainstormLastUpdatedAt = Date.now();
  await RoomManager.updateRoom(APP.roomCode, room);
}

async function brainstormMoveNote(noteId, lane) {
  if (!APP.roomCode || !noteId || !BRAINSTORM_LANE_INDEX.hasOwnProperty(lane) || APP.room?.currentActivity !== 'brainstorm-canvas') return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'brainstorm-canvas') return;
  const state = room.activityState || {};
  if (state.sessionStatus === 'locked') return;
  const notes = Array.isArray(state.notes) ? state.notes : [];
  const note = notes.find(item => item.id === noteId);
  if (!note) return;
  note.lane = lane;
  note.updatedAt = Date.now();
  room.activityState = state;
  room.brainstormData = safeParseJson(JSON.stringify(state)) || state;
  room.brainstormLastUpdatedAt = Date.now();
  await RoomManager.updateRoom(APP.roomCode, room);
}

async function brainstormShiftNote(noteId, direction) {
  const room = APP.room;
  if (!room || room.currentActivity !== 'brainstorm-canvas') return;
  const notes = Array.isArray(room.activityState?.notes) ? room.activityState.notes : [];
  const note = notes.find(item => item.id === noteId);
  if (!note) return;
  const laneIndex = BRAINSTORM_LANE_INDEX[note.lane];
  if (!Number.isInteger(laneIndex)) return;
  const nextIndex = direction === 'left' ? laneIndex - 1 : laneIndex + 1;
  if (nextIndex < 0 || nextIndex >= BRAINSTORM_LANES.length) return;
  await brainstormMoveNote(noteId, BRAINSTORM_LANES[nextIndex].id);
}

async function brainstormToggleLock() {

function triggerTextFileDownload(filename, mimeType, content) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

function generateMeetingICS(meeting) {
  const uid = `meeting-${Date.now()}@teambuilder`;
  const now = new Date().toISOString().replace(/[-:\.]/g, '').slice(0, 15) + 'Z';

  let dtStart = now;
  let dtEnd = now;
  if (meeting.date && meeting.time) {
    const start = new Date(`${meeting.date}T${meeting.time}`);
    const end = new Date(start.getTime() + 60 * 60 * 1000);
    dtStart = start.toISOString().replace(/[-:\.]/g, '').slice(0, 15) + 'Z';
    dtEnd = end.toISOString().replace(/[-:\.]/g, '').slice(0, 15) + 'Z';
  }

  const activities = (meeting.activityQueue || [])
    .map(id => ACTIVITY_QUEUE_ITEM_MAP[id]?.label || id)
    .join(', ');
  const desc = [meeting.details, activities ? `Activities: ${activities}` : '']
    .filter(Boolean).join('\\n')
    .replace(/,/g, '\\,').replace(/;/g, '\\;');
  const location = (meeting.zoomLink || '').replace(/,/g, '\\,').replace(/;/g, '\\;');

  return [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Team Builder//EN',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTAMP:${now}`,
    `DTSTART:${dtStart}`,
    `DTEND:${dtEnd}`,
    'SUMMARY:Team Meeting',
    `DESCRIPTION:${desc}`,
    `LOCATION:${location}`,
    `URL:${meeting.zoomLink || ''}`,
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');
}

async function exportBrainstormData(format) {
  if (!APP.roomCode || !APP.room) return;
  const snapshot = getBrainstormExportSnapshot();
  if (!Array.isArray(snapshot.notes) || snapshot.notes.length === 0) {
    showError('No brainstorm notes to export yet.');
    return;
  }
  const stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
  const safeRoom = String(snapshot.roomCode || 'session').replace(/[^a-zA-Z0-9_-]/g, '');

  if (format === 'json') {
    const filename = `brainstorm-${safeRoom || 'session'}-${stamp}.json`;
    triggerTextFileDownload(filename, 'application/json;charset=utf-8', JSON.stringify(snapshot, null, 2));
    return;
  }

  if (format === 'csv') {

    const rows = snapshot.notes.map(note => [
      note.id || '',
      note.lane || '',

      note.createdAt ? new Date(note.createdAt).toISOString() : '',

    ]);

    triggerTextFileDownload(filename, 'text/csv;charset=utf-8', csv);

function getPulseExportSnapshot() {
  const state = APP.room?.activityState || {};
  const selected = Array.isArray(state.selectedPollIndexes) ? state.selectedPollIndexes : [];
  const resultIndexes = selected.length ? selected : PULSE_QUESTIONS.map((_, idx) => idx);
  const voteHistory = state.voteHistory && typeof state.voteHistory === 'object' ? { ...state.voteHistory } : {};
  const currentPoll = Number.isInteger(state.currentPoll) ? state.currentPoll : 0;

  // Include the in-progress poll in export when results are not finalized yet.
  if (!state.showResults && state.votes && typeof state.votes === 'object' && !voteHistory[currentPoll]) {
    voteHistory[currentPoll] = { ...state.votes };
  }

  const polls = resultIndexes.map((sourceIndex, displayIndex) => {
    const poll = PULSE_QUESTIONS[sourceIndex];
    if (!poll) return null;
    const pollVotes = voteHistory[displayIndex] && typeof voteHistory[displayIndex] === 'object'
      ? voteHistory[displayIndex]
      : {};
    const counts = {};
    Object.values(pollVotes).forEach(value => {
      counts[value] = (counts[value] || 0) + 1;
    });
    const totalVotes = Object.keys(pollVotes).length;
    return {
      order: displayIndex + 1,
      question: poll.q,
      totalVotes,
      options: poll.opts.map((option, optionIndex) => {
        const votes = counts[optionIndex] || 0;
        const percent = totalVotes > 0 ? Math.round((votes / totalVotes) * 100) : 0;
        return {
          optionIndex,
          option,
          votes,
          percent
        };
      })
    };
  }).filter(Boolean);

  return {
    exportedAt: new Date().toISOString(),
    roomCode: APP.roomCode || '',
    activity: 'pulse-check',
    showResults: Boolean(state.showResults),
    totalParticipants: Array.isArray(APP.room?.participants) ? APP.room.participants.length : 0,
    polls
  };
}

function renderEmojiCharades() {
  const state = APP.room.activityState || {};
  const isHost = APP.room.host === APP.player.name;
  const roomSettings = getRoomHostSettings(APP.room);
  const allowCloseAnswers = roomSettings.emojiCharadesAllowCloseAnswers !== false;
  const round = Number.isInteger(state.round) ? state.round : 0;
  const roundsTotal = Math.max(1, Math.min(8, Number.parseInt(state.roundsTotal || '8', 10) || 8));
  const questionIndex = state.questionOrder?.[round] ?? round;
  const prompt = EMOJI_CHARADES_BANK[questionIndex];

  if (!prompt || round >= roundsTotal) {
    return renderEmojiCharadesResults();
  }

  const revealed = Boolean(state.revealed);
  const guesses = state.guesses || {};
  const closeAccepted = state.closeAccepted && typeof state.closeAccepted === 'object' ? state.closeAccepted : {};
  const userGuess = guesses[APP.player.name] || '';
  const roundPoints = state.roundPoints || {};
  const answerKey = normalizeCharadesAnswer(prompt.answer);
  const submittedCount = Object.values(guesses).filter(Boolean).length;

  const guessRows = APP.room.participants.map(player => {
    const guess = guesses[player.name] || '';
    const score = roundPoints[player.name] || 0;
    const outcome = getEmojiCharadesGuessOutcome(
      guess,
      answerKey,
      allowCloseAnswers && Boolean(closeAccepted[player.name])
    );
    const isCorrect = revealed && outcome.points > 0;
    const isCloseAccepted = revealed && outcome.isCloseAccepted;
    const closeAction = revealed && isHost && allowCloseAnswers && guess && !outcome.isExact
      ? `
        <button class="btn-secondary" data-action="toggle-emoji-charades-close-answer" data-player="${escapeHtml(player.name)}" data-accepted="${isCloseAccepted ? '0' : '1'}" style="width:auto;padding:4px 10px;font-size:0.78rem;">
          ${isCloseAccepted ? 'Remove Close Accept' : 'Accept Close'}
        </button>
      `
      : '';
    const statusChip = !revealed
      ? (guess ? '<span class="emoji-charades-chip" style="background:rgba(0,210,211,0.12);color:var(--accent);">Submitted</span>' : '<span class="emoji-charades-chip" style="background:var(--surface);color:var(--text-dim);">Waiting</span>')
      : (isCorrect
        ? (isCloseAccepted
          ? `<span class="emoji-charades-chip" style="background:rgba(0,210,211,0.14);color:var(--accent);">✓ Close Accepted +${score}</span>`
          : `<span class="emoji-charades-chip" style="background:rgba(0,210,106,0.14);color:var(--success);">✓ Correct +${score}</span>`)
        : '<span class="emoji-charades-chip" style="background:rgba(255,64,96,0.12);color:var(--danger);">✕ Miss</span>');
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:8px;min-width:0;">
          <span>${escapeHtml(player.avatar)}</span>
          <span style="font-weight:600;">${escapeHtml(player.name)}</span>
          ${revealed ? `<span style="color:var(--text-mid);font-size:0.86rem;">${guess ? escapeHtml(guess) : 'No guess'}</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap;">
          ${statusChip}
          ${closeAction}
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;">🎭 Emoji Charades</h1>
      <p class="tagline">Round ${Math.min(round + 1, roundsTotal)} of ${roundsTotal} • Guess the phrase from emojis</p>
    </div>

    ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}

    <div style="background:var(--surface-solid);border:2px solid var(--accent);border-radius:var(--radius);padding:28px;margin:20px 0;text-align:center;">
      <div class="emoji-charades-prompt">${escapeHtml(prompt.emojis)}</div>
      ${revealed ? `
        <div style="margin-top:16px;color:var(--text-mid);font-size:0.9rem;">Answer</div>
        <div style="font-family:'Fraunces',serif;font-size:1.6rem;color:var(--success);margin-top:6px;">${escapeHtml(prompt.answer)}</div>
      ` : ''}
    </div>

    ${!revealed ? `
      <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;">
        <label class="form-label" for="emojiCharadesGuessInput">Your guess</label>
        <div class="emoji-charades-guess-row">
          <input id="emojiCharadesGuessInput" class="form-input" maxlength="60" value="${escapeHtml(userGuess)}" placeholder="Type a phrase">
          <button class="btn-primary" data-action="submit-emoji-charades-guess" style="width:auto;padding:0 16px;">Submit</button>

      <h3 style="margin-bottom:10px;">Team Guesses</h3>
      ${guessRows}
      ${revealed && isHost && allowCloseAnswers ? '<div style="margin-top:8px;font-size:0.82rem;color:var(--text-dim);">Host can mark near-miss guesses as close accepted.</div>' : ''}
    </div>

    ${isHost ? `
      <button class="btn-primary" data-action="${revealed ? 'next-emoji-charades' : 'reveal-emoji-charades'}">
        ${revealed ? (round < roundsTotal - 1 ? 'Next Round' : 'View Results') : 'Reveal Answer'}
      </button>
    ` : ''}
  `;
}

    } else if (isUserAnswer && !revealed) {
      style = 'background:rgba(0,210,211,0.06);border:2px solid var(--accent);';
    } else if (revealed) {
      style = 'background:var(--surface-2);border:2px solid var(--border);opacity:0.5;';
    } else {
      style = 'background:var(--surface-2);border:2px solid var(--border);';
    }
    
    const actionAttrs = canClick ? `data-action="submit-regular-trivia-answer" data-index="${i}"` : '';
    const disabledAttr = canClick ? '' : 'disabled';
    const cursor = canClick ? 'pointer' : 'default';
    
    optionsHtml += `
      <button type="button" class="tile-btn" ${actionAttrs} ${disabledAttr}
        style="${style}border-radius:12px;padding:16px 20px;margin-bottom:12px;
        cursor:${cursor};transition:all 0.3s;display:flex;justify-content:space-between;
        align-items:center;">
        <span style="font-size:1.1rem;">${opt}</span>
        ${revealed ? `
          <span style="background:var(--accent);color:var(--bg);padding:6px 14px;
            border-radius:20px;font-size:0.85rem;font-weight:700;">${voteCount}</span>
        ` : ''}
      </button>
    `;
  });
  
  return `
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;">🧠 Trivia Battle</h1>
      <p class="tagline">Question ${currentQ + 1} of ${TRIVIA_BANK.length} • Room: ${safeRoomCode}</p>
    </div>
    
    ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}
    
    <div style="background:var(--surface-solid);border:2px solid var(--accent);
      border-radius:var(--radius);padding:40px 30px;margin:30px 0;text-align:center;">
      <div style="font-family:'Fraunces',serif;font-size:${APP.presentationMode ? '2.5rem' : '1.8rem'};
        font-weight:700;line-height:1.4;">
        ${question.q}
      </div>
    </div>
    
    <div style="max-width:700px;margin:0 auto;">
      ${optionsHtml}
    </div>
    
    <div role="status" aria-live="polite" aria-atomic="true" style="text-align:center;padding:16px;color:var(--text-dim);margin-top:20px;">
      ${Object.keys(answers).length} of ${APP.room.participants.length} answered
    </div>
    
    ${isHost ? `
      <button class="btn-primary" data-action="${revealed ? 'next-regular-trivia' : 'reveal-regular-answer'}">
        ${revealed ? (currentQ < TRIVIA_BANK.length - 1 ? 'Next Question' : 'View Final Results') : 'Reveal Answer'}
      </button>
    ` : ''}
  `;
}

function renderTeamJeopardy() {
  const state = APP.room.activityState || {};
  const isHost = APP.room.host === APP.player.name;
  const safeRoomCode = escapeHtml(APP.roomCode);
  const board = Array.isArray(state.board) ? state.board : [];
  const selectedClues = state.selectedClues && typeof state.selectedClues === 'object' ? state.selectedClues : {};
  const current = getTeamJeopardyActiveClue(state);
  const answers = state.answers && typeof state.answers === 'object' ? state.answers : {};
  const userAnswer = answers[APP.player.name];
  const totalClues = board.reduce((sum, category) => sum + (Array.isArray(category?.clues) ? category.clues.length : 0), 0);
  const pickedCount = Object.keys(selectedClues).length;
  const scores = state.scores && typeof state.scores === 'object' ? state.scores : {};
  const leaderboard = (APP.room.participants || [])
    .map(player => ({ name: player.name, score: scores[player.name] || 0 }))
    .sort((a, b) => b.score - a.score);

  if (state.finished && !current) {
    return `
      <div class="header">
        <h1 style="font-size:2rem;font-weight:700;">🏆 Team Jeopardy</h1>
        <p class="tagline">Final scores • Room: ${safeRoomCode}</p>
      </div>

      ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}

      <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:20px;">
        <h3 style="margin-bottom:12px;">Leaderboard</h3>
        <div style="display:grid;gap:10px;">
          ${leaderboard.map((entry, idx) => `
            <div style="display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;">
              <span style="font-weight:700;">${idx + 1}. ${escapeHtml(entry.name)}</span>
              <span style="color:var(--accent);font-weight:700;">${entry.score}</span>
            </div>
          `).join('')}
        </div>
      </div>

      ${isHost ? `
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button class="btn-primary" data-action="new-jeopardy-game" style="flex:1;">Play New Board</button>
          <button class="btn-secondary" data-action="end-activity" style="flex:1;">Back to Lobby</button>
        </div>
      ` : '<div style="margin-top:14px;color:var(--text-dim);text-align:center;">Waiting for host to continue.</div>'}
    `;
  }

  if (!current) {
    const boardHtml = board.map((category, catIndex) => `
      <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:12px;padding:12px;">
        <div style="font-weight:700;text-align:center;margin-bottom:10px;min-height:42px;display:flex;align-items:center;justify-content:center;">
          ${escapeHtml(category.category || `Category ${catIndex + 1}`)}
        </div>
        <div style="display:grid;gap:8px;">
          ${(Array.isArray(category.clues) ? category.clues : []).map((clue, clueIndex) => {
            const clueKey = `${catIndex}:${clueIndex}`;
            const used = Boolean(selectedClues[clueKey]);
            const canPick = isHost && !used && !state.finished;
            const buttonStyle = used
              ? 'background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);'
              : 'background:rgba(0,210,211,0.08);color:var(--accent);border:1px solid rgba(0,210,211,0.35);';
            return `
              <button class="btn-secondary" ${canPick ? `data-action="pick-jeopardy-clue" data-cat="${catIndex}" data-clue="${clueIndex}"` : 'disabled'}
                style="${buttonStyle}width:100%;margin:0;padding:10px 12px;font-weight:700;">
                ${used ? 'Answered' : `$${Number(clue?.value) || 100}`}
              </button>
            `;
          }).join('')}
        </div>
      </div>
    `).join('');

    return `
      <div class="header">
        <h1 style="font-size:2rem;font-weight:700;">🏆 Team Jeopardy</h1>
        <p class="tagline">Board ${pickedCount}/${totalClues} clues completed • Room: ${safeRoomCode}</p>
      </div>

      ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:22px;">

      <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:16px;">
        <div style="font-weight:700;margin-bottom:10px;">Scores</div>
        <div style="display:grid;gap:8px;">
          ${leaderboard.map(entry => `
            <div style="display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);border-radius:10px;padding:10px 12px;">

  const { category, clue } = current;

  let optionsHtml = '';

    const isCorrect = revealed && idx === clue.ans;
    const isUserPick = userAnswer === idx;

    let style = 'background:var(--surface-2);border:2px solid var(--border);';
    if (isCorrect) {
      style = 'background:rgba(0,210,106,0.15);border:2px solid var(--success);';
    } else if (!revealed && isUserPick) {

    } else if (revealed) {
      style = 'background:var(--surface-2);border:2px solid var(--border);opacity:0.6;';

    optionsHtml += `
      <button type="button" class="tile-btn" ${revealed ? 'disabled' : `data-action="submit-jeopardy-answer" data-index="${idx}"`}

  return `
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;">🏆 Team Jeopardy</h1>
      <p class="tagline">${escapeHtml(category.category || 'Category')} • $${Number(clue.value) || 100} • Room: ${safeRoomCode}</p>
    </div>

    ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}

    <div style="background:var(--surface-solid);border:2px solid var(--accent);border-radius:var(--radius);padding:28px 24px;margin:22px 0;text-align:center;">
      <div style="font-family:'Fraunces',serif;font-size:1.7rem;font-weight:700;line-height:1.35;">
        ${escapeHtml(clue.q || '')}
      </div>
    </div>

    <div style="max-width:760px;margin:0 auto;">
      ${optionsHtml}
    </div>

    <div role="status" aria-live="polite" aria-atomic="true" style="text-align:center;padding:12px;color:var(--text-dim);">
      ${Object.keys(answers).length} of ${APP.room.participants.length} answered
    </div>

    ${isHost ? `
      <button class="btn-primary" data-action="${revealed ? 'close-jeopardy-clue' : 'reveal-jeopardy-answer'}">
        ${revealed ? (state.finished ? 'View Final Scores' : 'Back to Board') : 'Reveal Answer'}
      </button>
    ` : '<div style="text-align:center;color:var(--text-dim);margin-top:8px;">Waiting for host to reveal the answer.</div>'}
  `;
}

function renderUnoCardElement(card, options = {}) {
  const palette = getUnoCardTheme(card?.color);
  const symbol = escapeHtml(getUnoCardSymbol(card));
  const subLabel = escapeHtml(getUnoCardSubLabel(card));
  const title = escapeHtml(getUnoCardLabel(card));
  const action = options.action ? `data-action="${escapeHtml(options.action)}"` : '';
  const cardIdAttr = options.cardId ? `data-card-id="${escapeHtml(options.cardId)}"` : '';
  const colorAttr = options.color ? `data-color="${escapeHtml(options.color)}"` : '';
  const disabledAttr = options.disabled ? 'disabled' : '';
  const extraClass = options.className ? ` ${escapeHtml(options.className)}` : '';
  const tag = options.button === false ? 'div' : 'button';
  const style = `
    --uno-card-bg:${palette.bg};
    --uno-card-border:${palette.border};
    --uno-card-ink:${palette.text};
    ${options.style || ''}
  `;
  return `
    <${tag}
      class="uno-card${extraClass}"
      style="${style}"
      aria-label="${title}"
      title="${title}"
      ${action}
      ${cardIdAttr}
      ${colorAttr}
      ${disabledAttr}
    >
      <div class="uno-card-corner">${symbol}</div>
      <div class="uno-card-center">${symbol}<span class="uno-card-sub">${subLabel}</span></div>
      <div class="uno-card-corner bottom">${symbol}</div>
    </${tag}>
  `;
}

function renderUno() {
  const state = APP.room.activityState || {};
  const isHost = APP.room.host === APP.player.name;
  const safeRoomCode = escapeHtml(APP.roomCode);
  const playerOrder = Array.isArray(state.playerOrder) && state.playerOrder.length
    ? state.playerOrder
    : (APP.room.participants || []).map(player => player.name);
  const participantsByName = Object.fromEntries((APP.room.participants || []).map(player => [player.name, player]));
  const myHand = getUnoPlayerHand(state, APP.player.name);
  const currentPlayer = getUnoCurrentPlayerName(state);
  const topCard = getUnoTopDiscard(state);
  const currentColor = UNO_COLOR_META[state.currentColor]?.label || 'Wild';
  const pendingDrawCount = Number(state.pendingDrawCount) || 0;
  const isMyTurn = currentPlayer === APP.player.name;
  const pendingColorChoice = state.pendingColorChoice?.player === APP.player.name ? state.pendingColorChoice : null;
  const canDraw = isMyTurn && !state.roundOver && !pendingColorChoice && (pendingDrawCount > 0 || !state.hasDrawnThisTurn);
  const canEndTurn = isMyTurn && !state.roundOver && !pendingColorChoice && pendingDrawCount === 0 && Boolean(state.hasDrawnThisTurn);
  const canCallUno = !state.roundOver && myHand.length === 1;
  const canCallOut = !state.roundOver && state.unoPendingPlayer && state.unoPendingPlayer !== APP.player.name;
  const drawLabel = pendingDrawCount > 0 ? getUnoPenaltyMessage(pendingDrawCount) : 'Draw Card';
  const handPlayableCount = myHand.filter(card => isUnoCardPlayable(card, state)).length;
  const standings = playerOrder
    .map(name => ({
      name,
      avatar: participantsByName[name]?.avatar || '👤',
      score: Number(state.scores?.[name]) || 0,
      handCount: getUnoPlayerHand(state, name).length
    }))
    .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
  const handMarkup = myHand.length
    ? myHand.map(card => {
      const playable = isMyTurn && isUnoCardPlayable(card, state);
      const isWild = card.color === 'wild';
      const isPendingWild = pendingColorChoice?.cardId === card.id;
      const action = playable
        ? (isWild ? 'uno-open-color-choice' : 'uno-play-card')
        : '';
      return renderUnoCardElement(card, {
        action,
        cardId: card.id,
        disabled: !playable,
        className: playable ? 'playable' : '',
        style: `${playable ? 'outline:2px solid rgba(255,255,255,0.26);' : ''}${isPendingWild ? 'box-shadow:0 0 0 4px rgba(255,255,255,0.14);' : ''}`
      });
    }).join('')
    : '<div class="uno-message">Your hand is empty.</div>';
  const colorChooser = pendingColorChoice ? `
    <div class="uno-panel-card uno-color-panel">
      <div style="font-weight:700;margin-bottom:6px;">Choose a color for your wild card</div>
      <div style="color:var(--text-dim);font-size:0.9rem;">Pick the next active color before the card is played.</div>
      <div class="uno-color-picker">
        ${UNO_COLORS.map(color => `
          <button class="uno-color-btn" data-action="uno-play-wild" data-card-id="${escapeHtml(pendingColorChoice.cardId)}" data-color="${escapeHtml(color)}" style="background:${getUnoCardTheme(color).bg};">
            ${escapeHtml(UNO_COLOR_META[color].label)}
          </button>
        `).join('')}
      </div>
    </div>
  ` : '';
  const lastAction = String(state.lastAction || '').trim();
  const winner = String(state.winner || '').trim();

  return `
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;">🃏 UNO Showdown</h1>
      <p class="tagline">Match color or value, time your action cards, and be first to empty your hand • Room: ${safeRoomCode}</p>
    </div>

    ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}

    <div class="uno-shell">
      <div class="uno-board">
        <div class="uno-status-badges">
          <span class="uno-badge">🎯 Turn: ${escapeHtml(currentPlayer || 'Waiting')}</span>
          <span class="uno-badge">🎨 Color: ${escapeHtml(currentColor)}</span>
          <span class="uno-badge">${state.direction === -1 ? '↺ Reverse' : '↻ Forward'}</span>
          <span class="uno-badge">🂠 Draw pile: ${Array.isArray(state.drawPile) ? state.drawPile.length : 0}</span>
          <span class="uno-badge">✋ Your hand: ${myHand.length}</span>
        </div>

        <div class="uno-table">
          <div>
            <div class="uno-pile-row">
              <div>
                <div class="uno-pile-card back"></div>
                <div class="uno-pile-meta">${drawLabel}</div>
              </div>
              <div>
                ${topCard ? renderUnoCardElement(topCard, { button: false, style: 'min-height:176px;' }) : '<div class="uno-pile-card"></div>'}
                <div class="uno-pile-meta">Discard top</div>
              </div>
            </div>

            <div class="uno-message${state.unoPendingPlayer ? ' alert' : ''}">
              ${
                state.roundOver && winner
                  ? `${escapeHtml(winner)} won the round and banked ${Number(state.roundPoints) || 0} points.`
                  : state.unoPendingPlayer
                    ? `${escapeHtml(state.unoPendingPlayer)} is at UNO and can still be called out if they did not declare it.`
                    : pendingDrawCount > 0
                      ? `${escapeHtml(currentPlayer)} must ${escapeHtml(getUnoPenaltyMessage(pendingDrawCount).toLowerCase())}.`
                      : isMyTurn
                        ? (handPlayableCount ? `Your turn. You have ${handPlayableCount} playable card${handPlayableCount === 1 ? '' : 's'}.` : 'Your turn. Draw a card or play a wild.')
                        : `Waiting for ${escapeHtml(currentPlayer || 'the active player')} to make a move.`
              }
            </div>

            ${lastAction ? `<div class="uno-message" style="margin-top:12px;">${escapeHtml(lastAction)}</div>` : ''}

            <div class="uno-action-row">
              <button class="btn-primary" data-action="uno-draw-card" ${canDraw ? '' : 'disabled'} style="width:auto;padding:12px 18px;">${escapeHtml(drawLabel)}</button>
              <button class="btn-secondary" data-action="uno-end-turn" ${canEndTurn ? '' : 'disabled'}>End Turn</button>
              <button class="btn-secondary" data-action="uno-call-uno" ${canCallUno ? '' : 'disabled'}>Call UNO</button>
              <button class="btn-secondary" data-action="uno-callout-uno" ${canCallOut ? '' : 'disabled'}>Call Out</button>
              ${isHost && state.roundOver ? '<button class="btn-primary" data-action="uno-restart-round" style="width:auto;padding:12px 18px;">Start Next Round</button>' : ''}
            </div>
          </div>

          <div class="uno-side-panel">
            <div class="uno-panel-card">
              <div style="font-family:'Fraunces',serif;font-size:1.25rem;margin-bottom:10px;">Table</div>
              <div class="uno-player-list">
                ${playerOrder.map(name => {
                  const participant = participantsByName[name] || {};
                  const handCount = getUnoPlayerHand(state, name).length;
                  const isActive = name === currentPlayer;
                  const isPending = name === state.unoPendingPlayer;
                  return `
                    <div class="uno-player-row${isActive ? ' active' : ''}${isPending ? ' pending' : ''}">
                      <div>
                        <div style="font-weight:700;">${escapeHtml(participant.avatar || '👤')} ${escapeHtml(name)}</div>
                        <div style="font-size:0.82rem;color:var(--text-dim);">${isActive ? 'Playing now' : isPending ? 'UNO risk' : 'Waiting'}</div>
                      </div>
                      <div style="text-align:right;">
                        <div style="font-weight:800;">${handCount} card${handCount === 1 ? '' : 's'}</div>
                        <div style="font-size:0.82rem;color:var(--text-dim);">${Number(state.scores?.[name]) || 0} pts</div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>

            <div class="uno-panel-card">
              <div style="font-family:'Fraunces',serif;font-size:1.15rem;margin-bottom:10px;">Leaderboard</div>
              <div class="uno-player-list">
                ${standings.map((entry, idx) => `
                  <div class="uno-player-row">
                    <div style="font-weight:700;">#${idx + 1} ${escapeHtml(entry.avatar)} ${escapeHtml(entry.name)}</div>
                    <div style="text-align:right;">
                      <div style="font-weight:800;">${entry.score} pts</div>
                      <div style="font-size:0.82rem;color:var(--text-dim);">${entry.handCount} in hand</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      </div>

      ${colorChooser}

      <div class="uno-panel-card uno-hand-panel">
        <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin-bottom:12px;">
          <div>
            <div style="font-family:'Fraunces',serif;font-size:1.35rem;">Your Hand</div>
            <div style="color:var(--text-dim);font-size:0.9rem;">Play a matching color, same value, or any wild. Wild Draw Four is unrestricted in this first version.</div>
          </div>
          <div style="color:var(--text-dim);font-size:0.84rem;">Round ${Number(state.roundNumber) || 1}</div>
        </div>
        <div class="uno-hand-grid">
          ${handMarkup}
        </div>
      </div>
    </div>
  `;
}

function renderSpinWheel() {
  const state = APP.room.activityState || {};
  const isHost = APP.room.host === APP.player.name;
  const hostName = APP.room.host;
  const wheelTitle = normalizeSpinWheelTitle(state.title || '') || SPIN_WHEEL_DEFAULT_TITLE;
  const safeRoomCode = escapeHtml(APP.roomCode);
  const roomSettings = getRoomHostSettings(APP.room);
  const funMode = roomSettings.spinWheelFunMode === true;
  const allowPlayerPicks = roomSettings.spinWheelAllowPlayerPicks !== false;
  const participantList = Array.isArray(APP.room.participants) ? APP.room.participants : [];
  const nonHostParticipants = participantList.filter(participant => participant?.name && participant.name !== hostName);
  const assignedSpinnerRaw = String(state.spinnerTurnPlayer || '').trim();
  const assignedSpinner = nonHostParticipants.some(participant => participant.name === assignedSpinnerRaw) ? assignedSpinnerRaw : '';
  const mySpinTurn = isHost ? !assignedSpinner : assignedSpinner === APP.player.name;
  const turnLabel = assignedSpinner ? `${assignedSpinner} spins next.` : 'Host controls the spin.';
  const optionPoolEntries = normalizeSpinWheelEntries(state.optionPool || SPIN_WHEEL_DEFAULT_OPTIONS);
  const displayEntries = getSpinWheelSessionEntries(state);
  const displayOptions = displayEntries.map(entry => entry.label);
  const segments = buildSpinWheelSegments(displayEntries);
  const optionCount = Math.max(1, segments.length);
  const optionSummary = displayEntries.map(entry => {
    const sectionCount = segments.filter(segment => segment.label === entry.label).length;
    return {
      label: entry.label,
      actionSummary: getSpinWheelEntryActionSummary(entry),
      sectionCount,
      percent: (sectionCount / Math.max(1, segments.length)) * 100
    };
  });
  const wheelRotation = Number(state.wheelRotation) || 0;
  const prevWheelRotation = Number(state.prevWheelRotation ?? wheelRotation) || 0;
  const now = Date.now();
  const spinning = Boolean(state.isSpinning);
  const selectedIndex = Number.isInteger(state.selectedIndex) ? state.selectedIndex : null;
  const currentResult = String(state.currentResult || '').trim();
  const spinDurationMs = Math.max(1500, Number(state.spinDurationMs) || 4800);
  const isAnimating = spinning && state.lastSpinAt && (now - Number(state.lastSpinAt) < spinDurationMs + 250);
  const isCelebrating = Boolean(currentResult) && state.spinSettledAt && (now - Number(state.spinSettledAt) < 1800);
  const segmentColors = funMode
    ? ['#ef4335', '#f7d13a', '#19984b', '#1b61b9', '#ff9252', '#d6452c', '#f0d94f', '#0f8f58', '#2b73d2', '#ffb347', '#da5534', '#1976c8']
    : ['#00d2d3', '#feca57', '#ff6b6b', '#6c5ce7', '#00d26a', '#ff9f43', '#54a0ff', '#ff7fbb', '#10ac84', '#a29bfe', '#f368e0', '#2e86de'];
  const gradientParts = segments.map((segment, idx) => {
    const start = segment.start.toFixed(3);
    const end = segment.end.toFixed(3);
    const color = segmentColors[idx % segmentColors.length];
    return `${color} ${start}deg ${end}deg`;
  }).join(', ');
  const selectedStart = selectedIndex !== null ? segments[selectedIndex]?.start?.toFixed(3) : null;
  const selectedEnd = selectedIndex !== null ? segments[selectedIndex]?.end?.toFixed(3) : null;
  const playerSelections = state.playerSelections && typeof state.playerSelections === 'object' ? state.playerSelections : {};

  const spinPoints = state.spinPoints && typeof state.spinPoints === 'object' ? state.spinPoints : {};
  const currentResultAction = state.currentResultAction && typeof state.currentResultAction === 'object' ? state.currentResultAction : null;
  const currentResultPrompt = String(state.currentResultPrompt || '').trim();
  const favorites = getSpinWheelFavorites();
  const wheelStyle = `
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    --wheel-spin-from:${prevWheelRotation}deg;
    --wheel-spin-to:${wheelRotation}deg;
    ${isAnimating
      ? `animation:wheelSpinBetween ${spinDurationMs}ms cubic-bezier(.16,1,.3,1) both;`
      : `transform:rotate(${wheelRotation}deg);`
    }
  `;
  const wheelFaceStyle = `
    position:absolute;
    inset:0;
    border-radius:50%;
    border:6px solid ${funMode ? 'rgba(255,223,145,0.92)' : 'rgba(255,255,255,0.85)'};
    box-shadow:${funMode ? '0 20px 50px rgba(0,0,0,0.32), inset 0 0 0 3px rgba(90,47,5,0.25), 0 0 0 10px rgba(255,209,102,0.08)' : '0 18px 50px rgba(0,0,0,0.25), inset 0 0 0 3px rgba(0,0,0,0.1)'};
    background:conic-gradient(from -90deg, ${gradientParts || '#00d2d3 0deg 360deg'});
  `;
  // Place labels near each sector centroid and scale for option count/text length.
  const labelRadius = optionCount >= 10 ? 29 : optionCount >= 8 ? 31 : 32;
  const labelsSvg = segments.map((segment, idx) => {
    const option = segment.label;
    const thetaDeg = -90 + segment.center;
    const theta = (thetaDeg * Math.PI) / 180;
    const x = 50 + (labelRadius * Math.cos(theta));
    const y = 50 + (labelRadius * Math.sin(theta));
    // Align text with each wedge centerline.
    const rotate = thetaDeg;
    const optionLen = String(option || '').length;
    const baseSize = optionCount >= 10 ? 2.6 : optionCount >= 8 ? 2.95 : 3.25;
    const sizeByLen = optionLen > 16 ? -0.4 : optionLen > 12 ? -0.2 : 0;
    const fontSize = Math.max(2.0, baseSize + sizeByLen);
    const isWinner = !isAnimating && selectedIndex === idx;
    const labelY = y - 2;
    return `
      <text
        x="${x.toFixed(3)}"
        y="${labelY.toFixed(3)}"
        text-anchor="middle"
        dominant-baseline="middle"
        transform="rotate(${rotate.toFixed(3)} ${x.toFixed(3)} ${y.toFixed(3)})"
        fill="${isWinner ? '#ffffff' : 'rgba(255,255,255,0.92)'}"
        font-size="${fontSize.toFixed(2)}"
        font-weight="${isWinner ? '800' : '700'}"
        style="paint-order:stroke;stroke:rgba(0,0,0,0.6);stroke-width:${isWinner ? '1.05' : '0.88'};stroke-linejoin:round;letter-spacing:0.15px;"
      >${escapeHtml(option)}</text>
    `;
  }).join('');
  const winnerOutlineSvg = (!isAnimating && selectedIndex !== null && selectedStart !== null && selectedEnd !== null)
    ? (() => {
      const segment = segments[selectedIndex];
      if (!segment) return '';
      const startDeg = -90 + segment.start;
      const endDeg = -90 + segment.end;
      const innerR = 13;
      const outerR = 48;
      const toXY = (deg, radius) => {
        const rad = (deg * Math.PI) / 180;
        return { x: 50 + (radius * Math.cos(rad)), y: 50 + (radius * Math.sin(rad)) };
      };
      const pOuterStart = toXY(startDeg, outerR);
      const pOuterEnd = toXY(endDeg, outerR);
      const pInnerEnd = toXY(endDeg, innerR);
      const pInnerStart = toXY(startDeg, innerR);
      const largeArc = (segment.end - segment.start) > 180 ? 1 : 0;
      const outerArc = [
        `M ${pOuterStart.x.toFixed(3)} ${pOuterStart.y.toFixed(3)}`,
        `A ${outerR} ${outerR} 0 ${largeArc} 1 ${pOuterEnd.x.toFixed(3)} ${pOuterEnd.y.toFixed(3)}`
      ].join(' ');
      const sideA = `M ${pInnerStart.x.toFixed(3)} ${pInnerStart.y.toFixed(3)} L ${pOuterStart.x.toFixed(3)} ${pOuterStart.y.toFixed(3)}`;
      const sideB = `M ${pInnerEnd.x.toFixed(3)} ${pInnerEnd.y.toFixed(3)} L ${pOuterEnd.x.toFixed(3)} ${pOuterEnd.y.toFixed(3)}`;
      return `
        <svg viewBox="0 0 100 100" width="100%" height="100%" aria-hidden="true" style="display:block;position:absolute;inset:0;pointer-events:none;">

              <stop offset="0%" stop-color="#9be4ff"/>

            </linearGradient>

          <path d="${sideA}" fill="none" stroke="url(#winnerBorderGrad)" stroke-width="1.25" stroke-linecap="round" style="filter:drop-shadow(0 0 4px rgba(126,228,255,0.85));"/>

        </svg>
