}

function normalizeSpinWheelActionMeta(actionSource = {}, metaParts = []) {
  const source = actionSource && typeof actionSource === 'object' ? actionSource : {};
  let actionType = String(source.type || source.kind || '').trim().toLowerCase();
  let points = Number.parseInt(source.points ?? source.value ?? '', 10);
  let activityId = String(source.activityId || source.activity || '').trim();
  let prompt = String(source.prompt || source.desc || source.description || '').trim();

  metaParts.forEach(part => {
    const [rawKey, ...rest] = String(part || '').split(':');
    const key = String(rawKey || '').trim().toLowerCase();
    const value = rest.join(':').trim();
    if (!key || !value) return;
    if (key === 'points') {
      actionType = 'points';
      points = Number.parseInt(value, 10);
    } else if (key === 'activity' || key === 'game') {
      actionType = 'activity';
      activityId = value;
    } else if (key === 'prompt' || key === 'desc' || key === 'description') {
      prompt = value;
    }
  });

  if (actionType === 'points' && Number.isFinite(points)) {
    return {
      type: 'points',
      points: Math.max(10, Math.min(500, points))
    };
  }
  if (actionType === 'activity' && ACTIVITY_QUEUE_ITEM_MAP[activityId]) {
    return {
      type: 'activity',
      activityId
    };
  }
  if (prompt) {
    return {
      type: 'prompt',
      prompt: prompt.slice(0, 160)
    };
  }
  return null;
}

function normalizeSpinWheelEntries(rawOptions) {
  const lines = Array.isArray(rawOptions) ? rawOptions : [];
  const unique = new Set();
  const normalized = [];
  lines.forEach(raw => {
    let label = '';
    let action = null;
    let prompt = '';
    if (raw && typeof raw === 'object') {
      label = String(raw.label || raw.option || '').replace(/\s+/g, ' ').trim().slice(0, 40);
      action = normalizeSpinWheelActionMeta(raw.action || raw, []);
      prompt = String(raw.prompt || raw.desc || raw.description || '').trim().slice(0, 160);
    } else {
      const text = String(raw || '').replace(/\s+/g, ' ').trim();
      if (!text) return;
      const parts = text.split('|').map(part => part.trim()).filter(Boolean);
      label = String(parts.shift() || '').replace(/\s+/g, ' ').trim().slice(0, 40);
      action = normalizeSpinWheelActionMeta({}, parts);
    }
    if (!label) return;
    const key = label.toLowerCase();
    if (unique.has(key)) return;
    unique.add(key);
    normalized.push({
      label,
      action,
      prompt: prompt || action?.prompt || ''
    });
  });
  return normalized.slice(0, 24);
}

function sampleSpinWheelEntries(rawEntries, count = SPIN_WHEEL_SESSION_OPTION_LIMIT) {
  const entries = normalizeSpinWheelEntries(rawEntries);
  if (entries.length <= count) return entries;
  return shuffleCards(entries).slice(0, count);
}

function getSpinWheelSessionEntries(state) {

  if (poolEntries.length >= 2) return sampleSpinWheelEntries(poolEntries);

}

function buildSpinWheelSegments(options) {
  const baseEntries = normalizeSpinWheelEntries(options);
  const fallback = baseEntries.length ? baseEntries : sampleSpinWheelEntries(SPIN_WHEEL_DEFAULT_OPTIONS);
  const duplicateFactor = fallback.length <= 6 ? 2 : 1;
  const expanded = Array.from({ length: fallback.length * duplicateFactor }, (_, idx) => fallback[idx % fallback.length]);
  const sectionAngle = 360 / expanded.length;
  let cursor = 0;
  return expanded.map((entry, idx) => {
    const angle = sectionAngle;
    const start = cursor;
    const end = cursor + angle;
    cursor = end;
    return {
      id: `${idx}:${entry.label}`,
      label: entry.label,
      entry,
      start,
      end,
      center: start + (angle / 2),
      percent: 100 / expanded.length
    };
  });
}

function findSpinWheelLandedIndex(segments, wheelRotation) {
  const safeSegments = Array.isArray(segments) ? segments : [];
  if (!safeSegments.length) return 0;
  const normalizedRotation = ((Number(wheelRotation) || 0) % 360 + 360) % 360;
  const pointerAngle = (360 - normalizedRotation) % 360;
  const windowStart = (pointerAngle - 1 + 360) % 360;
  const windowEnd = (pointerAngle + 1) % 360;
  const windowRanges = windowStart <= windowEnd
    ? [{ start: windowStart, end: windowEnd }]
    : [{ start: windowStart, end: 360 }, { start: 0, end: windowEnd }];
  let bestIdx = -1;
  let bestOverlap = -1;
  safeSegments.forEach((segment, idx) => {
    const segStart = Math.max(0, Number(segment?.start) || 0);
    const segEnd = Math.min(360, Number(segment?.end) || 0);
    let overlap = 0;
    windowRanges.forEach(range => {
      const a = Math.max(segStart, range.start);
      const b = Math.min(segEnd, range.end);
      if (b > a) overlap += (b - a);
    });
    if (overlap > bestOverlap) {
      bestOverlap = overlap;
      bestIdx = idx;
    } else if (overlap === bestOverlap && overlap > 0) {
      const centerA = Number(segment?.center) || 0;
      const centerB = Number(safeSegments[bestIdx]?.center) || 0;
      const distA = Math.min(centerA, 360 - centerA);
      const distB = Math.min(centerB, 360 - centerB);
      if (distA < distB) bestIdx = idx;
    }
  });
  if (bestIdx >= 0 && bestOverlap > 0) return bestIdx;

  const idx = safeSegments.findIndex((segment, i) => {
    const start = Number(segment?.start) || 0;
    const end = Number(segment?.end) || 0;
    if (i === safeSegments.length - 1) return pointerAngle >= start && pointerAngle <= 360;
    return pointerAngle >= start && pointerAngle < end;
  });
  return idx >= 0 ? idx : 0;
}

function getTicTacToeWinnerSymbol(board) {
  const safeBoard = Array.isArray(board) ? board : [];
  for (const [a, b, c] of TTT_WIN_LINES) {
    if (!safeBoard[a] || safeBoard[a] !== safeBoard[b] || safeBoard[a] !== safeBoard[c]) continue;
    return safeBoard[a];
  }
  return null;
}

function ensureTicTacToeStanding(state, playerName) {
  if (!state.standings || typeof state.standings !== 'object') state.standings = {};
  if (!state.standings[playerName]) {
    state.standings[playerName] = {
      points: 0,
      wins: 0,
      draws: 0,
      losses: 0,
      byes: 0,
      played: 0
    };
  }
  return state.standings[playerName];
}

function applyTicTacToeMatchResult(state, matchId, winnerName, reason) {
  const match = state?.matches?.[matchId];
  if (!match || match.scored) return false;
  const players = Array.isArray(match.players) ? match.players : [];
  if (players.length !== 2) return false;
  const [playerA, playerB] = players;
  const standingA = ensureTicTacToeStanding(state, playerA);
  const standingB = ensureTicTacToeStanding(state, playerB);
  standingA.played += 1;
  standingB.played += 1;

  if (winnerName && players.includes(winnerName)) {
    const loserName = winnerName === playerA ? playerB : playerA;
    const winnerStanding = ensureTicTacToeStanding(state, winnerName);
    const loserStanding = ensureTicTacToeStanding(state, loserName);
    winnerStanding.points += 3;
    winnerStanding.wins += 1;
    loserStanding.losses += 1;
    match.winner = winnerName;
  } else {
    standingA.points += 1;
    standingB.points += 1;
    standingA.draws += 1;
    standingB.draws += 1;
    match.winner = null;
  }

  match.complete = true;
  match.scored = true;
  match.resultReason = reason || 'round-end';
  match.finishedAt = Date.now();
  return true;
}

function areAllTicTacToeMatchesComplete(state) {
  const matches = Object.values(state?.matches || {});
  if (matches.length === 0) return true;
  return matches.every(match => Boolean(match?.complete));
}

function finalizeTicTacToeRoundState(rawState) {
  const state = rawState && typeof rawState === 'object' ? rawState : {};
  if (state.roundClosed) return state;

  Object.entries(state.matches || {}).forEach(([matchId, match]) => {
    if (!match || match.complete) return;
    const board = Array.isArray(match.board) ? match.board : Array(9).fill('');
    const winnerSymbol = getTicTacToeWinnerSymbol(board);
    let winnerName = null;
    if (winnerSymbol) {
      winnerName = Object.entries(match.symbols || {}).find(([, symbol]) => symbol === winnerSymbol)?.[0] || null;
    } else {
      const xCount = board.filter(cell => cell === 'X').length;
      const oCount = board.filter(cell => cell === 'O').length;
      if (xCount !== oCount) {
        const symbol = xCount > oCount ? 'X' : 'O';
        winnerName = Object.entries(match.symbols || {}).find(([, s]) => s === symbol)?.[0] || null;
      }
    }
    applyTicTacToeMatchResult(state, matchId, winnerName, winnerName ? 'time' : 'time-draw');
  });

  state.roundClosed = true;
  state.roundClosedAt = Date.now();
  state.updatedAt = Date.now();
  return state;
}

function createTicTacToeBlitzState(participants, previousState = null) {
  const now = Date.now();
  const participantNames = Array.from(new Set((participants || [])
    .map(player => String(player?.name || '').trim())
    .filter(Boolean)));
  const previousStandings = previousState?.standings && typeof previousState.standings === 'object'
    ? previousState.standings
    : {};
  const standings = {};
  participantNames.forEach(name => {
    const old = previousStandings[name] || {};
    standings[name] = {
      points: Number(old.points) || 0,
      wins: Number(old.wins) || 0,
      draws: Number(old.draws) || 0,
      losses: Number(old.losses) || 0,
      byes: Number(old.byes) || 0,
      played: Number(old.played) || 0
    };
  });

  const previousOpponents = previousState?.opponents && typeof previousState.opponents === 'object'
    ? previousState.opponents
    : {};
  const opponents = {};
  participantNames.forEach(name => {
    const recent = Array.isArray(previousOpponents[name]) ? previousOpponents[name].filter(Boolean) : [];
    opponents[name] = recent.slice(-12);
  });

  const sortedPlayers = [...participantNames]
    .sort((a, b) => {
      const aStanding = standings[a] || {};
      const bStanding = standings[b] || {};
      if ((bStanding.points || 0) !== (aStanding.points || 0)) {
        return (bStanding.points || 0) - (aStanding.points || 0);
      }
      if ((bStanding.wins || 0) !== (aStanding.wins || 0)) {
        return (bStanding.wins || 0) - (aStanding.wins || 0);
      }
      return Math.random() - 0.5;
    });

  const previousPairings = Array.isArray(previousState?.lastPairings) ? previousState.lastPairings : [];
  const previousPairSet = new Set(previousPairings
    .filter(pair => Array.isArray(pair) && pair.length === 2)
    .map(pair => pair.slice().sort().join('|')));

  const matches = {};
  const matchByPlayer = {};
  const lastPairings = [];
  const pool = [...sortedPlayers];
  let pairIndex = 0;
  while (pool.length > 1) {
    const playerA = pool.shift();
    let bestIdx = 0;
    let bestPenalty = Number.POSITIVE_INFINITY;
    for (let i = 0; i < pool.length; i++) {
      const candidate = pool[i];
      const pairKey = [playerA, candidate].sort().join('|');
      const repeatPenalty = previousPairSet.has(pairKey) ? 100 : 0;
      const recentPenalty = (opponents[playerA] || []).includes(candidate) ? 20 : 0;
      const pointsGapPenalty = Math.abs((standings[playerA]?.points || 0) - (standings[candidate]?.points || 0));
      const score = repeatPenalty + recentPenalty + pointsGapPenalty;
      if (score < bestPenalty) {
        bestPenalty = score;
        bestIdx = i;
      }
    }
    const playerB = pool.splice(bestIdx, 1)[0];
    if (!playerB) break;

    const playerAIsX = ((Number(previousState?.round) || 0) + pairIndex) % 2 === 0;
    const symbols = playerAIsX
      ? { [playerA]: 'X', [playerB]: 'O' }
      : { [playerA]: 'O', [playerB]: 'X' };
    const matchId = `ttt_${now}_${pairIndex}_${Math.random().toString(36).slice(2, 8)}`;
    matches[matchId] = {
      id: matchId,
      players: [playerA, playerB],
      symbols,
      board: Array(9).fill(''),
      turn: 'X',
      complete: false,
      scored: false,
      winner: null,
      resultReason: null,
      startedAt: now,
      updatedAt: now
    };
    matchByPlayer[playerA] = matchId;
    matchByPlayer[playerB] = matchId;
    lastPairings.push([playerA, playerB]);
    opponents[playerA] = [...(opponents[playerA] || []), playerB].slice(-12);
    opponents[playerB] = [...(opponents[playerB] || []), playerA].slice(-12);
    pairIndex += 1;
  }

  const byePlayers = [...pool];
  byePlayers.forEach(playerName => {
    const standing = ensureTicTacToeStanding({ standings }, playerName);
    standing.points += 1;
    standing.byes += 1;
  });

  return {
    mode: 'blitz',
    round: Math.max(1, (Number(previousState?.round) || 0) + 1),
    roundDurationMs: TTT_BLITZ_ROUND_MS,
    roundStartedAt: now,
    roundEndsAt: now + TTT_BLITZ_ROUND_MS,
    roundClosed: false,
    roundClosedAt: null,
    standings,
    matches,
    matchByPlayer,
    byePlayers,
    lastPairings,
    opponents,
    updatedAt: now
  };
}

function createBattleshipShipState(template) {
  return {
    id: template.id,
    label: template.label,
    role: template.role || '',
    accent: template.accent || '#8af1ff',
    length: template.length,
    horizontal: true,
    row: -1,
    col: -1,
    cells: []
  };
}

function createBattleshipPlayerState() {
  return {
    ready: false,
    ships: BATTLESHIP_SHIP_SET.map(createBattleshipShipState),
    shotsTaken: [],
    shotsReceived: []
  };
}

function createBattleshipState(participants, previousState = null) {
  const now = Date.now();
  const players = Array.from(new Set((participants || [])
    .map(player => String(player?.name || '').trim())
    .filter(Boolean)))
    .slice(0, 2);
  const previousBoards = previousState?.boards && typeof previousState.boards === 'object'
    ? previousState.boards
    : {};
  const boards = {};
  players.forEach(playerName => {
    const previousBoard = previousBoards[playerName];
    boards[playerName] = previousBoard && typeof previousBoard === 'object'
      ? previousBoard
      : createBattleshipPlayerState();
  });
  return {
    phase: 'setup',
    players,
    boards,
    turn: players[0] || '',
    winner: '',
    lastAction: '',
    startedAt: now,
    updatedAt: now
  };
}

function getBattleshipPlayers(state) {
  return Array.isArray(state?.players) ? state.players.filter(Boolean).slice(0, 2) : [];
}

function getBattleshipOpponent(state, playerName) {
  return getBattleshipPlayers(state).find(name => name !== playerName) || '';
}

function getBattleshipBoard(state, playerName) {
  const boards = state?.boards && typeof state.boards === 'object' ? state.boards : {};
  const board = boards[playerName];
  return board && typeof board === 'object' ? board : null;
}

function getBattleshipShipCells(row, col, length, horizontal) {
  return Array.from({ length }, (_, idx) => ({
    row: horizontal ? row : row + idx,
    col: horizontal ? col + idx : col
  }));
}

function normalizeBattleshipBoard(board) {
  const base = board && typeof board === 'object' ? board : {};
  return {
    ready: base.ready === true,
    ships: Array.isArray(base.ships) ? base.ships.map(ship => ({
      id: String(ship?.id || ''),
      label: String(ship?.label || ''),
      length: Number(ship?.length) || 0,
      horizontal: ship?.horizontal !== false,
      row: Number.isInteger(ship?.row) ? ship.row : -1,
      col: Number.isInteger(ship?.col) ? ship.col : -1,
      cells: Array.isArray(ship?.cells) ? ship.cells.map(cell => ({
        row: Number(cell?.row),
        col: Number(cell?.col)
      })).filter(cell => Number.isInteger(cell.row) && Number.isInteger(cell.col)) : []
    })) : BATTLESHIP_SHIP_SET.map(createBattleshipShipState),
    shotsTaken: Array.isArray(base.shotsTaken) ? base.shotsTaken.map(shot => ({
      row: Number(shot?.row),
      col: Number(shot?.col),
      result: String(shot?.result || 'miss'),
      shipId: String(shot?.shipId || '')
    })).filter(shot => Number.isInteger(shot.row) && Number.isInteger(shot.col)) : [],
    shotsReceived: Array.isArray(base.shotsReceived) ? base.shotsReceived.map(shot => ({
      row: Number(shot?.row),
      col: Number(shot?.col),
      result: String(shot?.result || 'miss'),
      shipId: String(shot?.shipId || '')
    })).filter(shot => Number.isInteger(shot.row) && Number.isInteger(shot.col)) : []
  };
}

function findBattleshipShip(board, shipId) {
  return normalizeBattleshipBoard(board).ships.find(ship => ship.id === shipId) || null;
}

function getBattleshipShipAtCell(board, row, col, excludeShipId = '') {
  const safeBoard = normalizeBattleshipBoard(board);
  for (const ship of safeBoard.ships) {
    if (excludeShipId && ship.id === excludeShipId) continue;
    if (ship.cells.some(cell => cell.row === row && cell.col === col)) {
      return ship;
    }
  }
  return null;
}

function canPlaceBattleshipShip(board, shipId, row, col, horizontal) {
  const safeBoard = normalizeBattleshipBoard(board);
  const ship = safeBoard.ships.find(entry => entry.id === shipId);
  if (!ship) return false;
  const cells = getBattleshipShipCells(row, col, ship.length, horizontal);
  if (cells.some(cell => cell.row < 0 || cell.col < 0 || cell.row >= BATTLESHIP_BOARD_SIZE || cell.col >= BATTLESHIP_BOARD_SIZE)) {
    return false;
  }
  return cells.every(cell => !getBattleshipShipAtCell(safeBoard, cell.row, cell.col, shipId));
}

function placeBattleshipShip(board, shipId, row, col, horizontal) {
  const safeBoard = normalizeBattleshipBoard(board);
  const ship = safeBoard.ships.find(entry => entry.id === shipId);
  if (!ship) return safeBoard;
  ship.horizontal = horizontal !== false;
  ship.row = row;
  ship.col = col;
  ship.cells = getBattleshipShipCells(row, col, ship.length, ship.horizontal);
  safeBoard.ready = false;
  return safeBoard;
}

function clearBattleshipBoard(board) {
  const safeBoard = normalizeBattleshipBoard(board);
  safeBoard.ready = false;
  safeBoard.ships = BATTLESHIP_SHIP_SET.map(createBattleshipShipState);
  safeBoard.shotsTaken = [];
  safeBoard.shotsReceived = [];
  return safeBoard;
}

function areBattleshipShipsPlaced(board) {
  return normalizeBattleshipBoard(board).ships.every(ship => Array.isArray(ship.cells) && ship.cells.length === ship.length);
}

function getBattleshipShotsByCell(shots) {
  const map = new Map();
  (Array.isArray(shots) ? shots : []).forEach(shot => {
    map.set(`${shot.row}:${shot.col}`, shot);
  });
  return map;
}

function isBattleshipShipSunk(board, ship) {
  if (!ship || !Array.isArray(ship.cells) || !ship.cells.length) return false;
  const receivedMap = getBattleshipShotsByCell(normalizeBattleshipBoard(board).shotsReceived);
  return ship.cells.every(cell => receivedMap.get(`${cell.row}:${cell.col}`)?.result === 'hit');
}

function areAllBattleshipShipsSunk(board) {
  const safeBoard = normalizeBattleshipBoard(board);
  return safeBoard.ships.length > 0 && safeBoard.ships.every(ship => isBattleshipShipSunk(safeBoard, ship));
}

function getBattleshipLivingShips(board) {
  return normalizeBattleshipBoard(board).ships.filter(ship => !isBattleshipShipSunk(board, ship)).length;
}

function randomizeBattleshipBoard(board) {
  let nextBoard = clearBattleshipBoard(board);
  for (const ship of nextBoard.ships) {
    let placed = false;
    for (let attempt = 0; attempt < 200 && !placed; attempt++) {
      const horizontal = Math.random() >= 0.5;
      const maxRow = horizontal ? BATTLESHIP_BOARD_SIZE - 1 : BATTLESHIP_BOARD_SIZE - ship.length;
      const maxCol = horizontal ? BATTLESHIP_BOARD_SIZE - ship.length : BATTLESHIP_BOARD_SIZE - 1;
      const row = Math.floor(Math.random() * (maxRow + 1));
      const col = Math.floor(Math.random() * (maxCol + 1));
      if (!canPlaceBattleshipShip(nextBoard, ship.id, row, col, horizontal)) continue;
      nextBoard = placeBattleshipShip(nextBoard, ship.id, row, col, horizontal);
      placed = true;
    }
  }
  return nextBoard;
}

function createBackgammonSeat(participant = null, fallbackColor = 'white') {
  return {
    playerId: String(participant?.id || '').trim(),
    playerName: String(participant?.name || '').trim() || (fallbackColor === 'white' ? 'White' : 'Black'),
    avatar: String(participant?.avatar || '').trim() || '👤'
  };
}

function createBackgammonState(participants) {
  const players = Array.from(new Set((participants || [])
    .filter(participant => participant?.id || participant?.name)
    .map(participant => JSON.stringify({
      id: String(participant.id || '').trim(),
      name: String(participant.name || '').trim(),
      avatar: String(participant.avatar || '').trim()
    }))))
    .map(value => safeParseJson(value))
    .filter(Boolean)
    .slice(0, 2);
  const whiteSeat = createBackgammonSeat(players[0], 'white');
  const blackSeat = createBackgammonSeat(players[1], 'black');
  return {
    phase: players.length === 2 ? 'playing' : 'waiting',
    players: {
      white: whiteSeat,
      black: blackSeat
    },
    points: [...BACKGAMMON_INITIAL_POINTS],
    bar: { white: 0, black: 0 },
    borneOff: { white: 0, black: 0 },
    turn: 'white',
    dice: [],
    remainingMoves: [],
    winner: '',
    lastAction: players.length === 2
      ? `${whiteSeat.playerName} opens the match. Roll the dice to begin.`
      : 'Waiting for two players.',
    startedAt: Date.now(),
    updatedAt: Date.now()
  };
}

function cloneBackgammonPosition(state) {
  return {
    points: Array.isArray(state?.points) ? state.points.map(value => Number(value) || 0) : [...BACKGAMMON_INITIAL_POINTS],
    bar: {
      white: Math.max(0, Number(state?.bar?.white) || 0),
      black: Math.max(0, Number(state?.bar?.black) || 0)
    },
    borneOff: {
      white: Math.max(0, Number(state?.borneOff?.white) || 0),
      black: Math.max(0, Number(state?.borneOff?.black) || 0)
    }
  };
}

function getBackgammonPlayerColor(state, player = APP.player) {
  const playerId = String(player?.id || '').trim();
  const playerName = String(player?.name || '').trim();
  if (!state?.players || (!playerId && !playerName)) return '';
  return BACKGAMMON_COLORS.find(color => {
    const seat = state.players[color] || {};
    return (playerId && seat.playerId === playerId) || (playerName && seat.playerName === playerName);
  }) || '';
}

function getBackgammonSeat(state, color) {
  return state?.players?.[color] || createBackgammonSeat(null, color);
}

function getBackgammonColorSign(color) {
  return color === 'black' ? -1 : 1;
}

function getBackgammonOpponentColor(color) {
  return color === 'white' ? 'black' : 'white';
}

function getBackgammonPointOwner(points, index) {
  const value = Number(points?.[index]) || 0;
  if (value > 0) return 'white';
  if (value < 0) return 'black';
  return '';
}

function getBackgammonPointCount(points, index) {
  return Math.abs(Number(points?.[index]) || 0);
}

function getBackgammonHomeRange(color) {
  return color === 'white' ? [0, 5] : [18, 23];
}

function isBackgammonHomeReady(position, color) {
  if ((position?.bar?.[color] || 0) > 0) return false;
  const [homeStart, homeEnd] = getBackgammonHomeRange(color);
  return (position?.points || []).every((value, index) => {
    if (getBackgammonPointOwner(position.points, index) !== color) return true;
    return index >= homeStart && index <= homeEnd;
  });
}

function getBackgammonEntryPoint(color, die) {
  return color === 'white' ? 24 - die : die - 1;
}

function canBackgammonOccupyPoint(points, index, color) {
  const owner = getBackgammonPointOwner(points, index);
  const count = getBackgammonPointCount(points, index);
  return !owner || owner === color || count === 1;
}

function getBackgammonMoveTarget(from, die, color) {
  if (from === 'bar') return getBackgammonEntryPoint(color, die);
  return color === 'white' ? from - die : from + die;
}

function canBackgammonBearOff(position, color, from, die) {
  if (!isBackgammonHomeReady(position, color)) return false;
  const target = getBackgammonMoveTarget(from, die, color);
  if (color === 'white') {
    if (target === -1) return true;
    if (target < -1) {
      for (let idx = from + 1; idx <= 5; idx++) {
        if (getBackgammonPointOwner(position.points, idx) === color) return false;
      }
      return true;
    }
    return false;
  }
  if (target === 24) return true;
  if (target > 24) {
    for (let idx = 18; idx < from; idx++) {
      if (getBackgammonPointOwner(position.points, idx) === color) return false;
    }
    return true;
  }
  return false;
}

function getBackgammonLegalMovesForDie(position, color, die) {
  const safeDie = Number(die) || 0;
  if (!safeDie || !BACKGAMMON_COLORS.includes(color)) return [];
  const moves = [];
  const barCount = Math.max(0, Number(position?.bar?.[color]) || 0);
  if (barCount > 0) {
    const entryPoint = getBackgammonEntryPoint(color, safeDie);
    if (entryPoint >= 0 && entryPoint < 24 && canBackgammonOccupyPoint(position.points, entryPoint, color)) {
      const owner = getBackgammonPointOwner(position.points, entryPoint);
      moves.push({
        from: 'bar',
        to: entryPoint,
        die: safeDie,
        hit: owner && owner !== color && getBackgammonPointCount(position.points, entryPoint) === 1
      });
    }
    return moves;
  }

  for (let index = 0; index < 24; index++) {
    if (getBackgammonPointOwner(position.points, index) !== color) continue;
    const target = getBackgammonMoveTarget(index, safeDie, color);
    if (target >= 0 && target < 24) {
      if (!canBackgammonOccupyPoint(position.points, target, color)) continue;
      const owner = getBackgammonPointOwner(position.points, target);
      moves.push({
        from: index,
        to: target,
        die: safeDie,
        hit: owner && owner !== color && getBackgammonPointCount(position.points, target) === 1
      });
      continue;
    }
    if (canBackgammonBearOff(position, color, index, safeDie)) {
      moves.push({
        from: index,
        to: 'off',
        die: safeDie,
        hit: false
      });
    }
  }
  return moves;
}

function applyBackgammonMoveToPosition(position, move, color) {
  const next = cloneBackgammonPosition(position);
  const sign = getBackgammonColorSign(color);
  const opponent = getBackgammonOpponentColor(color);
  if (move.from === 'bar') {
    next.bar[color] = Math.max(0, next.bar[color] - 1);
  } else if (Number.isInteger(move.from)) {
    next.points[move.from] = (Number(next.points[move.from]) || 0) - sign;
  }
  if (move.to === 'off') {
    next.borneOff[color] += 1;
    return next;
  }
  const targetOwner = getBackgammonPointOwner(next.points, move.to);
  const targetCount = getBackgammonPointCount(next.points, move.to);
  if (targetOwner === opponent && targetCount === 1) {
    next.points[move.to] = 0;
    next.bar[opponent] += 1;
  }
  next.points[move.to] = (Number(next.points[move.to]) || 0) + sign;
  return next;
}

function getBackgammonMoveSequences(position, color, remainingMoves) {
  if (!Array.isArray(remainingMoves) || !remainingMoves.length) return [[]];
  let usedAny = false;
  const sequences = [];
  const seenDice = new Set();
  remainingMoves.forEach((die, index) => {
    const dieValue = Number(die) || 0;
    if (!dieValue || seenDice.has(dieValue)) return;
    seenDice.add(dieValue);
    const legalMoves = getBackgammonLegalMovesForDie(position, color, dieValue);
    if (!legalMoves.length) return;
    usedAny = true;
    legalMoves.forEach(move => {
      const nextPosition = applyBackgammonMoveToPosition(position, move, color);
      const nextMoves = remainingMoves.filter((_, moveIndex) => moveIndex !== index);
      getBackgammonMoveSequences(nextPosition, color, nextMoves).forEach(trail => {
        sequences.push([move, ...trail]);
      });
    });
  });
  if (!usedAny) return [[]];
  return sequences;
}

function getBackgammonOptimalMoveSequences(position, color, remainingMoves) {
  const sequences = getBackgammonMoveSequences(position, color, remainingMoves);
  const maxLength = sequences.reduce((best, sequence) => Math.max(best, sequence.length), 0);
  let filtered = sequences.filter(sequence => sequence.length === maxLength);
  if (maxLength === 1 && Array.isArray(remainingMoves) && remainingMoves.length === 2 && remainingMoves[0] !== remainingMoves[1]) {
    const highestDie = filtered.reduce((best, sequence) => Math.max(best, Number(sequence[0]?.die) || 0), 0);
    filtered = filtered.filter(sequence => (Number(sequence[0]?.die) || 0) === highestDie);
  }
  return filtered;
}

function getBackgammonLegalFirstMoves(state, color) {
  const remainingMoves = Array.isArray(state?.remainingMoves) ? state.remainingMoves.map(value => Number(value) || 0).filter(Boolean) : [];
  if (!remainingMoves.length) return [];
  const sequences = getBackgammonOptimalMoveSequences(cloneBackgammonPosition(state), color, remainingMoves);
  const seen = new Set();
  return sequences
    .map(sequence => sequence[0])
    .filter(Boolean)
    .filter(move => {
      const key = `${move.from}:${move.to}:${move.die}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
}

function getBackgammonLegalMovesFromSource(state, color, source) {
  return getBackgammonLegalFirstMoves(state, color).filter(move => move.from === source);
}

function getBackgammonPipCount(position, color) {
  const sign = getBackgammonColorSign(color);
  let total = 0;
  (position?.points || []).forEach((value, index) => {
    if ((Number(value) || 0) * sign <= 0) return;
    const count = Math.abs(Number(value) || 0);
    total += count * (color === 'white' ? index + 1 : 24 - index);
  });
  total += (Math.max(0, Number(position?.bar?.[color]) || 0) * 25);
  return total;
}

function formatBackgammonMovePoint(point) {
  if (point === 'bar') return 'BAR';
  if (point === 'off') return 'OFF';
  const index = Number(point);
  return Number.isInteger(index) && index >= 0 && index < 24 ? String(index + 1) : '';
}

function createConnect4Seat(participant = null, fallbackColor = 'red') {
  return {
    playerId: String(participant?.id || '').trim(),
    playerName: String(participant?.name || '').trim() || (fallbackColor === 'red' ? 'Red Player' : 'Yellow Player'),
    avatar: String(participant?.avatar || '').trim() || '👤'
  };
}

function createConnect4Board() {
  return Array.from({ length: CONNECT4_ROWS }, () => Array(CONNECT4_COLS).fill(''));
}

function createConnect4State(participants) {
  const players = Array.from(new Set((participants || [])
    .filter(participant => participant?.id || participant?.name)
    .map(participant => JSON.stringify({
      id: String(participant.id || '').trim(),
      name: String(participant.name || '').trim(),
      avatar: String(participant.avatar || '').trim()
    }))))
    .map(value => safeParseJson(value))
    .filter(Boolean)
    .slice(0, 2);
  const redSeat = createConnect4Seat(players[0], 'red');
  const yellowSeat = createConnect4Seat(players[1], 'yellow');
  return {
    phase: players.length === 2 ? 'playing' : 'waiting',
    players: {
      red: redSeat,
      yellow: yellowSeat
    },
    board: createConnect4Board(),
    turn: 'red',
    winner: '',
    winningCells: [],
    lastMove: null,
    startedAt: Date.now(),
    updatedAt: Date.now()
  };
}

function getConnect4Seat(state, color) {
  return state?.players?.[color] || createConnect4Seat(null, color);
}

function getConnect4PlayerColor(state, player = APP.player) {
  const playerId = String(player?.id || '').trim();
  const playerName = String(player?.name || '').trim();
  if (!state?.players || (!playerId && !playerName)) return '';
  return CONNECT4_COLORS.find(color => {
    const seat = state.players[color] || {};
    return (playerId && seat.playerId === playerId) || (playerName && seat.playerName === playerName);
  }) || '';
}

function getConnect4Cell(board, row, col) {
  return String(board?.[row]?.[col] || '').trim().toLowerCase();
}

function getConnect4DropRow(board, col) {
  if (!Number.isInteger(col) || col < 0 || col >= CONNECT4_COLS) return -1;
  for (let row = CONNECT4_ROWS - 1; row >= 0; row--) {
    if (!getConnect4Cell(board, row, col)) return row;
  }
  return -1;
}

function getConnect4Winner(board) {
  const directions = [
    [0, 1],
    [1, 0],
    [1, 1],
    [1, -1]
  ];
  for (let row = 0; row < CONNECT4_ROWS; row++) {
    for (let col = 0; col < CONNECT4_COLS; col++) {
      const color = getConnect4Cell(board, row, col);
      if (!color) continue;
      for (const [deltaRow, deltaCol] of directions) {
        const cells = [{ row, col }];
        let matched = true;
        for (let step = 1; step < 4; step++) {
          const nextRow = row + (deltaRow * step);
          const nextCol = col + (deltaCol * step);
          if (nextRow < 0 || nextRow >= CONNECT4_ROWS || nextCol < 0 || nextCol >= CONNECT4_COLS || getConnect4Cell(board, nextRow, nextCol) !== color) {
            matched = false;
            break;
          }
          cells.push({ row: nextRow, col: nextCol });
        }
        if (matched) {
          return { color, cells };
        }
      }
    }
  }
  return null;
}

function isConnect4BoardFull(board) {
  return Array.isArray(board) && board.every(row => Array.isArray(row) && row.every(cell => Boolean(String(cell || '').trim())));
}

function shuffleArray(items) {
  const arr = [...items];
  for (let idx = arr.length - 1; idx > 0; idx--) {
    const swapIdx = Math.floor(Math.random() * (idx + 1));
    [arr[idx], arr[swapIdx]] = [arr[swapIdx], arr[idx]];
  }
  return arr;
}

function createBingoCard() {
  const grid = Array.from({ length: 5 }, () => Array(5).fill(null));
  BINGO_NUMBER_RANGES.forEach(([min, max], col) => {
    const values = shuffleArray(Array.from({ length: max - min + 1 }, (_, idx) => min + idx)).slice(0, 5);
    for (let row = 0; row < 5; row++) {
      grid[row][col] = values[row];
    }
  });
  grid[2][2] = 'FREE';
  return grid;
}

function createBingoMarkedGrid() {
  return Array.from({ length: 5 }, (_, row) => Array.from({ length: 5 }, (_, col) => row === 2 && col === 2));
}

function createBingoPlayerCard() {
  return {
    grid: createBingoCard(),
    marked: createBingoMarkedGrid()
  };
}

function normalizeBingoWinningPattern(value) {
  const normalized = String(value || '').trim().toLowerCase();
  return BINGO_PATTERN_OPTIONS.some(option => option.id === normalized) ? normalized : 'line';
}

function getBingoWinningPatternMeta(value) {
  const normalized = normalizeBingoWinningPattern(value);
  return BINGO_PATTERN_OPTIONS.find(option => option.id === normalized) || BINGO_PATTERN_OPTIONS[0];
}

function createBingoState(participants, winningPattern = 'line') {
  const players = Array.from(new Set((participants || [])
    .map(player => String(player?.name || '').trim())
    .filter(Boolean)));
  const cards = {};
  players.forEach(playerName => {
    cards[playerName] = createBingoPlayerCard();
  });
  return {
    phase: 'playing',
    drawPool: shuffleArray(Array.from({ length: 75 }, (_, idx) => idx + 1)),
    calledNumbers: [],
    cards,
    winners: [],
    winningPattern: normalizeBingoWinningPattern(winningPattern),
    nextWinningPattern: normalizeBingoWinningPattern(winningPattern),
    lastCalled: null,
    lastCalledAt: null,
    startedAt: Date.now(),
    updatedAt: Date.now()
  };
}

function getBingoCard(state, playerName) {
  const cards = state?.cards && typeof state.cards === 'object' ? state.cards : {};
  const card = cards[playerName];
  return card && typeof card === 'object' ? card : null;
}

function normalizeBingoMarkedGrid(marked) {
  return Array.from({ length: 5 }, (_, row) => Array.from({ length: 5 }, (_, col) => {
    if (row === 2 && col === 2) return true;
    return Boolean(marked?.[row]?.[col]);
  }));
}

function buildBingoCalledSet(state) {
  return new Set(Array.isArray(state?.calledNumbers) ? state.calledNumbers.map(value => Number(value)) : []);
}

function isBingoCellMarkAllowed(card, calledSet, row, col) {
  const value = card?.grid?.[row]?.[col];
  if (row === 2 && col === 2) return true;
  return calledSet.has(Number(value));
}

function getBingoWinningLines() {
  const rows = Array.from({ length: 5 }, (_, row) => Array.from({ length: 5 }, (_, col) => [row, col]));
  const cols = Array.from({ length: 5 }, (_, col) => Array.from({ length: 5 }, (_, row) => [row, col]));
  const diagA = Array.from({ length: 5 }, (_, idx) => [idx, idx]);
  const diagB = Array.from({ length: 5 }, (_, idx) => [idx, 4 - idx]);
  return [...rows, ...cols, diagA, diagB];
}

function validateBingoCardAgainstCalled(card, calledSet, winningPattern = 'line') {
  if (!card?.grid || !card?.marked) return false;
  const marked = normalizeBingoMarkedGrid(card.marked);
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 5; col++) {
      if (!marked[row][col]) continue;
      if (!isBingoCellMarkAllowed(card, calledSet, row, col)) return false;
    }
  }
  const pattern = normalizeBingoWinningPattern(winningPattern);
  if (pattern === 'four_corners') {
    return [[0, 0], [0, 4], [4, 0], [4, 4]].every(([row, col]) => marked[row][col]);
  }
  if (pattern === 'full_card') {
    return Array.from({ length: 5 }, (_, row) => Array.from({ length: 5 }, (_, col) => marked[row][col]).every(Boolean)).every(Boolean);
  }
  return getBingoWinningLines().some(line => line.every(([row, col]) => marked[row][col]));
}

function formatBingoCall(value) {
  const num = Number(value);
  if (!Number.isInteger(num) || num < 1 || num > 75) return '';
  const col = num <= 15 ? 'B' : num <= 30 ? 'I' : num <= 45 ? 'N' : num <= 60 ? 'G' : 'O';
  return `${col}-${num}`;
}

function getBingoBallMeta(value) {
  const num = Number(value);
  if (!Number.isInteger(num) || num < 1 || num > 75) return null;
  if (num <= 15) return { letter: 'B', number: num, color: '#ef233c' };
  if (num <= 30) return { letter: 'I', number: num, color: '#2563eb' };
  if (num <= 45) return { letter: 'N', number: num, color: '#16a34a' };
  if (num <= 60) return { letter: 'G', number: num, color: '#facc15', textColor: '#3f2200' };
  return { letter: 'O', number: num, color: '#f97316' };
}

function clampNumber(value, min, max, fallback) {
  const numeric = Number(value);
  if (!Number.isFinite(numeric)) return fallback;
  return Math.min(max, Math.max(min, numeric));
}

function normalizeHexColor(value, fallback = '#0f172a') {
  const normalized = String(value || '').trim();
  return /^#[0-9a-fA-F]{6}$/.test(normalized) ? normalized.toLowerCase() : fallback;
}

async function updateSlidesStudioState(mutator) {
  if (!APP.roomCode || !APP.room) return null;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'slides-studio') return null;
  if (room.host !== APP.player?.name) return room;
  const nextState = normalizeSlidesStudioState(room.activityState);
  if (typeof mutator === 'function') mutator(nextState);

    ...nextState,

  });

  await RoomManager.updateRoom(APP.roomCode, room);

async function slidesStudioDuplicateSlide(slideId) {
  const requestedId = String(slideId || '').trim();
  await updateSlidesStudioState(state => {
    const idx = state.slides.findIndex(slide => slide.id === requestedId);
    if (idx < 0) return;
    const source = state.slides[idx];
    const duplicate = createSlidesStudioSlide(idx + 1, {
      ...source,
      id: '',
      title: source.title ? `${source.title} Copy` : ''
    });
    state.slides.splice(idx + 1, 0, duplicate);
    state.activeSlideId = duplicate.id;
  });
}

async function slidesStudioRemoveSlide(slideId) {
  const requestedId = String(slideId || '').trim();
  await updateSlidesStudioState(state => {
    if (state.slides.length <= 1) {
      state.slides = [createSlidesStudioSlide(0)];
      state.activeSlideId = state.slides[0].id;
      return;
    }
    const idx = state.slides.findIndex(slide => slide.id === requestedId);
    if (idx < 0) return;
    state.slides.splice(idx, 1);
    const nextIdx = Math.max(0, Math.min(idx, state.slides.length - 1));
    state.activeSlideId = state.slides[nextIdx]?.id || state.slides[0].id;
  });
}

async function slidesStudioNavigate(delta = 0) {
  const step = Number(delta) || 0;
  if (!step) return;
  await updateSlidesStudioState(state => {
    const currentIndex = getSlidesStudioActiveSlideIndex(state);
    const nextIndex = Math.max(0, Math.min(state.slides.length - 1, currentIndex + step));
    state.activeSlideId = state.slides[nextIndex]?.id || state.activeSlideId;
  });
}

async function generateSlidesStudioFromPrompt() {
  if (!APP.roomCode || !APP.room || APP.room.currentActivity !== 'slides-studio') return;
  if (APP.room.host !== APP.player?.name) return;
  const promptText = String(document.getElementById('slidesStudioAIPrompt')?.value || '').trim();
  const requestedCount = Math.max(3, Math.min(10, Number.parseInt(document.getElementById('slidesStudioAICount')?.value || '5', 10) || 5));
  APP.slidesStudioUi.aiPrompt = promptText;
  APP.slidesStudioUi.aiCount = requestedCount;
  const apiKeyInput = String(document.getElementById('slidesStudioAIApiKey')?.value || '').trim();
  const apiKey = apiKeyInput || HOST_LOCAL_CONFIG.aiApiKey || localStorage.getItem('ai-question-api-key') || '';
  if (!promptText) {
    showError('Add a prompt to generate slides.');
    return;
  }

  APP.aiGenerating = true;
  APP.aiStatus = `Generating ${requestedCount} slide${requestedCount === 1 ? '' : 's'}...`;
  render();

  try {
    if (apiKeyInput) {
      HOST_LOCAL_CONFIG.aiApiKey = apiKeyInput;
      localStorage.setItem('ai-question-api-key', apiKeyInput);
      saveHostLocalConfig(HOST_LOCAL_CONFIG);
    }
    const generated = await requestAIGeneratedArray(buildAISlidesStudioPrompt(promptText, requestedCount), apiKey);
    const slides = validateAISlidesStudioSlides(generated);
    if (!slides.length) {
      throw new Error('AI returned no valid slides.');
    }
    await updateSlidesStudioState(state => {
      state.title = normalizeTopic(document.getElementById('slidesStudioDeckTitle')?.value || promptText) || state.title || 'Slides Studio';
      state.slides = slides;
      state.activeSlideId = slides[0].id;
    });
    APP.aiStatus = `Generated ${slides.length} slide${slides.length === 1 ? '' : 's'} from prompt.`;
  } catch (error) {
    APP.aiStatus = error?.message || 'Slide generation failed.';
    showError(APP.aiStatus);
  } finally {
    APP.aiGenerating = false;
    render();
  }
}

function renderSlidesStudioCanvas(slide, options = {}) {

  const safeSourceLabel = escapeHtml(safeSlide.sourceLabel || '');
  const safeSourceUrl = escapeHtml(safeSlide.sourceUrl || '');
  const verticalAlign = safeSlide.contentVertical === 'top'
    ? 'start'
    : safeSlide.contentVertical === 'center'
      ? 'center'
      : 'end';
  const horizontalAlign = safeSlide.contentHorizontal === 'right'
    ? 'end'
    : safeSlide.contentHorizontal === 'center'
      ? 'center'
      : 'start';
  const textAlign = safeSlide.contentHorizontal === 'right'
    ? 'right'
    : safeSlide.contentHorizontal === 'center'
      ? 'center'
      : 'left';
  const stageClass = [
    'slides-studio-stage',
    variant === 'thumb' ? 'slides-studio-stage-thumb' : '',
    hasCard ? 'slides-studio-stage-has-card' : '',
    template === 'title' ? 'slides-studio-template-center' : '',
    ['problem', 'resolution', 'looking-forward', 'did-you-know'].includes(template) ? 'slides-studio-template-panel' : ''
  ].filter(Boolean).join(' ');
  let bodyMarkup = '';
  if (template === 'features') {
    bodyMarkup = descriptionItems.length ? `
      <div class="slides-studio-feature-grid">
        ${descriptionItems.slice(0, 6).map(item => `<div class="slides-studio-feature-card">${escapeHtml(item)}</div>`).join('')}
      </div>
    ` : '';
  } else if (template === 'did-you-know' && safeDescription) {
    bodyMarkup = `<div class="slides-studio-fact-card">${safeDescription}</div>`;
  } else if (safeDescription) {
    bodyMarkup = `<div class="slides-studio-description">${safeDescription}</div>`;
  }
  const tagMarkup = safeTag
    ? `<div class="slides-studio-kicker" style="border-color:color-mix(in srgb, var(--slides-template-accent) 48%, rgba(255,255,255,0.12));color:color-mix(in srgb, var(--slides-template-accent) 76%, white 24%);">${safeTag}</div>`
    : '';
  const actionsMarkup = (safeButtonLabel && safeButtonUrl) || (safeSourceLabel && safeSourceUrl)
    ? `
      <div class="slides-studio-actions" style="justify-content:${textAlign === 'center' ? 'center' : textAlign === 'right' ? 'flex-end' : 'flex-start'};">
        ${safeButtonLabel && safeButtonUrl ? `<a class="slides-studio-link-button" href="${safeButtonUrl}" target="_blank" rel="noopener noreferrer">${safeButtonLabel}</a>` : ''}
        ${safeSourceLabel && safeSourceUrl ? `<a class="slides-studio-source-link" href="${safeSourceUrl}" target="_blank" rel="noopener noreferrer">Source: ${safeSourceLabel}</a>` : ''}
      </div>
    `
    : '';
  return `
    <div class="${stageClass}" style="${getSlidesStudioSlideBackground(safeSlide)};--slide-fade-strength:${Math.max(0, Math.min(0.9, safeSlide.imageFade / 100)).toFixed(2)};--slides-template-accent:${templateMeta.accent};">
      ${hasImage && !hasCard ? `
        <div class="slides-studio-stage-bg-image" style="background-image:url('${escapeHtml(safeSlide.backgroundImageUrl)}');"></div>
        <div class="slides-studio-stage-bg-fade"></div>
      ` : ''}
      <div class="slides-studio-stage-shell">
        <div class="slides-studio-stage-copy" style="align-self:${verticalAlign};justify-self:${horizontalAlign};text-align:${textAlign};">
          ${safeSlide.tagPosition === 'top' ? tagMarkup : ''}
          ${safeTitle ? `<h2 class="slides-studio-title">${safeTitle}</h2>` : ''}
          ${safeSubtitle ? `<div class="slides-studio-subtitle">${safeSubtitle}</div>` : ''}
          ${bodyMarkup}
          ${safeSlide.tagPosition === 'bottom' ? tagMarkup : ''}
          ${actionsMarkup}
        </div>
        ${hasCard ? `
          <div class="slides-studio-stage-card" style="border-radius:${safeSlide.imageRadius}px;">
            <div class="slides-studio-stage-card-image" style="background-image:url('${escapeHtml(safeSlide.backgroundImageUrl)}');"></div>
            <div class="slides-studio-stage-card-fade"></div>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function getInitialActivityState(room, activityId) {
  if (activityId === 'presentation') {
    const presentation = room?.sharedPresentation || null;
    return presentation ? {
      title: String(presentation.title || 'Shared Presentation').trim() || 'Shared Presentation',
      url: String(presentation.url || '').trim(),
      embedUrl: String(presentation.embedUrl || getPresentationEmbedUrl(presentation.url || '') || presentation.url || '').trim(),
      startedAt: Date.now()
    } : null;
  }
  if (activityId === 'slides-studio') {
    return createSlidesStudioState();
  }
  if (activityId === 'tic-tac-toe-blitz') {
    return createTicTacToeBlitzState(room?.participants || []);
  }
  if (activityId === 'battleship') {
    return createBattleshipState(room?.participants || []);
  }
  if (activityId === 'bingo') {
    return createBingoState(room?.participants || []);
  }
  if (activityId === 'backgammon') {
    return createBackgammonState(room?.participants || []);
  }
  if (activityId === 'connect-4') {
    return createConnect4State(room?.participants || []);
  }
  if (activityId === 'uno') {
    return createUnoGameState(room?.participants || []);
  }
  let initialState = createInitialActivityState(activityId);
  if (activityId === 'brainstorm-canvas' && room?.brainstormData && typeof room.brainstormData === 'object') {
    const resumed = safeParseJson(JSON.stringify(room.brainstormData));
    if (resumed && typeof resumed === 'object') {
      initialState = resumed;
    }
  }
  if (activityId === 'spin-wheel' && isSpinWheelFunMode(room)) {
    initialState = applySpinWheelFunModeState(initialState, true);
  }
  return initialState;
}

function activityMeetsRoomRequirements(room, activityId) {
  if (activityId === 'presentation') {
    return ENABLE_PRESENTATION_SHARE && Boolean(room?.sharedPresentation?.url);
  }
  if (activityId === 'battleship') {
    return (room?.participants || []).length >= 2;
  }
  if (activityId === 'backgammon') {
    return (room?.participants || []).length >= 2;
  }
  if (activityId === 'connect-4') {
    return (room?.participants || []).length >= 2;
  }
  if (activityId === 'uno') {
    return (room?.participants || []).length >= 2;
  }
  return true;
}

async function startActivityById(activityId) {
  if (!APP.roomCode || !APP.room) return false;
  if (!activityMeetsRoomRequirements(APP.room, activityId)) {
    if (activityId === 'presentation') {
      showError('Share a presentation link first, then start the Presentation activity.');
      return false;
    }
    if (activityId === 'battleship') {
      showError('Battleship needs at least 2 players in the room.');
      return false;
    }
    if (activityId === 'backgammon') {
      showError('Backgammon needs exactly 2 players in the room to start.');
      return false;
    }
    if (activityId === 'connect-4') {
      showError('Connect 4 needs 2 players in the room.');
      return false;
    }
    showError('UNO needs at least 2 players.');
    return false;
  }
  if (!isActivityEnabled(activityId)) {
    showError('This activity is disabled by admin.');
    return false;
  }
  if (!activityHasPlayableContent(activityId, APP.room)) {
    if (activityId === 'presentation') {
      showError('Share a presentation link first, then start the Presentation activity.');
      return false;
    }
    showError('No content available for this activity. Enable sample questions or side-load a collection.');
    return false;
  }
  const room = { ...APP.room };
  const initialState = getInitialActivityState(room, activityId);
  if (!initialState) {
    showError('Unsupported activity.');
    return false;
  }
  lightningAutoRevealPending = false;
  ticTacToeFinalizePending = false;
  room.currentActivity = activityId;
  room.activityState = initialState;
  await RoomManager.updateRoom(APP.roomCode, room);
  APP.room = room;
  if (activityId === 'word-chain') {
    wordChainDraft = {};
    resetWordChainFocusState();
  }
  if (activityId === 'wordle') {
    hostWordleDraft = '';
  }
  if (activityId === 'battleship') {
    APP.battleshipUi = getDefaultBattleshipUiState();
  }
  if (activityId === 'backgammon') {
    APP.backgammonUi = getDefaultBackgammonUiState();
  }
  render();
  return true;
}

async function runNextQueuedActivity(roomOverride = null) {
  const room = roomOverride ? { ...roomOverride } : await RoomManager.loadRoom(APP.roomCode);
  if (!room) return false;
  const queue = Array.isArray(room.activityQueue) ? room.activityQueue : [];
  let queueIndex = Number.isInteger(room.queueIndex) ? room.queueIndex : 0;
  if (!room.queueActive || queue.length === 0) return false;

  while (
    queueIndex < queue.length
    && (
      !ACTIVITY_QUEUE_ITEM_MAP[queue[queueIndex]]
      || !isActivityEnabled(queue[queueIndex])
      || !activityHasPlayableContent(queue[queueIndex], room)
      || !activityMeetsRoomRequirements(room, queue[queueIndex])
    )
  ) {
    queueIndex++;
  }

  if (queueIndex >= queue.length) {
    room.queueActive = false;
    room.queueIndex = 0;
    room.currentActivity = null;
    room.activityState = {};
    await RoomManager.updateRoom(APP.roomCode, room);
    APP.room = room;
    render();
    return false;
  }

  const activityId = queue[queueIndex];
  ticTacToeFinalizePending = false;
  room.queueIndex = queueIndex + 1;
  room.currentActivity = activityId;
  room.activityState = getInitialActivityState(room, activityId) || {};
  await RoomManager.updateRoom(APP.roomCode, room);
  APP.room = room;
  APP.screen = 'lobby';
  if (activityId === 'word-chain') {
    wordChainDraft = {};
    resetWordChainFocusState();
  }
  if (activityId === 'wordle') {
    hostWordleDraft = '';
  }
  if (activityId === 'backgammon') {
    APP.backgammonUi = getDefaultBackgammonUiState();
  }
  render();
  return true;
}

function getBackgammonCurrentTurnColor(state) {
  const turn = String(state?.turn || '').trim().toLowerCase();
  return BACKGAMMON_COLORS.includes(turn) ? turn : 'white';
}

function advanceBackgammonTurn(state, actionLabel = '') {
  state.turn = getBackgammonOpponentColor(getBackgammonCurrentTurnColor(state));
  state.dice = [];
  state.remainingMoves = [];
  state.updatedAt = Date.now();

async function rollBackgammonDice() {
  if (!APP.roomCode || !APP.room) return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'backgammon') return;
  const state = room.activityState && typeof room.activityState === 'object'
    ? room.activityState
    : createBackgammonState(room.participants || []);
  if (state.phase !== 'playing' || state.winner) return;
  const playerColor = getBackgammonPlayerColor(state);
  if (!playerColor || getBackgammonCurrentTurnColor(state) !== playerColor) return;
  if (Array.isArray(state.remainingMoves) && state.remainingMoves.length) return;
  const dieA = 1 + Math.floor(Math.random() * 6);
  const dieB = 1 + Math.floor(Math.random() * 6);
  state.dice = [dieA, dieB];
  state.remainingMoves = dieA === dieB ? [dieA, dieA, dieA, dieA] : [dieA, dieB];
  const seat = getBackgammonSeat(state, playerColor);
  const legalMoves = getBackgammonLegalFirstMoves(state, playerColor);
  if (!legalMoves.length) {
    const nextColor = getBackgammonOpponentColor(playerColor);
    advanceBackgammonTurn(state, `${seat.playerName} rolled ${dieA} and ${dieB} but had no legal moves. ${getBackgammonSeat(state, nextColor).playerName} is up.`);
  } else {
    state.updatedAt = Date.now();
    state.lastAction = `${seat.playerName} rolled ${dieA} and ${dieB}.`;
  }
  room.activityState = state;
  await RoomManager.updateRoom(APP.roomCode, room);
  APP.room = room;
  APP.backgammonUi = getDefaultBackgammonUiState();
  render();
}

async function backgammonHandlePointAction(pointValue) {
  if (!APP.roomCode || !APP.room) return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'backgammon') return;
  const state = room.activityState && typeof room.activityState === 'object'
    ? room.activityState
    : createBackgammonState(room.participants || []);
  if (state.phase !== 'playing' || state.winner) return;
  const playerColor = getBackgammonPlayerColor(state);
  if (!playerColor || getBackgammonCurrentTurnColor(state) !== playerColor) return;
  const legalMoves = getBackgammonLegalFirstMoves(state, playerColor);
  if (!legalMoves.length) return;
  const selectedSource = APP.backgammonUi.selectedSource;
  const exactMove = legalMoves.find(move => move.from === selectedSource && move.to === pointValue)
    || legalMoves.find(move => move.from === pointValue);
  if (exactMove && exactMove.from === selectedSource && exactMove.to === pointValue) {
    const nextPosition = applyBackgammonMoveToPosition(state, exactMove, playerColor);
    state.points = nextPosition.points;
    state.bar = nextPosition.bar;
    state.borneOff = nextPosition.borneOff;
    const remainingMoves = Array.isArray(state.remainingMoves) ? [...state.remainingMoves] : [];
    const dieIndex = remainingMoves.findIndex(value => Number(value) === Number(exactMove.die));
    if (dieIndex >= 0) remainingMoves.splice(dieIndex, 1);
    state.remainingMoves = remainingMoves;
    state.updatedAt = Date.now();
    const seat = getBackgammonSeat(state, playerColor);
    state.lastAction = `${seat.playerName} moved ${formatBackgammonMovePoint(exactMove.from)} to ${formatBackgammonMovePoint(exactMove.to)} using ${exactMove.die}.`;
    if ((state.borneOff?.[playerColor] || 0) >= 15) {
      state.winner = playerColor;
      state.phase = 'finished';
      state.remainingMoves = [];
      state.dice = [];
      state.lastAction = `${seat.playerName} bore off the final checker and won the match.`;
    } else {
      const nextLegal = getBackgammonLegalFirstMoves(state, playerColor);
      if (!state.remainingMoves.length || !nextLegal.length) {
        const nextColor = getBackgammonOpponentColor(playerColor);
        advanceBackgammonTurn(state, nextLegal.length
          ? state.lastAction
          : `${seat.playerName} has no remaining legal moves. ${getBackgammonSeat(state, nextColor).playerName} is up.`);
      }
    }
    room.activityState = state;
    await RoomManager.updateRoom(APP.roomCode, room);
    APP.room = room;
    APP.backgammonUi = getDefaultBackgammonUiState();
    render();
    return;
  }
  const sourceMoves = legalMoves.filter(move => move.from === pointValue);
  if (sourceMoves.length) {
    setBackgammonSelectedSource(selectedSource === pointValue ? null : pointValue);
  }
}

async function dropConnect4Disc(col) {
  if (!APP.roomCode || !Number.isInteger(col)) return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'connect-4') return;
  const state = room.activityState && typeof room.activityState === 'object'
    ? room.activityState
    : createConnect4State(room.participants || []);
  if (state.phase !== 'playing' || state.winner) return;
  const myColor = getConnect4PlayerColor(state);
  if (!myColor || state.turn !== myColor) return;
  const board = Array.isArray(state.board) ? state.board.map(row => Array.isArray(row) ? [...row] : Array(CONNECT4_COLS).fill('')) : createConnect4Board();
  const row = getConnect4DropRow(board, col);
  if (row < 0) return;
  board[row][col] = myColor;
  state.board = board;
  state.lastMove = { row, col, color: myColor };
  state.updatedAt = Date.now();
  const winner = getConnect4Winner(board);
  if (winner) {
    state.winner = winner.color;
    state.winningCells = winner.cells;
    state.phase = 'finished';
    state.lastAction = `${getConnect4Seat(state, myColor).playerName} connected four and won the round.`;
  } else if (isConnect4BoardFull(board)) {
    state.winner = 'draw';
    state.winningCells = [];
    state.phase = 'finished';
    state.lastAction = 'The board filled up. Match drawn.';
  } else {
    state.turn = myColor === 'red' ? 'yellow' : 'red';
    state.lastAction = `${getConnect4Seat(state, myColor).playerName} dropped into column ${col + 1}. ${getConnect4Seat(state, state.turn).playerName} is up.`;
  }
  room.activityState = state;
  await RoomManager.updateRoom(APP.roomCode, room);
  APP.room = room;
  render();
}

  if (!room || room.currentActivity !== 'battleship') return;
  const state = room.activityState || {};
  if (state.phase !== 'battle') return;
  const attacker = APP.player?.name || '';
  const players = getBattleshipPlayers(state);
  if (!players.includes(attacker)) return;
  if (state.turn !== attacker) return;
  const defender = getBattleshipOpponent(state, attacker);
  if (!defender) return;
  const attackerBoard = normalizeBattleshipBoard(getBattleshipBoard(state, attacker));
  const defenderBoard = normalizeBattleshipBoard(getBattleshipBoard(state, defender));
  if (attackerBoard.shotsTaken.some(shot => shot.row === row && shot.col === col)) return;

  const targetShip = getBattleshipShipAtCell(defenderBoard, row, col);
  const result = targetShip ? 'hit' : 'miss';
  const shot = { row, col, result, shipId: targetShip?.id || '' };
  attackerBoard.shotsTaken = [...attackerBoard.shotsTaken, shot];
  defenderBoard.shotsReceived = [...defenderBoard.shotsReceived, shot];

  let actionLabel = `${attacker} missed at ${BATTLESHIP_COLUMN_LABELS[col]}${row + 1}.`;
  if (targetShip) {
    const sunk = isBattleshipShipSunk(defenderBoard, targetShip);
    actionLabel = sunk
      ? `${attacker} sank ${defender}'s ${targetShip.label}.`
      : `${attacker} hit ${defender}'s fleet at ${BATTLESHIP_COLUMN_LABELS[col]}${row + 1}.`;
  }

  state.boards[attacker] = attackerBoard;
  state.boards[defender] = defenderBoard;
  state.lastAction = actionLabel;
  if (areAllBattleshipShipsSunk(defenderBoard)) {
    state.phase = 'finished';
    state.winner = attacker;
    state.turn = '';
  } else {
    state.turn = defender;
  }
  state.updatedAt = Date.now();
  room.activityState = state;
  await RoomManager.updateRoom(APP.roomCode, room);
  APP.room = room;
  render();
}

async function submitTicTacToeMove(index) {
  if (!APP.roomCode || !Number.isInteger(index) || index < 0 || index > 8) return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'tic-tac-toe-blitz') return;
  const state = room.activityState || {};
  if (state.roundClosed || Date.now() >= (Number(state.roundEndsAt) || 0)) return;
  const matchId = state.matchByPlayer?.[APP.player?.name];
  if (!matchId) return;
  const match = state.matches?.[matchId];
  if (!match || match.complete) return;
  if (!Array.isArray(match.board) || match.board[index]) return;
  const symbol = match.symbols?.[APP.player?.name];
  if (!symbol || symbol !== match.turn) return;

  match.board[index] = symbol;
  match.turn = symbol === 'X' ? 'O' : 'X';
  match.updatedAt = Date.now();
  const winnerSymbol = getTicTacToeWinnerSymbol(match.board);

  if (winnerSymbol) {
    const winnerName = Object.entries(match.symbols || {}).find(([, mark]) => mark === winnerSymbol)?.[0] || null;
    applyTicTacToeMatchResult(state, matchId, winnerName, 'line');
  } else if (match.board.every(Boolean)) {
    applyTicTacToeMatchResult(state, matchId, null, 'draw');
  }

  if (areAllTicTacToeMatchesComplete(state)) {
    state.roundClosed = true;
    state.roundClosedAt = Date.now();
  }
  state.updatedAt = Date.now();
  room.activityState = state;
  await RoomManager.updateRoom(APP.roomCode, room);
}

function getUnoPlayerHand(state, playerName) {
  const hands = state?.hands && typeof state.hands === 'object' ? state.hands : {};
  return Array.isArray(hands[playerName]) ? hands[playerName] : [];
}

function clearUnoSafetyForPlayer(state, playerName) {
  if (!state?.unoSafePlayers || typeof state.unoSafePlayers !== 'object') return;
  delete state.unoSafePlayers[playerName];
}

function setUnoPendingPlayer(state, playerName) {
  const hand = getUnoPlayerHand(state, playerName);
  if (hand.length !== 1) {
    if (state.unoPendingPlayer === playerName) state.unoPendingPlayer = '';
    clearUnoSafetyForPlayer(state, playerName);
    return;
  }
  if (state.unoSafePlayers?.[playerName] === true) {
    if (state.unoPendingPlayer === playerName) state.unoPendingPlayer = '';
    return;
  }
  state.unoPendingPlayer = playerName;
}

function applyUnoPostPlayEffects(state, card) {
  const order = Array.isArray(state.playerOrder) ? state.playerOrder : [];
  let stepCount = 1;
  if (card.value === 'reverse') {
    if (order.length <= 2) {
      stepCount = 2;
    } else {
      state.direction = state.direction === -1 ? 1 : -1;
    }
  } else if (card.value === 'skip') {
    stepCount = 2;
  } else if (card.value === 'draw2') {
    state.pendingDrawCount = (Number(state.pendingDrawCount) || 0) + 2;
  } else if (card.value === 'wild4') {
    state.pendingDrawCount = (Number(state.pendingDrawCount) || 0) + 4;
  }
  advanceUnoTurn(state, stepCount);
}

async function unoPlayCard(cardId, chosenColor = '') {
  if (!APP.roomCode || !cardId) return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'uno') return;
  const state = room.activityState || {};
  if (state.roundOver) return;
  const playerName = APP.player?.name;
  const currentPlayer = getUnoCurrentPlayerName(state);
  if (!playerName || currentPlayer !== playerName) return;
  if ((Number(state.pendingDrawCount) || 0) > 0) {
    showError(`You must ${getUnoPenaltyMessage(Number(state.pendingDrawCount) || 0).toLowerCase()} first.`);
    return;
  }

  const hand = getUnoPlayerHand(state, playerName);
  const cardIndex = hand.findIndex(entry => entry?.id === cardId);
  if (cardIndex < 0) return;
  const card = hand[cardIndex];
  const normalizedColor = UNO_COLORS.includes(chosenColor) ? chosenColor : '';
  if (!isUnoCardPlayable(card, state)) return;
  if (card.color === 'wild' && !normalizedColor) {
    state.pendingColorChoice = { player: playerName, cardId };
    room.activityState = state;
    await RoomManager.updateRoom(APP.roomCode, room);
    APP.room = room;
    render();
    return;
  }

  hand.splice(cardIndex, 1);
  state.discardPile = Array.isArray(state.discardPile) ? state.discardPile : [];
  state.discardPile.push(card);
  state.currentColor = card.color === 'wild' ? normalizedColor : card.color;
  state.pendingColorChoice = null;
  state.hasDrawnThisTurn = false;
  state.lastDrawnCardId = '';

  if (hand.length === 0) {
    state.roundOver = true;
    state.winner = playerName;
    state.pendingDrawCount = 0;
    state.roundPoints = computeUnoRoundPoints(state, playerName);
    state.scores = state.scores && typeof state.scores === 'object' ? state.scores : {};
    state.scores[playerName] = (Number(state.scores[playerName]) || 0) + state.roundPoints;
    state.unoPendingPlayer = '';
    clearUnoSafetyForPlayer(state, playerName);
    state.lastAction = `${playerName} went out with ${getUnoCardLabel(card)} and won ${state.roundPoints} points.`;
  } else {
    setUnoPendingPlayer(state, playerName);
    state.lastAction = `${playerName} played ${getUnoCardLabel(card)}${card.color === 'wild' ? ` and chose ${UNO_COLOR_META[normalizedColor]?.label || normalizedColor}` : ''}.`;
    applyUnoPostPlayEffects(state, card);
  }

  room.activityState = state;
  await RoomManager.updateRoom(APP.roomCode, room);
  APP.room = room;
  render();
}

async function unoDrawCard() {
  if (!APP.roomCode) return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'uno') return;
  const state = room.activityState || {};
  if (state.roundOver) return;
  const playerName = APP.player?.name;
  if (!playerName || getUnoCurrentPlayerName(state) !== playerName) return;

  const hand = getUnoPlayerHand(state, playerName);
  if ((Number(state.pendingDrawCount) || 0) > 0) {
    const penalty = Number(state.pendingDrawCount) || 0;
    const drawnCards = drawUnoCards(state, penalty);
    hand.push(...drawnCards);
    state.pendingDrawCount = 0;
    state.lastAction = `${playerName} drew ${drawnCards.length} penalty card${drawnCards.length === 1 ? '' : 's'}.`;
    clearUnoSafetyForPlayer(state, playerName);
    if (state.unoPendingPlayer === playerName) state.unoPendingPlayer = '';
    advanceUnoTurn(state, 1);
  } else if (state.hasDrawnThisTurn) {
    return;
  } else {
    const drawnCards = drawUnoCards(state, UNO_DRAW_LIMIT);
    if (!drawnCards.length) {
      showError('No more cards available to draw.');
      return;
    }
    hand.push(...drawnCards);
    state.hasDrawnThisTurn = true;
    state.lastDrawnCardId = drawnCards[0]?.id || '';
    clearUnoSafetyForPlayer(state, playerName);
    state.lastAction = `${playerName} drew a card.`;
  }

  room.activityState = state;
  await RoomManager.updateRoom(APP.roomCode, room);
  APP.room = room;
  render();
}

async function unoEndTurn() {
  if (!APP.roomCode) return;

async function revealAnswer() {
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.activityState?.revealed) return;
  room.activityState.revealed = true;
  const hostSettings = getRoomHostSettings(room);
  
  const currentQ = room.activityState.currentQ;
  const questionIndex = room.activityState.questionOrder?.[currentQ] ?? currentQ;
  const question = TRIVIA_BANK[questionIndex];
  const answers = room.activityState.answers || {};
  const answerTimes = room.activityState.answerTimes || {};
  
  if (!room.activityState.scores) room.activityState.scores = {};
  if (!room.activityState.lastPoints) room.activityState.lastPoints = {};
  
  Object.entries(answers).forEach(([playerName, ans]) => {
    room.activityState.lastPoints[playerName] = 0;
    
    if (ans === question.ans) {
      let points = 1000;
      if (hostSettings.dynamicScoring) {
        const timeUsed = answerTimes[playerName] || 20;
        const timeRemaining = Math.max(0, 20 - timeUsed);
        const timeRemainingRatio = timeRemaining / 20;
        points = Math.round(1000 + (1000 * timeRemainingRatio)); // 1000..2000
      }
      
      room.activityState.scores[playerName] = (room.activityState.scores[playerName] || 0) + points;
      room.activityState.lastPoints[playerName] = points;
    }
  });
  
  await RoomManager.updateRoom(APP.roomCode, room);
}

async function endActivity() {
  const room = await RoomManager.loadRoom(APP.roomCode);
  
  // Award XP based on activity type
  const activity = room.currentActivity;
  let xpEarned = 0;
  
  if (activity === 'lightning-trivia' || activity === 'regular-trivia') {
    const playerScore = room.activityState.scores?.[APP.player.name] || 0;
    xpEarned = Math.round(playerScore / 10);
  } else if (activity === 'icebreaker') {
    xpEarned = 50; // Participation XP
  } else if (activity === 'emoji-charades') {
    const playerScore = room.activityState.scores?.[APP.player.name] || 0;
    xpEarned = Math.max(40, Math.round(playerScore / 5));
  } else if (activity === 'pulse-check') {
    xpEarned = 30;
  } else if (activity === 'values-vote') {
    xpEarned = 40;
  } else if (activity === 'wordle') {
    const won = room.activityState.gameOver && room.activityState.guesses?.includes(room.activityState.targetWord);
    xpEarned = won ? 100 : 50;
  } else if (activity === 'word-chain') {
    const score = room.activityState.scores?.[APP.player.name] || 0;
    xpEarned = Math.max(40, Math.round(score / 25));
  } else if (activity === 'tic-tac-toe-blitz') {
    const points = room.activityState?.standings?.[APP.player.name]?.points || 0;
    xpEarned = Math.max(40, points * 20);
  } else if (activity === 'team-jeopardy') {
    const score = room.activityState.scores?.[APP.player.name] || 0;
    xpEarned = Math.max(40, Math.round(score / 8));
  } else if (activity === 'spin-wheel') {
    const spins = Number(room.activityState?.spinCount) || 0;
    xpEarned = Math.max(20, Math.min(60, spins * 10));
  } else if (activity === 'brainstorm-canvas') {
    const notes = Array.isArray(room.activityState?.notes) ? room.activityState.notes : [];
    const userNotes = notes.filter(note => note.author === APP.player.name).length;
    const userVotes = notes.filter(note => Array.isArray(note.voters) && note.voters.includes(APP.player.name)).length;
    xpEarned = Math.max(30, (userNotes * 15) + (userVotes * 5));
  } else if (activity === 'uno') {
    const score = room.activityState?.scores?.[APP.player.name] || 0;
    const won = room.activityState?.winner === APP.player.name;
    xpEarned = won ? Math.max(80, Math.round(score / 2)) : Math.max(30, Math.round(score / 4));
  }
  
  if (xpEarned > 0) {
    const updatedProfile = await PlayerManager.awardXP(xpEarned, activity);
    if (updatedProfile) {
      APP.player = updatedProfile;
    }
  }
  
  // Update activity completion stat
  APP.player.stats = APP.player.stats || {};
  if (GAME_ACTIVITY_IDS.has(activity)) {
    APP.player.stats.gamesPlayed = (APP.player.stats.gamesPlayed || 0) + 1;
  }
  APP.player.stats.activitiesCompleted = (APP.player.stats.activitiesCompleted || 0) + 1;
  await PlayerManager.updateProfile(APP.player);

  if (activity === 'brainstorm-canvas') {
    room.brainstormData = safeParseJson(JSON.stringify(room.activityState || {})) || room.activityState || {};
    room.brainstormLastUpdatedAt = Date.now();
  }
  
  room.currentActivity = null;
  room.activityState = {};
  
  await RoomManager.updateRoom(APP.roomCode, room);
  ticTacToeFinalizePending = false;
  resetWordChainFocusState();

  if (room.queueActive && room.host === APP.player?.name) {
    await runNextQueuedActivity(room);
  }
}

  room.activityState.answers[APP.player.name] = optionIndex;

async function revealRegularAnswer() {
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.activityState.revealed) return;
  room.activityState.revealed = true;
  const hostSettings = getRoomHostSettings(room);
  
  const currentQ = room.activityState.currentQ || 0;
  const questionIndex = room.activityState.questionOrder?.[currentQ] ?? currentQ;
  const question = TRIVIA_BANK[questionIndex];
  const answers = room.activityState.answers || {};
  const answerTimes = room.activityState.answerTimes || {};
  if (!room.activityState.scores) room.activityState.scores = {};
  if (!room.activityState.lastPoints) room.activityState.lastPoints = {};
  
  // Award time-based points for correct answers (continuous scoring).
  Object.entries(answers).forEach(([playerName, answer]) => {
    let points = 0;
    if (answer === question?.ans) {
      if (hostSettings.dynamicScoring) {
        const timeUsed = Math.min(answerTimes[playerName] ?? 20, 20);
        const timeRemainingRatio = Math.max(0, (20 - timeUsed) / 20);
        points = Math.round(500 + (500 * timeRemainingRatio)); // 500..1000
      } else {
        points = 500;
      }
    }
    room.activityState.lastPoints[playerName] = points;
    room.activityState.scores[playerName] = (room.activityState.scores[playerName] || 0) + points;
  });
  
  await RoomManager.updateRoom(APP.roomCode, room);
}

function getTeamJeopardyActiveClue(state) {
  const clueRef = state?.currentClue;
  if (!clueRef || !Number.isInteger(clueRef.categoryIndex) || !Number.isInteger(clueRef.clueIndex)) return null;
  const category = state?.board?.[clueRef.categoryIndex];
  const clue = category?.clues?.[clueRef.clueIndex];
  if (!category || !clue) return null;
  return { category, clue };
}

async function revealTeamJeopardyAnswer() {
  if (!APP.roomCode) return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'team-jeopardy') return;
  if (room.host !== APP.player?.name) return;
  const state = room.activityState || {};
  if (state.revealed || state.finished || !state.currentClue) return;
  const active = getTeamJeopardyActiveClue(state);
  if (!active) return;

  const { clue } = active;
  const value = Number(clue.value) || 100;
  const answers = state.answers || {};
  const participants = Array.isArray(room.participants) ? room.participants : [];
  if (!state.scores || typeof state.scores !== 'object') state.scores = {};
  if (!state.lastPoints || typeof state.lastPoints !== 'object') state.lastPoints = {};
  participants.forEach(player => {
    const playerName = player?.name;
    if (!playerName) return;
    const points = answers[playerName] === clue.ans ? value : 0;
    state.lastPoints[playerName] = points;
    state.scores[playerName] = (state.scores[playerName] || 0) + points;
  });

  if (!state.selectedClues || typeof state.selectedClues !== 'object') state.selectedClues = {};
  const clueKey = `${state.currentClue.categoryIndex}:${state.currentClue.clueIndex}`;
  state.selectedClues[clueKey] = true;
  const totalClues = Array.isArray(state.board)
    ? state.board.reduce((sum, category) => sum + ((Array.isArray(category?.clues) ? category.clues.length : 0)), 0)
    : 0;
  state.finished = Object.keys(state.selectedClues).length >= totalClues;
  state.revealed = true;
  room.activityState = state;
  await RoomManager.updateRoom(APP.roomCode, room);
}
