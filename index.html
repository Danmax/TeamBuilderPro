function cosmosBoundAssignRoles(names) {
  const roles = {};
  const ROLES = COSMOS_BOUND_ROLES;
  if (names.length >= 7) {
    names.forEach((name, i) => {
      const role = ROLES[i % ROLES.length];
      if (!roles[name]) roles[name] = [];
      roles[name].push(role);
    });
  } else {
    const distributions = {
      2: [['CDR','ENG','MED'], ['PLT','NAV','COM','SCI']],
      3: [['CDR','MED'], ['PLT','ENG'], ['NAV','COM','SCI']],
      4: [['CDR'], ['PLT','ENG'], ['NAV','COM'], ['SCI','MED']],
      5: [['CDR'], ['PLT'], ['ENG','MED'], ['NAV'], ['COM','SCI']],
      6: [['CDR'], ['PLT'], ['ENG'], ['NAV'], ['COM','SCI'], ['MED']]
    };
    const dist = distributions[names.length] || distributions[2];
    names.forEach((name, i) => {
      roles[name] = dist[i] || dist[dist.length - 1];
    });
  }
  return roles;
}

function createCosmosBoundState(participants) {
  const names = Array.from(new Set(
    (participants || [])
      .map(p => String(p?.name || '').trim())
      .filter(Boolean)
  ));
  const roles = cosmosBoundAssignRoles(names);
  const crewVitals = {};
  names.forEach(n => { crewVitals[n] = 'nominal'; });
  return {
    phase: 0,
    destination: 'mars',
    roles,
    systems: { 'life-support': false, comms: false, shields: false, gyro: false, fuel: false },
    throttle: 0,
    coords: { x: '', y: '', z: '' },
    coordsLocked: false,
    altitude: 0,
    velocity: 0,
    maxAlt: 0,
    maxVel: 0,
    missionStartedAt: null,
    targetCoords: COSMOS_BOUND_DESTINATIONS.mars.coords,
    log: [],
    countdownValue: null,
    broadcast: '',
    crewVitals,
    medReady: false,
    sciScanComplete: false,
    starSpeed: 0,
    planetPhase: 0,
    planetSize: 0,
    encounter: null,
    landedAt: 0,
    startedAt: Date.now(),
    updatedAt: Date.now()
  };
}

const COSMOS_BOUND_CREW_NAMES = ['ALPHA', 'BETA', 'GAMMA', 'DELTA'];
const COSMOS_BOUND_CREW_COLORS = ['#00d4ff', '#ff6b2b', '#b44dff', '#00ff88'];

function createCosmosBoundCrewMissionState(members, destId) {
  const dest = COSMOS_BOUND_DESTINATIONS[destId] || COSMOS_BOUND_DESTINATIONS.mars;
  const roles = cosmosBoundAssignRoles(members);
  const crewVitals = {};
  members.forEach(n => { crewVitals[n] = 'nominal'; });
  return {
    phase: 0,
    roles,
    systems: { 'life-support': false, comms: false, shields: false, gyro: false, fuel: false },
    throttle: 0,
    coords: { x: '', y: '', z: '' },
    coordsLocked: false,
    altitude: 0,
    velocity: 0,
    maxAlt: 0,
    maxVel: 0,
    missionStartedAt: null,
    targetCoords: dest.coords,
    log: [],
    countdownValue: null,
    broadcast: '',
    crewVitals,
    medReady: false,
    sciScanComplete: false,
    starSpeed: 0,
    planetPhase: 0,
    planetSize: 0
  };
}

function cosmosBoundAutoSplitCrews(names, destId) {
  // Split into crews of 4-7
  const crewSize = names.length <= 14 ? Math.ceil(names.length / 2) : Math.ceil(names.length / Math.ceil(names.length / 7));
  const crews = {};
  const crewAssignments = {};
  let crewIdx = 0;
  for (let i = 0; i < names.length; i++) {
    if (i > 0 && i % crewSize === 0) crewIdx++;
    const crewId = COSMOS_BOUND_CREW_NAMES[crewIdx] || ('CREW-' + (crewIdx + 1));
    if (!crews[crewId]) crews[crewId] = { name: crewId, members: [], color: COSMOS_BOUND_CREW_COLORS[crewIdx] || '#00d4ff' };
    crews[crewId].members.push(names[i]);
    crewAssignments[names[i]] = crewId;
  }
  // Create mission state per crew
  const crewStates = {};
  for (const [crewId, crew] of Object.entries(crews)) {
    crewStates[crewId] = { ...createCosmosBoundCrewMissionState(crew.members, destId), name: crew.name, color: crew.color, members: crew.members };
  }
  return { crewStates, crewAssignments };
}

function getCosmosBoundMyCrewId(state) {
  if (!state?.multiCrew) return null;
  return (state.crewAssignments || {})[APP.player?.name || ''] || null;
}

function getCosmosBoundMyCrewState(state) {
  if (!state?.multiCrew) return state;
  const crewId = getCosmosBoundMyCrewId(state);
  return crewId ? (state.crews || {})[crewId] || state : state;
}

function getCosmosBoundRoles(state, playerName) {
  const effectiveState = state?.multiCrew ? getCosmosBoundMyCrewState(state) : state;
  const entry = effectiveState?.roles?.[playerName];
  return Array.isArray(entry) ? entry : (typeof entry === 'string' ? [entry] : []);
}

function getCosmosBoundMyRoles(state) {
  return getCosmosBoundRoles(state, APP.player?.name || '');
}

function cosmosBoundPlayerHasRole(state, playerName, role) {
  return getCosmosBoundRoles(state, playerName).includes(role);
}

function canCosmosBoundInteract(state, role) {
  return cosmosBoundPlayerHasRole(state, APP.player?.name || '', role);
}

function getCosmosBoundDest(state) {
  const destId = state?.destination || APP.room?.activityState?.destination || 'mars';
  return COSMOS_BOUND_DESTINATIONS[destId] || COSMOS_BOUND_DESTINATIONS.mars;
}

function cosmosBoundPreflightReady(state) {
  const dest = getCosmosBoundDest(state);
  const allSys = Object.values(state.systems || {}).every(v => v);
  return allSys && (state.throttle || 0) >= dest.minThrottle && state.coordsLocked && state.medReady && state.sciScanComplete;
}

function getCosmosBoundNextSteps(state, myRoles) {
  const phase = state.phase || 0;
  const dest = getCosmosBoundDest(state);
  const systems = state.systems || {};
  const steps = [];

  if (phase === 0) {
    // Pre-flight: each role has tasks
    if (myRoles.includes('ENG')) {
      const offSystems = ['life-support', 'gyro', 'fuel'].filter(s => !systems[s]);
      if (offSystems.length) steps.push({ role: 'ENG', text: 'Activate ' + offSystems.map(s => s.replace(/-/g, ' ').toUpperCase()).join(', '), urgent: true });
      else steps.push({ role: 'ENG', text: 'All systems online', done: true });
    }
    if (myRoles.includes('COM')) {
      if (!systems.comms) steps.push({ role: 'COM', text: 'Activate COMMS ARRAY', urgent: true });
      else steps.push({ role: 'COM', text: 'Comms online — broadcast when ready', done: true });
    }
    if (myRoles.includes('MED')) {
      if (!systems.shields) steps.push({ role: 'MED', text: 'Activate HEAT SHIELDS', urgent: true });
      else if (!state.medReady) steps.push({ role: 'MED', text: 'Confirm crew vitals', urgent: true });
      else steps.push({ role: 'MED', text: 'Crew cleared for launch', done: true });
    }
    if (myRoles.includes('PLT')) {
      if ((state.throttle || 0) < dest.minThrottle) steps.push({ role: 'PLT', text: 'Set throttle to ' + dest.minThrottle + '%+', urgent: true });
      else steps.push({ role: 'PLT', text: 'Throttle nominal at ' + (state.throttle || 0) + '%', done: true });
    }
    if (myRoles.includes('NAV')) {
      if (!state.coordsLocked) steps.push({ role: 'NAV', text: 'Enter coordinates (' + dest.coords.x + ', ' + dest.coords.y + ', ' + dest.coords.z + ') and lock', urgent: true });
      else steps.push({ role: 'NAV', text: 'Coordinates locked', done: true });
    }
    if (myRoles.includes('SCI')) {
      if (!state.sciScanComplete) steps.push({ role: 'SCI', text: 'Run systems scan when checklist is ready', urgent: true });
      else steps.push({ role: 'SCI', text: 'Scan complete — all nominal', done: true });
    }
    if (myRoles.includes('CDR')) {
      if (cosmosBoundPreflightReady(state)) steps.push({ role: 'CDR', text: 'ALL SYSTEMS GO — press IGNITE ENGINES', urgent: true });
      else steps.push({ role: 'CDR', text: 'Waiting for crew to complete pre-flight checks' });
    }
  } else if (phase === 1) {
    if (myRoles.includes('CDR')) steps.push({ role: 'CDR', text: 'Engines firing — press LAUNCH when ready', urgent: true });
    else steps.push({ text: 'Engines firing — awaiting CDR to launch' });
  } else if (phase === 2) {
    steps.push({ text: 'Ascending to orbit — hold steady' });
  } else if (phase === 3) {
    if (myRoles.includes('CDR')) steps.push({ role: 'CDR', text: 'Stable orbit — press SET COURSE for ' + dest.label, urgent: true });
    else steps.push({ text: 'Stable orbit — awaiting CDR to set course' });
  } else if (phase === 4) {
    steps.push({ text: 'In transit to ' + dest.label + ' — hold steady' });
  } else if (phase === 5) {
    if (myRoles.includes('PLT') && (state.throttle || 0) > dest.landThrottle) {
      steps.push({ role: 'PLT', text: 'Reduce throttle below ' + dest.landThrottle + '% for landing', urgent: true });
    }
    if (myRoles.includes('CDR')) {
      if ((state.throttle || 0) <= dest.landThrottle) steps.push({ role: 'CDR', text: 'Throttle safe — press INITIATE LANDING', urgent: true });
      else steps.push({ role: 'CDR', text: 'Waiting for PLT to reduce throttle below ' + dest.landThrottle + '%' });
    }
    if (!myRoles.includes('CDR') && !myRoles.includes('PLT')) {
      steps.push({ text: 'Approaching ' + dest.label + ' — preparing for landing' });
    }
  } else if (phase >= 5.5 && phase < 6) {
    steps.push({ text: 'Landing in progress — hold steady' });
  } else if (phase === 6) {
    steps.push({ text: 'Mission complete — ' + dest.label + ' reached!', done: true });
  }
  return steps;
}

function cosmosBoundAddLog(state, msg) {
  const log = Array.isArray(state.log) ? state.log : [];
  log.push({ t: Date.now(), msg });
  if (log.length > 30) log.splice(0, log.length - 30);
  state.log = log;
}

// Drop resilience: redistribute roles from disconnected crew to active members
let cosmosBoundLastParticipantCheck = 0;

function cosmosBoundCheckCrewIntegrity() {
  if (APP.room?.host !== APP.player?.name) return; // only host checks
  if (APP.room?.currentActivity !== 'cosmos-bound') return;
  const now = Date.now();
  if (now - cosmosBoundLastParticipantCheck < 3000) return; // throttle to every 3s
  cosmosBoundLastParticipantCheck = now;

  const state = APP.room.activityState;
  if (!state || !state.roles) return;
  const currentNames = new Set((APP.room.participants || []).map(p => String(p?.name || '').trim()).filter(Boolean));
  const roleNames = Object.keys(state.roles);
  const orphanedRoles = [];

  // Find roles belonging to disconnected players
  for (const name of roleNames) {
    if (!currentNames.has(name)) {
      const roles = getCosmosBoundRoles(state, name);
      orphanedRoles.push(...roles);
    }
  }
  if (orphanedRoles.length === 0) return;

  // Redistribute orphaned roles to active players
  cosmosBoundUpdateState(s => {
    const active = Object.keys(s.roles).filter(n => currentNames.has(n));
    if (active.length === 0) return;
    // Remove disconnected players
    for (const name of Object.keys(s.roles)) {
      if (!currentNames.has(name)) {
        cosmosBoundAddLog(s, name.toUpperCase() + ' DISCONNECTED — REDISTRIBUTING ROLES');
        delete s.roles[name];
      }
    }
    // Distribute orphaned roles round-robin to active players (fewest roles first)
    for (const role of orphanedRoles) {
      const activeList = Object.keys(s.roles).filter(n => currentNames.has(n));
      activeList.sort((a, b) => (s.roles[a]?.length || 0) - (s.roles[b]?.length || 0));
      const target = activeList[0];
      if (target) {
        if (!Array.isArray(s.roles[target])) s.roles[target] = [];
        if (!s.roles[target].includes(role)) {
          s.roles[target].push(role);
          cosmosBoundAddLog(s, role + ' ROLE REASSIGNED TO ' + target.toUpperCase());
        }
      }
    }
    // Also update crewVitals
    const vitals = s.crewVitals || {};
    for (const name of Object.keys(vitals)) {
      if (!currentNames.has(name)) delete vitals[name];
    }
    s.crewVitals = vitals;
  });
}

// Also handle new participants joining mid-mission
function cosmosBoundCheckNewMembers() {
  if (APP.room?.host !== APP.player?.name) return;
  if (APP.room?.currentActivity !== 'cosmos-bound') return;
  const state = APP.room.activityState;
  if (!state || !state.roles) return;
  const currentNames = (APP.room.participants || []).map(p => String(p?.name || '').trim()).filter(Boolean);
  const roleNames = new Set(Object.keys(state.roles));
  const newMembers = currentNames.filter(n => !roleNames.has(n));
  if (newMembers.length === 0) return;

  cosmosBoundUpdateState(s => {
    for (const name of newMembers) {
      // Assign them the role with fewest holders
      const roleCounts = {};
      COSMOS_BOUND_ROLES.forEach(r => { roleCounts[r] = 0; });
      for (const roles of Object.values(s.roles)) {
        if (Array.isArray(roles)) roles.forEach(r => { roleCounts[r] = (roleCounts[r] || 0) + 1; });
      }
      const leastRole = COSMOS_BOUND_ROLES.reduce((a, b) => (roleCounts[a] || 0) <= (roleCounts[b] || 0) ? a : b);
      s.roles[name] = [leastRole];
      if (!s.crewVitals) s.crewVitals = {};
      s.crewVitals[name] = 'nominal';
      cosmosBoundAddLog(s, name.toUpperCase() + ' JOINED CREW AS ' + leastRole);
    }
  });
}

function cosmosBoundInitAudio() {
  if (!cosmosBoundAudioAmbient) {
    cosmosBoundAudioAmbient = new Audio('/sounds/space-ship-bridge-loop-104525.mp3');
    cosmosBoundAudioAmbient.loop = true;
    cosmosBoundAudioAmbient.volume = 0.25;
  }
  if (!cosmosBoundAudioLaunch) {
    cosmosBoundAudioLaunch = new Audio('/sounds/Rocket-launch-306441.mp3');
    cosmosBoundAudioLaunch.loop = false;
    cosmosBoundAudioLaunch.volume = 0.5;
  }
}

// Play a one-shot sound effect
function cosmosBoundPlaySfx(name, volume = 0.4) {
  const paths = {
    beep: '/sounds/beep-sound-short-237619.mp3',
    beep1: '/sounds/eaglaxle-electronic-beep-1-453381.mp3',
    beep2: '/sounds/eaglaxle-electronic-beep-2-453382.mp3',
    beep3: '/sounds/eaglaxle-electronic-beep-3-453383.mp3',
    warp: '/sounds/freesound_community-cinematic-glitch-transition-sfx-27806.mp3',
    info: '/sounds/lubecin123-info-computer-sound-299367.mp3'
  };
  const path = paths[name];
  if (!path) return;
  // Reuse or create audio element
  if (!cosmosBoundSfxCache[name]) {
    cosmosBoundSfxCache[name] = new Audio(path);
  }
  const sfx = cosmosBoundSfxCache[name];
  sfx.currentTime = 0;
  sfx.volume = volume;
  sfx.play().catch(() => {});
}

function cosmosBoundSyncAudio(phase) {
  const p = Math.floor(phase);
  if (p === cosmosBoundLastAudioPhase) return;
  const prevPhase = cosmosBoundLastAudioPhase;
  cosmosBoundLastAudioPhase = p;
  cosmosBoundInitAudio();

  // Ambient bridge hum: plays during pre-flight and orbit+
  if (p >= 0 && p !== 2) {
    if (cosmosBoundAudioAmbient.paused) {
      cosmosBoundAudioAmbient.currentTime = 0;
      cosmosBoundAudioAmbient.play().catch(() => {});
    }
    cosmosBoundAudioAmbient.volume = p === 0 ? 0.15 : p >= 4 ? 0.3 : 0.25;
  }
  // Duck ambient during launch ascent
  if (p === 2) {
    cosmosBoundAudioAmbient.volume = 0.08;
  }

  // Phase transition SFX
  if (p === 1 && prevPhase === 0) {
    // Ignition
    cosmosBoundPlaySfx('beep3', 0.5);
    cosmosBoundAudioLaunch.currentTime = 0;
    cosmosBoundAudioLaunch.volume = 0.5;
    cosmosBoundAudioLaunch.play().catch(() => {});
  }
  if (p === 2 && prevPhase === 1) {
    // Launch — countdown beeps handled separately
    cosmosBoundPlaySfx('beep3', 0.5);
  }
  if (p === 3 && prevPhase <= 2) {
    // Orbit achieved
    cosmosBoundPlaySfx('info', 0.5);
    // Fade out rocket
    if (!cosmosBoundAudioLaunch.paused) {
      cosmosBoundAudioLaunch.volume = 0.1;
      setTimeout(() => { cosmosBoundAudioLaunch.pause(); cosmosBoundAudioLaunch.currentTime = 0; }, 1500);
    }
  }
  if (p === 4 && prevPhase === 3) {
    // Warp / navigate
    cosmosBoundPlaySfx('warp', 0.6);
  }
  if (p === 5 && prevPhase === 4) {
    // Arrived at destination
    cosmosBoundPlaySfx('info', 0.5);
    cosmosBoundAudioLaunch.currentTime = 0;
    cosmosBoundAudioLaunch.volume = 0.25;
    cosmosBoundAudioLaunch.play().catch(() => {});
  }
  if (p === 6) {
    // Mission complete
    cosmosBoundPlaySfx('info', 0.6);
    if (cosmosBoundAudioAmbient) {
      cosmosBoundAudioAmbient.volume = 0.1;
      setTimeout(() => { cosmosBoundAudioAmbient.pause(); }, 2000);
    }
    if (cosmosBoundAudioLaunch && !cosmosBoundAudioLaunch.paused) {
      cosmosBoundAudioLaunch.pause();
    }
  }
}

function cosmosBoundStopAudio() {
  cosmosBoundLastAudioPhase = -1;
  if (cosmosBoundAudioAmbient) {
    cosmosBoundAudioAmbient.pause();
    cosmosBoundAudioAmbient.currentTime = 0;
  }
  if (cosmosBoundAudioLaunch) {
    cosmosBoundAudioLaunch.pause();
    cosmosBoundAudioLaunch.currentTime = 0;
  }
}

function getConnect4Seat(state, color) {
  return state?.players?.[color] || createConnect4Seat(null, color);
}

function getConnect4PlayerColor(state, player = APP.player) {
  const playerId = String(player?.id || '').trim();
  const playerName = String(player?.name || '').trim();
  if (!state?.players || (!playerId && !playerName)) return '';
  return CONNECT4_COLORS.find(color => {
    const seat = state.players[color] || {};
    return (playerId && seat.playerId === playerId) || (playerName && seat.playerName === playerName);
  }) || '';
}

function getConnect4Cell(board, row, col) {
  return String(board?.[row]?.[col] || '').trim().toLowerCase();
}

function getConnect4DropRow(board, col) {
  if (!Number.isInteger(col) || col < 0 || col >= CONNECT4_COLS) return -1;
  for (let row = CONNECT4_ROWS - 1; row >= 0; row--) {
    if (!getConnect4Cell(board, row, col)) return row;
  }
  return -1;
}

function getConnect4Winner(board) {
  const directions = [
    [0, 1],
    [1, 0],
    [1, 1],
    [1, -1]
  ];
  for (let row = 0; row < CONNECT4_ROWS; row++) {
    for (let col = 0; col < CONNECT4_COLS; col++) {
      const color = getConnect4Cell(board, row, col);
      if (!color) continue;
      for (const [deltaRow, deltaCol] of directions) {
        const cells = [{ row, col }];
        let matched = true;
        for (let step = 1; step < 4; step++) {
          const nextRow = row + (deltaRow * step);
          const nextCol = col + (deltaCol * step);
          if (nextRow < 0 || nextRow >= CONNECT4_ROWS || nextCol < 0 || nextCol >= CONNECT4_COLS || getConnect4Cell(board, nextRow, nextCol) !== color) {
            matched = false;
            break;
          }
          cells.push({ row: nextRow, col: nextCol });
        }
        if (matched) {
          return { color, cells };
        }
      }
    }
  }
  return null;
}

function isConnect4BoardFull(board) {
  return Array.isArray(board) && board.every(row => Array.isArray(row) && row.every(cell => Boolean(String(cell || '').trim())));
}

function shuffleArray(items) {
  const arr = [...items];
  for (let idx = arr.length - 1; idx > 0; idx--) {
    const swapIdx = Math.floor(Math.random() * (idx + 1));
    [arr[idx], arr[swapIdx]] = [arr[swapIdx], arr[idx]];
  }
  return arr;
}

function createBingoCard() {
  const grid = Array.from({ length: 5 }, () => Array(5).fill(null));
  BINGO_NUMBER_RANGES.forEach(([min, max], col) => {
    const values = shuffleArray(Array.from({ length: max - min + 1 }, (_, idx) => min + idx)).slice(0, 5);
    for (let row = 0; row < 5; row++) {
      grid[row][col] = values[row];
    }
  });
  grid[2][2] = 'FREE';
  return grid;
}

function createBingoMarkedGrid() {
  return Array.from({ length: 5 }, (_, row) => Array.from({ length: 5 }, (_, col) => row === 2 && col === 2));
}

function normalizeBingoMarkerType(value) {
  const normalized = String(value || '').trim().toLowerCase();
  return BINGO_MARKER_OPTIONS.some(option => option.id === normalized)
    ? normalized
    : BINGO_MARKER_OPTIONS[0].id;
}

function getBingoMarkerMeta(value) {
  const normalized = normalizeBingoMarkerType(value);
  return BINGO_MARKER_OPTIONS.find(option => option.id === normalized) || BINGO_MARKER_OPTIONS[0];
}

function createBingoMarkerGrid() {
  return Array.from({ length: 5 }, (_, row) => Array.from({ length: 5 }, (_, col) => {
    if (row === 2 && col === 2) return 'star-violet';
    return '';
  }));
}

function createBingoPlayerCard() {
  return {
    grid: createBingoCard(),
    marked: createBingoMarkedGrid(),
    markers: createBingoMarkerGrid()
  };
}

function normalizeBingoWinningPattern(value) {
  const normalized = String(value || '').trim().toLowerCase();
  return BINGO_PATTERN_OPTIONS.some(option => option.id === normalized) ? normalized : 'line';
}

function getBingoWinningPatternMeta(value) {
  const normalized = normalizeBingoWinningPattern(value);
  return BINGO_PATTERN_OPTIONS.find(option => option.id === normalized) || BINGO_PATTERN_OPTIONS[0];
}

function createBingoState(participants, winningPattern = 'line') {
  const players = Array.from(new Set((participants || [])
    .map(player => String(player?.name || '').trim())
    .filter(Boolean)));
  const cards = {};
  players.forEach(playerName => {
    cards[playerName] = createBingoPlayerCard();
  });
  return {
    phase: 'playing',
    drawPool: shuffleArray(Array.from({ length: 75 }, (_, idx) => idx + 1)),
    calledNumbers: [],
    cards,
    winners: [],
    winningPattern: normalizeBingoWinningPattern(winningPattern),
    nextWinningPattern: normalizeBingoWinningPattern(winningPattern),
    lastCalled: null,
    lastCalledAt: null,
    startedAt: Date.now(),
    updatedAt: Date.now()
  };
}

function getBingoCard(state, playerName) {
  const cards = state?.cards && typeof state.cards === 'object' ? state.cards : {};
  const card = cards[playerName];
  return card && typeof card === 'object' ? card : null;
}

function normalizeBingoMarkedGrid(marked) {
  return Array.from({ length: 5 }, (_, row) => Array.from({ length: 5 }, (_, col) => {
    if (row === 2 && col === 2) return true;
    return Boolean(marked?.[row]?.[col]);
  }));
}

function normalizeBingoMarkerGrid(markers, marked) {
  const normalizedMarked = normalizeBingoMarkedGrid(marked);
  return Array.from({ length: 5 }, (_, row) => Array.from({ length: 5 }, (_, col) => {
    if (row === 2 && col === 2) {
      return normalizeBingoMarkerType(markers?.[row]?.[col] || 'star-violet');
    }
    if (!normalizedMarked[row][col]) return '';
    return normalizeBingoMarkerType(markers?.[row]?.[col] || BINGO_MARKER_OPTIONS[0].id);
  }));
}

function buildBingoCalledSet(state) {
  return new Set(Array.isArray(state?.calledNumbers) ? state.calledNumbers.map(value => Number(value)) : []);
}

function isBingoCellMarkAllowed(card, calledSet, row, col) {
  const value = card?.grid?.[row]?.[col];
  if (row === 2 && col === 2) return true;
  return calledSet.has(Number(value));
}

function getBingoWinningLines() {
  const rows = Array.from({ length: 5 }, (_, row) => Array.from({ length: 5 }, (_, col) => [row, col]));
  const cols = Array.from({ length: 5 }, (_, col) => Array.from({ length: 5 }, (_, row) => [row, col]));
  const diagA = Array.from({ length: 5 }, (_, idx) => [idx, idx]);
  const diagB = Array.from({ length: 5 }, (_, idx) => [idx, 4 - idx]);
  return [...rows, ...cols, diagA, diagB];
}

function validateBingoCardAgainstCalled(card, calledSet, winningPattern = 'line') {
  if (!card?.grid || !card?.marked) return false;
  const marked = normalizeBingoMarkedGrid(card.marked);
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 5; col++) {
      if (!marked[row][col]) continue;
      if (!isBingoCellMarkAllowed(card, calledSet, row, col)) return false;
    }
  }
  const pattern = normalizeBingoWinningPattern(winningPattern);
  if (pattern === 'four_corners') {
    return [[0, 0], [0, 4], [4, 0], [4, 4]].every(([row, col]) => marked[row][col]);
  }
  if (pattern === 'full_card') {
    return Array.from({ length: 5 }, (_, row) => Array.from({ length: 5 }, (_, col) => marked[row][col]).every(Boolean)).every(Boolean);
  }
  return getBingoWinningLines().some(line => line.every(([row, col]) => marked[row][col]));
}

function formatBingoCall(value) {
  const num = Number(value);
  if (!Number.isInteger(num) || num < 1 || num > 75) return '';
  const col = num <= 15 ? 'B' : num <= 30 ? 'I' : num <= 45 ? 'N' : num <= 60 ? 'G' : 'O';
  return `${col}-${num}`;
}

function formatBingoVoiceCall(value) {
  const label = formatBingoCall(value);
  return label ? label.replace('-', ' ') : '';
}

function speakBingoAnnouncement(text) {
  if (!text || typeof window === 'undefined' || !('speechSynthesis' in window)) return;
  try {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 1;
    utterance.pitch = 1;
    utterance.volume = 1;
    window.speechSynthesis.speak(utterance);
  } catch (error) {
    console.warn('Bingo speech unavailable', error);
  }
}

function triggerBingoCelebration(winners) {
  if (typeof document === 'undefined' || !document.body) return;
  const prior = document.getElementById('bingo-celebration-overlay');
  if (prior) prior.remove();
  const winnerNames = Array.isArray(winners)
    ? winners.map(name => String(name || '').trim()).filter(Boolean)
    : [];
  const overlay = document.createElement('div');
  overlay.id = 'bingo-celebration-overlay';
  overlay.setAttribute('aria-hidden', 'true');
  overlay.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:2400;overflow:hidden;';
  overlay.innerHTML = `
    <div style="position:absolute;top:18px;left:50%;transform:translateX(-50%);padding:14px 20px;border-radius:999px;border:1px solid rgba(255,255,255,0.3);background:linear-gradient(135deg,rgba(239,35,60,0.94),rgba(249,115,22,0.9));box-shadow:0 22px 48px rgba(15,23,42,0.34);color:#ffffff;font-weight:900;letter-spacing:0.06em;text-transform:uppercase;backdrop-filter:blur(8px);">
      Bingo Confirmed${winnerNames.length ? ` • ${escapeHtml(winnerNames.join(', '))}` : ''}!
    </div>
    <div class="trivia-confetti" style="position:absolute;inset:0;z-index:0;">${buildCelebrationConfettiPieces(34)}</div>

function maybeHandleBingoAnnouncements(state, winners, drawStamp, winStamp) {
  APP.bingoUi = APP.bingoUi && typeof APP.bingoUi === 'object' ? APP.bingoUi : getDefaultBingoUiState();
  const ui = APP.bingoUi;
  if (typeof ui.voiceEnabled !== 'boolean') ui.voiceEnabled = true;
  const roundStamp = Number(state?.startedAt) || 0;
  if (ui.lastObservedRoundStamp !== roundStamp) {
    ui.lastObservedRoundStamp = roundStamp;
    ui.lastAnnouncedCallStamp = drawStamp;
    ui.lastAnnouncedWinStamp = winStamp;
    return;
  }
  if (drawStamp && ui.lastAnnouncedCallStamp !== drawStamp) {
    ui.lastAnnouncedCallStamp = drawStamp;
    if (ui.voiceEnabled) {
      speakBingoAnnouncement(formatBingoVoiceCall(state?.lastCalled));
    }
  }
  if (!drawStamp) ui.lastAnnouncedCallStamp = null;
  if (winStamp && ui.lastAnnouncedWinStamp !== winStamp) {
    ui.lastAnnouncedWinStamp = winStamp;
    triggerBingoCelebration(winners);
    if (ui.voiceEnabled) {
      const winnerNames = Array.isArray(winners) ? winners.filter(Boolean).join(', ') : '';
      speakBingoAnnouncement(winnerNames ? `Bingo confirmed. Winner ${winnerNames}.` : 'Bingo confirmed.');
    }
  }
  if (!winStamp) ui.lastAnnouncedWinStamp = null;
}

function parseYouTubeSource(rawValue) {
  const raw = String(rawValue || '').trim();
  if (!raw) return { sourceUrl: '', sourceType: 'none', videoId: '', playlistId: '', trackIndex: 0 };
  try {
    const withProtocol = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
    const parsed = new URL(withProtocol);
    const host = parsed.hostname.replace(/^www\./i, '').toLowerCase();
    let videoId = '';
    let playlistId = '';
    let trackIndex = Math.max(0, Number.parseInt(parsed.searchParams.get('index') || '0', 10) - 1);
    if (host === 'youtu.be') {
      videoId = parsed.pathname.replace(/\//g, '').trim();
      playlistId = parsed.searchParams.get('list') || '';
    } else if (host.endsWith('youtube.com') || host.endsWith('youtube-nocookie.com')) {
      if (parsed.pathname === '/watch') {
        videoId = parsed.searchParams.get('v') || '';
        playlistId = parsed.searchParams.get('list') || '';
      } else if (parsed.pathname === '/playlist') {
        playlistId = parsed.searchParams.get('list') || '';
      } else if (parsed.pathname.startsWith('/embed/')) {
        videoId = parsed.pathname.split('/')[2] || '';
        playlistId = parsed.searchParams.get('list') || '';
      } else if (parsed.pathname.startsWith('/shorts/')) {
        videoId = parsed.pathname.split('/')[2] || '';
      }
    }
    videoId = String(videoId || '').replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 16);
    playlistId = String(playlistId || '').replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 64);
    return {
      sourceUrl: raw,
      sourceType: playlistId ? 'playlist' : videoId ? 'video' : 'none',
      videoId,
      playlistId,
      trackIndex: Math.max(0, trackIndex)
    };
  } catch (_error) {
    return { sourceUrl: raw, sourceType: 'none', videoId: '', playlistId: '', trackIndex: 0 };
  }
}

    label: String(rawDeck?.label || fallbackLabel).replace(/\s+/g, ' ').trim().slice(0, 24) || fallbackLabel,
    sourceMode: 'youtube',
    sourceUrl: String(rawDeck?.sourceUrl || source.sourceUrl || '').trim().slice(0, 500),
    sourceType: source.sourceType,
    sourceLabel: String(rawDeck?.sourceLabel || '').replace(/\s+/g, ' ').trim().slice(0, 80),
    videoId: String(source.videoId || '').trim(),
    playlistId: String(source.playlistId || '').trim(),
    trackIndex: Math.max(0, Number.parseInt(rawDeck?.trackIndex ?? source.trackIndex ?? 0, 10) || 0),
    playing: rawDeck?.playing === true,
    volume: Math.max(0, Math.min(100, Number.parseInt(rawDeck?.volume ?? 82, 10) || 82)),
    positionSeconds: Math.max(0, Number(rawDeck?.positionSeconds) || 0),
    lastActionAt: Number(rawDeck?.lastActionAt) || Date.now()
  };
}

function normalizeDjBoothState(rawState) {
  const source = rawState && typeof rawState === 'object' ? rawState : {};
  const lights = source.lights && typeof source.lights === 'object' ? source.lights : {};
  return {
    marqueeText: String(source.marqueeText || 'Broadcast live from the Team Builder DJ Booth').replace(/\s+/g, ' ').trim().slice(0, 140) || 'Broadcast live from the Team Builder DJ Booth',
    masterVolume: Math.max(0, Math.min(100, Number.parseInt(source.masterVolume ?? 86, 10) || 86)),
    crossfader: Math.max(0, Math.min(100, Number.parseInt(source.crossfader ?? 50, 10) || 50)),
    micLive: source.micLive === true,
    deckA: normalizeDjBoothDeckState(source.deckA, 'Deck A'),
    deckB: normalizeDjBoothDeckState(source.deckB, 'Deck B'),
    trackLibrary: normalizeDjBoothTrackLibrary(source.trackLibrary),
    soundPads: normalizeDjBoothPads(source.soundPads),
    activePadId: String(source.activePadId || '').trim(),
    lastPadTriggerAt: Number(source.lastPadTriggerAt) || 0,
    lights: {
      enabled: lights.enabled !== false,
      mode: ['ambient', 'pulse', 'wave', 'strobe', 'party'].includes(String(lights.mode || '').trim()) ? String(lights.mode).trim() : 'pulse',
      speed: Math.max(10, Math.min(100, Number.parseInt(lights.speed ?? 55, 10) || 55)),
      intensity: Math.max(10, Math.min(100, Number.parseInt(lights.intensity ?? 75, 10) || 75)),
      colorA: isValidHexColor(lights.colorA || '') ? String(lights.colorA).trim() : '#00d2d3',
      colorB: isValidHexColor(lights.colorB || '') ? String(lights.colorB).trim() : '#ff4d8d',
      flashAt: Number(lights.flashAt) || 0
    },
    updatedAt: Number(source.updatedAt) || Date.now()
  };
}

function createDjBoothState() {
  return normalizeDjBoothState({
    deckA: createDjBoothDeckState('Deck A'),
    deckB: createDjBoothDeckState('Deck B'),
    trackLibrary: [],
    soundPads: getDefaultDjBoothPads(),
    marqueeText: 'Broadcast live from the Team Builder DJ Booth',
    masterVolume: 86,
    crossfader: 50,
    micLive: false,
    activePadId: '',
    lastPadTriggerAt: 0,
    lights: {
      enabled: true,
      mode: 'pulse',
      speed: 55,
      intensity: 75,
      colorA: '#00d2d3',
      colorB: '#ff4d8d',
      flashAt: 0
    },
    updatedAt: Date.now()
  });
}

function getDjBoothEffectiveDeckPosition(deck) {
  const safeDeck = normalizeDjBoothDeckState(deck, deck?.label || 'Deck');
  if (!safeDeck.playing) return safeDeck.positionSeconds;
  return Math.max(0, safeDeck.positionSeconds + ((Date.now() - safeDeck.lastActionAt) / 1000));
}

function computeDjBoothDeckEffectiveVolume(state, deckKey) {
  const safeState = normalizeDjBoothState(state);
  const deck = safeState[deckKey];
  if (!deck) return 0;
  const cross = Math.max(0, Math.min(100, Number(safeState.crossfader) || 50));
  const master = Math.max(0, Math.min(100, Number(safeState.masterVolume) || 0)) / 100;
  const deckVolume = Math.max(0, Math.min(100, Number(deck.volume) || 0)) / 100;
  const crossFactor = deckKey === 'deckA'
    ? Math.min(1, Math.max(0, (100 - cross) / 50))
    : Math.min(1, Math.max(0, cross / 50));
  return Math.round(deckVolume * crossFactor * master * 100);
}

function ensureDjBoothAudioContext() {
  if (djBoothPadAudioContext) return djBoothPadAudioContext;
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return null;
  djBoothPadAudioContext = new AudioCtx();
  return djBoothPadAudioContext;
}

function scheduleDjBoothTone(ctx, { type = 'sine', frequency = 440, gain = 0.2, startOffset = 0, duration = 0.2, endFrequency = null }) {
  const oscillator = ctx.createOscillator();
  const gainNode = ctx.createGain();
  oscillator.type = type;
  oscillator.frequency.setValueAtTime(frequency, ctx.currentTime + startOffset);
  if (endFrequency != null) {
    oscillator.frequency.exponentialRampToValueAtTime(Math.max(20, endFrequency), ctx.currentTime + startOffset + duration);
  }
  gainNode.gain.setValueAtTime(0.0001, ctx.currentTime + startOffset);
  gainNode.gain.exponentialRampToValueAtTime(Math.max(0.001, gain), ctx.currentTime + startOffset + 0.02);
  gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + startOffset + duration);
  oscillator.connect(gainNode).connect(ctx.destination);
  oscillator.start(ctx.currentTime + startOffset);
  oscillator.stop(ctx.currentTime + startOffset + duration + 0.05);
}

function playDjBoothPadSound(pad) {
  const ctx = ensureDjBoothAudioContext();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume().catch(() => {});
  const tone = String(pad?.tone || '').trim();
  if (tone === 'airhorn') {
    scheduleDjBoothTone(ctx, { type: 'sawtooth', frequency: 520, endFrequency: 250, gain: 0.28, duration: 0.7 });
    scheduleDjBoothTone(ctx, { type: 'triangle', frequency: 780, endFrequency: 360, gain: 0.14, duration: 0.7 });
    return;
  }
  if (tone === 'laser') {
    scheduleDjBoothTone(ctx, { type: 'square', frequency: 900, endFrequency: 120, gain: 0.2, duration: 0.3 });
    scheduleDjBoothTone(ctx, { type: 'triangle', frequency: 1200, endFrequency: 180, gain: 0.08, startOffset: 0.04, duration: 0.28 });
    return;
  }
  if (tone === 'clap') {
    scheduleDjBoothTone(ctx, { type: 'square', frequency: 240, endFrequency: 90, gain: 0.08, duration: 0.08 });
    scheduleDjBoothTone(ctx, { type: 'square', frequency: 260, endFrequency: 100, gain: 0.08, startOffset: 0.05, duration: 0.08 });
    scheduleDjBoothTone(ctx, { type: 'square', frequency: 300, endFrequency: 110, gain: 0.08, startOffset: 0.1, duration: 0.08 });
    return;
  }
  if (tone === 'chime') {
    scheduleDjBoothTone(ctx, { type: 'sine', frequency: 660, gain: 0.12, duration: 0.34 });
    scheduleDjBoothTone(ctx, { type: 'sine', frequency: 990, gain: 0.11, startOffset: 0.08, duration: 0.34 });
    scheduleDjBoothTone(ctx, { type: 'triangle', frequency: 1320, gain: 0.07, startOffset: 0.16, duration: 0.28 });
    return;
  }
  if (tone === 'bass') {
    scheduleDjBoothTone(ctx, { type: 'sine', frequency: 120, endFrequency: 48, gain: 0.3, duration: 0.55 });
    scheduleDjBoothTone(ctx, { type: 'triangle', frequency: 60, endFrequency: 35, gain: 0.16, duration: 0.6 });
    return;
  }
  if (tone === 'siren') {
    scheduleDjBoothTone(ctx, { type: 'square', frequency: 520, endFrequency: 900, gain: 0.12, duration: 0.35 });
    scheduleDjBoothTone(ctx, { type: 'square', frequency: 900, endFrequency: 520, gain: 0.12, startOffset: 0.35, duration: 0.35 });
    return;
  }
  if (tone === 'sparkle') {
    [880, 1320, 1760, 1480].forEach((frequency, idx) => {
      scheduleDjBoothTone(ctx, { type: 'triangle', frequency, gain: 0.08, startOffset: idx * 0.05, duration: 0.16 });
    });
    return;
  }
  scheduleDjBoothTone(ctx, { type: 'triangle', frequency: 210, endFrequency: 90, gain: 0.18, duration: 0.22 });
}

function maybePlayDjBoothPadTrigger(state) {
  const safeState = normalizeDjBoothState(state);
  const stamp = Number(safeState.lastPadTriggerAt) || 0;
  if (stamp <= (Number(APP.djBoothUi.lastPadTriggerAt) || 0)) return;
  APP.djBoothUi.lastPadTriggerAt = stamp;
  const pad = safeState.soundPads.find(item => item.id === safeState.activePadId);
  if (pad) playDjBoothPadSound(pad);
}

function teardownDjBoothPlayers() {
  if (djBoothProgressFrame) {
    cancelAnimationFrame(djBoothProgressFrame);
    djBoothProgressFrame = 0;
  }
  if (djBoothClipRecorder || djBoothClipRecorderStream) {
    cleanupDjBoothClipRecorder();
  }
  DJ_BOOTH_DECK_KEYS.forEach(deckKey => {
    const player = djBoothPlayers[deckKey];
    if (player && typeof player.destroy === 'function') {
      try {
        player.destroy();
      } catch (_error) {
        // Ignore player teardown races during rerenders.
      }
    }
    djBoothPlayers[deckKey] = null;
  });
  DJ_BOOTH_DECK_KEYS.forEach(deckKey => {
    const audio = djBoothLocalDeckAudio[deckKey];
    if (audio instanceof HTMLAudioElement) {
      try {
        audio.pause();
      } catch (_error) {
        // Ignore audio teardown races.
      }
    }
    const meta = djBoothLocalDeckMeta[deckKey];
    if (meta?.objectUrl) {
      try {
        URL.revokeObjectURL(meta.objectUrl);
      } catch (_error) {
        // Ignore revoked URL races.
      }
    }
    djBoothLocalDeckAudio[deckKey] = null;
    djBoothLocalDeckMeta[deckKey] = null;
  });
}

function ensureDjBoothParkingLot() {
  if (djBoothParkingLot instanceof HTMLElement && document.body.contains(djBoothParkingLot)) {
    return djBoothParkingLot;
  }
  djBoothParkingLot = document.createElement('div');
  djBoothParkingLot.id = 'djBoothParkingLot';
  djBoothParkingLot.style.display = 'none';
  document.body.appendChild(djBoothParkingLot);
  return djBoothParkingLot;
}

function preserveDjBoothPlayersBeforeRender() {
  if (APP.room?.currentActivity !== 'dj-booth') return;
  const parkingLot = ensureDjBoothParkingLot();
  DJ_BOOTH_DECK_KEYS.forEach(deckKey => {
    const player = djBoothPlayers[deckKey];
    if (!player || typeof player.getIframe !== 'function') return;
    try {
      const iframe = player.getIframe();
      if (iframe instanceof HTMLElement) parkingLot.appendChild(iframe);
    } catch (_error) {
      // Ignore stale iframe references during rerender.
    }
  });
}

function restoreDjBoothPlayersAfterRender() {
  if (APP.room?.currentActivity !== 'dj-booth') return;
  DJ_BOOTH_DECK_KEYS.forEach(deckKey => {
    const player = djBoothPlayers[deckKey];
    if (!player || typeof player.getIframe !== 'function') return;
    try {
      const iframe = player.getIframe();
      const container = document.getElementById(`djBoothPlayer-${deckKey}`);
      if (iframe instanceof HTMLElement && container instanceof HTMLElement && !container.contains(iframe)) {
        container.innerHTML = '';
        container.appendChild(iframe);
      }
    } catch (_error) {
      // Ignore stale iframe references during rerender.
    }
  });
}

function setDjBoothLocalDeckAudio(deckKey, file) {
  if (!DJ_BOOTH_DECK_KEYS.includes(deckKey) || !(file instanceof File)) return null;
  clearDjBoothLocalDeckAudio(deckKey);
  const objectUrl = URL.createObjectURL(file);
  const audio = new Audio(objectUrl);
  audio.preload = 'auto';
  audio.loop = false;
  audio.addEventListener('ended', () => {
    void updateDjBoothState(state => {
      const deck = normalizeDjBoothDeckState(state[deckKey], deckKey === 'deckA' ? 'Deck A' : 'Deck B');
      deck.playing = false;
      deck.positionSeconds = Number.isFinite(audio.duration) ? audio.duration : deck.positionSeconds;
      deck.lastActionAt = Date.now();
      state[deckKey] = deck;
    });
  });
  djBoothLocalDeckAudio[deckKey] = audio;
  djBoothLocalDeckMeta[deckKey] = {
    sourceMode: 'local',
    sourceUrl: objectUrl,
    fileName: file.name,
    objectUrl,
    size: file.size
  };
  APP.djBoothUi = APP.djBoothUi && typeof APP.djBoothUi === 'object' ? APP.djBoothUi : getDefaultDjBoothUiState();
  APP.djBoothUi.localDecks = {
    ...(APP.djBoothUi.localDecks || {}),
    [deckKey]: {
      fileName: file.name,
      size: file.size
    }
  };
  return audio;
}

function clearDjBoothLocalDeckAudio(deckKey) {
  if (!DJ_BOOTH_DECK_KEYS.includes(deckKey)) return;
  const existingAudio = djBoothLocalDeckAudio[deckKey];
  if (existingAudio instanceof HTMLAudioElement) {
    try {
      existingAudio.pause();
    } catch (_error) {
      // Ignore teardown races.
    }
  }
  const existingMeta = djBoothLocalDeckMeta[deckKey];
  if (existingMeta?.objectUrl) {
    try {
      URL.revokeObjectURL(existingMeta.objectUrl);
    } catch (_error) {
      // Ignore revoked URL races.
    }
  }
  djBoothLocalDeckAudio[deckKey] = null;
  djBoothLocalDeckMeta[deckKey] = null;
  APP.djBoothUi = APP.djBoothUi && typeof APP.djBoothUi === 'object' ? APP.djBoothUi : getDefaultDjBoothUiState();
  APP.djBoothUi.localDecks = {
    ...(APP.djBoothUi.localDecks || {}),
    [deckKey]: null
  };
}

function resetDjBoothClipRecorderUi() {
  APP.djBoothUi = APP.djBoothUi && typeof APP.djBoothUi === 'object' ? APP.djBoothUi : getDefaultDjBoothUiState();
  APP.djBoothUi.recordingClip = false;
  APP.djBoothUi.recordingSeconds = 0;
}

function cleanupDjBoothClipRecorder() {
  if (djBoothClipRecorderTimer) {
    clearInterval(djBoothClipRecorderTimer);
    djBoothClipRecorderTimer = 0;
  }
  if (djBoothClipRecorderStream) {
    djBoothClipRecorderStream.getTracks().forEach(track => {
      try {
        track.stop();
      } catch (_error) {
        // Ignore track stop races.
      }
    });
  }
  djBoothClipRecorder = null;
  djBoothClipRecorderStream = null;
  djBoothClipRecorderChunks = [];
  djBoothClipRecorderStartedAt = 0;
  resetDjBoothClipRecorderUi();
}

async function startDjBoothClipRecording() {
  if (djBoothClipRecorder || APP.room?.host !== APP.player?.name) return;
  if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined') {
    showError('This browser does not support mic clip recording.');
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported?.('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : (MediaRecorder.isTypeSupported?.('audio/webm') ? 'audio/webm' : '');
    const recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    djBoothClipRecorder = recorder;
    djBoothClipRecorderStream = stream;
    djBoothClipRecorderChunks = [];
    djBoothClipRecorderStartedAt = Date.now();
    APP.djBoothUi = APP.djBoothUi && typeof APP.djBoothUi === 'object' ? APP.djBoothUi : getDefaultDjBoothUiState();
    APP.djBoothUi.recordingClip = true;
    APP.djBoothUi.recordingSeconds = 0;
    recorder.addEventListener('dataavailable', event => {
      if (event.data && event.data.size > 0) djBoothClipRecorderChunks.push(event.data);
    });
    recorder.start(250);
    djBoothClipRecorderTimer = window.setInterval(() => {
      if (!djBoothClipRecorderStartedAt) return;
      APP.djBoothUi.recordingSeconds = Math.max(0, Math.floor((Date.now() - djBoothClipRecorderStartedAt) / 1000));
      render();
    }, 500);
    render();
  } catch (error) {
    cleanupDjBoothClipRecorder();
    showError(error.message || 'Unable to access the microphone for recording.');
  }
}

async function stopDjBoothClipRecording() {
  if (!djBoothClipRecorder) return;
  const recorder = djBoothClipRecorder;
  const mimeType = recorder.mimeType || 'audio/webm';
  const stopped = new Promise((resolve, reject) => {
    recorder.addEventListener('stop', () => resolve(), { once: true });
    recorder.addEventListener('error', event => reject(event.error || new Error('Recording failed.')), { once: true });
  });
  try {
    recorder.stop();
    await stopped;
    const blob = new Blob(djBoothClipRecorderChunks, { type: mimeType });
    if (!blob.size) throw new Error('Recorded clip is empty.');
    const clipStamp = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).replace(/\s+/g, '');
    const defaultName = `DJ Clip ${clipStamp}`;
    const requestedName = prompt('Name this recorded clip', defaultName);
    cleanupDjBoothClipRecorder();
    if (requestedName === null) return;
    const safeName = String(requestedName || '').replace(/\s+/g, ' ').trim().slice(0, 64) || defaultName;
    const extension = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('wav') ? 'wav' : 'webm';
    const file = new File([blob], `${safeName}.${extension}`, { type: mimeType });
    await addDjBoothSharedTrack(file);
  } catch (error) {
    cleanupDjBoothClipRecorder();
    showError(error.message || 'Unable to finish the recorded clip.');
  }
}

function ensureDjBoothSharedDeckAudio(deckKey, deck) {
  if (!DJ_BOOTH_DECK_KEYS.includes(deckKey)) return null;
  const safeDeck = normalizeDjBoothDeckState(deck, deckKey === 'deckA' ? 'Deck A' : 'Deck B');
  if (safeDeck.sourceMode !== 'shared' || !safeDeck.sourceUrl) return null;
  const existingAudio = djBoothLocalDeckAudio[deckKey];
  const existingMeta = djBoothLocalDeckMeta[deckKey];
  if (
    existingAudio instanceof HTMLAudioElement
    && existingMeta?.sourceMode === 'shared'
    && existingMeta?.sourceUrl === safeDeck.sourceUrl
  ) {
    return existingAudio;
  }
  clearDjBoothLocalDeckAudio(deckKey);
  const audio = new Audio(safeDeck.sourceUrl);
  audio.preload = 'auto';
  audio.crossOrigin = 'anonymous';
  audio.loop = false;
  audio.addEventListener('ended', () => {
    void updateDjBoothState(state => {
      const nextDeck = normalizeDjBoothDeckState(state[deckKey], deckKey === 'deckA' ? 'Deck A' : 'Deck B');
      if (nextDeck.sourceMode !== 'shared' || nextDeck.sourceUrl !== safeDeck.sourceUrl) return;
      nextDeck.playing = false;
      nextDeck.positionSeconds = Number.isFinite(audio.duration) ? audio.duration : nextDeck.positionSeconds;
      nextDeck.lastActionAt = Date.now();
      state[deckKey] = nextDeck;
    });
  });
  djBoothLocalDeckAudio[deckKey] = audio;
  djBoothLocalDeckMeta[deckKey] = {
    sourceMode: 'shared',
    sourceUrl: safeDeck.sourceUrl,
    fileName: safeDeck.sourceLabel,
    objectUrl: ''
  };
  return audio;
}

function isDjBoothDeckFinished(deckKey, deck) {
  const safeDeck = normalizeDjBoothDeckState(deck, deckKey === 'deckA' ? 'Deck A' : 'Deck B');
  if (safeDeck.sourceMode === 'local' || safeDeck.sourceMode === 'shared') {
    const audio = djBoothLocalDeckAudio[deckKey];
    if (!(audio instanceof HTMLAudioElement)) return safeDeck.positionSeconds > 0;
    const duration = Number(audio.duration) || 0;
    const currentTime = Number(audio.currentTime) || 0;
    return duration > 0 && currentTime >= Math.max(0, duration - 0.35);
  }
  const player = djBoothPlayers[deckKey];
  if (player && typeof player.getDuration === 'function' && typeof player.getCurrentTime === 'function') {
    try {
      const duration = Number(player.getDuration()) || 0;
      const currentTime = Number(player.getCurrentTime()) || 0;
      const playerState = typeof player.getPlayerState === 'function' ? player.getPlayerState() : null;
      return (playerState === window.YT?.PlayerState?.ENDED) || (duration > 0 && currentTime >= Math.max(0, duration - 1));
    } catch (_error) {
      return false;
    }
  }
  return false;
}

function loadYouTubeIframeApi() {
  if (window.YT?.Player) return Promise.resolve(window.YT);
  if (djBoothApiPromise) return djBoothApiPromise;
  djBoothApiPromise = new Promise((resolve, reject) => {
    const previousReady = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = () => {
      if (typeof previousReady === 'function') previousReady();
      resolve(window.YT);
    };
    if (document.getElementById('youtube-iframe-api')) return;
    const script = document.createElement('script');
    script.id = 'youtube-iframe-api';
    script.src = 'https://www.youtube.com/iframe_api';
    script.async = true;
    script.onerror = () => reject(new Error('Failed to load YouTube API'));
    document.head.appendChild(script);
  });
  return djBoothApiPromise;
}

function syncDjBoothProgressLoop() {
  if (djBoothProgressFrame) cancelAnimationFrame(djBoothProgressFrame);
  const tick = () => {
    if (APP.room?.currentActivity !== 'dj-booth') return;
    const activityState = normalizeDjBoothState(APP.room?.activityState || {});
    DJ_BOOTH_DECK_KEYS.forEach(deckKey => {
      const deckState = normalizeDjBoothDeckState(activityState[deckKey], deckKey === 'deckA' ? 'Deck A' : 'Deck B');
      const localAudio = djBoothLocalDeckAudio[deckKey];
      const player = djBoothPlayers[deckKey];
      const titleNode = document.querySelector(`[data-dj-track-title="${deckKey}"]`);
      const timeNode = document.querySelector(`[data-dj-track-time="${deckKey}"]`);
      const sliderNode = document.getElementById(`djBoothSeek-${deckKey}`);
      let currentTime = 0;
      let duration = 0;
      let liveTitle = deckState.sourceLabel || (deckKey === 'deckA' ? 'Deck A ready' : 'Deck B ready');
      if ((deckState.sourceMode === 'local' || deckState.sourceMode === 'shared') && localAudio instanceof HTMLAudioElement) {
        currentTime = Number(localAudio.currentTime) || 0;
        duration = Number(localAudio.duration) || 0;
      } else if (player && typeof player.getCurrentTime === 'function') {
        currentTime = Number(player.getCurrentTime()) || 0;
        duration = Number(player.getDuration()) || 0;
        liveTitle = String(player.getVideoData?.().title || '').trim() || liveTitle;
      } else {
        currentTime = getDjBoothEffectiveDeckPosition(deckState);
      }
      APP.djBoothUi = APP.djBoothUi && typeof APP.djBoothUi === 'object' ? APP.djBoothUi : getDefaultDjBoothUiState();
      APP.djBoothUi.deckTitles = {
        ...(APP.djBoothUi.deckTitles || {}),
        [deckKey]: liveTitle
      };
      if (titleNode instanceof HTMLElement) {
        titleNode.textContent = liveTitle;
      }
      if (timeNode instanceof HTMLElement) {
        timeNode.textContent = `${formatClockFromMs(currentTime * 1000)} / ${formatClockFromMs(duration * 1000)}`;
      }
      if (sliderNode instanceof HTMLInputElement && document.activeElement !== sliderNode) {
        sliderNode.max = String(Math.max(1, Math.round(duration || 1)));
        sliderNode.value = String(Math.max(0, Math.min(Number(sliderNode.max) || 1, Math.round(currentTime))));
      }
    });
    djBoothProgressFrame = requestAnimationFrame(tick);
  };
  djBoothProgressFrame = requestAnimationFrame(tick);
}

async function syncDjBoothPlayers() {
  if (APP.room?.currentActivity !== 'dj-booth') {
    teardownDjBoothPlayers();
    return;
  }
  const state = normalizeDjBoothState(APP.room.activityState || {});
  maybePlayDjBoothPadTrigger(state);
  try {
    await loadYouTubeIframeApi();
  } catch (_error) {
    return;
  }
  for (const deckKey of DJ_BOOTH_DECK_KEYS) {
    const deck = state[deckKey];
    const containerId = `djBoothPlayer-${deckKey}`;
    const container = document.getElementById(containerId);
    if (!(container instanceof HTMLElement)) continue;
    if (deck.sourceMode === 'local' || deck.sourceMode === 'shared') {
      const player = djBoothPlayers[deckKey];
      if (player && typeof player.destroy === 'function') {
        try {
          player.destroy();
        } catch (_error) {
          // Ignore rerender teardown races.
        }
      }
      djBoothPlayers[deckKey] = null;
      const localAudio = deck.sourceMode === 'shared'
        ? ensureDjBoothSharedDeckAudio(deckKey, deck)
        : djBoothLocalDeckAudio[deckKey];
      if (localAudio instanceof HTMLAudioElement) {
        const expectedPosition = Math.max(0, getDjBoothEffectiveDeckPosition(deck));
        try {
          localAudio.volume = Math.max(0, Math.min(1, computeDjBoothDeckEffectiveVolume(state, deckKey) / 100));
          if (Math.abs((Number(localAudio.currentTime) || 0) - expectedPosition) > 1.5) {
            localAudio.currentTime = expectedPosition;
          }
          if (deck.playing && localAudio.paused) {
            localAudio.play().catch(() => {});
          } else if (!deck.playing && !localAudio.paused) {
            localAudio.pause();
          }
        } catch (_error) {
          // Ignore local audio sync races.
        }
        container.innerHTML = `<div style="display:grid;place-items:center;width:100%;height:100%;min-height:240px;border-radius:18px;background:linear-gradient(135deg,rgba(0,210,211,0.12),rgba(197,108,240,0.08));border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:24px;text-align:center;"><div><div style="font-family:'Fraunces',serif;font-size:1.4rem;margin-bottom:8px;">${escapeHtml(deck.sourceLabel || deck.label)}</div><div style="font-size:0.84rem;color:var(--text-dim);">${escapeHtml(deck.sourceMode === 'shared' ? 'Shared room track streaming on this device' : (APP.room?.host === APP.player?.name ? 'Local file loaded on this device' : 'Host is playing a local file on this deck'))}</div></div></div>`;
      } else {
        container.innerHTML = `<div style="display:grid;place-items:center;width:100%;height:100%;min-height:240px;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));border:1px dashed rgba(255,255,255,0.16);color:var(--text-dim);padding:24px;text-align:center;">${escapeHtml(deck.sourceMode === 'shared' ? 'Shared track is loading on this device' : (APP.room?.host === APP.player?.name ? 'Load a local audio file on this deck' : 'Host local file source is not available on this device'))}</div>`;
      }
      continue;
    }
    if (djBoothLocalDeckAudio[deckKey] instanceof HTMLAudioElement || djBoothLocalDeckMeta[deckKey]) {
      clearDjBoothLocalDeckAudio(deckKey);
    }
    const player = djBoothPlayers[deckKey];
    let liveStartAt = Math.max(0, Math.floor(getDjBoothEffectiveDeckPosition(deck)));
    if (player && typeof player.getCurrentTime === 'function') {
      try {
        liveStartAt = Math.max(0, Math.floor(Number(player.getCurrentTime()) || liveStartAt));
      } catch (_error) {
        // Ignore stale player time reads during rerender.
      }
    }
    if (deck.sourceType === 'none' || (!deck.videoId && !deck.playlistId)) {
      if (player && typeof player.destroy === 'function') {
        try {
          player.destroy();
        } catch (_error) {
          // Ignore rerender teardown races.
        }
      }
      djBoothPlayers[deckKey] = null;
      container.innerHTML = `<div style="display:grid;place-items:center;width:100%;height:100%;min-height:240px;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));border:1px dashed rgba(255,255,255,0.16);color:var(--text-dim);padding:24px;text-align:center;">Load a YouTube video or playlist on ${escapeHtml(deck.label)}</div>`;
      continue;
    }
    const metaKey = JSON.stringify({
      sourceType: deck.sourceType,
      videoId: deck.videoId,
      playlistId: deck.playlistId,
      trackIndex: deck.trackIndex
    });
    const mountedIframe = player && typeof player.getIframe === 'function'
      ? player.getIframe()
      : null;
    const playerStillMounted = mountedIframe instanceof HTMLElement && container.contains(mountedIframe);
    if (player && player.__djMetaKey === metaKey && playerStillMounted) {
      try {
        const duration = Number(player.getDuration?.()) || 0;
        const livePosition = Number(player.getCurrentTime?.()) || 0;
        const expectedPosition = Math.max(0, Math.min(duration || Number.MAX_SAFE_INTEGER, getDjBoothEffectiveDeckPosition(deck)));
        player.setVolume(computeDjBoothDeckEffectiveVolume(state, deckKey));
        if (Math.abs(livePosition - expectedPosition) > 2.5) {
          player.seekTo(expectedPosition, true);
        }
        const playerState = typeof player.getPlayerState === 'function' ? player.getPlayerState() : null;
        if (deck.playing && playerState !== window.YT.PlayerState.PLAYING) {
          player.playVideo();
        } else if (!deck.playing && playerState === window.YT.PlayerState.PLAYING) {
          player.pauseVideo();
        }
      } catch (_error) {
        // Ignore transient player state errors.
      }
      continue;
    }
    if (player && typeof player.destroy === 'function') {
      try {
        player.destroy();
      } catch (_error) {
        // Ignore rerender teardown races.
      }
    }
    djBoothPlayers[deckKey] = null;
    const startAt = liveStartAt;
    const createdPlayer = new window.YT.Player(containerId, {
      width: '100%',
      height: '260',
      videoId: deck.videoId || undefined,
      playerVars: {
        autoplay: deck.playing ? 1 : 0,
        controls: 0,
        disablekb: 1,
        fs: 0,
        modestbranding: 1,
        playsinline: 1,
        rel: 0,
        start: startAt,
        listType: deck.playlistId ? 'playlist' : undefined,
        list: deck.playlistId || undefined
      },
      events: {
        onReady: event => {
          const readyPlayer = event.target;
          try {
            if (deck.playlistId) {
              if (deck.playing) {
                readyPlayer.loadPlaylist({ listType: 'playlist', list: deck.playlistId, index: deck.trackIndex, startSeconds: startAt });
              } else {
                readyPlayer.cuePlaylist({ listType: 'playlist', list: deck.playlistId, index: deck.trackIndex, startSeconds: startAt });
              }
            } else if (deck.videoId) {
              if (deck.playing) {
                readyPlayer.loadVideoById({ videoId: deck.videoId, startSeconds: startAt });
              } else {
                readyPlayer.cueVideoById({ videoId: deck.videoId, startSeconds: startAt });
              }
            }
          } catch (_error) {
            // Ignore early player API timing races.
          }
          setTimeout(() => {
            try {
              readyPlayer.setVolume(computeDjBoothDeckEffectiveVolume(state, deckKey));
              if (!deck.playing) readyPlayer.pauseVideo();
            } catch (_error) {
              // Ignore player volume races.
            }
          }, 160);
        },
        onStateChange: event => {
          const ytState = event.data;
          const playerTarget = event.target;
          if (!window.YT?.PlayerState) return;
          if (ytState === window.YT.PlayerState.PLAYING || ytState === window.YT.PlayerState.CUED) {
            if (!deck.playlistId || typeof playerTarget.getPlaylistIndex !== 'function') return;
            const currentPlaylistIndex = Number(playerTarget.getPlaylistIndex());
            if (!Number.isInteger(currentPlaylistIndex) || currentPlaylistIndex < 0 || currentPlaylistIndex === deck.trackIndex) return;
            void updateDjBoothState(state => {
              const nextDeck = normalizeDjBoothDeckState(state[deckKey], deckKey === 'deckA' ? 'Deck A' : 'Deck B');
              if (nextDeck.sourceMode !== 'youtube' || nextDeck.playlistId !== deck.playlistId) return;
              nextDeck.trackIndex = currentPlaylistIndex;
              nextDeck.positionSeconds = Math.max(0, Number(playerTarget.getCurrentTime?.()) || 0);
              nextDeck.lastActionAt = Date.now();
              state[deckKey] = nextDeck;
            });
            return;
          }
          if (ytState !== window.YT.PlayerState.ENDED) return;
          const playlistIndex = deck.playlistId && typeof playerTarget.getPlaylistIndex === 'function'
            ? Math.max(0, Number(playerTarget.getPlaylistIndex()) || deck.trackIndex)
            : deck.trackIndex;
          const duration = Math.max(0, Number(playerTarget.getDuration?.()) || 0);
          void updateDjBoothState(state => {
            const nextDeck = normalizeDjBoothDeckState(state[deckKey], deckKey === 'deckA' ? 'Deck A' : 'Deck B');
            if (nextDeck.sourceMode !== 'youtube') return;
            if (nextDeck.playlistId) {
              nextDeck.trackIndex = Math.max(playlistIndex + 1, nextDeck.trackIndex + 1);
              nextDeck.positionSeconds = 0;
              nextDeck.playing = true;
            } else {
              nextDeck.playing = false;
              nextDeck.positionSeconds = duration;
            }
            nextDeck.lastActionAt = Date.now();
            state[deckKey] = nextDeck;
          });
        }
      }
    });
    createdPlayer.__djMetaKey = metaKey;
    djBoothPlayers[deckKey] = createdPlayer;
  }
  syncDjBoothProgressLoop();
}

function getSlidesStudioActiveSlideIndex(state) {
  const normalized = normalizeSlidesStudioState(state);
  const idx = normalized.slides.findIndex(slide => slide.id === normalized.activeSlideId);
  return idx >= 0 ? idx : 0;
}

function getSlidesStudioActiveSlide(state) {
  const normalized = normalizeSlidesStudioState(state);
  return normalized.slides[getSlidesStudioActiveSlideIndex(normalized)] || normalized.slides[0];
}

function formatSlidesStudioText(value) {
  return escapeHtml(String(value || '').trim()).replace(/\n+/g, '<br>');
}

async function updateSlidesStudioState(mutator) {
  if (!APP.roomCode || !APP.room) return null;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'slides-studio') return null;
  if (room.host !== APP.player?.name) return room;
  const nextState = normalizeSlidesStudioState(room.activityState);
  if (typeof mutator === 'function') mutator(nextState);
  const normalized = normalizeSlidesStudioState({
    ...nextState,
    updatedAt: Date.now()
  });
  room.activityState = normalized;
  await RoomManager.updateRoom(APP.roomCode, room);
  APP.room = room;
  render();
  return room;
}

async function updateDjBoothState(mutator) {
  if (!APP.roomCode || !APP.room) return null;
  const room = await RoomManager.loadRoom(APP.roomCode, APP.roomAccessToken || '');
  if (!room || room.currentActivity !== 'dj-booth') return null;
  if (room.host !== APP.player?.name) return room;
  const state = normalizeDjBoothState(room.activityState || {});
  if (typeof mutator === 'function') mutator(state);
  state.updatedAt = Date.now();
  room.activityState = normalizeDjBoothState(state);
  await RoomManager.updateRoom(APP.roomCode, room, APP.roomAccessToken || '');
  APP.room = room;
  render();
  return room;
}

async function loadDjBoothDeckSource(deckKey, rawSource = '') {
  if (!DJ_BOOTH_DECK_KEYS.includes(deckKey)) return;
  const input = document.getElementById(`djBoothSource-${deckKey}`);
  const parsed = parseYouTubeSource(rawSource || input?.value || '');
  if (parsed.sourceType === 'none') {
    showError('Enter a valid YouTube video or playlist URL.');
    return;
  }
  clearDjBoothLocalDeckAudio(deckKey);
  await updateDjBoothState(state => {
    state[deckKey] = {
      ...state[deckKey],
      sourceMode: 'youtube',
      ...parsed,
      sourceLabel: '',
      playing: false,
      positionSeconds: 0,
      lastActionAt: Date.now()
    };
  });
}

async function loadDjBoothLocalDeckFile(deckKey, file) {
  if (!DJ_BOOTH_DECK_KEYS.includes(deckKey) || !(file instanceof File)) return;
  const audio = setDjBoothLocalDeckAudio(deckKey, file);
  if (!audio) return;
  await updateDjBoothState(state => {
    state[deckKey] = {
      ...state[deckKey],
      sourceMode: 'local',
      sourceType: 'local',
      sourceUrl: '',
      sourceLabel: String(file.name || `${deckKey === 'deckA' ? 'Deck A' : 'Deck B'} local track`).trim().slice(0, 80),
      videoId: '',
      playlistId: '',
      trackIndex: 0,
      playing: false,
      positionSeconds: 0,
      lastActionAt: Date.now()
    };
  });
}

async function uploadDjBoothSharedTrack(file) {
  if (!(file instanceof File)) return null;
  if (!APP.roomCode || !APP.room) throw new Error('Join a room before uploading DJ tracks.');
  if (APP.room.host !== APP.player?.name) throw new Error('Only the host can upload shared DJ tracks.');
  const response = await fetch(`${API_BASE_URL}/api/dj/library/upload?roomCode=${encodeURIComponent(APP.roomCode)}`, {
    method: 'POST',
    headers: {
      'Content-Type': file.type || 'application/octet-stream',
      'x-room-token': APP.roomAccessToken || '',
      'x-player-name': APP.player?.name || '',
      'x-file-name': encodeURIComponent(file.name || 'track')
    },
    body: file
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok || data?.ok === false) {
    throw new Error(data?.error || `Upload failed: ${response.status}`);
  }
  return normalizeDjBoothTrack(data.track);
}

async function addDjBoothSharedTrack(file) {
  const track = await uploadDjBoothSharedTrack(file);
  if (!track) return;
  await updateDjBoothState(state => {
    const library = normalizeDjBoothTrackLibrary(state.trackLibrary);
    const withoutSame = library.filter(item => item.id !== track.id);
    state.trackLibrary = [track, ...withoutSame].slice(0, 48);
  });
}

async function loadDjBoothSharedTrack(deckKey, trackId) {
  if (!DJ_BOOTH_DECK_KEYS.includes(deckKey)) return;
  const library = normalizeDjBoothTrackLibrary(APP.room?.activityState?.trackLibrary);
  const track = library.find(item => item.id === String(trackId || '').trim());
  if (!track) {
    showError('Shared track not found.');
    return;
  }
  clearDjBoothLocalDeckAudio(deckKey);
  await updateDjBoothState(state => {
    state[deckKey] = {
      ...state[deckKey],
      sourceMode: 'shared',
      sourceType: 'audio',
      sourceUrl: track.url,
      sourceLabel: track.name,
      videoId: '',
      playlistId: '',
      trackIndex: 0,
      playing: false,
      positionSeconds: 0,
      lastActionAt: Date.now()
    };
  });
}

async function removeDjBoothSharedTrack(trackId) {
  const requestedId = String(trackId || '').trim();
  if (!requestedId || !APP.roomCode || !APP.room) return;
  const library = normalizeDjBoothTrackLibrary(APP.room?.activityState?.trackLibrary);
  const track = library.find(item => item.id === requestedId);
  if (!track) return;
  const response = await fetch(`${API_BASE_URL}/api/dj/library/${encodeURIComponent(requestedId)}?roomCode=${encodeURIComponent(APP.roomCode)}`, {
    method: 'DELETE',
    headers: {
      'x-room-token': APP.roomAccessToken || '',
      'x-player-name': APP.player?.name || ''
    }
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok || data?.ok === false) {
    throw new Error(data?.error || `Remove failed: ${response.status}`);
  }
  await updateDjBoothState(state => {
    state.trackLibrary = normalizeDjBoothTrackLibrary(state.trackLibrary).filter(item => item.id !== requestedId);
    DJ_BOOTH_DECK_KEYS.forEach(deckKey => {
      const deck = normalizeDjBoothDeckState(state[deckKey], deckKey === 'deckA' ? 'Deck A' : 'Deck B');
      if (deck.sourceMode === 'shared' && deck.sourceUrl === track.url) {
        state[deckKey] = {
          ...deck,
          sourceMode: 'youtube',
          sourceType: 'none',
          sourceUrl: '',
          sourceLabel: '',
          playing: false,
          positionSeconds: 0,
          lastActionAt: Date.now()
        };
      }
    });
  });
}

async function toggleDjBoothDeckPlayback(deckKey) {
  if (!DJ_BOOTH_DECK_KEYS.includes(deckKey)) return;
  await updateDjBoothState(state => {
    const deck = normalizeDjBoothDeckState(state[deckKey], deckKey === 'deckA' ? 'Deck A' : 'Deck B');
    const now = Date.now();
    const currentPosition = getDjBoothEffectiveDeckPosition(deck);
    const nextPlaying = !deck.playing;
    if (nextPlaying && isDjBoothDeckFinished(deckKey, deck)) {
      if (deck.playlistId) {
        deck.trackIndex = Math.max(0, deck.trackIndex + 1);
      }
      deck.positionSeconds = 0;
    } else {
      deck.positionSeconds = currentPosition;
    }
    deck.playing = nextPlaying;
    deck.lastActionAt = now;
    state[deckKey] = deck;
  });
}

async function shiftDjBoothDeckTrack(deckKey, direction = 1) {
  if (!DJ_BOOTH_DECK_KEYS.includes(deckKey)) return;
  await updateDjBoothState(state => {
    const fallbackLabel = deckKey === 'deckA' ? 'Deck A' : 'Deck B';
    const deck = normalizeDjBoothDeckState(state[deckKey], fallbackLabel);
    if (deck.sourceMode === 'local') {
      deck.positionSeconds = 0;
      deck.lastActionAt = Date.now();
      state[deckKey] = deck;
      return;
    }
    const movingForward = Number(direction) >= 0;
    deck.positionSeconds = 0;
    deck.lastActionAt = Date.now();
    if (deck.playlistId) {
      deck.trackIndex = Math.max(0, deck.trackIndex + (movingForward ? 1 : -1));
    }
    state[deckKey] = deck;
  });
}

async function restartDjBoothDeck(deckKey) {
  if (!DJ_BOOTH_DECK_KEYS.includes(deckKey)) return;
  await updateDjBoothState(state => {
    const deck = normalizeDjBoothDeckState(state[deckKey], deckKey === 'deckA' ? 'Deck A' : 'Deck B');
    deck.positionSeconds = 0;
    deck.lastActionAt = Date.now();
    state[deckKey] = deck;
  });
}

async function setDjBoothDeckSeek(deckKey, seconds) {
  if (!DJ_BOOTH_DECK_KEYS.includes(deckKey)) return;
  const safeSeconds = Math.max(0, Number(seconds) || 0);
  await updateDjBoothState(state => {
    const deck = normalizeDjBoothDeckState(state[deckKey], deckKey === 'deckA' ? 'Deck A' : 'Deck B');
    deck.positionSeconds = safeSeconds;
    deck.lastActionAt = Date.now();
    state[deckKey] = deck;
  });
}

async function setDjBoothDeckVolume(deckKey, volume) {
  if (!DJ_BOOTH_DECK_KEYS.includes(deckKey)) return;
  const safeVolume = Math.max(0, Math.min(100, Number.parseInt(volume, 10) || 0));
  await updateDjBoothState(state => {
    const deck = normalizeDjBoothDeckState(state[deckKey], deckKey === 'deckA' ? 'Deck A' : 'Deck B');
    deck.volume = safeVolume;
    state[deckKey] = deck;
  });
}

async function setDjBoothMixerValue(key, value) {
  const allowedKeys = new Set(['crossfader', 'masterVolume']);
  if (!allowedKeys.has(key)) return;
  const safeValue = Math.max(0, Math.min(100, Number.parseInt(value, 10) || 0));
  await updateDjBoothState(state => {
    state[key] = safeValue;
  });
}

async function setDjBoothLightValue(key, value) {
  const numericKeys = new Set(['speed', 'intensity']);
  const modeKeys = new Set(['mode']);
  await updateDjBoothState(state => {
    const lights = state.lights && typeof state.lights === 'object' ? state.lights : normalizeDjBoothState({}).lights;
    if (numericKeys.has(key)) {
      lights[key] = Math.max(10, Math.min(100, Number.parseInt(value, 10) || 10));
    } else if (modeKeys.has(key)) {
      lights[key] = ['ambient', 'pulse', 'wave', 'strobe', 'party'].includes(String(value || '').trim()) ? String(value).trim() : 'pulse';
    } else if (key === 'enabled') {
      lights.enabled = value === true || value === 'true' || value === 1 || value === '1';
    }
    state.lights = lights;
  });
}

async function fadeDjBoothCrossfader(target) {
  const presets = {
    left: 0,
    center: 50,
    right: 100
  };
  if (!(target in presets)) return;
  await setDjBoothMixerValue('crossfader', presets[target]);
}

async function saveDjBoothMarquee() {
  const input = document.getElementById('djBoothMarqueeInput');
  if (!(input instanceof HTMLInputElement)) return;
  const nextValue = String(input.value || '').replace(/\s+/g, ' ').trim().slice(0, 140);
  await updateDjBoothState(state => {
    state.marqueeText = nextValue || 'Broadcast live from the Team Builder DJ Booth';
  });
}

async function toggleDjBoothMicLive() {
  await updateDjBoothState(state => {
    state.micLive = state.micLive !== true;
    if (state.micLive) {
      state.lights = {
        ...(state.lights || normalizeDjBoothState({}).lights),
        flashAt: Date.now()
      };
    }
  });
}

async function triggerDjBoothPad(padId) {
  const requestedId = String(padId || '').trim();
  if (!requestedId) return;
  await updateDjBoothState(state => {
    const pad = normalizeDjBoothPads(state.soundPads).find(item => item.id === requestedId);
    if (!pad) return;
    state.activePadId = requestedId;
    state.lastPadTriggerAt = Date.now();
    state.lights = {
      ...(state.lights || normalizeDjBoothState({}).lights),
      flashAt: Date.now()
    };
  });
}

async function editDjBoothPad(padId) {
  const requestedId = String(padId || '').trim();
  if (!requestedId) return;
  const state = normalizeDjBoothState(APP.room?.activityState || {});
  const padIndex = state.soundPads.findIndex(item => item.id === requestedId);
  if (padIndex < 0) return;
  const currentPad = state.soundPads[padIndex];
  const label = prompt('Pad label', currentPad.label || '');
  if (label === null) return;
  const emoji = prompt('Pad emoji', currentPad.emoji || '');
  if (emoji === null) return;
  const tone = prompt(`Pad tone (${DJ_BOOTH_TONE_IDS.join(', ')})`, currentPad.tone || '');
  if (tone === null) return;
  const color = prompt('Pad color (hex)', currentPad.color || '');
  if (color === null) return;
  await updateDjBoothState(nextState => {
    const pads = normalizeDjBoothPads(nextState.soundPads);
    pads[padIndex] = normalizeDjBoothPad({
      ...pads[padIndex],
      label,
      emoji,
      tone,
      color
    }, padIndex);
    nextState.soundPads = pads;
  });
}

async function slidesStudioSelectSlide(slideId) {
  const requestedId = String(slideId || '').trim();
  if (!requestedId) return;
  await updateSlidesStudioState(state => {
    if (state.slides.some(slide => slide.id === requestedId)) {
      state.activeSlideId = requestedId;
    }
  });
}

async function slidesStudioAddSlide() {
  await updateSlidesStudioState(state => {
    const newSlide = createSlidesStudioSlide(state.slides.length, {
      template: 'hero',
      title: `Slide ${state.slides.length + 1}`,
      subtitle: 'New slide subtitle',
      description: 'Add a short description or talking points for this slide.',
      tag: '',
      tagPosition: 'top',
      backgroundMode: 'gradient',
      gradientFrom: '#1d4ed8',
      gradientTo: '#7c3aed',
      solidColor: '#111827',
      contentVertical: 'bottom',
      contentHorizontal: 'left',
      imageStyle: 'background',
      imageRadius: 24,
      imageFade: 68,
      buttonLabel: '',
      buttonUrl: '',
      sourceLabel: '',
      sourceUrl: ''
    });
    state.slides.push(newSlide);
    state.activeSlideId = newSlide.id;
  });
}

async function slidesStudioDuplicateSlide(slideId) {
  const requestedId = String(slideId || '').trim();
  await updateSlidesStudioState(state => {
    const idx = state.slides.findIndex(slide => slide.id === requestedId);
    if (idx < 0) return;
    const source = state.slides[idx];
    const duplicate = createSlidesStudioSlide(idx + 1, {
      ...source,
      id: '',
      title: source.title ? `${source.title} Copy` : ''
    });
    state.slides.splice(idx + 1, 0, duplicate);
    state.activeSlideId = duplicate.id;
  });
}

async function slidesStudioRemoveSlide(slideId) {
  const requestedId = String(slideId || '').trim();
  await updateSlidesStudioState(state => {
    if (state.slides.length <= 1) {
      state.slides = [createSlidesStudioSlide(0)];
      state.activeSlideId = state.slides[0].id;
      return;
    }
    const idx = state.slides.findIndex(slide => slide.id === requestedId);
    if (idx < 0) return;
    state.slides.splice(idx, 1);
    const nextIdx = Math.max(0, Math.min(idx, state.slides.length - 1));
    state.activeSlideId = state.slides[nextIdx]?.id || state.slides[0].id;
  });
}

async function slidesStudioNavigate(delta = 0) {
  const step = Number(delta) || 0;
  if (!step) return;
  await updateSlidesStudioState(state => {
    const currentIndex = getSlidesStudioActiveSlideIndex(state);
    const nextIndex = Math.max(0, Math.min(state.slides.length - 1, currentIndex + step));
    state.activeSlideId = state.slides[nextIndex]?.id || state.activeSlideId;
  });
}

async function generateSlidesStudioFromPrompt() {
  if (!APP.roomCode || !APP.room || APP.room.currentActivity !== 'slides-studio') return;
  if (APP.room.host !== APP.player?.name) return;
  const promptText = String(document.getElementById('slidesStudioAIPrompt')?.value || '').trim();
  const requestedCount = Math.max(3, Math.min(10, Number.parseInt(document.getElementById('slidesStudioAICount')?.value || '5', 10) || 5));
  APP.slidesStudioUi.aiPrompt = promptText;
  APP.slidesStudioUi.aiCount = requestedCount;
  const apiKeyInput = String(document.getElementById('slidesStudioAIApiKey')?.value || '').trim();
  const apiKey = apiKeyInput || HOST_LOCAL_CONFIG.aiApiKey || localStorage.getItem('ai-question-api-key') || '';
  if (!promptText) {
    showError('Add a prompt to generate slides.');
    return;
  }

  APP.aiGenerating = true;
  APP.aiStatus = `Generating ${requestedCount} slide${requestedCount === 1 ? '' : 's'}...`;
  render();

  try {
    if (apiKeyInput) {
      HOST_LOCAL_CONFIG.aiApiKey = apiKeyInput;
      localStorage.setItem('ai-question-api-key', apiKeyInput);
      saveHostLocalConfig(HOST_LOCAL_CONFIG);
    }
    const generated = await requestAIGeneratedArray(buildAISlidesStudioPrompt(promptText, requestedCount), apiKey);
    const slides = validateAISlidesStudioSlides(generated);
    if (!slides.length) {
      throw new Error('AI returned no valid slides.');
    }
    await updateSlidesStudioState(state => {
      state.title = normalizeTopic(document.getElementById('slidesStudioDeckTitle')?.value || promptText) || state.title || 'Slides Studio';
      state.slides = slides;
      state.activeSlideId = slides[0].id;
    });
    APP.aiStatus = `Generated ${slides.length} slide${slides.length === 1 ? '' : 's'} from prompt.`;
  } catch (error) {
    APP.aiStatus = error?.message || 'Slide generation failed.';
    showError(APP.aiStatus);
  } finally {
    APP.aiGenerating = false;
    render();
  }
}
