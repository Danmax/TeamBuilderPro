}

function getBattleshipOwnCellState(board, row, col) {
  const safeBoard = normalizeBattleshipBoard(board);
  const ship = getBattleshipShipAtCell(safeBoard, row, col);
  const shot = safeBoard.shotsReceived.find(entry => entry.row === row && entry.col === col) || null;
  return {
    ship,
    shot
  };
}

function getBattleshipTargetCellState(board, row, col) {
  const safeBoard = normalizeBattleshipBoard(board);
  return safeBoard.shotsTaken.find(entry => entry.row === row && entry.col === col) || null;
}

function getBattleshipShipHits(board, ship) {
  if (!ship) return 0;
  const safeBoard = normalizeBattleshipBoard(board);
  const receivedMap = getBattleshipShotsByCell(safeBoard.shotsReceived);
  return (ship.cells || []).filter(cell => receivedMap.has(`${cell.row},${cell.col}`)).length;
}

function formatBattleshipShipPosition(ship) {
  if (!ship || !Array.isArray(ship.cells) || ship.cells.length !== ship.length) return 'Awaiting deployment';
  return `${ship.horizontal ? 'Horizontal' : 'Vertical'} • ${BATTLESHIP_COLUMN_LABELS[ship.col]}${ship.row + 1}`;
}

function renderBattleshipGridLabelCell(content, extraStyle = '') {
  return `<div style="display:grid;place-items:center;font-size:0.78rem;font-weight:800;color:rgba(236,233,225,0.72);text-shadow:0 0 10px rgba(138,241,255,0.2);${extraStyle}">${content}</div>`;
}

function renderBattleship() {
  const isHost = APP.room.host === APP.player.name;
  const state = APP.room.activityState && typeof APP.room.activityState === 'object'
    ? APP.room.activityState
    : createBattleshipState(APP.room.participants || []);
  const players = getBattleshipPlayers(state);
  const safeRoomCode = escapeHtml(APP.roomCode);
  const me = APP.player?.name || '';
  const isBattlePlayer = players.includes(me);
  const opponent = getBattleshipOpponent(state, me);
  const myBoard = isBattlePlayer ? normalizeBattleshipBoard(getBattleshipBoard(state, me)) : null;
  const opponentBoard = opponent ? normalizeBattleshipBoard(getBattleshipBoard(state, opponent)) : null;
  const selectedShipId = APP.battleshipUi.selectedShipId || '';

  const winnerName = String(state.winner || '');
  const spectators = (APP.room.participants || []).map(participant => participant?.name).filter(name => name && !players.includes(name));
  const phaseLabel = state.phase === 'setup' ? 'Setup Fleet' : state.phase === 'battle' ? 'Battle' : 'Finished';
  const myShipsPlaced = myBoard ? areBattleshipShipsPlaced(myBoard) : false;
  const myRemainingShips = myBoard ? getBattleshipLivingShips(myBoard) : 0;
  const opponentRemainingShips = opponentBoard ? getBattleshipLivingShips(opponentBoard) : 0;
  const myHitCount = myBoard ? myBoard.shotsTaken.filter(shot => shot.result === 'hit').length : 0;
  const myMissCount = myBoard ? myBoard.shotsTaken.filter(shot => shot.result === 'miss').length : 0;
  const receivedHitCount = myBoard ? myBoard.shotsReceived.filter(shot => shot.result === 'hit').length : 0;
  const statusAccent = state.phase === 'finished'
    ? '#ffd166'
    : state.phase === 'battle'
      ? '#8af1ff'
      : '#7af59f';

  const shipTray = myBoard ? `
    <div style="display:grid;gap:8px;">
      ${myBoard.ships.map(ship => {
        const placed = ship.cells.length === ship.length;
        const sunk = isBattleshipShipSunk(myBoard, ship);
        const isSelected = selectedShipId === ship.id;
        const hitCount = getBattleshipShipHits(myBoard, ship);
        const integrity = Math.max(0, ship.length - hitCount);
        const integrityLabel = sunk ? 'Sunk' : placed ? `${integrity}/${ship.length} hull` : 'Not deployed';
        return `
          <button

            data-battleship-ship-id="${escapeHtml(ship.id)}"
            style="margin:0;width:100%;padding:12px 14px;text-align:left;border:${isSelected ? `2px solid ${ship.accent}` : '1px solid rgba(255,255,255,0.08)'};background:${isSelected ? `linear-gradient(135deg, color-mix(in srgb, ${ship.accent} 18%, rgba(17,17,24,0.96) 82%), rgba(18,11,62,0.94))` : 'linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02))'};box-shadow:${isSelected ? `0 0 20px color-mix(in srgb, ${ship.accent} 24%, transparent)` : 'none'};opacity:${sunk ? '0.7' : '1'};backdrop-filter:blur(8px);">
            <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
              <div>
                <strong style="display:block;font-size:0.98rem;">${escapeHtml(ship.label)}</strong>
                <span style="display:block;margin-top:2px;font-size:0.76rem;letter-spacing:0.08em;text-transform:uppercase;color:${ship.accent};">${escapeHtml(ship.role || 'Fleet unit')}</span>
              </div>
              <span style="font-size:0.78rem;color:rgba(236,233,225,0.72);">${ship.length} cells</span>
            </div>
            <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;margin-top:8px;font-size:0.78rem;color:rgba(236,233,225,0.74);">
              <span>${escapeHtml(formatBattleshipShipPosition(ship))}</span>
              <span style="color:${sunk ? '#ff8fa3' : ship.accent};font-weight:800;">${escapeHtml(integrityLabel)}</span>
            </div>
            <div style="display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;">
              ${Array.from({ length: ship.length }, (_, idx) => `
                <span style="width:calc((100% - ${(ship.length - 1) * 4}px)/${ship.length});min-width:18px;height:8px;border-radius:999px;background:${idx < integrity ? ship.accent : 'rgba(255,95,126,0.34)'};box-shadow:${idx < integrity ? `0 0 12px color-mix(in srgb, ${ship.accent} 45%, transparent)` : 'none'};"></span>

  const ownBoardMarkup = `

          const background = ownCell.shot?.result === 'hit'
            ? 'linear-gradient(135deg,#ff8aa0,#b31244)'

              ? 'linear-gradient(135deg,#9dd9ff,#2563eb)'
              : ownCell.ship

  const targetBoardMarkup = isBattlePlayer && opponentBoard ? `

            <div style="display:grid;grid-template-columns:24px repeat(${BATTLESHIP_BOARD_SIZE}, minmax(0, 1fr));gap:3px;">

                ${renderBattleshipGridLabelCell(String(row + 1), 'font-size:0.7rem;')}

                    ? 'linear-gradient(135deg,#ff8aa0,#b31244)'

                  return `<div style="aspect-ratio:1/1;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:${background};display:grid;place-items:center;color:#fff;font-size:0.72rem;font-weight:700;">${shot?.result === 'hit' ? '✕' : shot?.result === 'miss' ? '•' : ''}</div>`;

  return `

                <div style="font-size:1.25rem;font-weight:800;color:#ff8fa3;">${opponentRemainingShips}</div>
              </div>
              <div style="padding:12px 14px;border-radius:16px;background:linear-gradient(135deg, rgba(122,245,159,0.14), rgba(122,245,159,0.04));border:1px solid rgba(122,245,159,0.18);">
                <div style="font-size:0.74rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.58);margin-bottom:4px;">Hits landed</div>
                <div style="font-size:1.25rem;font-weight:800;color:#7af59f;">${myHitCount}</div>
              </div>
              <div style="padding:12px 14px;border-radius:16px;background:linear-gradient(135deg, rgba(255,209,102,0.14), rgba(255,209,102,0.04));border:1px solid rgba(255,209,102,0.18);">
                <div style="font-size:0.74rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.58);margin-bottom:4px;">Hull damage</div>
                <div style="font-size:1.25rem;font-weight:800;color:#ffd166;">${receivedHitCount}</div>
              </div>
            </div>
          ` : ''}
          ${isBattlePlayer ? ownBoardMarkup : spectatorBoards}
        </div>

        <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;">
            <div>
              <div style="font-family:'Fraunces',serif;font-size:1.4rem;">${isBattlePlayer && opponent ? `Target ${escapeHtml(opponent)}` : 'Observers'}</div>
              <div style="font-size:0.84rem;color:rgba(236,233,225,0.72);">
                ${isBattlePlayer ? (state.phase === 'battle' ? 'Click a square to fire. Hits are marked with ✕ and misses with •.' : 'Targeting unlocks after both fleets are ready.') : `${spectators.length} spectator${spectators.length === 1 ? '' : 's'} in room.`}
              </div>
            </div>
            ${isBattlePlayer ? `
              <div style="padding:10px 12px;border-radius:14px;background:linear-gradient(135deg, rgba(255,143,163,0.16), rgba(255,143,163,0.04));border:1px solid rgba(255,143,163,0.18);min-width:120px;text-align:center;">
                <div style="font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.58);">Salvo record</div>
                <div style="font-size:1.1rem;font-weight:800;color:#ff8fa3;">${myHitCount}-${myMissCount}</div>
              </div>
            ` : ''}
          </div>
          ${targetBoardMarkup}
        </div>
      </div>

      <div style="display:grid;gap:18px;">
        <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
          <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:12px;">Match Status</div>
          <div style="display:grid;gap:10px;">
            <div style="background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:12px;">
              <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:4px;">Captains</div>
              <div style="display:grid;gap:8px;">
                ${players.map(playerName => {
                  const board = normalizeBattleshipBoard(getBattleshipBoard(state, playerName));
                  return `
                    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
                      <strong>${escapeHtml(playerName)}</strong>
                      <span style="font-size:0.8rem;color:${winnerName === playerName ? '#ffd166' : turnName === playerName ? '#8af1ff' : 'var(--text-dim)'};">
                        ${winnerName === playerName ? 'Winner' : state.phase === 'setup' ? (board.ready ? 'Ready' : areBattleshipShipsPlaced(board) ? 'Placed' : 'Placing') : turnName === playerName ? 'Turn' : `${getBattleshipLivingShips(board)} ships left`}
                      </span>

                  `;
                }).join('') || '<div style="color:var(--text-dim);">Need two players to start.</div>'}
              </div>
            </div>
            <div style="background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:12px;">
              <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:4px;">Phase</div>
              <div style="font-weight:800;color:${statusAccent};text-shadow:0 0 16px color-mix(in srgb, ${statusAccent} 40%, transparent);">${escapeHtml(phaseLabel)}</div>
              <div style="font-size:0.82rem;color:var(--text-dim);margin-top:6px;">
                ${state.phase === 'setup' ? `${setupReadyCount}/${players.length} captains ready` : winnerName ? `${escapeHtml(winnerName)} sank the last ship.` : turnName ? `Waiting for ${escapeHtml(turnName)} to fire.` : 'Preparing match.'}
              </div>
            </div>
            <div style="background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:12px;">
              <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:4px;">Spectators</div>
              <div style="font-weight:800;color:#c4a1ff;">${spectators.length}</div>
              <div style="font-size:0.82rem;color:var(--text-dim);margin-top:6px;">${spectators.length ? escapeHtml(spectators.join(', ')) : 'No spectators yet.'}</div>
            </div>
          </div>
        </div>

        ${isBattlePlayer ? `
          <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
            <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:12px;">Fleet Controls</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
              <button class="btn-secondary" data-action="battleship-toggle-axis" style="width:auto;padding:10px 14px;">Axis: ${placementAxis === 'horizontal' ? 'Horizontal' : 'Vertical'}</button>
              <button class="btn-secondary" data-action="battleship-randomize" style="width:auto;padding:10px 14px;" ${state.phase !== 'setup' ? 'disabled' : ''}>Randomize</button>
              <button class="btn-secondary" data-action="battleship-clear" style="width:auto;padding:10px 14px;" ${state.phase !== 'setup' ? 'disabled' : ''}>Clear</button>
            </div>
            ${shipTray}
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;">
              <button class="btn-primary" data-action="battleship-ready" data-ready-state="true" style="width:auto;padding:10px 16px;" ${(state.phase !== 'setup' || !myShipsPlaced || myBoard.ready) ? 'disabled' : ''}>Ready Up</button>
              <button class="btn-secondary" data-action="battleship-ready" data-ready-state="false" style="width:auto;padding:10px 16px;" ${(state.phase !== 'setup' || !myBoard.ready) ? 'disabled' : ''}>Not Ready</button>
            </div>
            <div style="font-size:0.82rem;color:var(--text-dim);margin-top:10px;">
              Drag a ship onto the grid on desktop, or tap a ship then tap a square on touch devices.
            </div>
          </div>
        ` : `
          <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
            <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:12px;">Spectator View</div>
            <div style="font-size:0.86rem;color:var(--text-dim);line-height:1.5;">
              Battleship currently assigns the first two people in the room as captains. Everyone else watches the public hit and miss markers until the match ends.
            </div>
          </div>
        `}
      </div>
    </div>
  `;
}

function renderBackgammon() {
  const isHost = APP.room.host === APP.player.name;
  const state = APP.room.activityState && typeof APP.room.activityState === 'object'
    ? APP.room.activityState
    : createBackgammonState(APP.room.participants || []);
  const safeRoomCode = escapeHtml(APP.roomCode);
  const myColor = getBackgammonPlayerColor(state);
  const activeColor = getBackgammonCurrentTurnColor(state);
  const activeSeat = getBackgammonSeat(state, activeColor);
  const whiteSeat = getBackgammonSeat(state, 'white');
  const blackSeat = getBackgammonSeat(state, 'black');
  const points = Array.isArray(state.points) ? state.points : [...BACKGAMMON_INITIAL_POINTS];
  const bar = state.bar || { white: 0, black: 0 };
  const borneOff = state.borneOff || { white: 0, black: 0 };
  const winnerColor = BACKGAMMON_COLORS.includes(state.winner) ? state.winner : '';
  const winnerSeat = winnerColor ? getBackgammonSeat(state, winnerColor) : null;
  const currentMoves = Array.isArray(state.remainingMoves) ? state.remainingMoves : [];
  const selectedSource = APP.backgammonUi?.selectedSource ?? null;
  const canInteract = state.phase === 'playing' && !winnerColor && myColor === activeColor;
  const legalFirstMoves = canInteract ? getBackgammonLegalFirstMoves(state, myColor) : [];
  const legalSourceKeys = new Set(legalFirstMoves.map(move => String(move.from)));
  const legalMovesFromSelected = selectedSource !== null
    ? legalFirstMoves.filter(move => move.from === selectedSource)
    : [];
  const legalTargetKeys = new Set(legalMovesFromSelected.map(move => String(move.to)));
  const canRoll = canInteract && currentMoves.length === 0;
  const canBearOff = legalTargetKeys.has('off');
  const topPipCount = getBackgammonPipCount(state, 'black');
  const bottomPipCount = getBackgammonPipCount(state, 'white');

  if (!whiteSeat.playerId || !blackSeat.playerId) {
    return `
      <div class="header">
        <h1 style="font-size:2rem;font-weight:700;">🎲 Backgammon</h1>
        <p class="tagline">Room: ${safeRoomCode}</p>
      </div>
      ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}
      <div style="max-width:780px;margin:28px auto 0;background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:28px;text-align:center;">
        <div style="font-family:'Fraunces',serif;font-size:1.5rem;margin-bottom:8px;">Backgammon needs two players.</div>
        <div style="color:var(--text-dim);">Invite one more player, then restart the activity.</div>
      </div>
    `;
  }

  const renderChecker = (color, index, totalCount, orientation = 'top') => {
    const colorMeta = BACKGAMMON_COLOR_META[color];
    return `
      <div style="
        width:32px;height:32px;border-radius:50%;
        background:radial-gradient(circle at 34% 32%, rgba(255,255,255,0.92), ${colorMeta.accent} 42%, color-mix(in srgb, ${colorMeta.accent} 76%, #111 24%) 100%);
        border:2px solid rgba(255,255,255,0.78);
        box-shadow:0 0 14px ${colorMeta.glow}, inset 0 -5px 10px rgba(0,0,0,0.18);
        color:${colorMeta.pipColor};
        font-size:0.68rem;font-weight:800;
        display:grid;place-items:center;
        margin-${orientation === 'top' ? 'top' : 'bottom'}:${index === 0 ? '0' : '-10px'};
      ">${index === Math.min(totalCount, 5) - 1 && totalCount > 5 ? escapeHtml(String(totalCount)) : ''}</div>
    `;
  };

  const renderPoint = (pointIndex, orientation = 'top', slotIndex = 0) => {
    const owner = getBackgammonPointOwner(points, pointIndex);
    const count = getBackgammonPointCount(points, pointIndex);
    const colorMeta = owner ? BACKGAMMON_COLOR_META[owner] : null;
    const isSelected = selectedSource === pointIndex;
    const isSource = legalSourceKeys.has(String(pointIndex));
    const isTarget = legalTargetKeys.has(String(pointIndex));
    const buttonAction = canInteract && (isSource || isTarget) ? 'backgammon-point' : '';
    const triangleColor = slotIndex % 2 === 0 ? 'rgba(255,205,144,0.76)' : 'rgba(140,80,41,0.74)';
    const triangleAccent = orientation === 'top'
      ? 'polygon(50% 100%, 8% 0, 92% 0)'
      : 'polygon(8% 100%, 92% 100%, 50% 0)';
    return `
      <button
        type="button"
        data-action="${buttonAction}"
        data-index="${pointIndex}"
        ${buttonAction ? '' : 'disabled'}
        style="
          position:relative;min-height:205px;border:none;background:transparent;padding:0;cursor:${buttonAction ? 'pointer' : 'default'};
          display:flex;align-items:${orientation === 'top' ? 'flex-start' : 'flex-end'};justify-content:center;
          outline:${isSelected ? '2px solid #8af1ff' : isTarget ? '2px solid #ff8fa3' : 'none'};
          outline-offset:4px;border-radius:12px;
          filter:${isTarget ? 'drop-shadow(0 0 12px rgba(255,143,163,0.32))' : isSource ? 'drop-shadow(0 0 10px rgba(138,241,255,0.24))' : 'none'};
        "
        title="Point ${pointIndex + 1}"
      >
        <div style="position:absolute;inset:0;display:flex;align-items:${orientation === 'top' ? 'flex-start' : 'flex-end'};justify-content:center;padding:${orientation === 'top' ? '0 4px 14px' : '14px 4px 0'};">
          <div style="width:100%;height:100%;max-width:64px;clip-path:${triangleAccent};background:${triangleColor};box-shadow:0 0 12px rgba(255,210,154,0.12), inset 0 0 0 1px rgba(255,255,255,0.12);"></div>
        </div>
        <div style="position:absolute;${orientation === 'top' ? 'top' : 'bottom'}:10px;left:50%;transform:translateX(-50%);font-size:0.72rem;font-weight:800;color:${isSource || isTarget ? '#ffffff' : 'rgba(255,232,196,0.68)'};text-shadow:0 0 8px rgba(0,0,0,0.4);">
          ${pointIndex + 1}
        </div>
        <div style="position:relative;z-index:1;display:flex;flex-direction:${orientation === 'top' ? 'column' : 'column-reverse'};align-items:center;justify-content:${orientation === 'top' ? 'flex-start' : 'flex-end'};min-height:180px;padding:${orientation === 'top' ? '12px 0 26px' : '26px 0 12px'};">
          ${count ? Array.from({ length: Math.min(count, 5) }, (_, checkerIndex) => renderChecker(owner, checkerIndex, count, orientation)).join('') : ''}
        </div>
        ${count ? `<div style="position:absolute;${orientation === 'top' ? 'bottom' : 'top'}:36px;right:6px;padding:2px 6px;border-radius:999px;background:${colorMeta?.glow || 'rgba(255,255,255,0.08)'};font-size:0.68rem;font-weight:800;color:${colorMeta?.accent || '#fff'};">${count}</div>` : ''}
      </button>
    `;
  };

  const renderHalf = (pointIndexes, orientation) => `
    <div style="display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;">
      ${pointIndexes.map((pointIndex, slotIndex) => renderPoint(pointIndex, orientation, slotIndex)).join('')}
    </div>
  `;

  const renderDie = (value, active = true, key = '') => `
    <div style="
      width:54px;height:54px;border-radius:14px;background:linear-gradient(145deg,#fffdf8,#f0e7d3);
      border:2px solid rgba(90,50,22,0.22);box-shadow:${active ? '0 0 18px rgba(255,209,102,0.26)' : 'none'},0 10px 20px rgba(0,0,0,0.2);
      display:grid;place-items:center;font-size:1.4rem;font-weight:900;color:#5f331f;
      opacity:${active ? '1' : '0.55'};
    " title="${escapeHtml(String(key || value))}">${value}</div>
  `;

  return `
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;">🎲 Backgammon</h1>
      <p class="tagline">Room: ${safeRoomCode} • ${winnerColor ? `${escapeHtml(winnerSeat?.playerName || 'Winner')} took the match` : `${escapeHtml(activeSeat.playerName)} to move`}</p>
    </div>

    ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}

    ${winnerColor ? `
      <div style="max-width:1200px;margin:18px auto 0;padding:18px 20px;border-radius:24px;background:linear-gradient(135deg, rgba(44,18,112,0.86), rgba(140,33,91,0.74));border:2px solid rgba(152,229,255,0.68);box-shadow:0 0 28px rgba(112,209,255,0.16);text-align:center;">
        <div style="font-size:1.45rem;font-weight:800;margin-bottom:6px;">🏆 ${escapeHtml(winnerSeat?.playerName || 'Winner')} wins</div>
        <div style="color:rgba(236,233,225,0.8);">${escapeHtml(state.lastAction || '')}</div>
      </div>
    ` : ''}

    <div style="max-width:1320px;margin:24px auto 0;display:grid;grid-template-columns:minmax(0,1.55fr) minmax(300px,0.85fr);gap:18px;align-items:start;">
      <div style="background:
        radial-gradient(circle at 50% 74%, rgba(255,82,138,0.18), transparent 24%),
        linear-gradient(180deg, rgba(48,23,10,0.96), rgba(28,14,8,0.98));
        border:1px solid rgba(255,216,169,0.18);border-radius:30px;padding:18px 18px 20px;box-shadow:0 26px 58px rgba(6,6,26,0.5), inset 0 0 0 1px rgba(255,255,255,0.04);">
        <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;">
          <div>
            <div style="font-family:'Fraunces',serif;font-size:1.45rem;">Neon Board</div>
            <div style="font-size:0.84rem;color:rgba(255,232,196,0.7);">${escapeHtml(state.lastAction || 'Roll and race your checkers home.')}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            ${state.dice?.length ? state.dice.map((value, idx) => renderDie(value, currentMoves.includes(value) || currentMoves.filter(move => move === value).length > state.dice.slice(0, idx).filter(move => move === value).length, `die-${idx + 1}`)).join('') : '<div style="color:rgba(255,232,196,0.62);font-size:0.88rem;">Dice waiting</div>'}
          </div>
        </div>

        <div style="display:grid;grid-template-columns:minmax(0,1fr) 88px minmax(0,1fr);gap:12px;align-items:stretch;">
          <div style="display:grid;gap:10px;">
            ${renderHalf(BACKGAMMON_TOP_POINTS.slice(0, 6), 'top')}
            ${renderHalf(BACKGAMMON_BOTTOM_POINTS.slice(0, 6), 'bottom')}
          </div>

          <div style="display:grid;grid-template-rows:1fr auto 1fr;gap:12px;align-items:center;">
            <div style="background:linear-gradient(180deg, rgba(24,12,54,0.94), rgba(14,8,30,0.98));border:1px solid rgba(255,143,163,0.14);border-radius:18px;padding:12px;display:grid;place-items:center;min-height:140px;">
              <div style="text-align:center;">
                <div style="font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,232,196,0.6);margin-bottom:8px;">Black Bar</div>
                <div style="font-size:2rem;font-weight:900;color:#ff8fa3;">${bar.black || 0}</div>
              </div>
            </div>
            <button type="button" data-action="${canInteract && (bar[myColor] || 0) > 0 ? 'backgammon-bar' : ''}" ${canInteract && (bar[myColor] || 0) > 0 ? '' : 'disabled'} style="background:linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));border:${selectedSource === 'bar' ? '2px solid #8af1ff' : '1px solid rgba(255,255,255,0.08)'};border-radius:18px;padding:12px;min-height:88px;color:${selectedSource === 'bar' ? '#8af1ff' : 'rgba(255,232,196,0.8)'};font-weight:800;letter-spacing:0.08em;text-transform:uppercase;cursor:${canInteract && (bar[myColor] || 0) > 0 ? 'pointer' : 'default'};">
              Enter<br>Bar
            </button>
            <div style="background:linear-gradient(180deg, rgba(24,12,54,0.94), rgba(14,8,30,0.98));border:1px solid rgba(138,241,255,0.14);border-radius:18px;padding:12px;display:grid;place-items:center;min-height:140px;">
              <div style="text-align:center;">
                <div style="font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,232,196,0.6);margin-bottom:8px;">White Bar</div>
                <div style="font-size:2rem;font-weight:900;color:#8af1ff;">${bar.white || 0}</div>
              </div>
            </div>
          </div>

          <div style="display:grid;gap:10px;">
            ${renderHalf(BACKGAMMON_TOP_POINTS.slice(7), 'top')}
            ${renderHalf(BACKGAMMON_BOTTOM_POINTS.slice(7), 'bottom')}
          </div>
        </div>
      </div>

      <div style="display:grid;gap:18px;">
        <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
          <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:12px;">Match Status</div>
          <div style="display:grid;gap:10px;">
            ${BACKGAMMON_COLORS.map(color => {
              const seat = getBackgammonSeat(state, color);
              const colorMeta = BACKGAMMON_COLOR_META[color];
              const isTurn = activeColor === color && !winnerColor;
              const isWinner = winnerColor === color;
              return `
                <div style="background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:12px;">
                  <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
                    <div>
                      <div style="font-weight:800;color:${colorMeta.accent};">${escapeHtml(colorMeta.icon)} ${escapeHtml(seat.playerName)}</div>
                      <div style="font-size:0.8rem;color:var(--text-dim);">${escapeHtml(seat.avatar || '👤')} • ${escapeHtml(colorMeta.label)}</div>
                    </div>
                    <div style="text-align:right;">
                      <div style="font-size:0.82rem;color:${isWinner ? '#ffd166' : isTurn ? '#8af1ff' : 'var(--text-dim)'};font-weight:800;">${isWinner ? 'Winner' : isTurn ? 'Turn' : 'Waiting'}</div>
                      <div style="font-size:0.8rem;color:var(--text-dim);">${borneOff[color] || 0} off • ${bar[color] || 0} bar</div>
                    </div>
                  </div>
                  <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px;">
                    <div style="padding:8px 10px;border-radius:12px;background:rgba(255,255,255,0.04);">
                      <div style="font-size:0.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;">Pip count</div>
                      <div style="font-weight:800;color:${colorMeta.accent};">${color === 'white' ? bottomPipCount : topPipCount}</div>
                    </div>
                    <div style="padding:8px 10px;border-radius:12px;background:rgba(255,255,255,0.04);">
                      <div style="font-size:0.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;">Checkers home</div>
                      <div style="font-weight:800;color:${colorMeta.accent};">${borneOff[color] || 0}/15</div>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
          <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:12px;">Controls</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
            <button class="btn-primary" data-action="backgammon-roll" style="width:auto;padding:10px 16px;" ${canRoll ? '' : 'disabled'}>Roll Dice</button>
            <button class="btn-secondary" data-action="backgammon-bear-off" style="width:auto;padding:10px 16px;" ${canBearOff ? '' : 'disabled'}>Bear Off</button>
            ${isHost ? '<button class="btn-secondary" data-action="backgammon-restart" style="width:auto;padding:10px 16px;">Restart Match</button>' : ''}
          </div>
          <div style="display:grid;gap:10px;">
            <div style="padding:12px 14px;border-radius:16px;background:linear-gradient(135deg, rgba(138,241,255,0.12), rgba(138,241,255,0.04));border:1px solid rgba(138,241,255,0.14);">
              <div style="font-size:0.74rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.58);margin-bottom:4px;">Turn flow</div>
              <div style="font-size:0.92rem;color:rgba(236,233,225,0.82);">
                ${winnerColor
                  ? `${escapeHtml(winnerSeat?.playerName || 'Winner')} has finished bearing off all checkers.`
                  : canRoll
                    ? `${escapeHtml(activeSeat.playerName)} should roll to start this turn.`
                    : currentMoves.length
                      ? `${escapeHtml(activeSeat.playerName)} has ${currentMoves.length} move${currentMoves.length === 1 ? '' : 's'} left: ${currentMoves.join(', ')}`
                      : `${escapeHtml(activeSeat.playerName)} is preparing the next roll.`}
              </div>
            </div>
            <div style="padding:12px 14px;border-radius:16px;background:linear-gradient(135deg, rgba(255,143,163,0.12), rgba(255,143,163,0.04));border:1px solid rgba(255,143,163,0.14);">
              <div style="font-size:0.74rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.58);margin-bottom:4px;">Selection</div>
              <div style="font-size:0.92rem;color:rgba(236,233,225,0.82);">
                ${selectedSource === 'bar'
                  ? 'Bar selected. Choose a highlighted entry point.'
                  : Number.isInteger(selectedSource)
                    ? `Point ${selectedSource + 1} selected. Choose a highlighted destination.`
                    : legalFirstMoves.length
                      ? 'Choose one of the glowing source points to move.'
                      : 'No legal move selected.'}
              </div>
            </div>
            <div style="padding:12px 14px;border-radius:16px;background:linear-gradient(135deg, rgba(255,209,102,0.12), rgba(255,209,102,0.04));border:1px solid rgba(255,209,102,0.14);">
              <div style="font-size:0.74rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.58);margin-bottom:4px;">Move help</div>
              <div style="font-size:0.92rem;color:rgba(236,233,225,0.82);">
                Hit single blots, re-enter from the bar first, and bear off only when every checker is home.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderConnect4() {
  const isHost = APP.room.host === APP.player.name;
  const state = APP.room.activityState && typeof APP.room.activityState === 'object'
    ? APP.room.activityState
    : createConnect4State(APP.room.participants || []);
  const safeRoomCode = escapeHtml(APP.roomCode);
  const redSeat = getConnect4Seat(state, 'red');
  const yellowSeat = getConnect4Seat(state, 'yellow');
  const board = Array.isArray(state.board) ? state.board : createConnect4Board();
  const myColor = getConnect4PlayerColor(state);
  const activeColor = CONNECT4_COLORS.includes(state.turn) ? state.turn : 'red';
  const activeSeat = getConnect4Seat(state, activeColor);
  const winnerColor = state.winner === 'red' || state.winner === 'yellow' ? state.winner : '';
  const isDraw = state.winner === 'draw';
  const winningKeySet = new Set((Array.isArray(state.winningCells) ? state.winningCells : []).map(cell => `${cell.row}:${cell.col}`));
  const canDrop = state.phase === 'playing' && !winnerColor && !isDraw && myColor === activeColor;

  if (!redSeat.playerId || !yellowSeat.playerId) {
    return `
      <div class="header">
        <h1 style="font-size:2rem;font-weight:700;">🟡 Connect 4</h1>
        <p class="tagline">Room: ${safeRoomCode}</p>
      </div>
      ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}
      <div style="max-width:780px;margin:28px auto 0;background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:28px;text-align:center;">
        <div style="font-family:'Fraunces',serif;font-size:1.5rem;margin-bottom:8px;">Connect 4 needs two players.</div>
        <div style="color:var(--text-dim);">Invite one more player, then restart the activity.</div>
      </div>
    `;
  }

  const columnButtons = Array.from({ length: CONNECT4_COLS }, (_, col) => {
    const dropRow = getConnect4DropRow(board, col);
    const enabled = canDrop && dropRow >= 0;
    return `
      <button
        type="button"
        data-action="${enabled ? 'connect4-drop' : ''}"
        data-index="${col}"
        ${enabled ? '' : 'disabled'}
        style="
          border:none;border-radius:16px;padding:10px 0;
          background:${enabled ? 'linear-gradient(135deg, rgba(145,196,255,0.22), rgba(255,107,135,0.18))' : 'rgba(255,255,255,0.04)'};
          color:${enabled ? '#fdf4ff' : 'rgba(236,233,225,0.42)'};
          font-weight:900;font-size:0.86rem;letter-spacing:0.12em;text-transform:uppercase;
          cursor:${enabled ? 'pointer' : 'default'};
          box-shadow:${enabled ? '0 0 20px rgba(145,196,255,0.16)' : 'none'};
        "
        title="Drop in column ${col + 1}"
      >
        ↓
      </button>
    `;
  }).join('');

  const boardMarkup = Array.from({ length: CONNECT4_ROWS }, (_, row) => `
    ${Array.from({ length: CONNECT4_COLS }, (_, col) => {
      const color = getConnect4Cell(board, row, col);
      const colorMeta = color ? CONNECT4_COLOR_META[color] : null;
      const isWinningCell = winningKeySet.has(`${row}:${col}`);
      return `
        <div style="
          aspect-ratio:1/1;
          border-radius:22px;
          background:linear-gradient(180deg, rgba(33,15,92,0.92), rgba(14,8,43,0.98));
          border:1px solid rgba(255,255,255,0.08);
          display:grid;place-items:center;
          box-shadow:inset 0 0 0 1px rgba(255,255,255,0.04), ${isWinningCell ? '0 0 22px rgba(255,255,255,0.14)' : 'none'};
        ">
          <div style="
            width:78%;height:78%;border-radius:50%;
            background:${colorMeta
              ? `radial-gradient(circle at 34% 32%, rgba(255,255,255,0.94), ${colorMeta.accent} 42%, color-mix(in srgb, ${colorMeta.accent} 76%, #171717 24%) 100%)`
              : 'radial-gradient(circle at 34% 32%, rgba(10,12,28,0.92), rgba(4,6,18,0.98) 100%)'};
            border:2px solid ${colorMeta ? 'rgba(255,255,255,0.78)' : 'rgba(255,255,255,0.06)'};
            box-shadow:${colorMeta ? `0 0 18px ${colorMeta.glow}, inset 0 -8px 12px rgba(0,0,0,0.18)` : 'inset 0 6px 12px rgba(255,255,255,0.02)'};
            transform:${isWinningCell ? 'scale(1.06)' : 'scale(1)'};
          "></div>
        </div>
      `;
    }).join('')}
  `).join('');

  return `
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;">🟡 Connect 4</h1>
      <p class="tagline">Room: ${safeRoomCode} • ${winnerColor ? `${escapeHtml(getConnect4Seat(state, winnerColor).playerName)} connected four` : isDraw ? 'Match drawn' : `${escapeHtml(activeSeat.playerName)} to drop`}</p>
    </div>

    ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}

    ${(winnerColor || isDraw) ? `
      <div style="max-width:1180px;margin:18px auto 0;padding:18px 20px;border-radius:24px;background:linear-gradient(135deg, rgba(44,18,112,0.86), rgba(140,33,91,0.74));border:2px solid rgba(152,229,255,0.68);box-shadow:0 0 28px rgba(112,209,255,0.16);text-align:center;">
        <div style="font-size:1.45rem;font-weight:800;margin-bottom:6px;">${winnerColor ? `🏆 ${escapeHtml(getConnect4Seat(state, winnerColor).playerName)} wins` : '🤝 Board full - draw'}</div>
        <div style="color:rgba(236,233,225,0.8);">${escapeHtml(state.lastAction || '')}</div>
      </div>
    ` : ''}

    <div style="max-width:1280px;margin:24px auto 0;display:grid;grid-template-columns:minmax(0,1.4fr) minmax(300px,0.85fr);gap:18px;align-items:start;">
      <div style="background:
        radial-gradient(circle at 50% 76%, rgba(255,82,138,0.18), transparent 28%),
        linear-gradient(180deg, rgba(23,10,74,0.98) 0%, rgba(13,9,45,0.98) 52%, rgba(8,7,26,0.99) 100%);
        border:1px solid rgba(174,118,255,0.42);
        box-shadow:0 24px 56px rgba(6,6,26,0.52), inset 0 0 0 1px rgba(255,255,255,0.05), 0 0 28px rgba(114,80,255,0.14);
        border-radius:30px;padding:18px;">
        <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px;">
          <div>
            <div style="font-family:'Fraunces',serif;font-size:1.45rem;">Neon Grid</div>
            <div style="font-size:0.84rem;color:rgba(236,233,225,0.72);">${escapeHtml(state.lastAction || 'Drop a disc and race to four in a row.')}</div>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            ${CONNECT4_COLORS.map(color => {
              const seat = getConnect4Seat(state, color);
              const colorMeta = CONNECT4_COLOR_META[color];
              const isTurn = activeColor === color && !winnerColor && !isDraw;
              return `
                <div style="padding:10px 12px;border-radius:16px;background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid ${isTurn ? colorMeta.accent : 'rgba(255,255,255,0.08)'};min-width:150px;">
                  <div style="font-size:0.74rem;letter-spacing:0.08em;text-transform:uppercase;color:${colorMeta.accent};margin-bottom:4px;">${escapeHtml(colorMeta.label)}</div>
                  <div style="font-weight:800;">${escapeHtml(seat.playerName)}</div>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(${CONNECT4_COLS}, minmax(0,1fr));gap:8px;margin-bottom:10px;">
          ${columnButtons}
        </div>

        <div style="padding:16px;border-radius:28px;background:linear-gradient(180deg, rgba(24,53,143,0.94), rgba(14,30,103,0.98));border:1px solid rgba(145,196,255,0.22);box-shadow:0 20px 48px rgba(6,6,26,0.45), inset 0 0 0 1px rgba(255,255,255,0.04);">
          <div style="display:grid;grid-template-columns:repeat(${CONNECT4_COLS}, minmax(0,1fr));gap:10px;">
            ${boardMarkup}
          </div>
        </div>
      </div>

      <div style="display:grid;gap:18px;">
        <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
          <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:12px;">Match Status</div>
          <div style="display:grid;gap:10px;">
            ${CONNECT4_COLORS.map(color => {
              const seat = getConnect4Seat(state, color);
              const colorMeta = CONNECT4_COLOR_META[color];
              const isTurn = activeColor === color && !winnerColor && !isDraw;
              const isWinner = winnerColor === color;
              return `
                <div style="background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:12px;">
                  <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
                    <div>
                      <div style="font-weight:800;color:${colorMeta.accent};">${escapeHtml(seat.avatar || '👤')} ${escapeHtml(seat.playerName)}</div>
                      <div style="font-size:0.8rem;color:var(--text-dim);">${escapeHtml(colorMeta.label)} discs</div>
                    </div>
                    <div style="font-size:0.82rem;color:${isWinner ? '#ffd166' : isTurn ? colorMeta.accent : 'var(--text-dim)'};font-weight:800;">
                      ${isWinner ? 'Winner' : isTurn ? 'Turn' : 'Waiting'}
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
          <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:12px;">Controls</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
            ${isHost ? '<button class="btn-secondary" data-action="connect4-restart" style="width:auto;padding:10px 16px;">Restart Match</button>' : ''}
          </div>
          <div style="display:grid;gap:10px;">
            <div style="padding:12px 14px;border-radius:16px;background:linear-gradient(135deg, rgba(145,196,255,0.12), rgba(145,196,255,0.04));border:1px solid rgba(145,196,255,0.14);">
              <div style="font-size:0.74rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.58);margin-bottom:4px;">Turn flow</div>
              <div style="font-size:0.92rem;color:rgba(236,233,225,0.82);">
                ${winnerColor
                  ? `${escapeHtml(getConnect4Seat(state, winnerColor).playerName)} finished with a four-in-a-row.`
                  : isDraw
                    ? 'No more moves remain. This round ended in a draw.'
                    : canDrop
                      ? `Choose a glowing arrow and drop into an open column as ${escapeHtml(CONNECT4_COLOR_META[myColor].label)}.`
                      : `${escapeHtml(activeSeat.playerName)} is currently dropping as ${escapeHtml(CONNECT4_COLOR_META[activeColor].label)}.`}
              </div>
            </div>
            <div style="padding:12px 14px;border-radius:16px;background:linear-gradient(135deg, rgba(255,224,102,0.12), rgba(255,224,102,0.04));border:1px solid rgba(255,224,102,0.14);">
              <div style="font-size:0.74rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.58);margin-bottom:4px;">Board tip</div>
              <div style="font-size:0.92rem;color:rgba(236,233,225,0.82);">
                Horizontal, vertical, and diagonal lines all count. Filled columns lock automatically.
              </div>
            </div>
            ${state.lastMove ? `
              <div style="padding:12px 14px;border-radius:16px;background:linear-gradient(135deg, rgba(255,107,135,0.12), rgba(255,224,102,0.04));border:1px solid rgba(255,107,135,0.14);">
                <div style="font-size:0.74rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.58);margin-bottom:4px;">Last drop</div>
                <div style="font-size:0.92rem;color:rgba(236,233,225,0.82);">
                  Row ${Number(state.lastMove.row) + 1}, column ${Number(state.lastMove.col) + 1} by ${escapeHtml(getConnect4Seat(state, state.lastMove.color).playerName)}.
                </div>
              </div>
            ` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderPresentationActivity() {
  const isHost = APP.room.host === APP.player.name;
  const roomPresentation = APP.room?.sharedPresentation || null;
  const state = APP.room?.activityState || {};
  const title = escapeHtml(String(state.title || roomPresentation?.title || 'Shared Presentation'));
  const sourceUrl = String(state.url || roomPresentation?.url || '').trim();
  const embedUrl = String(state.embedUrl || roomPresentation?.embedUrl || getPresentationEmbedUrl(sourceUrl) || sourceUrl).trim();
  const safeSourceUrl = escapeHtml(sourceUrl);
  const safeRoomCode = escapeHtml(APP.roomCode);

  if (!sourceUrl) {
    return `
      <div class="header">
        <h1 style="font-size:2rem;font-weight:700;">📽️ Presentation</h1>
        <p class="tagline">Room: ${safeRoomCode}</p>
      </div>
      ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}
      <div style="max-width:760px;margin:28px auto 0;background:var(--surface-solid);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;">
        <div style="font-family:\'Fraunces\',serif;font-size:1.5rem;margin-bottom:8px;">No presentation is shared for this room.</div>
        <div style="color:var(--text-dim);margin-bottom:14px;">Add a PowerPoint or slide URL in the lobby first, then start the Presentation activity.</div>
        <button class="btn-primary" data-action="end-activity" style="width:auto;padding:10px 18px;">Back to Lobby</button>
      </div>
    `;
  }

  return `
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;">📽️ ${title}</h1>
      <p class="tagline">Room: ${safeRoomCode}</p>
    </div>

async function submitIcebreakerAnswer() {
  const answer = (document.getElementById('icebreakerAnswer')?.value || '').trim().slice(0, 280);
  if (!answer) {
    showError('Please enter an answer');
    return;
  }
  
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room.activityState.answers) room.activityState.answers = {};
  
  room.activityState.answers[APP.player.name] = answer;
  
  await RoomManager.updateRoom(APP.roomCode, room);
}

async function submitPulseVote(optionIndex) {
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room) {
    showError('Room no longer available.');
    return;
  }
  if (room.activityState?.showResults) return;
  const currentPollIndex = room.activityState?.currentPoll || 0;
  const selected = room.activityState?.selectedPollIndexes || [];
  const questionIndex = selected[currentPollIndex] ?? currentPollIndex;
  const currentPoll = PULSE_QUESTIONS[questionIndex];
  if (!currentPoll) return;
  if (!room.activityState.votes) room.activityState.votes = {};
  
  room.activityState.votes[APP.player.name] = optionIndex;
  
  await RoomManager.updateRoom(APP.roomCode, room);
}

async function nextPulseQuestion() {
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room) {
    showError('Room no longer available.');
    return;
  }
  const selected = room.activityState?.selectedPollIndexes || [];
  const totalPolls = selected.length || PULSE_QUESTIONS.length;
  if (!room.activityState.voteHistory) room.activityState.voteHistory = {};
  const currentPoll = room.activityState.currentPoll || 0;
  room.activityState.voteHistory[currentPoll] = { ...(room.activityState.votes || {}) };

  if (currentPoll >= totalPolls - 1) {
    room.activityState.showResults = true;
  } else {
    room.activityState.currentPoll = currentPoll + 1;
    room.activityState.votes = {};
  }
  
  await RoomManager.updateRoom(APP.roomCode, room);
}

function renderPulseCheck() {
  const state = APP.room.activityState || {};
  const selected = state.selectedPollIndexes || [];
  const totalPolls = selected.length || PULSE_QUESTIONS.length;
  const questionIndex = selected[state.currentPoll || 0] ?? (state.currentPoll || 0);
  const poll = PULSE_QUESTIONS[questionIndex];
  const votes = state.votes || {};
  const userVote = votes[APP.player.name];
  const isHost = APP.room.host === APP.player.name;
  
  const voteCounts = {};
  Object.values(votes).forEach(v => voteCounts[v] = (voteCounts[v] || 0) + 1);
  const safeRoomCode = escapeHtml(APP.roomCode);
  const showResults = Boolean(state.showResults);

  if (showResults) {
    return renderPulseResults(state, isHost, safeRoomCode);

  if (!poll) {
    return `

async function submitWordleVote(word) {
  const normalized = normalizeWord(word || '');
  if (!normalized || normalized.length !== 5) {
    showError('Select a valid suggested word.');
    return;
  }

  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'wordle') return;
  if (room.activityState?.gameOver) return;

  const answers = room.activityState.answers || {};

  if (!suggestedWords.has(normalized)) {
    showError('That suggestion is no longer available.');
    return;
  }

  if (!room.activityState.wordleVotes) room.activityState.wordleVotes = {};
  room.activityState.wordleVotes[APP.player.name] = normalized;

  await awardParticipationInput(room, `wordle_vote:${round}:${APP.player.name}`, 2);

  await RoomManager.updateRoom(APP.roomCode, room);
}

async function submitWordleGuess() {
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'wordle') return;
  const answers = room.activityState.answers || {};
  const wordleVotes = room.activityState.wordleVotes || {};
  const isHost = room.host === APP.player?.name;
  const hostTypedWord = isHost ? normalizeWord(hostWordleDraft || getHostTypedWordFromCells()) : '';
  
  if (hostTypedWord.length === 5) {
    room.activityState.guesses.push(hostTypedWord);
    if (hostTypedWord === room.activityState.targetWord) {
      room.activityState.gameOver = true;
    } else if (room.activityState.guesses.length >= 6) {
      room.activityState.gameOver = true;
    }
    room.activityState.answers = {};
    room.activityState.wordleVotes = {};
    hostWordleDraft = '';
    await RoomManager.updateRoom(APP.roomCode, room);
    return;
  }

  if (Object.keys(answers).length === 0) return;
  const validSuggestions = Array.from(new Set(Object.values(answers).map(w => normalizeWord(w)).filter(Boolean)));
  if (validSuggestions.length === 1) {
    const onlyWord = validSuggestions[0];
    room.activityState.guesses.push(onlyWord);
    if (onlyWord === room.activityState.targetWord) {
      room.activityState.gameOver = true;
    } else if (room.activityState.guesses.length >= 6) {
      room.activityState.gameOver = true;
    }
    room.activityState.answers = {};
    room.activityState.wordleVotes = {};
    hostWordleDraft = '';
    await RoomManager.updateRoom(APP.roomCode, room);
    return;
  }

  if (Object.keys(wordleVotes).length === 0) {
    showError('Need at least one vote before submitting.');
    return;
  }
  
  const validSuggestionSet = new Set(validSuggestions);
  const voteCounts = {};
  Object.values(wordleVotes).forEach(word => {
    if (!validSuggestionSet.has(word)) return;
    voteCounts[word] = (voteCounts[word] || 0) + 1;
  });
  
  const mostPopular = Object.entries(voteCounts).sort((a, b) => b[1] - a[1])[0]?.[0];
  if (!mostPopular) {
    showError('No valid voted suggestion found. Ask team to vote again.');
    return;
  }
  
  room.activityState.guesses.push(mostPopular);
  
  if (mostPopular === room.activityState.targetWord) {
    room.activityState.gameOver = true;
  } else if (room.activityState.guesses.length >= 6) {
    room.activityState.gameOver = true;
  }
  
  room.activityState.answers = {};
  room.activityState.wordleVotes = {};
  hostWordleDraft = '';
  
  await RoomManager.updateRoom(APP.roomCode, room);
}

function renderWordle() {
  const state = APP.room.activityState || {};
  const targetWord = state.targetWord || 'AGILE';
  const guesses = state.guesses || [];
  const gameOver = state.gameOver || false;
  const answers = state.answers || {};
  const wordleVotes = state.wordleVotes || {};
  const userGuess = answers[APP.player.name] || '';
  const userVote = wordleVotes[APP.player.name] || '';
  const isHost = APP.room.host === APP.player.name;
  const maxGuesses = 6;
  const safeRoomCode = escapeHtml(APP.roomCode);
  const safeUserGuess = escapeHtml(userGuess);
  const suggestionWords = Array.from(new Set(Object.values(answers).map(word => normalizeWord(word)).filter(Boolean)));
  const voteCounts = {};
  Object.values(wordleVotes).forEach(word => {
    const normalized = normalizeWord(word);
    if (!normalized || !suggestionWords.includes(normalized)) return;
    voteCounts[normalized] = (voteCounts[normalized] || 0) + 1;
  });
  const topVoteEntry = Object.entries(voteCounts).sort((a, b) => b[1] - a[1])[0] || null;
  const topVoteWord = topVoteEntry?.[0] || '';
  
  const letterStates = {};
  guesses.forEach(guess => {
    for (let i = 0; i < 5; i++) {
      const letter = guess[i];
      if (targetWord[i] === letter) letterStates[letter] = 'correct';
      else if (targetWord.includes(letter) && letterStates[letter] !== 'correct') letterStates[letter] = 'present';
      else if (!targetWord.includes(letter)) letterStates[letter] = 'absent';
    }
  });
  
  const won = guesses.includes(targetWord);
  const lost = !won && guesses.length >= maxGuesses;
  
  let gridHtml = '';
  const hostTypedWord = isHost ? normalizeWord(hostWordleDraft) : '';
  for (let row = 0; row < maxGuesses; row++) {
    gridHtml += '<div class="wordle-row">';
    const guess = guesses[row] || '';
    const isActiveHostRow = isHost && !gameOver && row === guesses.length;
    for (let col = 0; col < 5; col++) {
      const letter = guess[col] || '';
      let cellClass = 'wordle-cell';
      if (guess.length === 5) {
        if (targetWord[col] === letter) cellClass += ' correct';
        else if (targetWord.includes(letter)) cellClass += ' present';
        else cellClass += ' absent';
      }
      if (isActiveHostRow) {
        const typedLetter = hostTypedWord[col] || '';
        gridHtml += `<div class="${cellClass}"><input class="host-wordle-cell-input" data-col="${col}" maxlength="1" value="${escapeHtml(typedLetter)}" aria-label="Host letter ${col + 1}"></div>`;
      } else {
        gridHtml += '<div class="' + cellClass + '">' + letter + '</div>';
      }
    }
    gridHtml += '</div>';
  }
  
  const keyboard = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['Z','X','C','V','B','N','M']
  ];
  
  let keyboardHtml = '<div style="max-width:500px;margin:20px auto;">';
  keyboard.forEach(row => {
    keyboardHtml += '<div style="display:flex;gap:6px;justify-content:center;margin-bottom:6px;">';
    row.forEach(key => {
      const state = letterStates[key] || '';
      const disabled = gameOver ? 'disabled' : '';
      keyboardHtml += '<button class="key-btn ' + state + '" data-action="wordle-key" data-key="' + key + '" ' + disabled + '>' + key + '</button>';
    });
    keyboardHtml += '</div>';
  });
  const disabled = gameOver ? 'disabled' : '';
  keyboardHtml += '<div style="display:flex;gap:6px;justify-content:center;">';
  keyboardHtml += '<button class="key-btn wide" data-action="wordle-key" data-key="ENTER" ' + disabled + '>ENTER</button>';
  keyboardHtml += '<button class="key-btn wide" data-action="wordle-key" data-key="DEL" ' + disabled + '>DEL</button>';
  keyboardHtml += '</div></div>';
  
  let statusHtml = '';
  if (won) {
    statusHtml = '<div role="status" aria-live="polite" aria-atomic="true" style="text-align:center;padding:20px;background:rgba(0,210,106,0.05);border:1px solid var(--success);border-radius:12px;color:var(--success);margin:20px 0;font-size:1.2rem;font-weight:700;">🎉 Team solved it in ' + guesses.length + ' ' + (guesses.length === 1 ? 'guess' : 'guesses') + '!</div>';
  } else if (lost) {
    statusHtml = '<div role="alert" aria-live="assertive" aria-atomic="true" style="text-align:center;padding:20px;background:rgba(255,64,96,0.05);border:1px solid var(--danger);border-radius:12px;margin:20px 0;">The word was: <strong style="color:var(--accent);font-size:1.5rem;display:block;margin-top:10px;">' + escapeHtml(targetWord) + '</strong></div>';
  }
  
  let suggestionsHtml = '';

    const normalized = normalizeWord(word);
    const participant = APP.room.participants.find(p => p.name === name);
    const avatar = participant ? participant.avatar : '👤';
    suggestionsHtml += '<div style="background:var(--surface-2);border-radius:10px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;">';
    suggestionsHtml += '<div style="font-size:1.5rem;">' + escapeHtml(avatar) + '</div>';
    suggestionsHtml += '<div style="flex:1;"><div style="color:var(--accent);font-weight:600;margin-bottom:4px;">' + escapeHtml(name) + '</div>';
    suggestionsHtml += '<div style="font-size:1.2rem;font-weight:700;letter-spacing:4px;">' + escapeHtml(word) + '</div></div>';
    if (normalized && voteCounts[normalized]) {
      suggestionsHtml += '<span style="background:var(--accent);color:var(--bg);padding:6px 10px;border-radius:999px;font-size:0.78rem;font-weight:700;">' + voteCounts[normalized] + ' vote' + (voteCounts[normalized] === 1 ? '' : 's') + '</span>';
    }
    suggestionsHtml += '</div>';
  });
  
  const voteButtonsHtml = suggestionWords.map(word => {
    const isSelected = userVote === word;
    const count = voteCounts[word] || 0;
    const selectedStyle = isSelected
      ? 'background:rgba(0,210,211,0.08);border-color:var(--accent);'

        </h3>
        ${suggestionWords.length ? `
          <div style="margin-bottom:12px;">
            ${suggestionsHtml}
          </div>
          <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;">
            ${voteButtonsHtml}

          <div role="status" aria-live="polite" aria-atomic="true" style="text-align:center;color:var(--text-dim);margin-top:12px;">
            ${Object.keys(wordleVotes).length} of ${APP.room.participants.length} voted
            ${userVote ? ` • Your vote: <strong style="color:var(--accent);letter-spacing:2px;">${escapeHtml(userVote)}</strong>` : ''}
          </div>

              Current leader: <strong style="color:var(--accent);letter-spacing:2px;">${escapeHtml(topVoteWord)}</strong>
            </div>
