async function spinWheelNow() {
  if (!APP.roomCode) return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'spin-wheel') return;
  const state = room.activityState || {};
  const assignedSpinnerRaw = String(state.spinnerTurnPlayer || '').trim();
  const assignedSpinner = assignedSpinnerRaw
    && assignedSpinnerRaw !== room.host
    && Array.isArray(room.participants)
    && room.participants.some(participant => participant?.name === assignedSpinnerRaw)
      ? assignedSpinnerRaw
      : '';
  const canCurrentPlayerSpin = APP.player?.name === room.host
    ? !assignedSpinner
    : assignedSpinner === APP.player?.name;
  if (!canCurrentPlayerSpin) return;
  if (state.isSpinning) return;
  const activeEntries = getSpinWheelSessionEntries(state);
  const segments = buildSpinWheelSegments(activeEntries);
  if (segments.length < 2) {
    showError('Wheel needs at least 2 options.');
    return;
  }
  const selectedIndex = Math.floor(Math.random() * segments.length);
  const centerDeg = segments[selectedIndex].center;
  const targetDeg = (360 - centerDeg + 360) % 360;
  const fullTurns = 6 + Math.floor(Math.random() * 3);
  const currentRotation = Number(state.wheelRotation) || 0;
  const normalizedCurrent = ((currentRotation % 360) + 360) % 360;
  const deltaToTarget = ((targetDeg - normalizedCurrent) + 360) % 360;
  const nextRotation = currentRotation + (fullTurns * 360) + deltaToTarget;
  const spinDurationMs = 4800;
  const spinToken = (Number(state.spinToken) || 0) + 1;

  state.optionEntries = activeEntries;
  state.options = activeEntries.map(entry => entry.label);
  state.spinnerTurnPlayer = null;
  state.pendingSelectedIndex = selectedIndex;
  state.selectedIndex = null;
  state.spinWinners = [];
  state.winnerXpClaimed = {};
  state.currentResult = '';
  state.currentResultAction = null;
  state.currentResultPrompt = '';
  state.lastResult = '';
  state.lastSpinner = assignedSpinner || room.host || APP.player?.name || '';
  state.spinCount = (Number(state.spinCount) || 0) + 1;
  state.spinDurationMs = spinDurationMs;
  state.lastSpinAt = Date.now();
  state.spinSettledAt = 0;
  state.isSpinning = true;
  state.spinToken = spinToken;
  state.prevWheelRotation = currentRotation;
  state.wheelRotation = nextRotation;
  room.activityState = state;
  await RoomManager.updateRoom(APP.roomCode, room);

  window.setTimeout(async () => {
    const latestRoom = await RoomManager.loadRoom(APP.roomCode);
    if (!latestRoom || latestRoom.currentActivity !== 'spin-wheel') return;
    const latestState = latestRoom.activityState || {};
    if ((Number(latestState.spinToken) || 0) !== spinToken) return;
    const pendingIndex = Number.isInteger(latestState.pendingSelectedIndex) ? latestState.pendingSelectedIndex : null;
    const latestEntries = getSpinWheelSessionEntries(latestState);
    const latestSegments = buildSpinWheelSegments(latestEntries);
    if (pendingIndex === null || !latestSegments[pendingIndex]) return;
    const landedIndex = findSpinWheelLandedIndex(latestSegments, Number(latestState.wheelRotation) || nextRotation);
    const landedEntry = latestSegments[landedIndex]?.entry || latestSegments[pendingIndex].entry || null;
    const landedLabel = landedEntry?.label || latestSegments[landedIndex]?.label || latestSegments[pendingIndex].label;
    const selections = latestState.playerSelections && typeof latestState.playerSelections === 'object'
      ? latestState.playerSelections
      : {};
    const winners = Object.entries(selections)
      .filter(([, idx]) => Number(idx) === landedIndex)
      .map(([playerName]) => playerName);
    const spinnerName = String(latestState.lastSpinner || latestRoom.host || '').trim();
    if (!latestState.spinPoints || typeof latestState.spinPoints !== 'object') latestState.spinPoints = {};
    let actionPrompt = landedEntry?.prompt || '';
    if (landedEntry?.action?.type === 'points' && spinnerName) {
      latestState.spinPoints[spinnerName] = (Number(latestState.spinPoints[spinnerName]) || 0) + (Number(landedEntry.action.points) || 0);
      actionPrompt = `${spinnerName} banks ${Number(landedEntry.action.points) || 0} spin points.`;
    } else if (landedEntry?.action?.type === 'activity') {
      actionPrompt = `Host can launch ${ACTIVITY_QUEUE_ITEM_MAP[landedEntry.action.activityId]?.label || landedEntry.action.activityId} as a mini session.`;
    } else if (landedEntry?.action?.type === 'prompt') {
      actionPrompt = landedEntry.action.prompt || actionPrompt;
    }
    latestState.selectedIndex = landedIndex;
    latestState.currentResult = landedLabel;
    latestState.currentResultAction = landedEntry?.action || null;
    latestState.currentResultPrompt = actionPrompt;
    latestState.lastResult = landedLabel;
    latestState.spinWinners = winners;
    latestState.pendingSelectedIndex = null;
    latestState.isSpinning = false;
    latestState.spinSettledAt = Date.now();
    latestRoom.activityState = latestState;
    await RoomManager.updateRoom(APP.roomCode, latestRoom);
  }, spinDurationMs + 60);
}

let spinWheelXpClaimPending = false;
async function maybeClaimSpinWheelWinnerXp() {
  if (spinWheelXpClaimPending || !APP.roomCode || !APP.player?.name) return;
  const room = APP.room;
  if (!room || room.currentActivity !== 'spin-wheel') return;
  const state = room.activityState || {};
  if (state.selectedIndex === null || state.isSpinning) return;
  const winners = Array.isArray(state.spinWinners) ? state.spinWinners : [];
  if (!winners.includes(APP.player.name)) return;
  const claimed = state.winnerXpClaimed && typeof state.winnerXpClaimed === 'object' ? state.winnerXpClaimed : {};
  if (claimed[APP.player.name]) return;

  spinWheelXpClaimPending = true;
  try {
    const freshRoom = await RoomManager.loadRoom(APP.roomCode);
    if (!freshRoom || freshRoom.currentActivity !== 'spin-wheel') return;
    const freshState = freshRoom.activityState || {};
    const freshWinners = Array.isArray(freshState.spinWinners) ? freshState.spinWinners : [];
    if (!freshWinners.includes(APP.player.name)) return;
    if (!freshState.winnerXpClaimed || typeof freshState.winnerXpClaimed !== 'object') {
      freshState.winnerXpClaimed = {};
    }
    if (freshState.winnerXpClaimed[APP.player.name]) return;

    const updatedProfile = await PlayerManager.awardXP(50, 'spin-wheel-winner');
    if (updatedProfile) APP.player = updatedProfile;
    freshState.winnerXpClaimed[APP.player.name] = true;
    freshRoom.activityState = freshState;
    await RoomManager.updateRoom(APP.roomCode, freshRoom);
    APP.room = freshRoom;
    render();
  } catch (_) {
    // Ignore claim retries; room sync will attempt again.
  } finally {
    spinWheelXpClaimPending = false;
  }
}

async function revealEmojiCharades() {
  if (!APP.roomCode || !APP.room || APP.room.host !== APP.player?.name || APP.room.currentActivity !== 'emoji-charades') return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'emoji-charades') return;
  const roomSettings = getRoomHostSettings(room);
  const allowCloseAnswers = roomSettings.emojiCharadesAllowCloseAnswers !== false;
  const state = room.activityState || {};
  if (state.revealed) return;

  const round = Number.isInteger(state.round) ? state.round : 0;
  const roundsTotal = Math.max(1, Math.min(8, Number.parseInt(state.roundsTotal || '8', 10) || 8));
  if (round >= roundsTotal) return;
  const questionIndex = state.questionOrder?.[round] ?? round;
  const prompt = EMOJI_CHARADES_BANK[questionIndex];
  if (!prompt) return;

  const answerKey = normalizeCharadesAnswer(prompt.answer);
  const guesses = state.guesses && typeof state.guesses === 'object' ? state.guesses : {};
  const closeAcceptedSource = state.closeAccepted && typeof state.closeAccepted === 'object' ? state.closeAccepted : {};
  const closeAccepted = allowCloseAnswers ? { ...closeAcceptedSource } : {};
  const scores = state.scores && typeof state.scores === 'object' ? state.scores : {};
  const roundPoints = {};

  APP.room.participants.forEach(player => {
    const outcome = getEmojiCharadesGuessOutcome(
      guesses[player.name] || '',
      answerKey,
      Boolean(closeAccepted[player.name])
    );
    roundPoints[player.name] = outcome.points;
    if (outcome.points > 0) {
      scores[player.name] = (scores[player.name] || 0) + outcome.points;
    }
  });

  room.activityState = {
    ...state,
    revealed: true,
    closeAccepted,
    scores,
    roundPoints
  };
  await RoomManager.updateRoom(APP.roomCode, room);

async function toggleEmojiCharadesCloseAnswer(playerName, accepted) {
  if (!APP.roomCode || !APP.room || APP.room.host !== APP.player?.name || APP.room.currentActivity !== 'emoji-charades') return;
  const normalizedName = String(playerName || '').trim();
  if (!normalizedName) return;

  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'emoji-charades') return;
  const roomSettings = getRoomHostSettings(room);
  if (roomSettings.emojiCharadesAllowCloseAnswers === false) return;

  const state = room.activityState || {};
  if (!state.revealed) return;

  const round = Number.isInteger(state.round) ? state.round : 0;
  const roundsTotal = Math.max(1, Math.min(8, Number.parseInt(state.roundsTotal || '8', 10) || 8));
  if (round >= roundsTotal) return;
  const questionIndex = state.questionOrder?.[round] ?? round;
  const prompt = EMOJI_CHARADES_BANK[questionIndex];
  if (!prompt) return;

  const guesses = state.guesses && typeof state.guesses === 'object' ? state.guesses : {};
  const guess = guesses[normalizedName] || '';
  if (!guess) return;
  const answerKey = normalizeCharadesAnswer(prompt.answer);
  const closeAccepted = state.closeAccepted && typeof state.closeAccepted === 'object' ? { ...state.closeAccepted } : {};
  const roundPoints = state.roundPoints && typeof state.roundPoints === 'object' ? { ...state.roundPoints } : {};
  const scores = state.scores && typeof state.scores === 'object' ? { ...state.scores } : {};

  const wasAccepted = Boolean(closeAccepted[normalizedName]);
  const oldOutcome = getEmojiCharadesGuessOutcome(guess, answerKey, wasAccepted);
  if (oldOutcome.isExact) return;

  if (accepted) closeAccepted[normalizedName] = true;
  else delete closeAccepted[normalizedName];

  const newOutcome = getEmojiCharadesGuessOutcome(guess, answerKey, Boolean(closeAccepted[normalizedName]));
  const delta = newOutcome.points - oldOutcome.points;
  if (delta === 0) return;

  roundPoints[normalizedName] = newOutcome.points;
  scores[normalizedName] = Math.max(0, (Number(scores[normalizedName]) || 0) + delta);

  room.activityState = {
    ...state,
    closeAccepted,
    roundPoints,
    scores
  };
  await RoomManager.updateRoom(APP.roomCode, room);
  APP.room = room;
  render();
}

async function nextEmojiCharadesRound() {
  if (!APP.roomCode || !APP.room || APP.room.host !== APP.player?.name || APP.room.currentActivity !== 'emoji-charades') return;
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'emoji-charades') return;
  const state = room.activityState || {};
  const nextRound = (Number.isInteger(state.round) ? state.round : 0) + 1;

  room.activityState = {
    ...state,
    round: nextRound,
    revealed: false,
    guesses: {},
    closeAccepted: {},
    roundPoints: {}
  };
  await RoomManager.updateRoom(APP.roomCode, room);
}

// Icebreaker Functions
function autoFocusWordChainActiveCell() {
  if (APP.room?.currentActivity !== 'word-chain') {
    wordChainLastAutoFocusKey = '';
    return;
  }
  if (APP.room.host !== APP.player?.name) return;
  const state = APP.room.activityState || {};
  const puzzle = WORD_CHAIN_PUZZLES[state.puzzleIndex];
  if (!puzzle) return;
  const chain = (puzzle.words || []).slice(0, Math.min(8, state.wordCount || 8));
  const lastIndex = chain.length - 1;
  if (lastIndex < 2) return;

  const playerName = TEAM_CHAIN_KEY;
  const progress = state.progressIndex?.[playerName] || 1;
  if (progress >= lastIndex) return;

  const rowLength = normalizeChainWord(chain[progress] || '').slice(0, 9).length;
  const revealCount = Math.max(1, Math.min(rowLength, state.revealedLetters?.[playerName]?.[progress] || 1));
  const focusKey = `${APP.roomCode || ''}:${playerName}:${progress}:${revealCount}`;
  if (focusKey === wordChainLastAutoFocusKey) return;

  const target = document.querySelector(`.word-chain-letter-input[data-row="${progress}"][data-first-editable="true"]`);
  if (!(target instanceof HTMLInputElement)) return;
  target.focus();
  target.select();
  if (wordChainFocusCueTimer) clearTimeout(wordChainFocusCueTimer);
  target.classList.remove('autofocus-cue');
  void target.offsetWidth;
  target.classList.add('autofocus-cue');
  wordChainFocusCueTimer = setTimeout(() => {
    target.classList.remove('autofocus-cue');
    wordChainFocusCueTimer = null;
  }, 420);
  wordChainLastAutoFocusKey = focusKey;
}

function renderVoiceDock() {

  if (!participant?.id) return '';
  const isHost = participant.name === APP.room.host;
  const isAllowed = isCurrentPlayerVoiceAllowed();
  const canRequest = canCurrentPlayerRequestVoice();
  const hideBlockedControls = voiceSettings.hideBlockedMicControls !== false && !isAllowed && !isHost;
  const showSpeakerButton = true;
  const showRequestButton = canRequest && !hideBlockedControls;
  const showMicButtons = !hideBlockedControls;
  const mobileDockStyle = `position:fixed;right:${APP.voiceDock.mobileRight}px;top:${APP.voiceDock.mobileTop}px;z-index:10010;pointer-events:auto;`;
  const middleAction = showRequestButton

  return `

function renderActivityQueue() {
  const isHost = APP.room.host === APP.player.name;
  const safeRoomCode = escapeHtml(APP.roomCode);
  const queueFeatureEnabled = APP.preferences.enableActivityQueue !== false;
  const availableQueueItems = getEnabledActivityItems();
  const activityQueue = Array.isArray(APP.room.activityQueue) ? APP.room.activityQueue : [];
  const queueAiActivities = getQueueEligibleAIActivityIds(activityQueue);
  const localCollections = normalizeClientCollections(APP.admin.collections || []);
  const queueIndex = Number.isInteger(APP.room.queueIndex) ? APP.room.queueIndex : 0;
  const queueActive = Boolean(APP.room.queueActive);
  const queueRemaining = activityQueue.slice(queueIndex);

  if (!queueFeatureEnabled) {
    return `
      <div class="header">
        <h1 class="logo">Activity Queue</h1>
        <p class="tagline">Room: ${safeRoomCode}</p>
      </div>
      <button class="btn-secondary" data-action="go-screen" data-screen="lobby">← Back to Lobby</button>
      <div style="margin-top:20px;color:var(--text-dim);">Activity Queue is disabled by admin.</div>
    `;
  }

  return `
    <div class="header">
      <h1 class="logo">Activity Queue</h1>
      <p class="tagline">Room: ${safeRoomCode}</p>
    </div>

    <button class="btn-secondary" data-action="go-screen" data-screen="lobby">← Back to Lobby</button>

    <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px;">
      <h3 style="font-weight:700;margin-bottom:12px;">Queued Activities</h3>
      ${activityQueue.length ? `
        <div style="margin-bottom:12px;">
          ${activityQueue.map((activityId, idx) => {
            const item = ACTIVITY_QUEUE_ITEM_MAP[activityId];
            if (!item) return '';
            const isCurrentPointer = queueActive && idx === queueIndex;
            const isDone = idx < queueIndex;
            const bg = isDone ? 'rgba(0,210,106,0.06)' : (isCurrentPointer ? 'rgba(0,210,211,0.08)' : 'var(--surface-2)');
            const border = isCurrentPointer ? 'var(--accent)' : 'var(--border)';
            return `
              <div style="display:flex;justify-content:space-between;align-items:center;background:${bg};
                border:1px solid ${border};border-radius:10px;padding:10px 12px;margin-bottom:8px;">
                <div style="display:flex;align-items:center;gap:10px;">
                  <span style="font-weight:700;min-width:20px;">${idx + 1}.</span>
                  <span>${item.icon}</span>
                  <span>${escapeHtml(item.label)}</span>
                  ${isCurrentPointer ? '<span style="font-size:0.75rem;color:var(--accent);font-weight:700;">UP NEXT</span>' : ''}
                  ${isDone ? '<span style="font-size:0.75rem;color:var(--success);font-weight:700;">DONE</span>' : ''}
                </div>
                ${isHost ? `<button class="btn-secondary" data-action="queue-remove" data-queue-index="${idx}" style="padding:6px 10px;">Remove</button>` : ''}
              </div>
            `;
          }).join('')}
        </div>
      ` : `
        <div style="color:var(--text-dim);margin-bottom:12px;">No activities queued yet.</div>
      `}
      <div style="font-size:0.85rem;color:var(--text-dim);margin-bottom:10px;">
        ${queueActive
          ? (queueRemaining.length ? `${queueRemaining.length} remaining in queue` : 'Queue will complete after this activity')
          : 'Queue is paused'}
      </div>

      ${isHost ? `
        <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px;">
          ${availableQueueItems.map(item => `
            <button class="btn-secondary" data-action="queue-add" data-activity="${item.id}" style="padding:10px 12px;">
              ${item.icon} ${escapeHtml(item.label)}
            </button>
          `).join('')}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn-primary" data-action="queue-start" style="width:auto;padding:10px 14px;">Start Queue</button>
          <button class="btn-secondary" data-action="queue-next">Next in Queue</button>
          <button class="btn-secondary" data-action="queue-clear">Clear Queue</button>
        </div>
      ` : ''}
    </div>

    ${isHost ? `
      <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px;">
        <h3 style="font-weight:700;margin-bottom:10px;">AI Queue Builder</h3>
        <div style="font-size:0.84rem;color:var(--text-dim);margin-bottom:12px;">
          Generate themed content for queued activities, side-load a collection JSON, or download templates for prompt-driven prep.
        </div>
        <div style="font-size:0.78rem;color:var(--text-dim);margin:-4px 0 12px;">
          Uses the server AI key when configured, or the fallback API key you already saved in Host Settings.
        </div>

        ${queueAiActivities.length ? `
          <div style="display:grid;grid-template-columns:1.2fr 1fr 0.8fr 0.8fr;gap:10px;margin-bottom:12px;">
            <select id="queueThemeSelect" class="form-input">
              ${ACTIVITY_QUEUE_THEME_OPTIONS.map(theme => `<option value="${escapeHtml(theme)}" ${theme === 'General Knowledge' ? 'selected' : ''}>${escapeHtml(theme)}</option>`).join('')}
            </select>
            <input id="queueThemeCustom" class="form-input" maxlength="120" placeholder="Optional sub-theme or audience">
            <select id="queueDifficulty" class="form-input">
              <option value="easy">Easy</option>
              <option value="mixed" selected>Mixed</option>
              <option value="hard">Hard</option>
            </select>
            <input id="queueCount" class="form-input" type="number" min="3" max="20" value="${Math.max(3, Math.min(20, Number(HOST_LOCAL_CONFIG.aiDefaultCount) || 8))}">
          </div>
          <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px;">
            ${queueAiActivities.map(activityId => `
              <label style="display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;">
                <input id="queueGenerateActivity-${activityId}" type="checkbox" checked>
                <span>${escapeHtml(ACTIVITY_QUEUE_ITEM_MAP[activityId]?.icon || '✨')} ${escapeHtml(AI_GENERATION_TARGET_LABELS[activityId] || activityId)}</span>
              </label>
            `).join('')}
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
            <button class="btn-primary" data-action="queue-generate-selected-content" ${APP.aiGenerating ? 'disabled' : ''}>
              ${APP.aiGenerating ? 'Generating...' : 'Generate for Selected Activities'}
            </button>
            <button class="btn-secondary" data-action="queue-download-prompt-template">Download Template Prompt</button>
            <button class="btn-secondary" data-action="queue-download-collection-template">Download JSON Template</button>
          </div>
        ` : `
          <div style="font-size:0.84rem;color:var(--text-dim);margin-bottom:12px;">Add AI-supported activities like Trivia, Icebreaker, Team Jeopardy, Spin Wheel, or Word Chain to unlock queue generation.</div>
        `}

        <div style="margin-top:10px;padding-top:14px;border-top:1px solid var(--border);">
          <div style="font-weight:700;margin-bottom:8px;">Side-Load Options (JSON)</div>
          <textarea id="queueCollectionJson" class="form-input" rows="6" placeholder='{"name":"Marvel Queue Pack","activities":{"lightning-trivia":[{"q":"...","opts":["A","B","C","D"],"ans":1}]}}'></textarea>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
            <button class="btn-secondary" data-action="queue-add-collection">Add Collection to This Browser</button>
          </div>
          <div style="font-size:0.78rem;color:var(--text-dim);margin-top:8px;">
            Side-loaded collections update the host browser’s activity banks immediately and can be used by queued activities in this session. Removing them here only affects this browser session.
          </div>
          ${localCollections.length ? `
            <div style="margin-top:12px;display:grid;gap:8px;">
              ${localCollections.map(col => `
                <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;justify-content:space-between;gap:10px;align-items:center;">
                  <div>
                    <div style="font-weight:700;">${escapeHtml(col.name || col.id)}</div>
                    <div style="font-size:0.8rem;color:var(--text-dim);">${escapeHtml(col.id || '')}</div>
                  </div>
                  <button class="btn-secondary" data-action="queue-remove-collection" data-key="${escapeHtml(col.id || '')}" style="padding:6px 10px;">Remove</button>
                </div>
              `).join('')}
            </div>
          ` : '<div style="margin-top:10px;color:var(--text-dim);font-size:0.9rem;">No side-loaded collections in this browser yet.</div>'}
        </div>

        ${APP.aiStatus ? `<div role="status" aria-live="polite" style="margin-top:12px;color:var(--text-mid);font-size:0.9rem;">${escapeHtml(APP.aiStatus)}</div>` : ''}
      </div>
    ` : ''}
  `;
}

  const aiBankEditorItems = getAIBankEditorItems(aiBankEditorTarget);

function togglePresentation() {
  APP.presentationMode = !APP.presentationMode;
  document.body.classList.toggle('presentation-mode', APP.presentationMode);
  
  const btn = document.getElementById('presentationToggle');
  if (btn) {
    btn.textContent = APP.presentationMode ? '📱 Exit Presentation' : '📺 Presentation Mode';
  }
  
  render();
}

function setAsyncButtonState(button, isBusy, idleLabel, busyLabel) {
  if (!button) return;
  button.disabled = isBusy;
  button.textContent = isBusy ? busyLabel : idleLabel;
  if (isBusy) {
    button.setAttribute('aria-busy', 'true');
  } else {
    button.removeAttribute('aria-busy');
  }
}

async function createPlayer() {
  const name = normalizeName(document.getElementById('playerName')?.value || '');
  if (!name) {
    showError('Please enter your name');
    return;
  }
  
  const avatar = AVATAR_OPTIONS.includes(selectedAvatar) ? selectedAvatar : getRandomAvatar();
  APP.player = await PlayerManager.createProfile(name, avatar);
  APP.screen = APP.pendingJoinCode ? 'join-room' : 'dashboard';
  render();
}

async function copyJoinLink() {
  if (!APP.roomCode) return;
  const joinUrl = buildJoinUrl(APP.roomCode, APP.roomAccessToken || '', isRoomPrivateSession(APP.room));
  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(joinUrl);
      showError('Join link copied.');
      return;
    }
  } catch (_error) {
    // fallback below
  }
  const fallback = document.createElement('textarea');
  fallback.value = joinUrl;
  fallback.setAttribute('readonly', 'true');
  fallback.style.position = 'fixed';
  fallback.style.left = '-9999px';
  document.body.appendChild(fallback);
  fallback.select();
  document.execCommand('copy');
  fallback.remove();
  showError('Join link copied.');
}

function goToScreen(screen) {
  if (screen === 'schedule-meeting' && APP.preferences.enableScheduleMeeting === false) {
    showError('Schedule Team Meeting is disabled by admin.');
    return;
  }
  if (screen === 'load-session' && APP.preferences.enableLoadSession === false) {
    showError('Load Saved Session is disabled by admin.');
    return;
  }
  if (screen === 'activity-queue' && APP.preferences.enableActivityQueue === false) {
    showError('Activity Queue is disabled by admin.');
    return;
  }
  if (screen === 'schedule-meeting' || screen === 'load-session') {
    APP.sessionManager.plans = loadSessionPlans();
  }
  const roomScreens = new Set(['lobby', 'activity-queue']);
  if (!roomScreens.has(screen)) {
    stopRoomSync();
    APP.showHostSettings = false;
    resetWordChainFocusState();
  }
  APP.showShortcutHelp = false;
  APP.screen = screen;
  
  if (screen === 'create-room') {
    createRoomAndNavigate();
  } else {
    render();
  }
}

async function startRoomRealtime() {
  roomRealtimeEnabled = false;
  if (!APP.roomCode) return false;

  const sharedKey = `room:${APP.roomCode}`;

  const socket = await getSocketClient();
  if (socket && socket.connected) {
    socketRoomKey = sharedKey;
    const authToken = getRoomAccessTokenForKey(sharedKey, APP.roomAccessToken || '');
    socket.emit('room:subscribe', authToken ? { key: sharedKey, authToken } : { key: sharedKey });
    roomRealtimeEnabled = true;
    return true;
  }

  const client = await getSupabaseClient();
  if (!client) return false;

  if (roomChannel) {
    await client.removeChannel(roomChannel);
    roomChannel = null;
  }

  roomChannel = client
    .channel(`room-sync-${APP.roomCode}`)
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'shared_state',
        filter: `key=eq.${sharedKey}`
      },
      payload => {
        const value = payload.new?.value || payload.old?.value;
        const room = normalizeRoom(safeParseJson(value));
        if (room) {
          APP.room = room;
          void syncVoiceFeatureState();
          render();
        }
      }
    )
    .subscribe(status => {
      roomRealtimeEnabled = status === 'SUBSCRIBED';
    });

  return true;
}

async function stopRoomRealtime() {
  await leaveVoiceSession();
  const socket = socketClient;
  if (socket && socket.connected && socketRoomKey) {
    socket.emit('room:unsubscribe', { key: socketRoomKey });
    socketRoomKey = null;
  }

  const client = await getSupabaseClient();
  if (client && roomChannel) {
    await client.removeChannel(roomChannel);
    roomChannel = null;
  }
  roomRealtimeEnabled = false;
}

function stopRoomSync() {
  if (syncInterval) {
    clearInterval(syncInterval);
    syncInterval = null;
  }
  stopRoomRealtime();
}

async function restoreActiveSession() {
  const snapshot = loadActiveSessionSnapshot();
  if (!snapshot || !APP.player?.id || !APP.player?.name) return false;
  if (snapshot.playerId !== APP.player.id || snapshot.playerName !== APP.player.name) {
    clearActiveSessionSnapshot();
    return false;
  }

  const accessToken = snapshot.accessToken || getStoredRoomAccessToken(snapshot.roomCode);
  const room = await RoomManager.loadRoom(snapshot.roomCode, accessToken);
  if (!room) {
    clearActiveSessionSnapshot();
    return false;
  }

  const participantMatch = Array.isArray(room.participants)
    && room.participants.some(player => player?.id === APP.player.id || player?.name === APP.player.name);
  const hostMatch = room.host === APP.player.name;
  if (!participantMatch && !hostMatch) {
    clearActiveSessionSnapshot();
    return false;
  }

  APP.room = room;
  APP.roomCode = snapshot.roomCode;
  APP.roomAccessToken = isRoomPrivateSession(room) ? accessToken : '';
  APP.screen = 'lobby';
  persistActiveSessionSnapshot();
  startRoomSync();
  return true;
}

async function createRoomAndNavigate() {
  render();
  
  const { room, accessToken } = await RoomManager.createRoom(APP.player.id, APP.player.name, APP.player.avatar);
  APP.room = room;
  APP.roomCode = room.code;
  APP.roomAccessToken = accessToken;
  APP.screen = 'lobby';

  startRoomSync();

}

async function createRoomFromSessionPlan(planId) {

  APP.room = room;
  APP.roomCode = room.code;
  APP.roomAccessToken = created.accessToken;
  APP.screen = 'lobby';
  persistActiveSessionSnapshot();
  startRoomSync();
  render();
}

async function saveSessionPlan() {
  const title = normalizeTopic(document.getElementById('meetingTitle')?.value || '');
  const date = String(document.getElementById('meetingDate')?.value || '').trim().slice(0, 32);
  const time = String(document.getElementById('meetingTime')?.value || '').trim().slice(0, 32);
  const zoomLink = normalizeSlidesStudioUrl(document.getElementById('zoomLink')?.value || '');
  const details = String(document.getElementById('meetingDetails')?.value || '').replace(/\r/g, '').trim().slice(0, 2000);
  const activityQueue = Array.from(
    document.querySelectorAll('.activity-queue-checkbox:checked')
  ).map(cb => cb.value).filter(activityId => ALL_ACTIVITY_IDS.includes(activityId));
  if (!title) {
    showError('Please add a session title.');
    return;
  }
  const nowIso = new Date().toISOString();
  const editingId = String(APP.sessionManager.editingPlanId || '').trim();
  const existing = editingId ? getSessionPlanById(editingId) : null;
  const plan = normalizeSessionPlan({
    id: existing?.id || '',
    title,
    date,
    time,
    zoomLink,
    details,
    activityQueue,
    createdAt: existing?.createdAt || nowIso,
    updatedAt: nowIso
  });
  const plans = loadSessionPlans().filter(item => item.id !== plan.id);
  plans.unshift(plan);
  persistSessionPlans(plans);
  APP.sessionManager.editingPlanId = plan.id;
  showError(existing ? 'Session plan updated.' : 'Session plan saved.');
  render();
}

function deleteSessionPlan(planId) {
  const id = String(planId || '').trim();
  if (!id) return;
  const plan = getSessionPlanById(id);
  if (!plan) return;
  const confirmed = window.confirm(`Delete "${plan.title}"?`);
  if (!confirmed) return;
  const plans = loadSessionPlans().filter(item => item.id !== id);
  persistSessionPlans(plans);
  if (APP.sessionManager.editingPlanId === id) APP.sessionManager.editingPlanId = '';
  showError('Session plan deleted.');
  render();
}

async function shareSessionPlan(planId) {
  const plan = getSessionPlanById(planId);
  if (!plan) return;
  const shareUrl = buildSessionPlanShareUrl(plan);
  if (!shareUrl) {
    showError('Unable to build session share link.');
    return;
  }
  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(shareUrl);
      showError('Session plan link copied.');
      return;
    }
  } catch (_error) {
    // fallback below
  }
  const fallback = document.createElement('textarea');
  fallback.value = shareUrl;
  fallback.setAttribute('readonly', 'true');
  fallback.style.position = 'fixed';
  fallback.style.left = '-9999px';
  document.body.appendChild(fallback);
  fallback.select();
  document.execCommand('copy');
  fallback.remove();
  showError('Session plan link copied.');
}

async function leaveSession() {
  if (!APP.roomCode || !APP.player?.name) {
    APP.room = null;
    APP.roomCode = null;
    APP.roomAccessToken = null;
    clearActiveSessionSnapshot();
    APP.showHostSettings = false;
    APP.screen = 'dashboard';
    stopRoomSync();
    resetWordChainFocusState();
    render();
    return;
  }

  const confirmed = window.confirm('Leave this session?');
  if (!confirmed) return;

  const room = await RoomManager.loadRoom(APP.roomCode);
  if (room) {
    room.participants = (room.participants || []).filter(p => p.id !== APP.player.id && p.name !== APP.player.name);
    if (room.participants.length > 0) {
      if (room.host === APP.player.name) {
        room.host = room.participants[0].name;
      }
      room.participants = normalizeRoomParticipants(room.participants.map(p => ({
        ...p,
        isHost: p.name === room.host
      })), room.host);
    } else {
      room.host = null;
      room.currentActivity = null;
      room.activityState = {};
    }
    await RoomManager.updateRoom(APP.roomCode, room);
  }

  stopRoomSync();
  ticTacToeFinalizePending = false;
  APP.room = null;
  APP.roomCode = null;
  APP.roomAccessToken = null;
  clearActiveSessionSnapshot();
  APP.showHostSettings = false;
  APP.screen = 'dashboard';
  resetWordChainFocusState();
  render();
}

function startRoomSync() {
  if (syncInterval) clearInterval(syncInterval);
  startRoomRealtime();
  syncInterval = setInterval(async () => {
    if (!APP.roomCode) return;
    if (!roomRealtimeEnabled) {
      const room = await RoomManager.loadRoom(APP.roomCode, APP.roomAccessToken || '');
      if (room && room.lastUpdate !== APP.room?.lastUpdate) {
        APP.room = room;
        void maybeClaimSpinWheelWinnerXp();
        void syncVoiceFeatureState();
        render();
      }
    }
    
    // Update timer during active questions
    if (APP.room?.currentActivity === 'lightning-trivia' && !APP.room?.activityState?.revealed) {
      const state = APP.room.activityState || {};
      const hostSettings = getRoomHostSettings(APP.room);
      const answersCount = Object.keys(state.answers || {}).length;
      const participantCount = APP.room.participants?.length || 0;
      const allAnswered = participantCount > 0 && answersCount >= participantCount;
      const startTime = state.startTime || Date.now();
      const timedOut = Date.now() - startTime >= 20000;
      const isHost = APP.room.host === APP.player?.name;

      if (hostSettings.autoRevealLightning && isHost && !lightningAutoRevealPending && (allAnswered || timedOut)) {
        lightningAutoRevealPending = true;
        try {
          await revealAnswer();
        } finally {
          lightningAutoRevealPending = false;
        }
      }
      render();
    }

    if (APP.room?.currentActivity === 'tic-tac-toe-blitz') {
      const state = APP.room.activityState || {};
      const isHost = APP.room.host === APP.player?.name;
      const timedOut = !state.roundClosed && Date.now() >= (Number(state.roundEndsAt) || 0);
      if (timedOut && isHost && !ticTacToeFinalizePending) {
        ticTacToeFinalizePending = true;
        try {
          await closeTicTacToeRound();
        } finally {
          ticTacToeFinalizePending = false;
        }
      }
      render();
    }
  }, ROOM_SYNC_MS);
}

function normalizePresentationUrl(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  try {
    const withProtocol = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
    const parsed = new URL(withProtocol);
    if (!['http:', 'https:'].includes(parsed.protocol)) return '';
    return parsed.toString();
  } catch (_error) {
    return '';
  }
}

function getPresentationEmbedUrl(url) {
  const normalizedUrl = normalizePresentationUrl(url);
  if (!normalizedUrl) return '';
  try {
    const parsed = new URL(normalizedUrl);
    const host = parsed.hostname.toLowerCase();
    const pathname = parsed.pathname || '';

    if (host.includes('docs.google.com') && pathname.includes('/presentation/')) {
      if (pathname.includes('/embed')) return parsed.toString();
      if (pathname.includes('/pub')) {
        parsed.pathname = pathname.replace('/pub', '/embed');
        return parsed.toString();
      }
      if (pathname.includes('/edit')) {
        parsed.pathname = pathname.replace('/edit', '/embed');
        parsed.search = '';
        return parsed.toString();
      }
      if (!pathname.endsWith('/embed')) {
        parsed.pathname = `${pathname.replace(/\/$/, '')}/embed`;
        parsed.search = '';
        return parsed.toString();
      }
    }

    if (/\.pptx?$/i.test(pathname)) {
      return `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(parsed.toString())}`;
    }

    if (host.includes('office.com') || host.includes('officeapps.live.com')) {
      return parsed.toString();
    }

    return parsed.toString();
  } catch (_error) {
    return '';
  }
}

function normalizeSharedPresentation(value) {
  const url = normalizePresentationUrl(value);
  if (!url) return null;
  return {
    url,
    embedUrl: getPresentationEmbedUrl(url)
  };
}

function normalizeSpotifyPlaylist(value) {
  const raw = String(value || '').trim();
  if (!raw) return null;

  let playlistId = '';
  if (/^spotify:playlist:/i.test(raw)) {
    const segments = raw.split(':');
    playlistId = String(segments[2] || '').trim();
  } else {
    try {
      const withProtocol = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
      const parsed = new URL(withProtocol);
      if (!['http:', 'https:'].includes(parsed.protocol)) return null;
      const host = parsed.hostname.toLowerCase();
      if (host !== 'open.spotify.com' && host !== 'play.spotify.com' && host !== 'www.open.spotify.com') return null;
      const parts = parsed.pathname.split('/').filter(Boolean);
      if (parts[0] === 'playlist') {
        playlistId = String(parts[1] || '').trim();
      } else if (parts[0] === 'embed' && parts[1] === 'playlist') {
        playlistId = String(parts[2] || '').trim();
      }
    } catch (_error) {
      return null;
    }
  }

  if (!/^[A-Za-z0-9]{10,64}$/.test(playlistId)) return null;
  return {
    playlistId,
    url: `https://open.spotify.com/playlist/${playlistId}`,
    embedUrl: `https://open.spotify.com/embed/playlist/${playlistId}?utm_source=generator`
  };
}

  room.activityQueue = Array.isArray(room.activityQueue) ? room.activityQueue : [];
  if (index >= room.activityQueue.length) return;
  room.activityQueue.splice(index, 1);
  room.queueIndex = Math.max(0, Math.min(room.queueIndex || 0, room.activityQueue.length));

    if (apiKeyInput) {
      HOST_LOCAL_CONFIG.aiApiKey = apiKeyInput;
      localStorage.setItem('ai-question-api-key', apiKeyInput);
      saveHostLocalConfig(HOST_LOCAL_CONFIG);
    }

    const completed = [];
    for (const activityId of selectedIds) {
      APP.admin.generationStatus = `Generating ${AI_GENERATION_TARGET_LABELS[activityId] || activityId}...`;
      render();
      const prompt = buildAIPromptForActivity(activityId, topic, difficulty, count);
      if (!prompt) throw new Error(`Unsupported activity selected: ${activityId}`);
      const items = await requestAIGeneratedArray(prompt, apiKey);
      const validated = validateGeneratedContentForActivity(activityId, items);
      if ((activityId === 'spin-wheel' && validated.length < 2) || (!validated.length && activityId !== 'spin-wheel')) {
        throw new Error(`AI returned invalid content for ${AI_GENERATION_TARGET_LABELS[activityId] || activityId}.`);
      }
      upsertAdminGeneratedCollection(activityId, validated);
      completed.push(`${AI_GENERATION_TARGET_LABELS[activityId] || activityId} (${validated.length})`);
    }

    await persistAdminCollectionsOnly();
    APP.admin.generationStatus = `Generated content for ${completed.join(', ')}.`;
    APP.aiStatus = null;
    render();
  } catch (e) {
    APP.admin.generationStatus = `Generation failed: ${e.message}`;
    render();
  } finally {
    APP.admin.generatingContent = false;
    render();
  }
}

  const platform = String(navigator.platform || '');
  const userAgent = String(navigator.userAgent || '');
  return /Mac|iPhone|iPad|iPod/i.test(platform) || /Mac OS|iPhone|iPad|iPod/i.test(userAgent);

function handleEscapeNavigation() {
  if (APP.showSpotifyPlaylistModal) {
    dockSpotifyPlaylistModal();
    return true;
  }
  if (APP.showShortcutHelp) {
    toggleShortcutHelp(false);
    return true;
  }
  if (APP.showHostSettings) {
    closeHostSettings();
    return true;
  }
  if (APP.editingProfile) {
    cancelEditProfile();
    return true;
  }
  if (APP.screen === 'about' || APP.screen === 'join-room' || APP.screen === 'feedback' || APP.screen === 'admin' || APP.screen === 'schedule-meeting' || APP.screen === 'load-session') {
    goToScreen('dashboard');
    return true;
  }
  if (APP.screen === 'activity-queue' && APP.roomCode) {
    goToScreen('lobby');
    return true;
  }
  return false;
}

async function handleGlobalKeyboardShortcuts(event) {
  const activeElement = document.activeElement;
  const isEditing = isEditableTarget(activeElement);

  if (event.key === 'Escape') {
    if (handleEscapeNavigation()) {
      event.preventDefault();
    }
    return;
  }

  if (!event.altKey && !event.ctrlKey && !event.metaKey && event.key === '?' && !isEditing) {
    event.preventDefault();
    toggleShortcutHelp();
    return;
  }

  if (isEditing || event.ctrlKey || event.metaKey || !event.altKey) return;

  const code = String(event.code || '');
  if (code === 'KeyH' && APP.player) {
    event.preventDefault();
    goToScreen('dashboard');
    return;
  }
  if (code === 'KeyN' && APP.player) {
    event.preventDefault();
    goToScreen('create-room');
    return;
  }
  if (code === 'KeyJ' && APP.player) {
    event.preventDefault();
    goToScreen('join-room');
    return;
  }
  if (code === 'KeyF' && APP.player && APP.preferences.enableFeedbackHub !== false) {
    event.preventDefault();
    await openFeedbackHub();
    return;
  }
  if (code === 'KeyA' && APP.player) {
    event.preventDefault();
    openAdminConsole();
    return;
  }
  if (code === 'KeyL' && APP.player && APP.roomCode) {
    event.preventDefault();
    goToScreen('lobby');
    return;
  }
  if (code === 'KeyQ' && APP.player && APP.roomCode && APP.room?.host === APP.player?.name && APP.preferences.enableActivityQueue !== false) {
    event.preventDefault();
    goToScreen('activity-queue');
    return;
  }
  if (code === 'KeyS' && APP.room?.host === APP.player?.name) {
    event.preventDefault();
    openHostSettings();
    return;
  }
  if (code === 'KeyP' && APP.roomCode) {
    event.preventDefault();
    togglePresentation();
  }
}

function switchHostSettingsTab(tabId) {
  if (!APP.showHostSettings) return;
  const allowedTabs = new Set(['game']);
  if (APP.preferences.enableAIGenerator !== false) {
    allowedTabs.add('ai');
  }
  const nextTab = allowedTabs.has(tabId) ? tabId : 'game';
  APP.hostSettingsTab = nextTab;

  const tabButtons = document.querySelectorAll('.host-tab-btn');
  const tabPanels = document.querySelectorAll('.host-tab-panel');
  if (!tabButtons.length || !tabPanels.length) {
    render();
    return;
  }

  tabButtons.forEach(button => {
    const isActive = button.dataset.tab === nextTab;
    button.classList.toggle('active', isActive);
    button.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });

  tabPanels.forEach(panel => {
    panel.hidden = panel.getAttribute('data-tab-panel') !== nextTab;
  });
}

async function saveHostSettings() {
  if (!APP.room || APP.room.host !== APP.player?.name || APP.hostSettingsSaving) return;
  const saveButton = document.querySelector('[data-action="save-host-settings"]');

  const pendingRoomSettings = {
    privateSession: Boolean(document.getElementById('hsPrivateSession')?.checked),
    spinWheelAllowPlayerPicks: Boolean(document.getElementById('hsSpinWheelAllowPlayerPicks')?.checked),
    emojiCharadesAllowCloseAnswers: Boolean(document.getElementById('hsEmojiCharadesAllowCloseAnswers')?.checked),
    voice: normalizeVoiceHostSettings({
      enabled: Boolean(document.getElementById('hsVoiceEnabled')?.checked),
      participantMicPolicy: document.getElementById('hsVoiceMicPolicy')?.value || 'approved',
      hideBlockedMicControls: Boolean(document.getElementById('hsVoiceHideBlockedControls')?.checked)
    }),
    enableAIGenerator: APP.preferences.enableAIGenerator !== false
      && Boolean(document.getElementById('hsEnableAIGenerator')?.checked)
  };

  HOST_LOCAL_CONFIG = {
    ...HOST_LOCAL_CONFIG,
    aiEndpoint: (document.getElementById('hsAiEndpoint')?.value || '').trim() || getDefaultHostLocalConfig().aiEndpoint,
    aiModel: (document.getElementById('hsAiModel')?.value || '').trim() || getDefaultHostLocalConfig().aiModel,
    aiDefaultActivity: AI_GENERATION_TARGET_LABELS[document.getElementById('hsAiDefaultActivity')?.value || '']
      ? String(document.getElementById('hsAiDefaultActivity')?.value || '')
      : getDefaultHostLocalConfig().aiDefaultActivity,
    aiDefaultDifficulty: String(document.getElementById('hsAiDefaultDifficulty')?.value || 'mixed'),
    aiDefaultCount: Math.max(3, Math.min(20, Number.parseInt(document.getElementById('hsAiDefaultCount')?.value || '8', 10) || 8)),
    aiApiKey: (document.getElementById('hsAiApiKey')?.value || '').trim()
  };
  localStorage.setItem('ai-question-api-key', HOST_LOCAL_CONFIG.aiApiKey || '');
  saveHostLocalConfig(HOST_LOCAL_CONFIG);
  APP.hostSettingsSaving = true;
  setAsyncButtonState(saveButton, true, 'Save Host Settings', 'Saving...');

  try {
    const room = await RoomManager.loadRoom(APP.roomCode);
    if (!room) {
      APP.hostSettingsSaving = false;
      setAsyncButtonState(saveButton, false, 'Save Host Settings', 'Saving...');
      showError('Room no longer available.');
      return;
    }
    const existingHostSettings = room.hostSettings && typeof room.hostSettings === 'object'
      ? room.hostSettings
      : {};
    const roomSettings = {
      ...existingHostSettings,
      ...pendingRoomSettings,
      spinWheelFunMode: existingHostSettings.spinWheelFunMode === true
    };
    room.hostSettings = roomSettings;
    room.access = {
      ...(room.access && typeof room.access === 'object' ? room.access : {}),
      privateSession: roomSettings.privateSession === true
    };
    await RoomManager.updateRoom(APP.roomCode, room);
    APP.hostSettingsSaving = false;
    APP.room = normalizeRoom(room);
    APP.showHostSettings = false;
    void syncVoiceFeatureState();
    render();
  } catch (e) {
    APP.hostSettingsSaving = false;
    setAsyncButtonState(saveButton, false, 'Save Host Settings', 'Saving...');
    showError(e.message);
  }
}

async function saveAIBankEditorCollection() {
  if (!APP.room || APP.room.host !== APP.player?.name) return;
  const targetInput = String(document.getElementById('hsAiBankTarget')?.value || APP.aiBankEditorTarget || '');
  const targetId = getAIBankEditorTargetOrDefault(targetInput);
  const editorValue = String(document.getElementById('hsAiBankEditorText')?.value || '').trim();
  if (!editorValue) {
    APP.aiBankEditorStatus = 'Collection update failed: editor is empty.';
    render();
    return;
  }

  const parsed = safeParseJson(editorValue);
  if (!Array.isArray(parsed)) {
    APP.aiBankEditorStatus = 'Collection update failed: provide a valid JSON array.';
    render();
    return;
  }

  const validated = validateAIBankEditorItems(targetId, parsed);
  if (!validated.length) {
    APP.aiBankEditorStatus = `Collection update failed: no valid entries for ${AI_BANK_EDITOR_TARGET_LABELS[targetId]}.`;
    render();
    return;
  }

  applyAIBankEditorItems(targetId, validated);
  APP.aiBankEditorTarget = targetId;
  APP.aiBankEditorStatus = `Saved ${validated.length} item${validated.length === 1 ? '' : 's'} to ${AI_BANK_EDITOR_TARGET_LABELS[targetId]}.`;
  APP.aiStatus = null;
  render();
}

function buildAIPromptForActivity(activityId, topic, difficulty, count) {
  const targetTopic = topic || 'team collaboration';
  switch (activityId) {
    case 'lightning-trivia':
    case 'regular-trivia':
      return `Generate ${count} multiple-choice trivia questions about "${targetTopic}" at ${difficulty} difficulty.
Return only valid JSON as an array. Each item must be:
{"q":"question text","opts":["A","B","C","D"],"ans":0}
where ans is the zero-based index of the correct option.`;
    case 'icebreaker':
      return `Generate ${count} icebreaker prompts about "${targetTopic}" at ${difficulty} difficulty.
Return only valid JSON as an array of strings.`;
    case 'emoji-charades':
      return `Generate ${count} emoji charades prompts about "${targetTopic}" at ${difficulty} difficulty.
Return only valid JSON as an array. Each item must be:
{"emojis":"emoji sequence","answer":"short phrase answer"}`;
    case 'pulse-check':
      return `Generate ${count} pulse-check polls about "${targetTopic}" for a team session.
Return only valid JSON as an array. Each item must be:
{"q":"question text","opts":["Option 1","Option 2","Option 3","Option 4"]}`;
    case 'values-vote':
      return `Generate ${count} team values themed around "${targetTopic}".
Return only valid JSON as an array. Each item must be:
{"name":"short value name","icon":"emoji"}`;
    case 'wordle':
      return `Generate ${count} distinct single English words related to "${targetTopic}".
Rules: exactly 5 letters, uppercase alphabetic only, no spaces, no punctuation.
Return only valid JSON as an array of strings.`;
    case 'word-chain':
      return `Generate ${Math.max(1, Math.min(5, count))} word-chain puzzles themed around "${targetTopic}".
Rules:
- Each puzzle contains exactly 8 singular words.
- Words use only letters A-Z and each word is 1 to 9 letters.
- Adjacent words should form a common two-word phrase or compound expression.
Return only valid JSON as an array. Each item must be:
{"title":"Chain name","words":["WORD1","WORD2","WORD3","WORD4","WORD5","WORD6","WORD7","WORD8"]}`;
    case 'team-jeopardy':
      return `Generate a Team Jeopardy board about "${targetTopic}" at ${difficulty} difficulty.
Rules:
- Return ${Math.max(3, Math.min(6, count))} categories.
- Each category must include exactly 5 clues with values 100, 200, 300, 400, and 500.
- Each clue must be multiple choice with exactly 4 options.
- ans must be the zero-based index of the correct option.
Return only valid JSON as an array. Each item must be:
{"category":"Category name","clues":[{"value":100,"q":"question text","opts":["A","B","C","D"],"ans":0},{"value":200,"q":"question text","opts":["A","B","C","D"],"ans":1},{"value":300,"q":"question text","opts":["A","B","C","D"],"ans":2},{"value":400,"q":"question text","opts":["A","B","C","D"],"ans":3},{"value":500,"q":"question text","opts":["A","B","C","D"],"ans":0}]}`;
    case 'spin-wheel':
      return `Generate ${Math.max(4, Math.min(12, count))} short spin wheel options themed around "${targetTopic}".
Rules:
- Each option should be 1 to 4 words.
- Keep options distinct, upbeat, and suitable for a team session.
- Do not number the options.
Return only valid JSON as an array of strings.`;
    case 'brainstorm-canvas':
      return `Generate ${count} brainstorming sticky notes for a Start/Stop/Improve/Create retrospective about "${targetTopic}".
Return only valid JSON as an array. Each item must be:
{"text":"short sticky note","lane":"start|stop|improve|create"}`;
    default:
      return '';
  }
}

async function requestAIGeneratedArray(prompt, apiKey = '') {
  let textContent = '';
  let serverError = '';
  try {
    const serverData = await apiRequest('/api/ai/generate', {
      method: 'POST',
      roomToken: APP.roomAccessToken || '',
      body: {
        prompt,
        model: HOST_LOCAL_CONFIG.aiModel,
        temperature: 0.7,
        roomCode: APP.roomCode || ''
      }
    });
    textContent = String(serverData?.content || '');
  } catch (serverErr) {
    serverError = serverErr?.message || 'Server AI generation failed.';
  }

  if (!textContent) {
    if (!apiKey) {
      throw new Error(`${serverError || 'Server AI generation failed.'} Add CHAT_GPT_MINI_KEY on the server or provide an API key.`);
    }

    const response = await fetch(HOST_LOCAL_CONFIG.aiEndpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: HOST_LOCAL_CONFIG.aiModel,
        messages: [
          { role: 'system', content: 'You create accurate facilitator game content. Output strict JSON only.' },
          { role: 'user', content: prompt }
        ],
        temperature: 0.7
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`AI request failed (${response.status}): ${errText.slice(0, 180)}`);
    }
    const data = await response.json();
    textContent = String(data?.choices?.[0]?.message?.content || '');
  }

  const jsonText = extractFirstJson(textContent);
  const parsed = safeParseJson(jsonText);
  return coerceAIArrayPayload(parsed);
}

function validateGeneratedContentForActivity(activityId, parsed) {
  if (activityId === 'lightning-trivia' || activityId === 'regular-trivia') return validateAIQuestions(parsed);
  if (activityId === 'icebreaker') return validateAIIcebreakerQuestions(parsed);
  if (activityId === 'emoji-charades') return validateAIEmojiCharades(parsed);
  if (activityId === 'pulse-check') return validateAIPulseQuestions(parsed);
  if (activityId === 'values-vote') return validateAIValues(parsed);
  if (activityId === 'wordle') return validateAIWordleWords(parsed);
  if (activityId === 'word-chain') return validateAIWordChainPuzzles(parsed);
  if (activityId === 'team-jeopardy') return validateAITeamJeopardyBoard(parsed);
  if (activityId === 'spin-wheel') return validateAISpinWheelOptions(parsed);
  if (activityId === 'brainstorm-canvas') return validateAIBrainstormNotes(parsed);
  return [];
}

async function applyAIGeneratedContent(activityId, parsed, topic) {
  if (activityId === 'lightning-trivia' || activityId === 'regular-trivia') {
    const validated = validateAIQuestions(parsed);
    if (!validated.length) throw new Error('AI returned invalid trivia format.');
    TRIVIA_BANK.push(...validated);
    APP.aiStatus = `Added ${validated.length} trivia question${validated.length === 1 ? '' : 's'} for ${AI_GENERATION_TARGET_LABELS[activityId]}. Total trivia questions: ${TRIVIA_BANK.length}.`;
    return;
  }

  if (activityId === 'icebreaker') {
    const validated = validateAIIcebreakerQuestions(parsed);
    if (!validated.length) throw new Error('AI returned invalid icebreaker format.');
    ICEBREAKER_QUESTIONS.push(...validated);
    APP.aiStatus = `Added ${validated.length} icebreaker prompt${validated.length === 1 ? '' : 's'} on "${topic || 'general'}".`;
    return;
  }

  if (activityId === 'emoji-charades') {
    const validated = validateAIEmojiCharades(parsed);
    if (!validated.length) throw new Error('AI returned invalid Emoji Charades format.');
    EMOJI_CHARADES_BANK.push(...validated);
    APP.aiStatus = `Added ${validated.length} Emoji Charades prompt${validated.length === 1 ? '' : 's'}.`;
    return;
  }

  if (activityId === 'pulse-check') {
    const validated = validateAIPulseQuestions(parsed);
    if (!validated.length) throw new Error('AI returned invalid pulse poll format.');
    PULSE_QUESTIONS.push(...validated);
    APP.aiStatus = `Added ${validated.length} pulse poll${validated.length === 1 ? '' : 's'}.`;
    return;
  }

  if (activityId === 'values-vote') {
    const validated = validateAIValues(parsed);
    if (!validated.length) throw new Error('AI returned invalid values format.');
    TEAM_VALUES.push(...validated);
    APP.aiStatus = `Added ${validated.length} value option${validated.length === 1 ? '' : 's'}.`;
    return;
  }

  if (activityId === 'wordle') {
    const validated = validateAIWordleWords(parsed);
    if (!validated.length) throw new Error('AI returned invalid Team Wordle format.');
    WORDLE_WORDS.push(...validated);
    APP.aiStatus = `Added ${validated.length} Team Wordle word${validated.length === 1 ? '' : 's'}.`;
    return;
  }

  if (activityId === 'word-chain') {
    const validated = validateAIWordChainPuzzles(parsed);
    if (!validated.length) throw new Error('AI returned invalid Word Chain puzzle format.');
    WORD_CHAIN_PUZZLES.push(...validated);
    APP.aiStatus = `Added ${validated.length} Word Chain puzzle${validated.length === 1 ? '' : 's'}.`;
    return;
  }

  if (activityId === 'team-jeopardy') {
    const validated = validateAITeamJeopardyBoard(parsed);
    if (!validated.length) throw new Error('AI returned invalid Team Jeopardy board format.');
    replaceArrayContents(TEAM_JEOPARDY_BOARD, validated);
    const clueCount = validated.reduce((sum, category) => sum + (Array.isArray(category?.clues) ? category.clues.length : 0), 0);
    APP.aiStatus = `Updated Team Jeopardy with ${validated.length} categor${validated.length === 1 ? 'y' : 'ies'} and ${clueCount} clue${clueCount === 1 ? '' : 's'}.`;
    return;
  }

  if (activityId === 'spin-wheel') {
    const validated = validateAISpinWheelOptions(parsed);
    if (validated.length < 2) throw new Error('AI returned invalid Spin Wheel options.');
    replaceArrayContents(SPIN_WHEEL_DEFAULT_OPTIONS, validated);
    APP.aiStatus = `Updated Spin Wheel with ${validated.length} option${validated.length === 1 ? '' : 's'}.`;
    return;
  }

  if (activityId === 'brainstorm-canvas') {
    const validated = validateAIBrainstormNotes(parsed);
    if (!validated.length) throw new Error('AI returned invalid Brainstorm note format.');
    if (!APP.roomCode) throw new Error('Join a room to add brainstorm notes.');
    const room = await RoomManager.loadRoom(APP.roomCode);
    if (!room) throw new Error('Room no longer available.');

    const baseState = (room.currentActivity === 'brainstorm-canvas' && room.activityState && typeof room.activityState === 'object')
      ? room.activityState
      : (room.brainstormData && typeof room.brainstormData === 'object'
        ? room.brainstormData
        : { boardType: 'start-stop-improve-create', notes: [], sessionStatus: 'open', createdAt: Date.now() });
    const notes = Array.isArray(baseState.notes) ? [...baseState.notes] : [];
    const ts = Date.now();
    validated.forEach((item, idx) => {
      notes.unshift({
        id: generateBrainstormNoteId(),
        text: item.text,
        author: 'AI Facilitator',
        lane: item.lane,
        votes: 0,
        voters: [],
        color: BRAINSTORM_NOTE_COLORS[idx % BRAINSTORM_NOTE_COLORS.length],
        createdAt: ts + idx,
        updatedAt: ts + idx
      });
    });

    const nextState = { ...baseState, notes };
    room.brainstormData = safeParseJson(JSON.stringify(nextState)) || nextState;
    room.brainstormLastUpdatedAt = Date.now();
    if (room.currentActivity === 'brainstorm-canvas') {
      room.activityState = nextState;
    }
    await RoomManager.updateRoom(APP.roomCode, room);
    APP.room = room;
    APP.aiStatus = `Added ${validated.length} brainstorm note${validated.length === 1 ? '' : 's'} to the canvas session data.`;
    return;
  }

  throw new Error('Unsupported AI generation target.');
}

async function generateAIQuestions() {
  if (APP.preferences.enableAIGenerator === false) {
    showError('AI generator is disabled by admin.');
    return;
  }
  const activityIdRaw = String(document.getElementById('aiActivity')?.value || HOST_LOCAL_CONFIG.aiDefaultActivity || 'lightning-trivia');
  const activityId = AI_GENERATION_TARGET_LABELS[activityIdRaw] ? activityIdRaw : 'lightning-trivia';
  const topic = normalizeTopic(document.getElementById('aiTopic')?.value || '');
  const difficulty = String(document.getElementById('aiDifficulty')?.value || HOST_LOCAL_CONFIG.aiDefaultDifficulty || 'mixed');
  const count = Math.max(3, Math.min(20, Number.parseInt(document.getElementById('aiCount')?.value || String(HOST_LOCAL_CONFIG.aiDefaultCount || 8), 10) || 8));
  const apiKeyInput = document.getElementById('aiApiKey')?.value?.trim() || '';
  const apiKey = apiKeyInput || HOST_LOCAL_CONFIG.aiApiKey || localStorage.getItem('ai-question-api-key') || '';

  const prompt = buildAIPromptForActivity(activityId, topic, difficulty, count);
  if (!prompt) {
    showError('Unsupported activity selected for AI generation.');
    return;
  }

  APP.aiGenerating = true;
  APP.aiStatus = `Generating ${AI_GENERATION_TARGET_LABELS[activityId] || 'content'}...`;
  render();

  try {
    HOST_LOCAL_CONFIG.aiDefaultActivity = activityId;
    if (apiKey) {
      HOST_LOCAL_CONFIG.aiApiKey = apiKey;
      localStorage.setItem('ai-question-api-key', apiKey);
    }
    saveHostLocalConfig(HOST_LOCAL_CONFIG);
    const items = await requestAIGeneratedArray(prompt, apiKey);
    await applyAIGeneratedContent(activityId, items, topic);
  } catch (e) {
    APP.aiStatus = `AI generation failed: ${e.message}`;
  } finally {
    APP.aiGenerating = false;
    render();
  }
}

async function generateQueueActivityContent() {
  if (!APP.room || APP.room.host !== APP.player?.name) return;
  if (APP.preferences.enableAIGenerator === false) {
    showError('AI generator is disabled by admin.');
    return;
  }
  const activityQueue = Array.isArray(APP.room.activityQueue) ? APP.room.activityQueue : [];
  const selectedIds = getQueueGenerationSelectedActivityIds(activityQueue);
  if (!selectedIds.length) {
    showError('Select at least one queued activity to generate.');
    return;
  }

  const topic = getQueueThemeTopic();
  const difficulty = String(document.getElementById('queueDifficulty')?.value || HOST_LOCAL_CONFIG.aiDefaultDifficulty || 'mixed');
  const count = Math.max(3, Math.min(20, Number.parseInt(document.getElementById('queueCount')?.value || String(HOST_LOCAL_CONFIG.aiDefaultCount || 8), 10) || 8));
  const apiKey = HOST_LOCAL_CONFIG.aiApiKey || localStorage.getItem('ai-question-api-key') || '';

  APP.aiGenerating = true;
  APP.aiStatus = `Generating ${selectedIds.length} activit${selectedIds.length === 1 ? 'y' : 'ies'} for ${topic}...`;
  render();

  try {
    const completed = [];
    for (const activityId of selectedIds) {
      APP.aiStatus = `Generating ${AI_GENERATION_TARGET_LABELS[activityId] || activityId} for ${topic}...`;
      render();
      const prompt = buildAIPromptForActivity(activityId, topic, difficulty, count);
      if (!prompt) throw new Error(`Unsupported activity selected: ${activityId}`);
      const items = await requestAIGeneratedArray(prompt, apiKey);
      await applyAIGeneratedContent(activityId, items, topic);
      completed.push(AI_GENERATION_TARGET_LABELS[activityId] || activityId);
    }
    APP.aiStatus = `Generated queue content for ${completed.join(', ')} using ${topic}.`;
  } catch (e) {
    APP.aiStatus = `Queue generation failed: ${e.message}`;
  } finally {
    APP.aiGenerating = false;
    render();
  }
}

function remapActivityStateKey(state, field, oldName, newName) {
  const target = state?.[field];
  if (!target || typeof target !== 'object') return;
  if (!(oldName in target)) return;
  if (newName in target) return;
  target[newName] = target[oldName];
  delete target[oldName];
}

function applyProfileUpdateToRoom(room, oldName, newName, newAvatar) {
  if (!room) return room;

  room.participants = (room.participants || []).map(p => {
    if (p.name !== oldName) return p;
    return { ...p, name: newName, avatar: newAvatar };
  });

  if (room.host === oldName) {
    room.host = newName;
  }

  const state = room.activityState || {};
  remapActivityStateKey(state, 'answers', oldName, newName);
  remapActivityStateKey(state, 'guesses', oldName, newName);
  remapActivityStateKey(state, 'scores', oldName, newName);
  remapActivityStateKey(state, 'votes', oldName, newName);
  remapActivityStateKey(state, 'lastPoints', oldName, newName);
  remapActivityStateKey(state, 'answerTimes', oldName, newName);
  remapActivityStateKey(state, 'entries', oldName, newName);
  remapActivityStateKey(state, 'solved', oldName, newName);
  remapActivityStateKey(state, 'attempts', oldName, newName);
  remapActivityStateKey(state, 'completedAt', oldName, newName);
  remapActivityStateKey(state, 'feedback', oldName, newName);
  remapActivityStateKey(state, 'progressIndex', oldName, newName);
  remapActivityStateKey(state, 'revealedLetters', oldName, newName);
  remapActivityStateKey(state, 'lastLetterGraceUsed', oldName, newName);
  remapActivityStateKey(state, 'solvedWords', oldName, newName);
  remapActivityStateKey(state, 'wordScores', oldName, newName);
  remapActivityStateKey(state, 'wordAttempts', oldName, newName);
  remapActivityStateKey(state, 'totalAttempts', oldName, newName);
  remapActivityStateKey(state, 'chainSuggestions', oldName, newName);
  remapActivityStateKey(state, 'chainVotes', oldName, newName);
  remapActivityStateKey(state, 'wordleVotes', oldName, newName);
  remapActivityStateKey(state, 'standings', oldName, newName);
  remapActivityStateKey(state, 'matchByPlayer', oldName, newName);
  remapActivityStateKey(state, 'opponents', oldName, newName);
  remapActivityStateKey(state, 'playerSelections', oldName, newName);
  remapActivityStateKey(state, 'spinPoints', oldName, newName);
  remapActivityStateKey(state, 'winnerXpClaimed', oldName, newName);
  remapActivityStateKey(state, 'closeAccepted', oldName, newName);
  remapUnoPlayerReferences(state, oldName, newName);
  if (Array.isArray(state.byePlayers)) {
    state.byePlayers = state.byePlayers.map(name => (name === oldName ? newName : name));
  }
  if (Array.isArray(state.lastPairings)) {
    state.lastPairings = state.lastPairings.map(pair => (
      Array.isArray(pair) ? pair.map(name => (name === oldName ? newName : name)) : pair
    ));
  }
  if (Array.isArray(state.spinWinners)) {
    state.spinWinners = state.spinWinners.map(name => (name === oldName ? newName : name));
  }
  if (state.matches && typeof state.matches === 'object') {
    Object.values(state.matches).forEach(match => {
      if (!match || typeof match !== 'object') return;
      if (Array.isArray(match.players)) {
        match.players = match.players.map(name => (name === oldName ? newName : name));
      }
      if (match.winner === oldName) {
        match.winner = newName;
      }
      remapActivityStateKey(match, 'symbols', oldName, newName);
    });
  }
  if (Array.isArray(state.notes)) {
    state.notes = state.notes.map(note => {
      const voters = Array.isArray(note.voters)
        ? note.voters.map(voter => (voter === oldName ? newName : voter))
        : [];
      const author = note.author === oldName ? newName : note.author;
      return { ...note, voters, author };
    });
  }
  room.activityState = state;
  if (room.brainstormData && typeof room.brainstormData === 'object' && Array.isArray(room.brainstormData.notes)) {
    room.brainstormData.notes = room.brainstormData.notes.map(note => {
      const voters = Array.isArray(note.voters)
        ? note.voters.map(voter => (voter === oldName ? newName : voter))
        : [];
      const author = note.author === oldName ? newName : note.author;
      return { ...note, voters, author };
    });
  }

  return room;
}

async function saveProfile() {
  if (!APP.player) return;

  const oldName = APP.player.name;
  const updatedName = normalizeName(document.getElementById('editName')?.value || '');
  const typedEmoji = normalizeEmoji(document.getElementById('editEmoji')?.value || '');
  const updatedAvatar = typedEmoji || selectedEditAvatar || APP.player.avatar;
  if (!updatedName) {
    showError('Please enter a valid display name');
    return;
  }

  if (APP.roomCode) {
    const room = await RoomManager.loadRoom(APP.roomCode);
    if (room) {
      const hasConflict = room.participants?.some(p => p.name === updatedName && p.name !== oldName);
      if (hasConflict) {
        showError('That name is already taken in this room.');
        return;
      }
      applyProfileUpdateToRoom(room, oldName, updatedName, updatedAvatar);
      await RoomManager.updateRoom(APP.roomCode, room);
      APP.room = room;
    }
  }

  APP.player.name = updatedName;
  APP.player.avatar = updatedAvatar;
  await PlayerManager.updateProfile(APP.player);
  if (APP.roomCode) {
    persistActiveSessionSnapshot();
    if (APP.voice.connected) {
      await leaveVoiceSession({ preserveSpeakerMute: true });
      void syncVoiceFeatureState();
    }
  }

  selectedAvatar = updatedAvatar;

  APP.editingProfile = false;
  selectedEditAvatar = null;
  render();
}

function handleWordleKey(key) {
  const input = document.getElementById('wordleInput');
  if (!input) return;

  const current = normalizeWord(input.value);
  if (key === 'DEL') {
    input.value = current.slice(0, -1);
    return;
  }
  if (key === 'ENTER') {
    submitWordleSuggestion();
    return;
  }
  if (/^[A-Z]$/.test(key) && current.length < 5) {
    input.value = current + key;
  }
}

function getHostTypedWordFromCells() {
  const inputs = Array.from(document.querySelectorAll('.host-wordle-cell-input'))
    .sort((a, b) => Number.parseInt(a.dataset.col || '0', 10) - Number.parseInt(b.dataset.col || '0', 10));
  if (!inputs.length) return '';
  return normalizeWord(inputs.map(input => String(input.value || '').slice(0, 1)).join(''));
}

function captureHostWordleDraft() {
  hostWordleDraft = getHostTypedWordFromCells();
}

function handleWordChainArrowNavigation(event) {
  if (APP.room?.currentActivity !== 'word-chain') return;
  const active = document.activeElement;
  if (!active || !active.classList?.contains('word-chain-letter-input')) return;
  if (event.key === 'Enter') {
    event.preventDefault();
    submitWordChainGuess();
    return;
  }
  const row = Number.parseInt(active.dataset.row || '', 10);
  const pos = Number.parseInt(active.dataset.pos || '', 10);
  if (!Number.isInteger(row) || !Number.isInteger(pos)) return;
  const rowInputs = Array.from(document.querySelectorAll(`.word-chain-letter-input[data-row="${row}"]`))
    .sort((a, b) => Number.parseInt(a.dataset.pos || '0', 10) - Number.parseInt(b.dataset.pos || '0', 10));
  const currentIndex = rowInputs.findIndex(input => input === active);
  if (currentIndex < 0) return;

  if (event.key === 'ArrowLeft' && currentIndex > 0) {
    event.preventDefault();
    rowInputs[currentIndex - 1].focus();
    return;
  }
  if (event.key === 'ArrowRight' && currentIndex < rowInputs.length - 1) {
    event.preventDefault();
    rowInputs[currentIndex + 1].focus();
    return;
  }
  if (event.key === 'Backspace' && !active.value && currentIndex > 0) {
    event.preventDefault();
    rowInputs[currentIndex - 1].focus();
    return;
  }
  if (['ArrowUp', 'ArrowDown'].includes(event.key)) {
    event.preventDefault();
  }
}

function captureWordChainRowDraft(row) {
  const rowInputs = Array.from(document.querySelectorAll(`.word-chain-letter-input[data-row="${row}"]`))
    .sort((a, b) => Number.parseInt(a.dataset.pos || '0', 10) - Number.parseInt(b.dataset.pos || '0', 10));
  wordChainDraft[row] = rowInputs.map(input => normalizeChainWord(input.value).slice(0, 1)).join('');
}

function handleHostWordleCellNavigation(event) {
  const active = document.activeElement;
  if (!active || !active.classList?.contains('host-wordle-cell-input')) return;
  const col = Number.parseInt(active.dataset.col || '', 10);
  if (!Number.isInteger(col)) return;

  if (event.key === 'ArrowLeft' && col > 0) {
    event.preventDefault();
    const prev = document.querySelector(`.host-wordle-cell-input[data-col="${col - 1}"]`);
    if (prev instanceof HTMLInputElement) prev.focus();
    return;
  }
  if (event.key === 'ArrowRight' && col < 4) {
    event.preventDefault();
    const next = document.querySelector(`.host-wordle-cell-input[data-col="${col + 1}"]`);
    if (next instanceof HTMLInputElement) next.focus();
    return;
  }
  if (event.key === 'Backspace' && !active.value && col > 0) {
    event.preventDefault();
    const prev = document.querySelector(`.host-wordle-cell-input[data-col="${col - 1}"]`);
    if (prev instanceof HTMLInputElement) prev.focus();
    return;
  }
}

  const row = Number.parseInt(target.dataset.row || '', 10);
  const pos = Number.parseInt(target.dataset.pos || '', 10);

document.addEventListener('dragover', event => {
  const battleshipCell = event.target instanceof HTMLElement ? event.target.closest('[data-bs-row][data-bs-col]') : null;
  if (battleshipCell && APP.room?.currentActivity === 'battleship') {
    event.preventDefault();
    if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
    return;
  }
  const lane = event.target instanceof HTMLElement ? event.target.closest('[data-brain-lane]') : null;
  if (!lane) return;
  event.preventDefault();
  if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
});

document.addEventListener('drop', async event => {
  const battleshipCell = event.target instanceof HTMLElement ? event.target.closest('[data-bs-row][data-bs-col]') : null;
  if (battleshipCell && APP.room?.currentActivity === 'battleship') {
    event.preventDefault();
    const row = Number.parseInt(battleshipCell.getAttribute('data-bs-row') || '', 10);
    const col = Number.parseInt(battleshipCell.getAttribute('data-bs-col') || '', 10);
    const draggedShipId = String(event.dataTransfer?.getData('text/plain') || APP.battleshipUi.dragShipId || '').trim();
    APP.battleshipUi.dragShipId = '';
    if (!Number.isInteger(row) || !Number.isInteger(col) || !draggedShipId) return;
    await placeBattleshipShipAt(row, col, draggedShipId);
    return;
  }
  const laneEl = event.target instanceof HTMLElement ? event.target.closest('[data-brain-lane]') : null;
  if (!laneEl) return;
  event.preventDefault();
  const laneId = laneEl.dataset.brainLane;
  const droppedNoteId = (event.dataTransfer?.getData('text/plain') || brainstormDraggedNoteId || '').trim();
  brainstormDraggedNoteId = null;
  if (!laneId || !droppedNoteId) return;
  await brainstormMoveNote(droppedNoteId, laneId);
});

function renderActivity() {
  const activity = APP.room.currentActivity;
  let content = '<div>Activity loading...</div>';

  if (activity === 'lightning-trivia') content = renderLightningTrivia();
  else if (activity === 'emoji-charades') content = renderEmojiCharades();
  else if (activity === 'icebreaker') content = renderIcebreaker();
  else if (activity === 'pulse-check') content = renderPulseCheck();
  else if (activity === 'values-vote') content = renderValuesVote();
  else if (activity === 'wordle') content = renderWordle();
  else if (activity === 'word-chain') content = renderWordChain();
  else if (activity === 'brainstorm-canvas') content = renderBrainstormCanvas();
  else if (activity === 'uno') content = renderUno();
  else if (activity === 'regular-trivia') content = renderRegularTrivia();
  else if (activity === 'tic-tac-toe-blitz') content = renderTicTacToeBlitz();
  else if (activity === 'team-jeopardy') content = renderTeamJeopardy();
  else if (activity === 'spin-wheel') content = renderSpinWheel();
  else if (activity === 'presentation') content = renderPresentationActivity();
  else if (activity === 'slides-studio') content = renderSlidesStudio();
  else if (activity === 'battleship') content = renderBattleship();
  else if (activity === 'bingo') content = renderBingo();
  else if (activity === 'backgammon') content = renderBackgammon();
  else if (activity === 'connect-4') content = renderConnect4();

  return `
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-bottom:8px;">
      <button class="btn-secondary" data-action="leave-session">🚪 Leave Session</button>
    </div>
    ${content}
  `;
}

            </div>
            <div style="margin-bottom:14px;">

              <div style="display:grid;gap:8px;">
                ${BINGO_PATTERN_OPTIONS.map(option => {

            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;">

                ? (winners.length ? `${escapeHtml(winners.join(', '))} called Bingo.` : 'Round finished.')

          </div>
        ` : ''}
        ${!isHost ? `
          <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:18px;padding:18px;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;border-radius:16px;background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));">
              <div>
                <div style="font-size:0.76rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;">Live call</div>
                <div style="font-family:'Fraunces',serif;font-size:1.2rem;">${lastCallLabel || 'Waiting for draw'}</div>

                aria-label="${escapeHtml(lastCallLabel || 'Waiting for first draw')}"
                title="${escapeHtml(lastCallLabel || 'Waiting for first draw')}"
              >
                <div style="display:grid;place-items:center;line-height:1;">
                  <div style="font-size:0.86rem;font-weight:900;letter-spacing:0.18em;color:${lastBallMeta?.textColor || '#ffffff'};margin-bottom:3px;">${escapeHtml(lastBallMeta?.letter || 'B')}</div>
                  <div style="font-size:2rem;font-weight:900;color:${lastBallMeta?.textColor || '#ffffff'};letter-spacing:-0.05em;">${escapeHtml(lastBallMeta ? String(lastBallMeta.number) : '00')}</div>
                </div>
              </div>
            </div>
          </div>
        ` : ''}

        <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:18px;padding:18px;">
          <div style="font-family:'Fraunces',serif;font-size:1.35rem;margin-bottom:12px;">Players</div>
          <div style="display:grid;gap:8px;">
            ${participantNames.map(playerName => {
              const playerCard = getBingoCard(state, playerName);
              const playerHasBingo = playerCard ? validateBingoCardAgainstCalled(playerCard, calledSet, state.winningPattern) : false;
              return `
                <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;">
                  <strong>${escapeHtml(playerName)}</strong>

                    ${winners.includes(playerName) ? 'Winner' : playerHasBingo ? 'Ready to claim' : playerCard ? 'Playing' : 'Spectating'}
                  </span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    </div>
