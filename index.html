        <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
          <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:12px;">Match Status</div>
          <div style="display:grid;gap:10px;">
            <div style="background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:12px;">
              <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:4px;">Captains</div>
              <div style="display:grid;gap:8px;">
                ${players.map(playerName => {
                  const board = normalizeBattleshipBoard(getBattleshipBoard(state, playerName));
                  return `
                    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
                      <strong>${escapeHtml(playerName)}</strong>
                      <span style="font-size:0.8rem;color:${winnerName === playerName ? '#ffd166' : turnName === playerName ? '#8af1ff' : 'var(--text-dim)'};">
                        ${winnerName === playerName ? 'Winner' : state.phase === 'setup' ? (board.ready ? 'Ready' : areBattleshipShipsPlaced(board) ? 'Placed' : 'Placing') : turnName === playerName ? 'Turn' : `${getBattleshipLivingShips(board)} ships left`}
                      </span>
                    </div>
                  `;
                }).join('') || '<div style="color:var(--text-dim);">Need two players to start.</div>'}
              </div>
            </div>
            <div style="background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:12px;">
              <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:4px;">Phase</div>
              <div style="font-weight:800;color:${statusAccent};text-shadow:0 0 16px color-mix(in srgb, ${statusAccent} 40%, transparent);">${escapeHtml(phaseLabel)}</div>
              <div style="font-size:0.82rem;color:var(--text-dim);margin-top:6px;">
                ${state.phase === 'setup' ? `${setupReadyCount}/${players.length} captains ready` : winnerName ? `${escapeHtml(winnerName)} sank the last ship.` : turnName ? `Waiting for ${escapeHtml(turnName)} to fire.` : 'Preparing match.'}
              </div>
            </div>
            <div style="background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:12px;">
              <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:4px;">Spectators</div>
              <div style="font-weight:800;color:#c4a1ff;">${spectators.length}</div>
              <div style="font-size:0.82rem;color:var(--text-dim);margin-top:6px;">${spectators.length ? escapeHtml(spectators.join(', ')) : 'No spectators yet.'}</div>
            </div>
          </div>
        </div>

        ${isBattlePlayer ? `
          <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
            <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:12px;">Fleet Controls</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
              <button class="btn-secondary" data-action="battleship-toggle-axis" style="width:auto;padding:10px 14px;">Rotate: ${placementAxis === 'horizontal' ? 'Horizontal' : 'Vertical'}</button>
              <button class="btn-secondary" data-action="battleship-select-next-ship" style="width:auto;padding:10px 14px;display:inline-flex;align-items:center;gap:8px;" ${(state.phase !== 'setup' || !canAdvancePlacementShip) ? 'disabled' : ''}>
                <span aria-hidden="true">⏭</span>
                <span>Next Vessel</span>
              </button>
              <button class="btn-secondary" data-action="battleship-randomize" style="width:auto;padding:10px 14px;" ${state.phase !== 'setup' ? 'disabled' : ''}>Randomize</button>
              <button class="btn-secondary" data-action="battleship-clear" style="width:auto;padding:10px 14px;" ${state.phase !== 'setup' ? 'disabled' : ''}>Clear</button>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:12px;">
              <div style="padding:12px 14px;border-radius:16px;background:linear-gradient(135deg, rgba(138,241,255,0.12), rgba(37,99,235,0.08));border:1px solid rgba(138,241,255,0.18);">
                <div style="font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.58);margin-bottom:4px;">Deployment</div>
                <div style="font-size:1.15rem;font-weight:800;color:#8af1ff;">${myPlacedShipCount}/${myBoard.ships.length}</div>
                <div style="font-size:0.8rem;color:var(--text-dim);margin-top:4px;">${myShipsPlaced ? 'All ships positioned' : `${shipsRemainingToPlace} ship${shipsRemainingToPlace === 1 ? '' : 's'} left`}</div>
              </div>
              <div style="padding:12px 14px;border-radius:16px;background:${myBoard.ready ? 'linear-gradient(135deg, rgba(34,197,94,0.18), rgba(21,128,61,0.1))' : 'linear-gradient(135deg, rgba(255,209,102,0.12), rgba(255,143,163,0.08))'};border:1px solid ${myBoard.ready ? 'rgba(34,197,94,0.24)' : 'rgba(255,209,102,0.18)'};">
                <div style="font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.58);margin-bottom:4px;">Fleet status</div>
                <div style="font-size:1.15rem;font-weight:800;color:${myBoard.ready ? '#7af59f' : '#ffd166'};">${myBoard.ready ? 'Locked In' : 'Editing'}</div>
                <div style="font-size:0.8rem;color:var(--text-dim);margin-top:4px;">${myBoard.ready ? 'Ready for battle start' : selectedShip ? `${escapeHtml(selectedShip.label)} selected` : 'Place or move ships'}</div>
              </div>
            </div>
            ${selectedShip ? `
              <div style="margin-bottom:12px;padding:12px 14px;border-radius:16px;background:linear-gradient(135deg, color-mix(in srgb, ${selectedShip.accent || '#8af1ff'} 14%, rgba(255,255,255,0.04) 86%), rgba(255,255,255,0.03));border:1px solid color-mix(in srgb, ${selectedShip.accent || '#8af1ff'} 36%, rgba(255,255,255,0.08));">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;">
                  <div>
                    <div style="font-size:0.76rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,233,225,0.6);margin-bottom:4px;">Selected ship</div>
                    <div style="font-weight:800;color:${selectedShip.accent || '#8af1ff'};">${escapeHtml(selectedShip.label)}</div>
                  </div>
                  ${canAdvancePlacementShip ? `
                    <button
                      type="button"
                      class="btn-secondary"
                      data-action="battleship-select-next-ship"
                      title="Select next vessel"
                      aria-label="Select next vessel"
                      style="width:42px;height:42px;padding:0;border-radius:999px;display:grid;place-items:center;font-size:1rem;flex:0 0 auto;"
                    >⏭</button>
                  ` : ''}
                </div>
                <div style="font-size:0.82rem;color:var(--text-dim);margin-top:4px;">${selectedShip.cells.length === selectedShip.length ? 'Highlighted on your board. Drag any glowing segment, or tap a new empty cell to move it.' : 'Tap a board cell to deploy it, or drag from the tray on desktop.'}</div>
                ${canAdvancePlacementShip ? `<div style="font-size:0.78rem;color:rgba(236,233,225,0.62);margin-top:8px;">Next vessel: ${escapeHtml(nextPlacementShip?.label || '')}</div>` : ''}
                ${canSelectNextUnplacedShip ? `<div style="font-size:0.78rem;color:rgba(138,241,255,0.78);margin-top:6px;">Map add mode available: use ➕ in the fleet header to arm ${escapeHtml(nextUnplacedShip?.label || 'the next vessel')}.</div>` : ''}
              </div>
            ` : ''}
            ${shipTray}
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;">
              <button class="btn-primary" data-action="battleship-ready" data-ready-state="true" style="width:auto;padding:10px 16px;background:${readyButtonAccent};border:none;cursor:${readyButtonCursor};opacity:${(state.phase !== 'setup' || (!myShipsPlaced && !myBoard.ready)) ? '0.72' : '1'};" ${(state.phase !== 'setup' || !myShipsPlaced || myBoard.ready) ? 'disabled' : ''}>${readyButtonLabel}</button>
              <button class="btn-secondary" data-action="battleship-ready" data-ready-state="false" style="width:auto;padding:10px 16px;background:${editFleetAccent};border:${myBoard.ready ? '1px solid rgba(255,209,102,0.28)' : '1px solid rgba(255,255,255,0.08)'};color:${myBoard.ready ? '#ffd166' : 'var(--text)'};box-shadow:${myBoard.ready ? '0 0 18px rgba(255,209,102,0.12)' : 'none'};" ${(state.phase !== 'setup' || !myBoard.ready) ? 'disabled' : ''}>${editFleetLabel}</button>
            </div>
            <div style="font-size:0.82rem;color:var(--text-dim);margin-top:10px;">
              ${myBoard.ready
                ? 'Your fleet is locked. Choose Unlock Fleet if you want to move ships again before the match starts.'
                : 'Drag ships from the tray or from the board itself on desktop. On touch devices, tap a ship to highlight it, rotate if needed, then tap a new empty square to reposition it.'}
            </div>
          </div>
        ` : `
          <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
            <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:12px;">Spectator View</div>
            <div style="font-size:0.86rem;color:var(--text-dim);line-height:1.5;">
              Battleship currently assigns the first two people in the room as captains. Everyone else watches the public hit and miss markers until the match ends.
            </div>
          </div>
        `}
      </div>
    </div>
  `;
}

function renderBackgammon() {
  const isHost = APP.room.host === APP.player.name;
  const state = APP.room.activityState && typeof APP.room.activityState === 'object'
    ? APP.room.activityState
    : createBackgammonState(APP.room.participants || []);
  const safeRoomCode = escapeHtml(APP.roomCode);
  const myColor = getBackgammonPlayerColor(state);
  const activeColor = getBackgammonCurrentTurnColor(state);
  const activeSeat = getBackgammonSeat(state, activeColor);
  const whiteSeat = getBackgammonSeat(state, 'white');
  const blackSeat = getBackgammonSeat(state, 'black');
  const points = Array.isArray(state.points) ? state.points : [...BACKGAMMON_INITIAL_POINTS];
  const bar = state.bar || { white: 0, black: 0 };
  const borneOff = state.borneOff || { white: 0, black: 0 };
  const winnerColor = BACKGAMMON_COLORS.includes(state.winner) ? state.winner : '';
  const winnerSeat = winnerColor ? getBackgammonSeat(state, winnerColor) : null;
  const currentMoves = Array.isArray(state.remainingMoves) ? state.remainingMoves : [];
  const selectedSource = APP.backgammonUi?.selectedSource ?? null;
  const canInteract = state.phase === 'playing' && !winnerColor && myColor === activeColor;
  const legalFirstMoves = canInteract ? getBackgammonLegalFirstMoves(state, myColor) : [];
  const legalSourceKeys = new Set(legalFirstMoves.map(move => String(move.from)));
  const legalMovesFromSelected = selectedSource !== null
    ? legalFirstMoves.filter(move => move.from === selectedSource)
    : [];
  const legalTargetKeys = new Set(legalMovesFromSelected.map(move => String(move.to)));
  const canRoll = canInteract && currentMoves.length === 0;
  const canBearOff = legalTargetKeys.has('off');
  const topPipCount = getBackgammonPipCount(state, 'black');
  const bottomPipCount = getBackgammonPipCount(state, 'white');

  if (!whiteSeat.playerId || !blackSeat.playerId) {
    return `
      <div class="header">
        <h1 style="font-size:2rem;font-weight:700;">🎲 Backgammon</h1>
        <p class="tagline">Room: ${safeRoomCode}</p>
      </div>
      ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}
      <div style="max-width:780px;margin:28px auto 0;background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:28px;text-align:center;">
        <div style="font-family:'Fraunces',serif;font-size:1.5rem;margin-bottom:8px;">Backgammon needs two players.</div>
        <div style="color:var(--text-dim);">Invite one more player, then restart the activity.</div>
      </div>
    `;
  }

  const renderChecker = (color, index, totalCount, orientation = 'top') => {
    const colorMeta = BACKGAMMON_COLOR_META[color];
    return `
      <div class="backgammon-checker" style="
        width:32px;height:32px;border-radius:50%;
        background:radial-gradient(circle at 34% 32%, rgba(255,255,255,0.92), ${colorMeta.accent} 42%, color-mix(in srgb, ${colorMeta.accent} 76%, #111 24%) 100%);
        border:2px solid rgba(255,255,255,0.78);
        box-shadow:0 0 14px ${colorMeta.glow}, inset 0 -5px 10px rgba(0,0,0,0.18);
        color:${colorMeta.pipColor};
        font-size:0.68rem;font-weight:800;
        display:grid;place-items:center;
        margin-${orientation === 'top' ? 'top' : 'bottom'}:${index === 0 ? '0' : '-10px'};
      ">${index === Math.min(totalCount, 5) - 1 && totalCount > 5 ? escapeHtml(String(totalCount)) : ''}</div>
    `;
  };

  const renderPoint = (pointIndex, orientation = 'top', slotIndex = 0) => {
    const owner = getBackgammonPointOwner(points, pointIndex);
    const count = getBackgammonPointCount(points, pointIndex);
    const colorMeta = owner ? BACKGAMMON_COLOR_META[owner] : null;
    const isSelected = selectedSource === pointIndex;
    const isSource = legalSourceKeys.has(String(pointIndex));
    const isTarget = legalTargetKeys.has(String(pointIndex));
    const buttonAction = canInteract && (isSource || isTarget) ? 'backgammon-point' : '';
    const triangleColor = slotIndex % 2 === 0 ? 'rgba(255,205,144,0.76)' : 'rgba(140,80,41,0.74)';
    const triangleAccent = orientation === 'top'
      ? 'polygon(50% 100%, 8% 0, 92% 0)'
      : 'polygon(8% 100%, 92% 100%, 50% 0)';
    return `
      <button
        class="backgammon-point"
        type="button"
        data-action="${buttonAction}"
        data-index="${pointIndex}"
        ${buttonAction ? '' : 'disabled'}
        style="
          position:relative;min-height:205px;border:none;background:transparent;padding:0;cursor:${buttonAction ? 'pointer' : 'default'};
          display:flex;align-items:${orientation === 'top' ? 'flex-start' : 'flex-end'};justify-content:center;
          outline:${isSelected ? '2px solid #8af1ff' : isTarget ? '2px solid #ff8fa3' : 'none'};
          outline-offset:4px;border-radius:12px;
          filter:${isTarget ? 'drop-shadow(0 0 12px rgba(255,143,163,0.32))' : isSource ? 'drop-shadow(0 0 10px rgba(138,241,255,0.24))' : 'none'};
        "
        title="Point ${pointIndex + 1}"
      >
        <div style="position:absolute;inset:0;display:flex;align-items:${orientation === 'top' ? 'flex-start' : 'flex-end'};justify-content:center;padding:${orientation === 'top' ? '0 4px 14px' : '14px 4px 0'};">
          <div class="backgammon-point-triangle" style="width:100%;height:100%;max-width:64px;clip-path:${triangleAccent};background:${triangleColor};box-shadow:0 0 12px rgba(255,210,154,0.12), inset 0 0 0 1px rgba(255,255,255,0.12);"></div>
        </div>
        <div class="backgammon-point-label" style="position:absolute;${orientation === 'top' ? 'top' : 'bottom'}:10px;left:50%;transform:translateX(-50%);font-size:0.72rem;font-weight:800;color:${isSource || isTarget ? '#ffffff' : 'rgba(255,232,196,0.68)'};text-shadow:0 0 8px rgba(0,0,0,0.4);">
          ${pointIndex + 1}
        </div>
        <div class="backgammon-point-stack" style="position:relative;z-index:1;display:flex;flex-direction:${orientation === 'top' ? 'column' : 'column-reverse'};align-items:center;justify-content:${orientation === 'top' ? 'flex-start' : 'flex-end'};min-height:180px;padding:${orientation === 'top' ? '12px 0 26px' : '26px 0 12px'};">
          ${count ? Array.from({ length: Math.min(count, 5) }, (_, checkerIndex) => renderChecker(owner, checkerIndex, count, orientation)).join('') : ''}
        </div>
        ${count ? `<div style="position:absolute;${orientation === 'top' ? 'bottom' : 'top'}:36px;right:6px;padding:2px 6px;border-radius:999px;background:${colorMeta?.glow || 'rgba(255,255,255,0.08)'};font-size:0.68rem;font-weight:800;color:${colorMeta?.accent || '#fff'};">${count}</div>` : ''}
      </button>
    `;
  };

  const renderHalf = (pointIndexes, orientation) => `
    <div class="backgammon-half-grid" style="display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;">
      ${pointIndexes.map((pointIndex, slotIndex) => renderPoint(pointIndex, orientation, slotIndex)).join('')}
    </div>
  `;

  const renderDie = (value, active = true, key = '') => `
    <div class="backgammon-die" style="
      width:54px;height:54px;border-radius:14px;background:linear-gradient(145deg,#fffdf8,#f0e7d3);
      border:2px solid rgba(90,50,22,0.22);box-shadow:${active ? '0 0 18px rgba(255,209,102,0.26)' : 'none'},0 10px 20px rgba(0,0,0,0.2);
      display:grid;place-items:center;font-size:1.4rem;font-weight:900;color:#5f331f;
      opacity:${active ? '1' : '0.55'};
    " title="${escapeHtml(String(key || value))}">${value}</div>
  `;

  return `
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;">🎲 Backgammon</h1>
      <p class="tagline">Room: ${safeRoomCode} • ${winnerColor ? `${escapeHtml(winnerSeat?.playerName || 'Winner')} took the match` : `${escapeHtml(activeSeat.playerName)} to move`}</p>
    </div>

    ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}

    ${winnerColor ? `
      <div style="max-width:1200px;margin:18px auto 0;padding:18px 20px;border-radius:24px;background:linear-gradient(135deg, rgba(44,18,112,0.86), rgba(140,33,91,0.74));border:2px solid rgba(152,229,255,0.68);box-shadow:0 0 28px rgba(112,209,255,0.16);text-align:center;">
        <div style="font-size:1.45rem;font-weight:800;margin-bottom:6px;">🏆 ${escapeHtml(winnerSeat?.playerName || 'Winner')} wins</div>
        <div style="color:rgba(236,233,225,0.8);">${escapeHtml(state.lastAction || '')}</div>
      </div>
    ` : ''}

    <div class="game-mobile-shell game-mobile-main" style="max-width:1320px;margin:24px auto 0;display:grid;grid-template-columns:minmax(0,1.55fr) minmax(300px,0.85fr);gap:18px;align-items:start;">
      <div class="game-mobile-side" style="background:
        radial-gradient(circle at 50% 74%, rgba(255,82,138,0.18), transparent 24%),
        linear-gradient(180deg, rgba(48,23,10,0.96), rgba(28,14,8,0.98));
        border:1px solid rgba(255,216,169,0.18);border-radius:30px;padding:18px 18px 20px;box-shadow:0 26px 58px rgba(6,6,26,0.5), inset 0 0 0 1px rgba(255,255,255,0.04);">
        <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;">
          <div>
            <div style="font-family:'Fraunces',serif;font-size:1.45rem;">Neon Board</div>
            <div style="font-size:0.84rem;color:rgba(255,232,196,0.7);">${escapeHtml(state.lastAction || 'Roll and race your checkers home.')}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            ${state.dice?.length ? state.dice.map((value, idx) => renderDie(value, currentMoves.includes(value) || currentMoves.filter(move => move === value).length > state.dice.slice(0, idx).filter(move => move === value).length, `die-${idx + 1}`)).join('') : '<div style="color:rgba(255,232,196,0.62);font-size:0.88rem;">Dice waiting</div>'}
          </div>
        </div>

        <div class="game-mobile-scroll">
          <div class="backgammon-grid">
            <div class="backgammon-board-shell" style="padding:0;">
              <div class="backgammon-board-layout" style="display:grid;grid-template-columns:minmax(0,1fr) 88px minmax(0,1fr);gap:12px;align-items:stretch;">
                <div style="display:grid;gap:10px;">
                  ${renderHalf(BACKGAMMON_TOP_POINTS.slice(0, 6), 'top')}
                  ${renderHalf(BACKGAMMON_BOTTOM_POINTS.slice(0, 6), 'bottom')}
                </div>

                <div style="display:grid;grid-template-rows:1fr auto 1fr;gap:12px;align-items:center;">
                  <div class="backgammon-bar-card" style="background:linear-gradient(180deg, rgba(24,12,54,0.94), rgba(14,8,30,0.98));border:1px solid rgba(255,143,163,0.14);border-radius:18px;padding:12px;display:grid;place-items:center;min-height:140px;">
                    <div style="text-align:center;">
                      <div style="font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,232,196,0.6);margin-bottom:8px;">Black Bar</div>
                      <div style="font-size:2rem;font-weight:900;color:#ff8fa3;">${bar.black || 0}</div>
                    </div>
                  </div>
                  <button class="backgammon-bar-btn" type="button" data-action="${canInteract && (bar[myColor] || 0) > 0 ? 'backgammon-bar' : ''}" ${canInteract && (bar[myColor] || 0) > 0 ? '' : 'disabled'} style="background:linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));border:${selectedSource === 'bar' ? '2px solid #8af1ff' : '1px solid rgba(255,255,255,0.08)'};border-radius:18px;padding:12px;min-height:88px;color:${selectedSource === 'bar' ? '#8af1ff' : 'rgba(255,232,196,0.8)'};font-weight:800;letter-spacing:0.08em;text-transform:uppercase;cursor:${canInteract && (bar[myColor] || 0) > 0 ? 'pointer' : 'default'};">
                    Enter<br>Bar
                  </button>

                  <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">

function renderConnect4() {
  const isHost = APP.room.host === APP.player.name;
  const state = APP.room.activityState && typeof APP.room.activityState === 'object'
    ? APP.room.activityState
    : createConnect4State(APP.room.participants || []);
  const safeRoomCode = escapeHtml(APP.roomCode);
  const redSeat = getConnect4Seat(state, 'red');
  const yellowSeat = getConnect4Seat(state, 'yellow');
  const board = Array.isArray(state.board) ? state.board : createConnect4Board();
  const myColor = getConnect4PlayerColor(state);
  const activeColor = CONNECT4_COLORS.includes(state.turn) ? state.turn : 'red';
  const activeSeat = getConnect4Seat(state, activeColor);
  const winnerColor = state.winner === 'red' || state.winner === 'yellow' ? state.winner : '';
  const isDraw = state.winner === 'draw';
  const winningKeySet = new Set((Array.isArray(state.winningCells) ? state.winningCells : []).map(cell => `${cell.row}:${cell.col}`));
  const canDrop = state.phase === 'playing' && !winnerColor && !isDraw && myColor === activeColor;

  if (!redSeat.playerId || !yellowSeat.playerId) {
    return `
      <div class="header">
        <h1 style="font-size:2rem;font-weight:700;">🟡 Connect 4</h1>
        <p class="tagline">Room: ${safeRoomCode}</p>
      </div>
      ${isHost ? '<button class="btn-secondary" data-action="end-activity">← End Activity</button>' : ''}
      <div style="max-width:780px;margin:28px auto 0;background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:28px;text-align:center;">
        <div style="font-family:'Fraunces',serif;font-size:1.5rem;margin-bottom:8px;">Connect 4 needs two players.</div>

  const columnButtons = Array.from({ length: CONNECT4_COLS }, (_, col) => {
    const dropRow = getConnect4DropRow(board, col);
    const enabled = canDrop && dropRow >= 0;
    return `
      <button

          font-weight:900;font-size:0.86rem;letter-spacing:0.12em;text-transform:uppercase;

        "
        title="Drop in column ${col + 1}"
      >
        ↓
      </button>
    `;
  }).join('');

  const boardMarkup = Array.from({ length: CONNECT4_ROWS }, (_, row) => `
    ${Array.from({ length: CONNECT4_COLS }, (_, col) => {
      const color = getConnect4Cell(board, row, col);
      const colorMeta = color ? CONNECT4_COLOR_META[color] : null;
      const isWinningCell = winningKeySet.has(`${row}:${col}`);
      return `
        <div class="connect4-cell" style="
          aspect-ratio:1/1;
          border-radius:22px;

            transform:${isWinningCell ? 'scale(1.06)' : 'scale(1)'};
          "></div>
        </div>
      `;
    }).join('')}
  `).join('');

  return `
    <div class="header">
      <h1 style="font-size:2rem;font-weight:700;">🟡 Connect 4</h1>
      <p class="tagline">Room: ${safeRoomCode} • ${winnerColor ? `${escapeHtml(getConnect4Seat(state, winnerColor).playerName)} connected four` : isDraw ? 'Match drawn' : `${escapeHtml(activeSeat.playerName)} to drop`}</p>

      <div class="game-mobile-side" style="background:
        radial-gradient(circle at 50% 76%, rgba(255,82,138,0.18), transparent 28%),
        linear-gradient(180deg, rgba(23,10,74,0.98) 0%, rgba(13,9,45,0.98) 52%, rgba(8,7,26,0.99) 100%);

        <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px;">
          <div>
            <div style="font-family:'Fraunces',serif;font-size:1.45rem;">Neon Grid</div>
            <div style="font-size:0.84rem;color:rgba(236,233,225,0.72);">${escapeHtml(state.lastAction || 'Drop a disc and race to four in a row.')}</div>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            ${CONNECT4_COLORS.map(color => {

              const isTurn = activeColor === color && !winnerColor && !isDraw;
              return `
                <div style="padding:10px 12px;border-radius:16px;background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));border:1px solid ${isTurn ? colorMeta.accent : 'rgba(255,255,255,0.08)'};min-width:150px;">

                  <div style="font-weight:800;">${escapeHtml(seat.playerName)}</div>

      <div class="game-mobile-side" style="display:grid;gap:18px;">
        <div style="background:linear-gradient(180deg,rgba(20,12,68,0.96),rgba(8,8,28,0.98));border:1px solid rgba(152,115,255,0.34);border-radius:24px;padding:18px;box-shadow:0 24px 54px rgba(6,6,26,0.45);">
          <div style="font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:12px;">Match Status</div>
          <div style="display:grid;gap:10px;">
            ${CONNECT4_COLORS.map(color => {

function renderCosmosBound() {
  const isHost = APP.room.host === APP.player.name;
  const state = APP.room.activityState && typeof APP.room.activityState === 'object'
    ? APP.room.activityState
    : createCosmosBoundState(APP.room.participants || []);
  const me = APP.player?.name || '';
  const participants = APP.room.participants || [];

  // Multi-crew: show assignment or cockpit for player's crew
  if (state.multiCrew) {
    if (!state.missionStartedAt) {
      const allNames = (participants).map(p => String(p?.name || '').trim()).filter(Boolean);
      return renderCosmosBoundCrewAssignment(state, isHost, me, allNames, participants);
    }
    const crewState = getCosmosBoundMyCrewState(state);
    const myRoles = getCosmosBoundMyRoles(state);
    const names = Object.keys(crewState.roles || {});
    const phase = crewState.phase || 0;
    const cockpit = renderCosmosBoundCockpit(crewState, isHost, me, myRoles, phase, names,
      myRoles.includes('CDR'), myRoles.includes('PLT'), myRoles.includes('ENG'),
      myRoles.includes('NAV'), myRoles.includes('SCI'), myRoles.includes('COM'), myRoles.includes('MED'));
    const scoreboard = renderCosmosBoundScoreboard(state);
    return scoreboard + cockpit;
  }

  // Single crew mode
  const myRoles = getCosmosBoundMyRoles(state);
  const phase = state.phase || 0;
  const names = Object.keys(state.roles || {});

  if (phase === 0 && !state.missionStartedAt) {
    return renderCosmosBoundCrewAssignment(state, isHost, me, names, participants);
  }
  return renderCosmosBoundCockpit(state, isHost, me, myRoles, phase, names,
    myRoles.includes('CDR'), myRoles.includes('PLT'), myRoles.includes('ENG'),
    myRoles.includes('NAV'), myRoles.includes('SCI'), myRoles.includes('COM'), myRoles.includes('MED'));
}

function renderCosmosBoundScoreboard(state) {
  const crews = state.crews || {};
  const myCrewId = getCosmosBoundMyCrewId(state);
  const cards = Object.entries(crews).map(([crewId, crew]) => {
    const isMe = crewId === myCrewId;
    const phase = crew.phase || 0;
    const phaseLbl = COSMOS_BOUND_PHASE_LABELS[Math.min(Math.floor(phase), 6)] || 'STANDBY';
    const pct = COSMOS_BOUND_PHASE_PCT[Math.min(Math.floor(phase), 6)] || 0;
    const color = crew.color || '#00d4ff';
    return `
      <div style="flex:1;min-width:120px;padding:8px 10px;background:${isMe ? 'rgba(255,255,255,.04)' : 'var(--cb-hull)'};
        border:1px solid ${isMe ? color : 'var(--cb-panel-edge)'};border-radius:8px;text-align:center">
        <div style="font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:${color}">
          CREW ${crew.name || crewId}${isMe ? ' (YOU)' : ''}
        </div>
        <div style="font-size:9px;color:var(--cb-text-dim);margin:3px 0">${(crew.members || []).length} members</div>
        <div style="height:3px;background:var(--cb-panel-edge);border-radius:2px;overflow:hidden;margin:4px 0">
          <div style="height:100%;width:${pct}%;background:${color};border-radius:2px;transition:width .5s"></div>
        </div>
        <div style="font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:1px;color:${phase >= 6 ? 'var(--cb-glow-green)' : 'var(--cb-text-mid)'}">
          ${phase >= 6 ? 'MISSION COMPLETE' : phaseLbl}
        </div>
      </div>
    `;
  }).join('');
  return `<div class="cosmos-bound" style="margin-bottom:8px">
    <div style="display:flex;gap:8px;flex-wrap:wrap">${cards}</div>
  </div>`;
}

function renderCosmosBoundCrewAssignment(state, isHost, me, names, participants) {
  const roleOptions = COSMOS_BOUND_ROLES.map(r =>
    `<option value="${r}">${r} — ${COSMOS_BOUND_ROLE_LABELS[r]}</option>`
  ).join('');

  const crewRows = names.map(name => {
    const roles = getCosmosBoundRoles(state, name);
    const isMe = name === me;
    const badges = roles.map(r =>
      `<span class="cb-role-badge cb-role-${r}">${r}</span>`
    ).join(' ');
    const avatar = (participants.find(p => p.name === name) || {}).avatar || '';
    return `
      <div class="cb-crew-row${isMe ? ' is-me' : ''}">
        <span style="font-size:20px">${escapeHtml(avatar)}</span>
        <span class="cb-crew-name">${escapeHtml(name)}${isMe ? ' <span style="color:var(--cb-glow-blue);font-size:9px">(YOU)</span>' : ''}</span>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${badges}</div>
        ${isHost ? `<select class="cb-role-select" data-action="cosmos-assign-role" data-player="${escapeHtml(name)}"
          onchange="this.setAttribute('data-role', this.value); this.click()">
          <option value="">+ Role</option>${roleOptions}</select>` : ''}
      </div>
    `;
  }).join('');

  const currentDest = state.destination || 'mars';
  const destCards = Object.entries(COSMOS_BOUND_DESTINATIONS).map(([id, dest]) => {
    const selected = id === currentDest;
    const diffColors = { Easy: 'var(--cb-glow-green)', Advanced: 'var(--cb-glow-orange)', Extreme: 'var(--cb-glow-red)' };
    const diffColor = diffColors[dest.difficulty] || 'var(--cb-text-mid)';
    return `
      <div class="cb-dest-card${selected ? ' selected' : ''}" data-action="cosmos-set-destination" data-destination="${id}"
        style="flex:1;min-width:140px;padding:12px;background:${selected ? 'rgba(255,255,255,.04)' : 'var(--cb-hull)'};
        border:2px solid ${selected ? dest.color : 'var(--cb-panel-edge)'};border-radius:10px;cursor:${isHost ? 'pointer' : 'default'};
        text-align:center;transition:.3s;${selected ? 'box-shadow:0 0 20px ' + dest.color + '33;' : ''}
        ${!isHost ? 'pointer-events:none;' : ''}">
        <div style="font-size:28px;margin-bottom:4px">${dest.icon}</div>
        <div style="font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:${selected ? dest.color : 'var(--cb-text-bright)'}">
          ${dest.label.toUpperCase()}
        </div>
        <div style="font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;color:${diffColor};margin-top:4px;
          border:1px solid ${diffColor};display:inline-block;padding:2px 8px;border-radius:3px">
          ${dest.difficulty.toUpperCase()}
        </div>
        <div style="font-size:10px;color:var(--cb-text-dim);margin-top:6px;line-height:1.4">${dest.description}</div>
        <div style="font-size:8px;color:var(--cb-text-dim);margin-top:4px">
          THROTTLE ${dest.minThrottle}% MIN &middot; LAND &lt;${dest.landThrottle}%
        </div>
      </div>
    `;
  }).join('');

  // Multi-crew section for 8+ participants
  const isMulti = state.multiCrew;
  const totalParticipants = participants.length;
  const multiCrewToggle = totalParticipants >= 8 && isHost ? `
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;padding:10px;background:var(--cb-hull);border:1px solid var(--cb-panel-edge);border-radius:8px">
      <span style="font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:var(--cb-text-mid)">
        ${totalParticipants} CREW MEMBERS DETECTED
      </span>
      <button style="padding:6px 14px;border:1px solid ${isMulti ? 'var(--cb-glow-green)' : 'var(--cb-glow-blue)'};background:${isMulti ? 'rgba(0,255,136,.08)' : 'transparent'};
        color:${isMulti ? 'var(--cb-glow-green)' : 'var(--cb-glow-blue)'};font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;
        border-radius:4px;cursor:pointer" data-action="cosmos-toggle-multi">
        ${isMulti ? 'MULTI-CREW: ON — ' + Object.keys(state.crews || {}).length + ' CREWS' : 'ENABLE MULTI-CREW MODE'}
      </button>
    </div>
  ` : '';

  // In multi-crew mode, show crew assignments instead of individual roles
  let crewSection = '';
  if (isMulti && state.crews) {
    crewSection = Object.entries(state.crews).map(([crewId, crew]) => {
      const members = (crew.members || []).map(name => {
        const isMe = name === me;
        const roles = (crew.roles || {})[name] || [];
        const badges = roles.map(r => `<span class="cb-role-badge cb-role-${r}">${r}</span>`).join(' ');
        const avatar = (participants.find(p => p.name === name) || {}).avatar || '';
        return `<div style="display:flex;align-items:center;gap:6px;padding:4px 0">
          <span style="font-size:16px">${escapeHtml(avatar)}</span>
          <span style="font-size:11px;color:${isMe ? 'var(--cb-glow-blue)' : 'var(--cb-text-bright)'};flex:1">${escapeHtml(name)}${isMe ? ' (YOU)' : ''}</span>
          <div style="display:flex;gap:3px">${badges}</div>
        </div>`;
      }).join('');
      return `
        <div style="background:var(--cb-panel);border:1px solid ${crew.color || 'var(--cb-panel-edge)'};border-radius:8px;padding:10px;margin-bottom:8px">
          <div style="font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:${crew.color || 'var(--cb-glow-blue)'};margin-bottom:6px">
            CREW ${crew.name} — ${(crew.members || []).length} MEMBERS
          </div>
          ${members}
        </div>
      `;
    }).join('');
  }

  return `
    <div class="cosmos-bound">
      <div class="cb-assign-shell">
        <div class="cb-assign-title">COSMOS BOUND</div>
        <div class="cb-assign-sub">SELECT DESTINATION</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">${destCards}</div>
        ${multiCrewToggle}
        ${isMulti ? `<div class="cb-assign-sub">CREW ASSIGNMENTS</div>${crewSection}` : `<div class="cb-assign-sub">CREW ROLE ASSIGNMENT</div><div class="cb-crew-list">${crewRows}</div>`}
        ${isHost
          ? `<button class="cb-begin-btn" data-action="cosmos-begin-mission">COMMENCE MISSION${isMulti ? ' — ALL CREWS' : ''}</button>`
          : `<div style="text-align:center;font-size:11px;color:var(--cb-text-dim);letter-spacing:2px;padding:10px">AWAITING COMMANDER TO BEGIN MISSION...</div>`
        }
      </div>
    </div>
  `;
}

function renderCosmosBoundCockpit(state, isHost, me, myRoles, phase, names, canCDR, canPLT, canENG, canNAV, canSCI, canCOM, canMED) {
  const systems = state.systems || {};
  const throttle = cosmosBoundLeverDragging ? cosmosBoundLocalThrottle : (state.throttle || 0);
  const coords = state.coords || { x: '', y: '', z: '' };
  const targetCoords = state.targetCoords || { x: '0', y: '0', z: '0' };
  const altitude = Math.round(state.altitude || 0);
  const velocity = Math.round(state.velocity || 0);
  const log = Array.isArray(state.log) ? state.log.slice(-4) : [];
  const countdownValue = state.countdownValue;
  const allSys = Object.values(systems).every(v => v);
  const preflight = cosmosBoundPreflightReady(state);
  const dest = getCosmosBoundDest(state);
  const phaseLabel = COSMOS_BOUND_PHASE_LABELS[Math.min(Math.floor(phase), 6)] || 'STANDBY';
  const phasePct = COSMOS_BOUND_PHASE_PCT[Math.min(Math.floor(phase), 6)] || 0;

  // Header crew dots
  const crewDots = names.map(name => {
    const roles = getCosmosBoundRoles(state, name);
    const isMe = name === me;
    return `<span class="cb-crew-dot${isMe ? ' me' : ''}" title="${escapeHtml(name)}: ${roles.join(', ')}">${roles.join('/')}</span>`;
  }).join('');

  // Status dots
  const commsOn = systems.comms ? 'on' : '';
  const engOn = allSys ? 'on' : '';
  const navOn = state.coordsLocked ? 'on' : '';

  // Left panel: systems + throttle
  const systemRows = Object.entries(COSMOS_BOUND_SYSTEM_OWNER).map(([sysId, ownerRole]) => {
    const isOn = systems[sysId];
    const canToggle = canCosmosBoundInteract(state, ownerRole) && phase < 2;
    const label = sysId.replace(/-/g, ' ').toUpperCase();
    return `
      <div class="cb-switch${isOn ? ' on' : ''}${!canToggle ? ' disabled' : ''}"
           data-action="cosmos-toggle-system" data-system="${sysId}">
        <div>
          <div class="cb-switch-label">${label}</div>
          <div class="cb-switch-status" style="color:${isOn ? 'var(--cb-glow-green)' : 'var(--cb-text-dim)'}">${isOn ? 'ONLINE' : 'OFFLINE'}</div>
          <div class="cb-switch-owner">${ownerRole} STATION</div>
        </div>
        <div class="cb-toggle"></div>
      </div>
    `;
  }).join('');

  const leverDisabled = !canPLT || (phase >= 2 && phase !== 5);

  // Right panel: coordinates + data
  const coordsLocked = state.coordsLocked;
  const coordDisabled = !canNAV || coordsLocked || phase >= 2;

  // COM broadcast section
  const comSection = `
    <div class="cb-panel-title" style="margin-top:6px">COM STATION</div>
    <div style="background:var(--cb-hull);border:1px solid var(--cb-panel-edge);border-radius:8px;padding:8px">
      <div style="font-size:9px;color:var(--cb-text-mid);margin-bottom:4px">BROADCAST MESSAGE</div>
      <div style="display:flex;gap:4px">
        <input class="cb-broadcast-input" id="cosmosBroadcastInput" type="text" placeholder="${canCOM ? 'Enter message...' : 'COM only'}" maxlength="80" ${canCOM ? '' : 'disabled'}>
        <button class="cb-broadcast-btn" data-action="cosmos-broadcast" ${canCOM ? '' : 'disabled'}>SEND</button>
      </div>
      ${state.broadcast ? `<div style="font-size:9px;color:#ff8fa3;margin-top:4px;opacity:.7">LAST: ${escapeHtml(state.broadcast)}</div>` : ''}
    </div>
  `;

  // MED vitals section
  const crewVitals = state.crewVitals || {};
  const vitalsRows = names.map(name => {
    const vital = crewVitals[name] || 'nominal';
    return `
      <div class="cb-vitals-row">
        <span class="cb-vital-name">${escapeHtml(name)}</span>
        <span class="cb-vital-status ${vital}">${vital.toUpperCase()}</span>
      </div>
    `;
  }).join('');
  const medSection = `
    <div class="cb-panel-title" style="margin-top:6px">MED STATION</div>
    <div style="background:var(--cb-hull);border:1px solid var(--cb-panel-edge);border-radius:8px;padding:8px">
      <div style="font-size:9px;color:var(--cb-text-mid);margin-bottom:2px">CREW VITALS</div>
      ${vitalsRows}
      <button class="cb-med-confirm-btn${state.medReady ? ' confirmed' : ''}"
        data-action="cosmos-confirm-vitals" ${canMED && !state.medReady && phase === 0 ? '' : 'disabled'}>
        ${state.medReady ? 'CREW FIT — CONFIRMED' : 'CONFIRM CREW FIT'}
      </button>
    </div>
  `;

  // SCI scan section
  const sciChecks = [
    { label: 'SYSTEMS', ok: allSys },
    { label: 'THROTTLE ≥' + dest.minThrottle + '%', ok: throttle >= dest.minThrottle },
    { label: 'COORDS LOCKED', ok: coordsLocked },
    { label: 'MED CLEARED', ok: state.medReady },
    { label: 'SCI SCAN', ok: state.sciScanComplete }
  ];
  const sciSection = `
    <div class="cb-panel-title" style="margin-top:6px">SCI STATION</div>
    <div style="background:var(--cb-hull);border:1px solid var(--cb-panel-edge);border-radius:8px;padding:8px">
      <div style="font-size:9px;color:var(--cb-text-mid);margin-bottom:2px">PRE-FLIGHT CHECKLIST</div>
      <div class="cb-sci-checklist">
        ${sciChecks.map(c => `<div class="${c.ok ? 'ok' : ''}">${c.ok ? '■' : '□'} ${c.label}</div>`).join('')}
      </div>
      <button class="cb-sci-scan-btn${state.sciScanComplete ? ' scanned' : ''}"
        data-action="cosmos-sci-scan" ${canSCI && !state.sciScanComplete && phase === 0 ? '' : 'disabled'}>
        ${state.sciScanComplete ? 'SCAN COMPLETE' : 'RUN SYSTEMS SCAN'}
      </button>
    </div>
  `;

  // Log lines
  const logHtml = log.map(entry => {
    const d = new Date(entry.t);
    const ts = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    return `<div class="cb-log-line">[${ts}] ${escapeHtml(entry.msg)}</div>`;
  }).join('');

  // Phase action buttons
  const igniteReady = phase === 0 && preflight;
  const launchReady = phase === 1;
  const navReady = phase === 3;
  const landReady = phase === 5;

  // HUD label
  const hudLabels = { 0: 'LAUNCH PAD', 1: 'ENGINES FIRING', 2: 'ASCENDING', 3: 'STABLE ORBIT', 4: 'IN TRANSIT', 5: 'DESTINATION', 6: 'LANDED' };
  const hudText = hudLabels[Math.floor(phase)] || 'STANDBY';

  // Progress labels
  const progressLabels = COSMOS_BOUND_PHASE_LABELS.map((lbl, i) => {
    const cls = i < Math.floor(phase) ? 'done' : i === Math.floor(phase) ? 'current' : '';
    return `<span class="${cls}">${lbl}</span>`;
  }).join('');

  // Mission complete overlay
  // Show landing scene for 5 seconds before overlay appears
  const landedAt = state.landedAt || 0;
  const showOverlay = phase === 6 && landedAt && (Date.now() - landedAt > 5000) && !cosmosBoundOverlayDismissed;
  const missionCompleteHtml = phase === 6 ? (showOverlay ? `
    <div class="cb-complete-overlay">
      <div class="cb-mc-title">MISSION COMPLETE</div>
      <div class="cb-mc-sub">${dest.icon} LANDED ON ${dest.label.toUpperCase()} — ${dest.difficulty.toUpperCase()} MODE</div>
      <div class="cb-mc-stats">
        <div class="cb-mc-stat">
          <div class="cb-mc-stat-val">${state.missionStartedAt ? (() => { const e = Date.now() - state.missionStartedAt; const m = Math.floor(e/60000); const s = Math.floor((e%60000)/1000); return m + ':' + String(s).padStart(2,'0'); })() : '0:00'}</div>
          <div class="cb-mc-stat-lbl">MISSION TIME</div>
        </div>
        <div class="cb-mc-stat">
          <div class="cb-mc-stat-val">${Math.round(state.maxAlt || 0)} km</div>
          <div class="cb-mc-stat-lbl">MAX ALTITUDE</div>
        </div>
        <div class="cb-mc-stat">
          <div class="cb-mc-stat-val">${Math.round(state.maxVel || 0)} m/s</div>
          <div class="cb-mc-stat-lbl">MAX VELOCITY</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;justify-content:center">
        <button class="cb-begin-btn" style="max-width:220px" data-action="cosmos-dismiss-overlay">VIEW LANDING</button>
        ${isHost ? '<button class="cb-begin-btn" style="max-width:220px" data-action="cosmos-restart">FLY AGAIN</button>' : ''}
      </div>
    </div>
  ` : `
    <div style="position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:20">
      <button class="cb-action-btn cb-btn-navigate" data-action="cosmos-show-overlay" style="min-width:auto;padding:8px 16px;font-size:9px">SHOW RESULTS</button>
      ${isHost ? '<button class="cb-action-btn cb-btn-land" data-action="cosmos-restart" style="min-width:auto;padding:8px 16px;font-size:9px;margin-left:8px">FLY AGAIN</button>' : ''}
    </div>
  `) : '';

  return `
    <div class="cosmos-bound">
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:6px">
        ${isHost ? '<button class="btn-secondary" data-action="end-activity" style="font-size:11px;padding:6px 12px">End Activity</button>' : ''}
      </div>
      <div class="cb-cockpit${phase === 2 ? ' cb-rumble' : ''}" style="position:relative">
        <!-- HEADER -->
        <div class="cb-hdr">
          <span class="cb-hdr-title">COSMOS BOUND</span>
          <span class="cb-mission-badge" style="border-color:${dest.color};color:${dest.color}">${dest.icon} ${dest.label.toUpperCase()} — ${dest.difficulty.toUpperCase()}</span>
          <div class="cb-crew-dots">${crewDots}</div>
          <div class="cb-status-bar">
            <div class="cb-status-item"><span class="cb-dot ${commsOn}"></span>COMMS</div>
            <div class="cb-status-item"><span class="cb-dot ${engOn}"></span>ENGINE</div>
            <div class="cb-status-item"><span class="cb-dot ${navOn}"></span>NAV</div>
          </div>
        </div>

        <!-- NEXT STEPS GUIDE -->
        ${(() => {
          const steps = getCosmosBoundNextSteps(state, myRoles);
          if (!steps.length) return '';
          return '<div style="grid-column:1/-1;display:flex;flex-wrap:wrap;gap:6px;padding:6px 12px;background:rgba(0,212,255,.03);border-bottom:1px solid var(--cb-panel-edge)">' +
            steps.map(s => {
              const color = s.done ? 'var(--cb-glow-green)' : s.urgent ? 'var(--cb-glow-orange)' : 'var(--cb-text-mid)';
              const icon = s.done ? '■' : s.urgent ? '▸' : '·';
              const roleTag = s.role ? '<span style="font-family:Orbitron,sans-serif;font-size:7px;letter-spacing:1px;padding:1px 5px;border:1px solid ' + color + ';border-radius:3px;margin-right:4px;color:' + color + '">' + s.role + '</span>' : '';
              return '<div style="font-size:10px;color:' + color + ';display:flex;align-items:center;gap:3px">' + icon + ' ' + roleTag + s.text + '</div>';
            }).join('') +
          '</div>';
        })()}

        <!-- LEFT PANEL -->
        <div class="cb-left">
          <div class="cb-panel-title">SYSTEMS CONTROL</div>
          ${systemRows}

          <div class="cb-panel-title" style="margin-top:6px">THROTTLE</div>
          <div class="cb-lever-container">
            <div class="cb-lever-track${leverDisabled ? ' disabled' : ''}" id="cosmosBoundLeverTrack">
              <div class="cb-lever-fill" style="height:${throttle}%"></div>
              <div class="cb-lever-handle" style="bottom:calc(${throttle}% - 6px)"></div>
            </div>
            <div class="cb-lever-value">${throttle}%</div>
            <div class="cb-lever-label">MAIN THROTTLE · PLT</div>
          </div>

          ${comSection}
        </div>

        <!-- VIEWPORT -->
        <div class="cb-viewport">
          <div class="cb-viewport-frame"></div>
          <div class="cb-viewport-hud">${hudText}</div>
          <canvas id="cosmosBoundCanvas"></canvas>
          <div class="cb-phase-banner" id="cosmosBoundBanner"><span id="cosmosBoundBannerText"></span><div class="cb-phase-sub" id="cosmosBoundBannerSub"></div></div>
          <div class="cb-countdown-overlay${countdownValue != null ? ' show' : ''}" id="cosmosBoundCountdown">
            <div class="cb-countdown-num">${countdownValue != null ? countdownValue : ''}</div>
          </div>
          ${(() => {
            const enc = state.encounter;
            if (!enc || enc.resolved) return '';
            const encDef = COSMOS_BOUND_ENCOUNTERS.find(e => e.id === enc.id);
            if (!encDef) return '';
            const elapsed = Date.now() - (enc.startedAt || Date.now());
            const remaining = Math.max(0, Math.ceil((encDef.duration - elapsed) / 1000));
            let actionBtn = '';
            if (enc.id === 'asteroids') {
              const alive = (enc.asteroidPositions || []).filter(a => a.alive).length;
              actionBtn = '<div style="font-size:10px;margin-top:4px">TAP ASTEROIDS ON SCREEN TO FIRE — ' + alive + ' remaining</div>';
            } else if (enc.id === 'alien') {
              actionBtn = canCOM ? '<button class="cb-action-btn cb-btn-land cb-btn-glow" data-action="cosmos-hail-alien" style="margin-top:6px;min-width:auto;padding:8px 16px">HAIL ALIEN VESSEL</button>'
                : '<div style="font-size:10px;margin-top:4px;color:var(--cb-glow-orange)">COM must send a hailing broadcast</div>';
            } else if (enc.id === 'deathstar') {
              actionBtn = '<div style="font-size:10px;margin-top:4px;color:var(--cb-glow-red)">AIM AT THE GREEN EXHAUST PORT AND FIRE!</div>';
            }
            return '<div style="position:absolute;top:40px;left:50%;transform:translateX(-50%);z-index:8;text-align:center;pointer-events:auto">' +
              '<div style="background:rgba(0,0,0,.75);border:2px solid ' + encDef.color + ';border-radius:12px;padding:10px 18px;box-shadow:0 0 30px ' + encDef.color + '44">' +
              '<div style="font-family:Orbitron,sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;color:' + encDef.color + '">' + encDef.icon + ' ' + encDef.label + '</div>' +
              '<div style="font-size:9px;color:var(--cb-text-mid);margin-top:3px">' + encDef.subtitle + '</div>' +
              '<div style="font-family:Orbitron,sans-serif;font-size:18px;font-weight:700;color:' + encDef.color + ';margin-top:4px">' + remaining + 's</div>' +
              actionBtn +
              '</div></div>';
          })()}
          <div class="cb-log-strip">${logHtml}</div>
          ${missionCompleteHtml}
        </div>

        <!-- RIGHT PANEL -->
        <div class="cb-right">
          <div class="cb-panel-title">NAVIGATION · NAV</div>
          <div class="cb-coord-group">
            <div style="font-size:9px;color:var(--cb-text-mid);margin-bottom:3px">TARGET COORDINATES</div>
            <div class="cb-coord-row"><label>X</label><input class="cb-coord-input${coordsLocked ? ' locked' : ''}" id="cosmosBoundCoordX" type="text" value="${escapeHtml(coords.x)}" placeholder="${targetCoords.x}" ${coordDisabled ? 'disabled' : ''}></div>
            <div class="cb-coord-row"><label>Y</label><input class="cb-coord-input${coordsLocked ? ' locked' : ''}" id="cosmosBoundCoordY" type="text" value="${escapeHtml(coords.y)}" placeholder="${targetCoords.y}" ${coordDisabled ? 'disabled' : ''}></div>

function renderPresentationActivity() {

async function submitIcebreakerAnswer() {
  const answer = (document.getElementById('icebreakerAnswer')?.value || '').trim().slice(0, 280);
  if (!answer) {
    showError('Please enter an answer');
    return;
  }
  
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room.activityState.answers) room.activityState.answers = {};
  
  room.activityState.answers[APP.player.name] = answer;
  
  await RoomManager.updateRoom(APP.roomCode, room);
}

async function nextIcebreakerQuestion() {
  const room = await RoomManager.loadRoom(APP.roomCode);
  const randomQ = ICEBREAKER_QUESTIONS[Math.floor(Math.random() * ICEBREAKER_QUESTIONS.length)];
  room.activityState.currentQuestion = randomQ;
  room.activityState.answers = {};
  
  await RoomManager.updateRoom(APP.roomCode, room);
}

async function submitWordleGuess() {
  const room = await RoomManager.loadRoom(APP.roomCode);
  if (!room || room.currentActivity !== 'wordle') return;
  const answers = room.activityState.answers || {};
  const wordleVotes = room.activityState.wordleVotes || {};
  const isHost = room.host === APP.player?.name;
  const hostTypedWord = isHost ? normalizeWord(hostWordleDraft || getHostTypedWordFromCells()) : '';
  
  if (hostTypedWord.length === 5) {
    room.activityState.guesses.push(hostTypedWord);
    if (hostTypedWord === room.activityState.targetWord) {
      room.activityState.gameOver = true;
    } else if (room.activityState.guesses.length >= 6) {
      room.activityState.gameOver = true;
    }
    room.activityState.answers = {};
    room.activityState.wordleVotes = {};
    hostWordleDraft = '';
    await RoomManager.updateRoom(APP.roomCode, room);
    return;
  }

  if (Object.keys(answers).length === 0) return;
  const validSuggestions = Array.from(new Set(Object.values(answers).map(w => normalizeWord(w)).filter(Boolean)));
  if (validSuggestions.length === 1) {
    const onlyWord = validSuggestions[0];
    room.activityState.guesses.push(onlyWord);
    if (onlyWord === room.activityState.targetWord) {
      room.activityState.gameOver = true;
    } else if (room.activityState.guesses.length >= 6) {
      room.activityState.gameOver = true;
    }
    room.activityState.answers = {};
    room.activityState.wordleVotes = {};
    hostWordleDraft = '';
    await RoomManager.updateRoom(APP.roomCode, room);
    return;
  }

  if (Object.keys(wordleVotes).length === 0) {
    showError('Need at least one vote before submitting.');
    return;
  }
  
  const validSuggestionSet = new Set(validSuggestions);
  const voteCounts = {};
  Object.values(wordleVotes).forEach(word => {
    if (!validSuggestionSet.has(word)) return;
    voteCounts[word] = (voteCounts[word] || 0) + 1;
  });
  
  const mostPopular = Object.entries(voteCounts).sort((a, b) => b[1] - a[1])[0]?.[0];
  if (!mostPopular) {
    showError('No valid voted suggestion found. Ask team to vote again.');
    return;
  }
  
  room.activityState.guesses.push(mostPopular);
  
  if (mostPopular === room.activityState.targetWord) {
    room.activityState.gameOver = true;
  } else if (room.activityState.guesses.length >= 6) {
    room.activityState.gameOver = true;
  }
  
  room.activityState.answers = {};
  room.activityState.wordleVotes = {};
  hostWordleDraft = '';
  
  await RoomManager.updateRoom(APP.roomCode, room);
}

  const state = APP.room.activityState || {};

  const answers = state.answers || {};

  const userGuess = answers[APP.player.name] || '';

  const suggestionWords = Array.from(new Set(Object.values(answers).map(word => normalizeWord(word)).filter(Boolean)));
  const voteCounts = {};
  Object.values(wordleVotes).forEach(word => {
    const normalized = normalizeWord(word);
    if (!normalized || !suggestionWords.includes(normalized)) return;
    voteCounts[normalized] = (voteCounts[normalized] || 0) + 1;
  });
  const topVoteEntry = Object.entries(voteCounts).sort((a, b) => b[1] - a[1])[0] || null;
